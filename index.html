cards:[{q:"Which two of the five leadership dimensions are 'game changers' that separate a solid candidate (score 4) from a great one (score 5), and which three are 'table stakes' where solid candidates already score 4-5?",a:"Game changers: Proactive, Resourceful & Resilient. Table stakes: Ownership & Accountability, Resolve Conflict, Grow Self & Team Continuously."},{q:"What three-part structure should every leadership story follow, and what should precede it?",a:"Context (situation/opportunity), Actions (what you specifically did), Impact (measurable result) — preceded by a one-line summary that explicitly names the dimension(s) being demonstrated and can include a self-assigned score."},{q:"In the 'Proactive' worked example template, what three pieces of information does the Context section need to specify?",a:"The company/team you were at, the product area you were working on, and the specific data/insight and opportunity you identified."},{q:"In the voter-turnout example story, what was the core insight that justified changing strategy?",a:"Even large creators' followers only saw a small fraction of their stories, conversion on those stories was low, and the specific creators who opted in determined who saw election info at all — meaning the creator-led strategy would hit under 10% of the goal, so IG needed to drive registration directly rather than through creators."},{q:"Why should you rehearse each story at two lengths instead of memorizing one script?",a:"Interviewers give varying amounts of time per story; structuring the story as Context/Actions/Impact with sub-bullets (rather than a fixed paragraph) lets you compress to 30 seconds or expand to 20-30 minutes on the same story without losing its shape."},{q:"What's the fastest way to catch a gap in a story's narrative before the actual interview?",a:"Say it out loud — written prep hides pacing and logic gaps that speaking reveals."},{q:"What is the practical implication of the game-changer vs. table-stakes distinction for how you allocate prep time?",a:"Since table-stakes dimensions (ownership, conflict resolution, growing others) are usually already scored 4-5 by solid candidates, prep effort has the highest return when spent making your Proactive and Resourceful & Resilient stories as sharp and self-directed as possible — that's where a 4 vs. a 5 actually changes the hiring outcome."}]},
{id:"intv-12",track:"intv",title:"Verbal Skills: Seven Failure Modes and Deliberate Practice",min:10,
body:`Interviews are fundamentally a different medium than the writing most PMs are trained in, and the gap between "good on paper" and "good in the room" is a **skills gap, not a knowledge gap**. This is a diagnostic-and-drill system: seven specific ways verbal performance breaks down, the deliberate practice exercise for each, and a compression drill for turning long answers into short ones without losing structure.

## Why verbal interviews are fundamentally harder than writing

How we normally work when writing: we write a document by thinking over multiple days; we start over as many times as needed; we edit and iterate multiple times; we get to look at it multiple times to catch mistakes; people evaluate the finished document we wrote.

What happens in a verbal interview instead: the candidate has to figure out the answer in minutes; speak the response out over the course of a few minutes; the interviewer has to listen, understand, and capture it in real time; the interviewer asks follow-up questions to get extra information; the candidate has to understand the follow-up and respond in real time; the interviewer evaluates the candidate based on their own notes, not a re-readable transcript.

The compressed timeline plus the loss of editing and re-reading is what produces the **seven specific failure modes** below — they are not random nervousness, they are the predictable result of forcing a writing-shaped thought process into a speaking-shaped time box.

{{DIAGRAM:0}}

## Failure mode 1: not listening well

The problems: not capturing the question correctly; not understanding the essence of the question; not listening to the interviewer's feedback.

The deliberate practice:

- Build presence through breathing and physical mindfulness.
- Stop writing or typing while listening, since you can't fully listen and capture notes at the same time.
- Repeat back what you heard to the interviewer before answering.
- Don't say anything for **5 seconds** after the person finishes speaking, to truly let it land.
- Figure out what extra information you'd want and ask for it politely.
- Practice this in day-to-day conversations and meetings at work and home, not just mock interviews.

## Failure mode 2: mixing up thinking and speaking

The problems: speaking before thinking; speaking out raw, unrefined thoughts.

The deliberate practice: use "let me think for a few minutes" as your first words after the 5-second rule from failure mode one; **separate thinking time from speaking time** explicitly by writing your raw thoughts down quickly, refining them by grouping, ordering, and removing, and ending with a final bulleted list — only then speak; be explicit out loud when you're switching between thinking mode and speaking mode during the interview, don't blur the two; practice in day-to-day conversations at work.

## Failure mode 3: lacking precision and brevity

The problems: "W-shaped" communication that wanders back and forth instead of a clean line; too many words to say everything; getting repetitive; not comfortable with silence; filler words.

The deliberate practice: use **T-shaped communication**, also known as the **Minto Pyramid Principle** — lead with the top-line answer, then support it; write in short bullet points and practice speaking directly off of them; say what you need to say, then stop; use physical mindfulness to tolerate silence — rub your fingers, take a deep breath instead of filling the gap with words; record yourself and listen back, using apps that surface filler-word patterns; practice in day-to-day conversations at work.

> T-shaped communication — the Minto Pyramid Principle — means leading with the top-line answer first, then supporting it, instead of wandering "W-shaped" toward the point.

## Failure mode 4: a fight-or-flight collaboration model

The problems: agreeing with the interviewer without genuinely thinking it through, which is intellectual dishonesty; disagreeing without genuinely thinking it through; asking the interviewer which direction to go and just taking hints as the answer; pivoting away from minor feedback that wasn't actually a signal to change course.

The deliberate practice uses three explicit mental models:

- **View the interview as an intellectual debate** where the goal is to arrive at the right answer — yes, you want to demonstrate competence, but at the same time you want to arrive at the right conclusion rather than just proving you were right from the start.
- **When you get feedback from the interviewer:** re-evaluate your ideas honestly; change your mind if the new information genuinely leads to a new conclusion; don't change your mind if you still think your original assessment was right; explain your reasoning either way, for changing your mind or for sticking with your original take.
- **When you seek input from the interviewer:** get background information, but not what-answer-they-want information; use context and scope constraints as they're given to you, since they exist to force useful constraints on the problem; treat any input on solutions as one input, not gospel — don't try to get the interviewer to hand you the answer, and don't over-pivot on their words, since interviewers generally don't want to spoon-feed information.

{{DIAGRAM:1}}

## Failure mode 5: not managing time well

The problems: losing track of time; going too deep on one part of the question; getting stuck and not making progress on a specific part; getting sidetracked into topics not relevant to the question.

**For tracking time:** build a mental model for time allocation per interview type — Product Thinking is roughly 3–5 minutes per portion of the response, Analytical Thinking is roughly 5–10 minutes per question, Leadership is roughly 3–5 minutes per question; use template docs or printouts, or the clock in the interview room plus a whiteboard note, to track elapsed time; check in with yourself every few minutes, using a practical heuristic of breaking a 40-minute interview into eight 5-minute chunks and re-evaluating progress at each boundary.

**For avoiding rabbit holes:** prevent them with hierarchical bullet points, since a visible outline keeps you from tunneling; get out of one by creating a tree, summarizing your new thinking to make sure the interviewer understands it, and explicitly deciding where in the tree you're going to focus next.

**For getting unstuck on a section:** switch into brainstorming mode with no self-judgment and write down everything that comes to mind; generate roughly 10 ideas for the sub-problem, expecting the first one to be easy, ideas two through four to be hard, and ideas five through ten to get easy again as you loosen up; then evaluate the ideas, and if literally nothing is coming to mind, say so out loud rather than freezing silently.

**For getting back on track after drifting:** prevent it by setting up the structure of your response upfront and being explicit about what you want to be perceived as; notice you've drifted by watching for disconnection cues from the interviewer, since they'll stop paying attention; recover by closing out the current tangent, getting their attention back, deciding where you want to take the interview next, then explicitly narrating the recovery — "let me take a minute to think again," "I went off track, let me reset this," "here's my new framing."

## Failure mode 6: the interviewer's mental state

Context you don't control, but should account for. They may have just been in a project meeting or product review; their last meeting may or may not have gone well; they're scrambling to find the interview room; they were stuck in traffic on the way in; they had a fight at home or work right before the meeting; their kid is sick and they just got a call from school.

The deliberate practice is a three-part approach:

- Help the interviewer **reset and let go of the other stuff** by asking how their day is going, which doubles as a reminder for them to close out loose ends in their own mind before the interview starts.
- **Don't over-socialize** with them at the beginning — hold LinkedIn-research small talk for the end of the interview instead of the start.
- **Earn their undivided attention** by letting them settle in and set up their own interview systems, like a notes doc or timer, before you dive in.

## Failure mode 7: the interviewer's perceived capabilities

Their own ability to listen and capture information, and their ability to engage with the direction you're taking the question. Four sub-skills to actively manage on your side:

- Make sure they are **100% present** through the entire interview by always looking at them to confirm you have their attention and always connecting before you start speaking.
- **Bring them along** with your thinking by sharing your structure upfront, explicitly going back to the structure and stating where you are within it as you move through the answer, and keeping numbered lists in each section so they can track your position.
- **Help them capture notes** to go back and review by slowing down your speech, using pauses to let them finish typing or catch up, being clear in your words and not swallowing them, and communicating in short sentences.
- **Manage their ability to engage** in the direction you're taking the question by remembering they usually want a specific answer, they know some information from past experience and know some directions are wrong, and they're willing to explore any direction you take without prior judgment — so state your direction confidently rather than hedging.

## Practicing verbal skills: the drill progression

{{DIAGRAM:2}}

**Speed thinking**, by speed-writing deliberate practice, means doing all of the same exercises from the earlier failure-mode drills, but under progressively shorter time limits to simulate real interview pressure: Product Thinking goes 3 hours → 1 hour → 30 minutes → 15 minutes; Analytical Thinking goes 30 minutes → 15 minutes → 10 minutes → 5 minutes; Leadership goes 10 minutes → 5 minutes → 1 minute. Evaluate every attempt against the same criteria interviewers use, and ask a peer for structured feedback.

**Communication practice** — for 100% presence, deep listening, and precise speaking — works section by section (context, segmentation, problems, solutions): do 4 minutes writing plus 4 minutes speaking, then 2 minutes writing plus 4 minutes speaking, then 1 minute writing plus 4 minutes speaking — compressing the thinking and writing time while holding the speaking clarity constant. Evaluation: record yourself and listen back, write down feedback, redo it again and again until it's succinct; identify your own speech and communication patterns and work on them directly.

**Speed story writing** — writing bulleted story arcs — uses a worked example: the question "Tell me about a time when you got buy-in for an idea when no one believed in it," with the goal of demonstrating proactivity and resourcefulness. The story arc template is **Role** (Company A, Project B) → **Opportunity** (Insight, Challenge and Opportunity) → **Actions** (Prototype, Pitch, Funding, Launch) → **Impact on Company or Team** (Result). This is the same fill-in-the-blank story-arc discipline covered in depth in the companion note on leadership interviews; this deck adds the speed-writing angle specifically.

**Verbal storytelling** — speaking precisely — applies the same compression pattern to stories: 4 minutes writing plus 4 minutes speaking, then 2 minutes writing plus 4 minutes speaking, then 1 minute writing plus 4 minutes speaking. Evaluation: record and listen, write down feedback, redo until succinct; identify and fix your own speech and communication patterns.

**Putting it all together** — full verbal interview, self and partner — has two modes. Full self-interviews run 6 or 8 questions back-to-back, each at 1 minute writing plus 4 minutes speaking; record and self-evaluate using an interview rubric. Mock interviews with a partner use the same drill structure, but ask for structured feedback from another person rather than only self-evaluating.`,
takeaways:["Verbal interviews strip away everything that makes writing forgiving — multi-day thinking time, unlimited edits, re-readability — which is why the same PM can be strong on paper and weak in the room; treat it as a distinct skill requiring its own deliberate practice, not an extension of writing skill.","The seven failure modes cluster into two groups: candidate-side (listening, thinking/speaking separation, precision/brevity, collaboration mode, time management) and context-side (interviewer's mental state, interviewer's capability to follow you) — prep for both, since you can't fix the interviewer but you can manage around them.","The core discipline threading through nearly every fix is separating thinking from speaking: write raw thoughts fast, refine into a bulleted structure, only then speak off the structure — this single habit resolves failure modes 2, 3, and 5 simultaneously.","Compress by cutting sub-bullets, not restructuring: every drill (4min+4min → 2min+4min → 1min+4min) keeps the speaking time and the underlying structure constant while shrinking only the thinking/writing time, which is what lets you compress live in a real interview without losing the shape of your answer.","Silence is a tool, not a failure — the 5-second rule after listening, and physical mindfulness (breathing, rubbing fingers) to tolerate silence while thinking, are both explicit techniques, not accidents of a slow speaker."],
cards:[{q:"What are the seven verbal-skill failure modes identified in the deck?",a:"(1) Not listening well, (2) mixing up thinking and speaking, (3) lacking precision and brevity, (4) fight-or-flight collaboration model, (5) not managing time well, (6) interviewer's mental state, (7) interviewer's (perceived) capabilities."},{q:"What is the recommended mental-model reframe for handling interviewer feedback under failure mode 4 (fight-or-flight collaboration)?",a:"View the interview as an intellectual debate aiming at the right answer — genuinely re-evaluate your idea when new information warrants it and say so, but don't change your mind just because you were challenged; explain your reasoning either way, and don't try to extract 'the answer' from the interviewer or over-pivot on their casual words."},{q:"What is the rough time-allocation heuristic per interview type used for time management (failure mode 5)?",a:"Product Thinking: ~3–5 minutes per portion of the response. Analytical Thinking: ~5–10 minutes per question. Leadership: ~3–5 minutes per question. A 40-minute interview can be mentally chunked into eight 5-minute checkpoints."},{q:"What three things should you do to help an interviewer with a rough mental state (failure mode 6) without over-investing time?",a:"Ask how their day is going (lets them mentally close loose ends), don't over-socialize at the start (save LinkedIn-research small talk for the end), and let them settle in and set up their own interview systems before diving in."},{q:"What is the compression drill pattern used across speed-thinking, communication, and verbal-storytelling practice?",a:"Progressively shrink the writing/thinking time while holding the speaking time constant (e.g., 4 min writing + 4 min speaking → 2 min writing + 4 min speaking → 1 min writing + 4 min speaking), then record, self-evaluate, and redo until the answer is succinct at each compression level."},{q:"What does 'T-shaped communication' / Minto Pyramid mean as a fix for failure mode 3 (lacking precision & brevity)?",a:"Lead with the top-line answer first, then support it with detail — as opposed to 'W-shaped' communication that wanders back and forth before arriving at the point."},{q:"What is the story arc template used in the speed story writing drill?",a:"Role (Company A, Project B) → Opportunity (Insight, Challenge and Opportunity) → Actions (Prototype, Pitch, Funding, Launch) → Impact on Company or Team (Result)."}]},
{id:"intv-13",track:"intv",title:"Interview Mindset: Saboteurs, Rejection, and Negative Emotions",min:9,
body:`Mindset is treated as a skill with its own deliberate practice, structured around three problems: the psychological baggage from past jobs and rejections that gets in the way of showing up as your best self, the internal "saboteur" thought patterns that baggage creates and how to counter them, and how to manage negative emotions live, during an actual interview, when something has already gone wrong.

## Why mindset is scored even though it's invisible

The starting premise: we want to show up as our best self as a human being and leader, put our best foot forward answering questions, and let other people see the best version of us. What blocks that isn't lack of preparation — it's **baggage** carried from past jobs and career progression, scars from rejections in the current or previous job search, and negative emotions generated during the live interview process itself.

## Desirable vs. undesirable traits interviewers pattern-match on

Interviewers are triangulating on the same four traits from both directions.

- **Desirable:** Competent looks like good pedigree and strong skills; Confident looks like "will figure it out" and a growth mindset; Likable looks like having something to admire about them, something to learn from them, being easy to work with, and having no ego; Social Proof looks like the current company wanting them and other companies wanting them.
- **Undesirable:** Not Competent looks like a lack of pedigree or lack of skills; Over- or Under-Confidence looks like being a know-it-all, saying "it is easy, if only they let me do it," saying "I am great, they didn't recognize my greatness," or saying "I'm not sure I can do this job"; Not Likable looks like something that turned the interviewer off, not being collaborative, not taking feedback, being entitled, or saying "it's your loss" or "how do you have this job while I don't"; No Other Options looks like communicating that you have no other options and that you desperately want this job.

{{DIAGRAM:0}}

The undesirable column is a direct map of what saboteur mindsets produce when left unmanaged — over-confidence, victimhood, and desperation all show up here as concrete interviewer-visible behaviors, not abstract flaws.

## Shedding baggage from past job experiences

The baggage itself: missed opportunities, perceived unfairness, social comparison, bad manager or coworker relationships, unhappiness with company culture, financial and family pressure.

The **"saboteur" framework** comes from the **Positive Intelligence saboteur assessment** (positiveintelligence.com/saboteurs) — a named, external framework rather than a generic list. Nine saboteurs are scored on a self-assessment:

- Stickler, Hyper-Achiever, Pleaser, Controller, Avoider, Restless, Hyper-Rational, Victim, Hyper-Vigilant.

No one fits any single saboteur completely — the point of the assessment is to notice which ones speak to you and look for the general pattern, not to over-identify with a label.

## From saboteur mindset to interviewer-visible failure

Saboteur mindsets create seven specific undesirable mental states: judging ourselves, other people, and our situation; feeling like a victim; being focused on pleasing people; being constantly restless; trying to control situations and people; being worried about things going wrong; and aiming for perfection.

Each mindset translates directly into an undesirable interview action:

- Judging ourselves causes not showing up as a confident person.
- Judging others and situations causes coming off as not taking ownership and accountability, and can also come off as arrogant.
- People-pleasing comes off as incompetent and desperate.
- Restlessness shows up as being unprincipled in decision-making.
- Controlling comes off as inflexible, not collaborative, and not taking feedback.
- Worrying comes off as not being confident.
- Perfectionism comes off as not being confident and not being competent.

This table is the practical payoff of the whole saboteur framework: it's not therapy-speak, it's a **direct causal chain** from an internal mental pattern to a specific interviewer-visible failure mode.

## Switching from saboteur to sage

The **"sage"** mindset is the counter-state to aim for: radically accept the situation, understand the problem deeply, brainstorm ideas, make a principled decision, take action now.

**Baseline improvements**, done ahead of time, not in the moment: take the saboteur survey and identify which saboteur mindsets you personally have from the list above; name your saboteurs whenever you encounter them; visualize your saboteurs "at their worst" to build recognition; debug what in your childhood led to these saboteurs; journal about them to shift mindset; turn past challenges into gifts.

{{DIAGRAM:1}}

**Switching in the moment**, during the actual interview: recognize that you are switching to a saboteur mindset; name it internally; tell yourself you will come back to it later; tell yourself you are switching over to sage mode; ask what you can do right now to have the best outcome in this situation.

The **journaling structure** for baseline improvement work runs five prompts in this order: **Feeling** (what is the name of the feeling I'm experiencing?), **Facts** (what really happened that is causing me to feel this way?), **Stories** (what assumptions am I making about the situation?), **Reframe stories** (what's an alternate hypothesis?), and **Plan and Act Now** (what actions can I take to improve the situation, and what will I do now?).

Finding gifts in challenges means looking for three categories: **the gift of knowledge, the gift of power, and the gift of inspiration**. This is the practical technique behind "turn the past challenges into gifts" from the baseline-improvement list above.

## Bouncing back from rejection during job interviews

Grounding the topic in real numbers, the deck author uses his own rejection history explicitly as proof that "most of us have faced rejection": rejected by all top-10 US CS PhD programs, twice, in 2002 and 2003; rejected by all top-10 US MBA programs without even getting an interview in 2010; rejected by Google, YouTube, LinkedIn, Facebook, and Yelp in 2011 and 2012; Google declined to interview him again in 2017, before he eventually landed the Meta job.

Rejection creates three specific failure states, each with its own self-talk pattern:

- **Chip on our shoulder** sounds like "Let me show you how good I am," "It's your loss if you don't choose me," "How do you have a job here while I don't?", "I am better than you."
- **Fear of more rejection** sounds like "We don't want to go through it again," "We want to somehow please people or plead with people to accept us," "We don't feel comfortable saying what we think," "We don't feel comfortable pushing back or debating," "We feel this is our only shot."
- **Feeling unworthy** sounds like "We start looking down on ourselves as human beings," "We think we're lucky to even get this interview," "We're lucky if we get this job."

Each of these three states maps directly back to the undesirable-traits pattern earlier — chip-on-shoulder produces the entitled, "it's your loss" behavior; fear of rejection produces desperation and people-pleasing; feeling unworthy produces under-confidence.

## Reframing what determines company recruiting decisions

It's mechanics, not judgment of you personally. What makes a company desirable to candidates: current compensation, future compensation, network and quality of people, market growth potential, company growth rate. Companies tend to fall into tiers by what they offer: places everyone wants to work right now that pay well in current compensation; places everyone wants to work right now that pay well in future compensation through equity upside; and "stepping stone" companies that help you build real product skills, get a real PM title, and earn a paycheck in a PM-related role toward the company you actually want next.

**How companies screen and choose candidates:** companies build an ideal-candidate profile based on their own desirability, create filters to identify candidates matching that profile, and ask for referrals — a referral only carries weight when it's substantive, something like "I worked with this person and they are incredibly good, I saw this in X project in Y ways," essentially an interview-feedback-style note; otherwise the candidate goes through standard filters, possibly a bit faster. Hiring approach splits into a general pool versus specific roles; decision-making follows either:

- **"Meet a certain bar"** for general PM loops, where you clear a bar, get an offer, and do team-matching later.
- **"Satisficing,"** where an offer goes to the first candidate who hits the bar after interviewing at least a set number of candidates.
- **"Best candidate in the world,"** where the company knows exactly what great looks like for this specific role and goes and gets the best person in the world for it.

How to interpret a rejection correctly, given all of the above: there is a lot of competition in the world — it is not a judgment of you as an overall person or your full potential, it is just a comparative evaluation of your current pedigree and skills against everyone else currently in the market. There are gaps between you and the people who are landing at different companies, across four specific dimensions: **Pedigree, Skills, Perception, and the Recruiting Game itself** — understanding the mechanics above, not just having the qualifications. Ask yourself which parts you can improve now, which you need to improve over a longer horizon, and what to change about the companies and roles you're targeting given this result.

What you actually have control over, regardless of any individual rejection: which companies you choose to be desirable for; how you represent your work as outcomes, not just activities; how you set yourself up for the next-next job, not just the immediate one; and the fact that every career step is an incremental one.

## Managing negative emotions during live interviews

What creates negative emotions in the interview itself splits into two clusters of triggers:

- **Circumstantial triggers:** not enough time to prepare; didn't get the right time slot or day of the week; got a bad interviewer; stuck in traffic; didn't wear well-fitting clothes; sweating too much; didn't eat appropriately.
- **Self-inflicted mid-interview triggers:** back pain; didn't sleep well; dog was sick; feeling you could have done better in the previous interview slot of the same loop; made a mistake and need to backtrack; misspoke a word.

{{DIAGRAM:2}}

The reframe uses three mantras explicitly in sequence:

- "Just like in sports, the match is now, and you want to win in this time window" — the earlier slots, prep gaps, or bad luck are sunk; only the current window is actionable.
- "You don't have to be perfect — you just need to be better than the other candidates" — given the satisficing and meet-a-certain-bar recruiting mechanics from the rejection section, perfection is not the actual bar being cleared.
- "You need to hit a certain bar" and "you just need to give it all you have on that day" — the achievable goal is full effort within the window, not a flawless performance.

> You don't have to be perfect — you just need to be better than the other candidates, and to give it everything you have inside this specific time window.

How you actually execute this in the moment: focus on inputs, not outputs — you control your preparation and effort in the next five minutes, not the interviewer's internal scoring; do your best given the actual circumstance you're in, not the ideal one; make the full time count; focus on this moment only, not the slot before, not the slot after.`,
takeaways:["Mindset problems are not vague — the deck maps specific internal saboteur states (judging, people-pleasing, controlling, worrying, perfectionism, etc.) to specific interviewer-visible failure modes (under-confidence, incompetence, inflexibility, arrogance), so fixing mindset is a traceable, not fuzzy, exercise.","Use the Positive Intelligence saboteur framework by name (positiveintelligence.com/saboteurs) to identify your own patterns rather than guessing generically — the deck explicitly warns no one fits any saboteur completely, so look for the general pattern, not a diagnosis.","Rejection has a mechanical explanation (company desirability, recruiting-decision mode — bar-clearing vs. satisficing vs. best-in-world) that is worth understanding before internalizing rejection as a personal verdict; the four real gaps to work on are pedigree, skills, perception, and understanding the recruiting game itself.","In-the-moment emotional management is a three-step sequence: recognize you're in a saboteur/negative state, name it, defer it — then explicitly switch to asking 'what's the best action right now' rather than trying to resolve the underlying feeling mid-interview.","Focus on inputs (your effort and preparation in this window) rather than outputs (the interviewer's scoring, or how a previous round went) — this is the same 'focus on this moment only' discipline as the time-window mantra."],
cards:[{q:"What framework does the deck use by name for identifying personal 'saboteur' thought patterns, and how many saboteurs does it list?",a:"The Positive Intelligence saboteur assessment (positiveintelligence.com/saboteurs) — nine saboteurs: Stickler, Hyper-Achiever, Pleaser, Controller, Avoider, Restless, Hyper-Rational, Victim, Hyper-Vigilant."},{q:"What specific interviewer-visible failure does 'people-pleasing' as a saboteur mindset directly cause, per the deck's causal table?",a:"It comes off as incompetence and desperation."},{q:"What are the three psychological states that rejection creates, and what does each sound like internally?",a:"Chip on the shoulder ('it's your loss,' 'I'm better than you'); fear of more rejection (can't say what you think, feel it's your only shot); feeling unworthy (looking down on yourself, feeling lucky just to be interviewed)."},{q:"What are the three recruiting decision-making modes companies use, and how do they differ?",a:"'Meet a certain bar' (clear a bar in general PM loops, get an offer, do team matching later), 'satisficing' (offer goes to the first candidate who clears the bar after interviewing at least X candidates), and 'best candidate in the world' (a specific role with a precise profile in mind, and they go find the best global fit for it)."},{q:"What is the five-step journaling structure for baseline mindset improvement?",a:"Feeling (what's the name of the feeling?) → Facts (what actually happened?) → Stories (what assumptions am I making?) → Reframe stories (what's an alternate hypothesis?) → Plan and Act Now (what actions can I take, what will I do now?)."},{q:"What is the in-the-moment (not baseline) technique for switching from a saboteur to a sage mindset during a live interview?",a:"Recognize you're switching into a saboteur mindset, name it, tell yourself you'll come back to it later, tell yourself you're switching to sage mode, then ask 'what can I do right now to have the best outcome in this situation?'"},{q:"What are the three categories to look for when 'finding gifts' in a past challenge?",a:"The gift of knowledge, the gift of power, and the gift of inspiration."}]},
{id:"intv-14",track:"intv",title:"XFN Partnerships: Goals, Incentives, and Working Models",min:10,
body:`Cross-functional (XFN) partnership is scored explicitly in most PM interview loops, usually as its own dedicated round or woven into the leadership round. This covers what that round is actually evaluating, what each function on your team is individually incentivized by, how to structure a working model with each of them, and the mindset shift that separates a PM who partners well from one who merely "manages" partners.

## What the XFN interview is actually scoring

There are two tiers of goals, each with its own "aka" label the interviewer is privately scoring against.

- **Primary goals**, the baseline bar: can this PM partner with different functions effectively, aka Empathy & Working Model; can this PM adapt to the capabilities of their peers, aka Adaptability & Delegation; can this PM set up good execution cadence for the team, aka Project Management; can this PM leverage the team effectively, aka Delegation; will the team have a voice in product direction, aka Empowerment; will this PM create space for their peers to shine, aka Credit & Visibility.
- **Secondary goals**, the differentiators: can I trust this PM with the success of my team, aka Product Thinking & Execution, probed via whether they will speed the team up or slow it down, amplify or dampen it, or hold it back; will they help the team grow stronger, aka Leadership - Grow team & self; can they align the team, aka Leadership - Conflict Resolution.

Notice the framing: every primary goal is phrased as a **yes/no risk question from the XFN partner's point of view** — can I trust this person with my team's success, growth, or voice — not from the PM's point of view. Prepping for this round means being ready to answer each of these questions with a specific story, not a general philosophy statement.

{{DIAGRAM:0}}

## What each function is individually incentivized by

The core insight: incentives are **not uniform across a team**. "Motivate the team" as a strategy fails because Engineering, Design, Data Science, Legal, and Sales are each optimizing for different things. A PM who can name each function's incentive structure specifically will out-partner one who treats "the team" as a monolith.

**Incentives that apply to everyone regardless of function:** Impact Now means landing or exceeding current high-priority goals and not wasting time on unnecessary fires; Growth Areas means showing progress on the past cycle's growth areas; Visibility means building visibility for the team's work and building one's own reputation; Org Building means strengthening the organization for the long run; Future Planning means identifying the next set of big bets to grow the business or one's own scope in the future, and protecting against downsides from ecosystem and organizational changes.

**Incentives specific to function:**

- **Product Managers** care about clear strategy, fast execution, well-defined metrics, and a healthy XFN team set up for the long term.
- **Engineers and Tech Leads** care about large system redesign, engineering complexity and realistic timelines, learning new tech, and tech debt.
- **Engineering Managers** care about realistic goals, team health, IC scope and career plans, XFN collaboration, and an empowered team.
- **Product Design** cares about consistent design systems, solving user problems completely rather than doing the most MVP-minimal thing, elegant solutions, and piecemeal launches versus large cohesive redesigns.
- **Data Science** cares about generating insights rather than just pulling data, solving large problems rather than tactical sizing asks, debugging experiments, and impacting product strategy and investment.
- **User Insights (UXR)** cares about being user-centered, having the right collaboration to have product impact, and identifying product opportunities through UXR in a timely manner.
- **Policy** cares about scalable policies, consistent enforcement, and looking ahead of regulatory risks.
- **Legal** cares about ensuring products meet legal requirements in the strictest defensible sense and protecting the company from liability.
- **Sales** cares about whether the company is being responsive enough to what the market wants and dealing with customer objections fast enough.
- **Marketing** cares about having a say in what gets built, consistency between how the product is talked about externally and internally, and being involved early enough to plan the full marketing motion.

Practical implication: before a project kickoff with a new XFN partner, you should be able to state their incentive in one sentence from the list above — **it changes how you frame the ask.**

## The mindset shift: XFN as scale, not competition or friction

Two explicit reframes are insisted on.

**First, don't view XFN as competition** — view them as a way to scale yourself. Two forces make this necessary: functions overlap at senior levels, since design, engineering, research, and data science leaders all start shaping strategy and driving product direction as part of their own performance evaluation, so friction over "whose call is it" is structural, not personal; and many XFN partners actively aspire to become PMs themselves — other than rotational PMs, everyone else was in a different function before switching to PM. Given both forces, the productive response is to understand each partner's career aspirations and growth goals, view them as literally helping your team scale instead of as competing with you, and leverage them to take on parts of what you'd normally consider "PM work" if they're interested — while giving them feedback to hold the bar. The closing line: **play the long game — winning is talented people wanting to work with you on important problems.**

**Second, don't view XFN as slowing you down** — view them as helping you build a better product. The practical version of amplifying and leveraging talented, opinionated XFN partners: trust that you have subject-matter experts who are talented in every function; every function exists to help build a better product and avoid traps later; involve them early even though it feels slower, since you will not regret it; listen to their feedback early and address it, where **addressing does not mean agreeing** — you can hear a concern seriously and still decide differently.

> Addressing feedback does not mean agreeing with it — you can hear a concern seriously and still land on a different decision.

## Working model: the concrete mechanics

Four questions define a working model with any XFN partner, and should be made explicit rather than left implicit: how do you divide responsibilities, how do you work on a project together, what cadence do you meet, and what is the collaboration style?

{{DIAGRAM:1}}

**Dividing responsibilities in practice:** between you and your XFN counterpart, everything that needs to be done needs to get done — team composition might be EM plus PM plus Design plus Eng, or EM plus PM plus Design plus DS plus Eng, or the fuller EM plus PM plus Design plus DS plus UXR plus PMM plus Eng. Whoever is left over after natural role assignment is the fallback for anything that doesn't have an obvious owner. Divide by asking what the team needs, what people want to do for their career growth, and what people want to do to demonstrate they've handled their growth areas.

## Two worked examples: PM/Design and PM/Data Science

A worked example of a **PM/Design working model**: align with Design on the problem being solved and constraints for solutions, and on timelines to finalize design and intermediate milestones like product review dates and team feedback. Working cadence is a PM plus Design working session every 2 days, or 2–3 times a week, or daily. The sequence runs:

- Brainstorm high-level directions together.
- Agree on directions to prioritize for low-fidelity designs.
- The designer explores the space and the pair reviews together and aligns on a shortlist.
- The designer fleshes out higher-fidelity mocks for the shortlisted directions.
- The pair reviews together and agrees on what to keep or forget.
- They work on a review deck outline together.
- The designer works on some portion while the PM works on some portion.
- They run product reviews together with the designer leading some sections and the PM leading or supporting others.

A worked example of a **PM/Data Science working model** follows an identical shape: align on what decisions you're trying to make and what data points matter, agree on timeline, constraints, and milestones, hold working sessions every 2 days or 2–3 times a week, brainstorm high-level analysis directions together, have DS explore and align on a shortlist, DS fleshes out higher analysis, summarize findings, build the review deck outline together, split the work, and run reviews together with DS leading some parts.

**Adapting to different seniority levels — Adaptability & Delegation** — means the more senior the XFN partner, the more you expect them to handle planning, process, and exploration independently without doing everything jointly with you. For junior people, pair on the problem, solutions, and prioritization directly. For senior people, pair on higher-order bits only, let them do more solo work, and use frequent touchpoints to stay aligned rather than co-working every step.

## Project management setup

**"Good Execution Setup"** means defining the goals, the workstreams, what roles people play on the project, who is accountable for which components, the timelines, how the team collaborates asynchronously versus synchronously, who the stakeholders and decision-makers are, how decisions get made, and what the upcoming decisions and reviews are.

The **"Extreme Clarity" template** for a project's operating structure is a reusable checklist to fill in at kickoff:

- **Goals and key decisions** to be made.
- **People**, meaning the core team of feedback leads, decision leads, sponsor, a governance body, and the extended team.
- **Forums**, meaning Slack channels, WIP groups, chat, email alias, and meetings, both recurring and open.
- **Workstreams**, for example WS1/WS2/WS3, each with named DRIs — directly responsible individuals — per function.
- **Timeline**, meaning V0, V1, feedback-leads check-in, and decision-making review.
- **Review schedule** of named decision points, each with a date, a named owner, and a linked WIP doc.

{{DIAGRAM:2}}

## Empowerment and credit — the two "soft" primary goals

**Voice for the team, or Empowerment,** means transparency, inclusive culture, explainable decision-making, and actively sharing responsibilities that could look like "PM work" with the team rather than hoarding them.

**Let them shine, or Credit & Visibility,** means weekly updates that name contributors, giving credit in reviews, all-hands shoutouts, explicit thank-yous, and folding recognition into performance feedback conversations rather than leaving it informal.

**Caring for people** is a distinct, higher bar: understand each person's career aspirations; mentor everyone on your engineering, DS, design, or XFN team who wants it, regardless of whether they report to you; coach on PM-adjacent skills like writing, decks, communication, and running reviews; help people with their promo packets and performance feedback. This is explicitly framed as going beyond the working relationship into genuine investment in people's careers.`,
takeaways:["The XFN interview scores six primary goals (empathy/working model, adaptability/delegation, project management, delegation, empowerment, credit/visibility) as the baseline, and three secondary/differentiating goals (trust with team success, growing the team, resolving conflict) — prep a specific story per goal, not a philosophy.","Each function has a distinct incentive — memorize the list (PM: strategy/execution/metrics; Eng: system quality/realistic timelines; Design: complete solutions not MVP-minimal; DS: insight not just data-pulling; Legal/Policy: defensible risk posture; Sales: market responsiveness; Marketing: early involvement and message consistency) and name it explicitly before making an ask.","Reframe XFN twice: as a way to scale yourself (not competition) and as what makes your product better (not what slows you down) — both reframes show up as the specific behavior of involving partners early and giving credit visibly.","A working model has four explicit dimensions (responsibility division, collaboration mechanics, cadence, style) and should scale by seniority — co-work everything with juniors, co-work only the higher-order bits with seniors and let them run solo with frequent touchpoints."],
cards:[{q:"What are the six primary goals scored in an XFN interview, and what 'aka' label does each map to?",a:"Partner effectively (Empathy & Working Model), adapt to peers' capabilities (Adaptability & Delegation), set up execution cadence (Project Management), leverage the team (Delegation), give the team a voice (Empowerment), create space for peers to shine (Credit & Visibility)."},{q:"What are Product Design's and Data Science's specific incentives, per the deck's breakdown?",a:"Product Design: consistent design systems, solving user problems completely (not the most MVP-minimal thing), elegant solutions, piecemeal vs. large cohesive redesign tradeoffs. Data Science: insights vs. just pulling data, solving large problems vs. tactical sizing asks, debugging experiments, impacting product strategy and investment."},{q:"Why does the deck say friction between PMs and senior XFN partners is often structural rather than personal?",a:"Because functions overlap at senior levels — design, engineering, research, and DS leaders are themselves evaluated on shaping strategy and driving product direction, and many aspire to become PMs, so overlap in 'who owns direction' is baked into how those roles are incentivized."},{q:"How should a working model change between a junior and a senior XFN partner on the same function?",a:"With juniors, pair directly on problems, solutions, and prioritization (more co-working). With seniors, pair only on higher-order bits, let them explore and execute more independently, and rely on frequent touchpoints to stay aligned instead of co-working every step."},{q:"What are the five fields in the 'Extreme Clarity' project-setup template?",a:"Goals & key decisions, People (core + extended team with named roles like feedback leads/decision leads/sponsor), Forums (Slack/email/meeting cadence), Workstreams (with named DRIs per function), and a Review Schedule (named decision points, each with date/owner/WIP doc)."},{q:"What does 'address ≠ agree' mean in the context of listening to XFN feedback?",a:"Taking a partner's feedback seriously and responding to it explicitly (addressing it) is not the same as adopting their recommendation (agreeing with it) — you can hear and engage with a concern thoroughly and still land on a different decision."},{q:"What incentive is shared by literally every function, regardless of role, and what does it mean in practice?",a:"Impact Now, Growth Areas, Visibility, Org Building, and Future Planning apply to everyone. Impact Now specifically means landing or exceeding current high-priority goals without wasting time on unnecessary fires — the baseline every function is measured against before their function-specific incentives even come into play."}]},
{id:"intv-15",track:"intv",title:"Relationships & Reputation: Trust Hierarchy and Managing Up",min:11,
body:`This covers how to deliberately build strong relationships and a strong reputation across three groups a PM depends on: XFN peers broadly, XFN peers specifically in 1:1s, and your own manager. It's focused specifically on relationship mechanics: what makes someone trust and like you, a concrete trust-building sequence, and an operational system — 1:1 cadence, shared agenda docs, relationship-health monitoring — for sustaining it.

## The goal and the definition

What great relationships produce: **amazing people wanting to do more work with you on more complex problems.** That's the single-sentence definition of the payoff — not just goodwill, but people actively opting to bring you harder, more interesting problems because they want to work with you specifically.

What makes a relationship "strong" breaks into four questions, each with its own sub-criteria.

**Do they like you?** Liking is framed as something you initiate, not wait for — "you'd better start liking them now." Do they relate to you? Do they admire something in you? Do they think you care about them? Do they think you have their back? This is stated bluntly as a job requirement: **it is your job to like every one of your key stakeholders.**

**Do they trust you?** Five sub-dimensions: **reliability**, meaning do they think you make and keep your commitments; **competence**, meaning do they think you can solve the problems you're given; **team leadership**, meaning do they think your team trusts you; **ambition and velocity**, meaning do they think you can move as fast as they want you to; and **integrity**, meaning do they think you'll represent them well when they're not in the room.

**Do they have enough context and interactions to help you?** Do they understand your area, goals, and projects at the right level of detail? Do they know your opportunity, your risks, and your delivery timeline? Do they know your ecosystem well enough to help you when the time comes? Have you repeated the necessary information enough times that they've internalized the nuances at their level? Have you given them time to process the information, form their opinions, raise concerns, and build support for you?

**Do they think you can help them?** Do you understand their challenges and goals well enough? Are you delivering on their can't-fails? Are you finding ways to support them? Are you taking things off their plate? Are you getting them information that helps them do their job better?

## The trust hierarchy — build it in order, cheapest first

Six rungs, ordered from easiest and fastest to hardest and slowest: **cares about us**, which is easiest and takes little time; **listens well**; **understands everyone's point of view**; **will represent us accurately**; **helps collaboration and process**; **execution impact**; and **strategic impact or thought leader**, which is hardest and takes the longest time.

{{DIAGRAM:0}}

The explicit framing: trust takes time, but there are easy quick wins at the bottom of the hierarchy — **don't skip straight to trying to demonstrate strategic impact before establishing that you care and listen.**

> Trust is built bottom-up: don't try to demonstrate strategic impact before you've established that you care and that you listen — the cheap, fast wins come first.

**Laying the foundation for a trustful relationship in a single meeting** follows a concrete sequence:

- Before the meeting: be 100% present; set your intention mentally ahead of time.
- During the meeting: state your goals; give a quick intro that hits three notes — credibility, vulnerability, and humanize; listen deeply to understand and explore; replay back what you heard to confirm; identify one thing to admire about them and tell them; identify one thing you can do to help them reach their goals; restate your intent to help with their long-term goals before the meeting ends.

## Who to build relationships with, and what they care about

Five categories of "players," illustrated for a senior IC PM at a large tech company:

- **Cross-functional peers**, spanning EM, TLs, PD, DS, UXR, DE, PMM, Policy, Legal, and Privacy.
- **Manager & manager's cross-functional peers**, spanning PM Manager, EM Manager, PD Manager, DS Manager, UXR Manager, and PMM Manager.
- **Skip-manager & skip-manager's cross-functional peers**, spanning PM Director, EM Director, PD Director, DS Director, UXR Director, and PMM Director.
- **Leadership team**, spanning PM VP, EM VP, PD VP, DS VP, UXR VP, and PMM VP.
- **Cross-org leads for vteams**, spanning PM peer, EM peer, DS peer, PD peer, and their managers.

**Incentives, at the all-people baseline**, are the same as in the XFN partnerships module: Impact Now (land or exceed current priority goals, don't waste time on unnecessary fires), Growth Areas (show progress on the past cycle's growth areas), Visibility (build visibility for the team's work, build your own reputation), Org Building (strengthen the organization long-term), and Future Planning (identify next big bets, protect against ecosystem or org downside).

**Incentives broken out further by level** — a dimension unique to this note — show how each incentive changes shape as you move from IC to Manager to Director:

- **Impact Now:** for an IC it's landing or exceeding project-level impact goals and not wasting time on unnecessary fires; for a Manager it's landing can't-fail team OKRs; for a Director it's landing can't-fail org OKRs.
- **Growth Areas:** for an IC it's showing progress on "IC behaviors"; for a Manager it's "manager behaviors"; for a Director it's "leader behaviors."
- **Org Building:** for an IC it's strengthening the organization long-term; for a Manager it's mentorship; for a Director it's strong team building.
- **Visibility:** for an IC it's pillar-lead reviews and org all-hands; for a Manager it's building their own reputation with managers and directors; for a Director it's org-goal-impacting reviews with directors and VPs, MZ team reviews and company all-hands, and reviews with VPs and CXOs.
- **Future Planning:** for an IC it's identifying the next big bets to grow the business or their own scope, and protecting against ecosystem or org downside; for a Manager it's a team-goal-impacting project, or a failed or moved-off project; for a Director it's org-goal-impacting initiatives, team charter, or org merges and deprioritization.

The mindset toward XFN peers specifically is the same reframe covered in the XFN partnerships module: don't view them as competition, view them as a way to help you scale yourself; don't view them as slowing you down, view them as helping you build a better product. This note picks up specifically at the cadence and 1:1-content layer below.

## Operationalizing relationships with XFN peers: cadence

Meeting frequency should scale by relationship type:

- **Key cross-functional peers** (EM, DS, PD, UXR, PMM) — weekly, more often during key phases.
- **Cross-functional peers generally** — weekly on a regular cadence.
- **Manager** — weekly.
- **Manager's cross-functional peers** — bi-weekly.
- **Skip-manager and skip-manager's cross-functional peers** — monthly or quarterly, based on project collaboration.
- **Leadership team** — quarterly or semi-annually, based on project collaboration and IC level.
- **Cross-org leads for vteams** — weekly.

{{DIAGRAM:1}}

## What to discuss with XFN peers in 1:1s

Four themes, each with topics and a stated cadence:

- **Theme one, support each other's careers**, for deeper understanding and to build trust: career goals and growth areas quarterly; understand concerns and fears monthly or bi-weekly; responsibility division as a bi-weekly check-in.
- **Theme two, support in executing current goals**, for competence, alignment, and building trust: goal check-in bi-weekly; team health and collaboration bi-weekly; key priorities for each other and how you can support each other weekly; upcoming key decisions and influencing each other weekly.
- **Theme three, set up for the future**, for competence and building trust: future-looking IC projects bi-weekly; future-looking collaboration bi-weekly; anticipating ecosystem and organizational shifts monthly.
- **Theme four, show care and vulnerability**, to like each other: letting them know how much you appreciate them and what you appreciate about them, weekly.

## Operationalizing relationship-building: three mechanisms

- **Shared 1:1 agenda docs** to ensure topic coverage and prioritization over time.
- **View 1:1s as working sessions** with key stakeholders, not social or status-update time.
- **Manage the health of the relationship constantly**, as an explicit, ongoing input — not something you only attend to when it breaks.

**How the shared agenda doc actually works:** keep a list of pinned topics that cover a longer time horizon with tentative dates; add tactical topics through the week as they come up; in the first few minutes of the meeting, add and stack-rank topics together for that session; work through them for the remaining time, and if you don't get through the list, find extra time to finish the rest; make time for deeper conversations either inside an existing 1:1 or by setting up a dedicated lunch, dinner, or long walk whenever a breakthrough conversation is needed.

Why 1:1s should be treated as working sessions, not social time: they exist to do early thinking or get alignment on three types of work — product, people, and process. Do early thinking with one or more people in 1:1s and spin the work into a doc that can be shared with larger groups. Get aligned on key decisions you'll need to make recommendations on in upcoming reviews.

**Managing relationship health** means recognizing that relationships have ups and downs and need constant nurturing. Keep an eye on the "temperature" of the relationship. Any time it's not as warm as you'd like, switch explicitly into relationship-building mode by asking: how are you doing, what challenges are you facing? How am I doing, what could I do better, any feedback from you to me? How can I make your life easier? Critically, **build relationship capital before moving onto more tactical work** — if that means finding extra time later for the tactical items, that's fine; the sequencing of trust first and tactics second is deliberate, not a nice-to-have.

## What is a strong manager relationship, and how to build it

The definition: your manager is invested in your success and will do everything in their power to help you be successful. Signals of that state: you're working on projects that matter to them and will lead to their own success; they trust you to learn or figure out whatever's necessary to make the project or area successful; they're willing to roll up their sleeves to help you level up your work; they're willing to invest time in helping with your growth areas; they're consciously helping you build a plan for your career; there's a high level of relationship trust and psychological safety underlying all of the above.

There are **eight discussion themes** for manager 1:1s, split into "deliver on current role" and "set up for future role." In the source material, "future role" is termed loosely around what you'll work on in the next half-year — it's a rolling, near-term horizon, not a distant aspiration.

{{DIAGRAM:2}}

**Deliver on current role:**

- **Theme one, demonstrate control**, for competence and to build trust: your can't-fails are on track; your peers love working with you; your stakeholders love working with you; you share team-health information and ways to strengthen the XFN team; you're thinking and planning ahead at your level.
- **Theme two, influence them and get help influencing others**, for shared ownership and allies: share context and get their input on key decisions; influence them on your recommendation; recruit them to influence their peers or skip and skip-peers as necessary; plant seeds for future ideas.
- **Theme three, get help raising the bar**, for shared ownership and investment in your success: input on what matters to the org leads who will review your work; traps to watch out for on different problem types; organizational dynamics to account for when influencing groups; framing of problems; narrative for reviews; navigating people and groups.
- **Theme four, bring problems early and share your plans**, for integrity and to build trust: don't surprise them late; run your plan by them; seek their input; ask for help.

**Set up for future role:**

- **Theme five, solve their problems for them**, to show care and earn new scope: what initiatives can you kick off that accomplish goals at their level? What work can you take off their plate? What can you do to help their entire team?
- **Theme six, career conversations**, for growth and rewards: feedback, checking in on how you're doing and what you could do better; expectations, sharing your expectations for career growth including what to show at current level versus next level, timelines, and how aggressive versus conservative your probabilities should be; working on a plan together with shared, realistic expectations; evaluating your portfolio and asking your manager for opportunities that let you demonstrate next-level work.
- **Theme seven, growth areas**, for personal growth and investment in your success: help identifying skill gaps; input on how to improve different skills and which resources to use; feedback and coaching after meetings on interpersonal skills; working sessions to improve specific skills like framing problems, building better review decks, running reviews, speaking precisely.
- **Theme eight, show care and appreciation**: tell them, all the time, what you learn from them, how they make your life easier, and how much you appreciate them.

## Adjusting your manager relationship across the promotion cycle

When and how to work with your manager shifts across the promotion cycle. At **"Current Level Competence,"** just after being promoted to the current level, show autonomy at the current level and get help from your manager only when necessary. Moving into **"Growth Towards Next Level,"** lean on your manager to help you learn next-level skills and up-level your work toward the next level. At **"Demonstrate Next Level Performance,"** approaching the next promotion, show autonomy at the next level and again get help from your manager only when necessary — the pattern of leaning on your manager heavily mid-cycle while showing independence at the start and end of the cycle repeats at each promotion boundary.`,
takeaways:["Strong relationships are built on four pillars — do they like you, trust you, have enough context to help you, and believe you can help them — and 'liking' is framed as a job requirement you initiate, not a byproduct that happens on its own.","Build trust bottom-up through a six-rung hierarchy (cares about us → listens well → understands POV → represents us accurately → helps process → execution impact → strategic impact), starting with the cheap, fast wins rather than trying to prove strategic value before establishing that you care and listen.","Meeting cadence should scale with organizational distance and incentive relevance: weekly for key peers and your manager, bi-weekly for their peers, monthly/quarterly for skip-level and leadership, based explicitly on your own IC level and how much active project collaboration exists.","Treat 1:1s as working sessions on product/people/process, not status updates or social time — use a shared, jointly-stack-ranked agenda doc, and explicitly build relationship capital before tackling tactical items whenever the relationship's 'temperature' has cooled.","Manager relationships run on eight themes split across 'deliver now' (control, influence, raise the bar, surface problems early) and 'set up the future' (solve their problems, career conversations, close growth gaps, show appreciation) — and the balance between leaning on your manager vs. demonstrating independence should shift predictably across each promotion cycle."],
