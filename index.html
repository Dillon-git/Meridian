Prompt: a severely skewed-distribution metric — the top 1% of men receive nearly all dating requests. The underlying mechanic is framed as an explicit formula before hypothesizing, useful as a template for decomposing any "why does X get all of Y" skew question: **Women sending a dating request** is a function of men being part of women's stated criteria/filters, men getting recommended by the algorithm, and women making a choice to send the request. Each term in that function is a separate place the skew could originate.

Data hypotheses map one-to-one to product hypotheses and then to actions:

- **Recommendation System Bias**: hypotheses are over-fitting to a specific "type" of woman's preferences, high engagement for top candidates overwhelming the majority of the feed, and a cold-start problem for new men on the platform; actions are adding a diversity mechanism to ranking, normalizing engagement scores so early high-engagement profiles don't compound, and showing each man to a sufficient number of diverse women to get signal.
- **User settings excluding men**: hypotheses are women using filters excessively and women strictly honoring stated preferences; actions are rethinking which filter options are available by default, educating users on how their filters affect their own match distribution, and considering softening "strict preference" enforcement.
- **Men getting rejected by women**: hypotheses are women having unrealistic standards, men not presenting themselves well, and people making snap decisions before really knowing the other person; actions are dating coaches (real or AI) to educate people, better profile-building tools, better conversation-starter tools, and virtual speed-dating to help people get to know each other before a hard swipe decision.
- **Conversations don't lead to next steps**: hypotheses are people don't respond to messages, men don't start conversations well, and conversations die down as they get repetitive or boring — diagnosing the specific conversational drop-off point and designing a targeted prompt or nudge fix.

Notice that a second version of this same example reuses the identical hypothesis-and-action table for a variant metric — "% of people on platform who get x matches in Y months" — which demonstrates that once you've built the hypothesis structure for a skewed-outcome problem, it's reusable across several related metric framings, not just the one you started with.`,
takeaways:["Root cause analysis is a 4-step funnel: categorize (operational/engineering — measurement, platform, infrastructure, product launch — vs. product/marketing — external factors, marketing impact, product experience/behavior) then dig into data (segment tree x funnel/user journey x submetric decomposition, often combined into one matrix) then hypothesize (product experience, ranking/backend, customer behavior, marketing) then propose experiments, one per hypothesis","Don't stop segmenting until each remaining slice points to one specific, testable hypothesis — aggregate metrics routinely hide multiple unrelated root causes, each needing a different fix (see the DoorDash four-issue breakdown)","The 6-question compressed lens (product description to mission to data hypotheses to product/user hypotheses to additional insights to actions) is a faster narration structure than the 4-step drill for interview settings, and adds an explicit \"good or bad?\" judgment step — label whether each confirmed hypothesis is actually good, neutral, or bad for the business before deciding where to invest follow-up effort"],
cards:[{q:"What's the first split to make in root cause analysis, before looking at any data, and what four categories fall on the \"operational/engineering\" side?",a:"Operational/engineering vs. product/marketing. Operational/engineering: measurement accuracy, platform issues, infrastructure issues, product launch issues."},{q:"What three lenses do you use to \"dig into the data\" in step 2, and what five shapes can the located abnormality take?",a:"Segment tree, funnel/user journey, and submetric decomposition (often crossed into a matrix). The abnormality can be: in some segment, in some funnel stage, in some submetric, in some segment-at-some-stage, or in some submetric-for-some-segment."},{q:"In the DoorDash worked example, name the four distinct new-user/existing-user issues and why a single fix wouldn't solve all of them.",a:"(1) install but don't open — ad targeting/quality issue; (2) open but never order — onboarding/first-order friction; (3) order once, churn just as high as never-ordered — poor first experience or promo-only intent; (4) existing users churning — cost-based or health-based churn. Each needs a different fix — a single blanket fix only touches one of the four."},{q:"In the Tinder worked example, what three root-cause categories explain the 1%-get-all-requests skew, and what's one action for each?",a:"Recommendation system bias (over-fitting/cold-start) — add a diversity mechanism to ranking. User settings excluding men (strict filters) — rethink filter defaults and educate on filter impact. Men getting rejected (unrealistic standards, poor self-presentation, snap judgments) — dating coaches, better profile tools, virtual speed-dating."},{q:"What are the six questions in the compressed alternate-lens approach to root cause analysis, and what judgment step does the Facebook Groups example add on top of it?",a:"Product Description, Purpose/Mission, Data Hypotheses, Product/User Hypotheses, Additional Insights, Actions. The Facebook Groups example adds an explicit \"good or bad?\" labeling step — e.g., public-group growth is good short and long term (mission-aligned), reactivation is good short-term but needs a sustainability check, and friends-and-family private-group stagnation is bad since private groups are core to the mission long-term."},{q:"Why check the four operational/engineering categories before assuming a metric problem is a \"real\" product issue?",a:"Because it's cheaper to rule out a broken measurement pipeline, platform bug, infrastructure issue, or launch regression than to design and run an experiment chasing a behavioral cause that may not even exist — a shocking share of metric crises turn out to be a broken dashboard query."}]},
{id:"intv-8",track:"intv",title:"Analytical Thinking — Tradeoffs & Estimation Follow-Ups",min:14,
body:`Analytical thinking interview follow-ups fall into three categories: **Root Cause**, **Trade Off/Product Decisions & Analysis**, and **Estimation**. This lesson covers the latter two — the lighter-weight companions to root cause analysis, where the move is either an explicit defended tradeoff call or a structured, sanity-checked estimate rather than a diagnosis.

## 2. Tradeoff / product decisions & analysis

Example prompts by sub-type: one side of a marketplace growing faster than the other, such as the men on Tinder growing fast while the number of women does not; one segment successful while others aren't, such as national brands getting a lot of sales while artisan stores are not; one funnel stage healthy while another isn't, such as DoorDash installs growing steadily while Daily Users who order has stagnated — note this sits in both Root Cause and Tradeoff framing depending on how it's asked; identifying and fixing fraud, such as a few businesses getting tens of thousands of transactions per day; and product experience impact, such as whether YouTube should put ads at the beginning or middle of a video.

The expanded prompt bank also includes:

- WhatsApp communities — groups getting created but not active
- Tinder — date requests growing but matches stagnating
- Messenger P2P payments — 99% of transactions with other people and only 1% with businesses, or 1% of engaged users resulting in 90% of transactions
- A spike in FB Groups joins of tens of thousands of members in a week
- Whether Instagram stories should be available for 24 or 48 hours
- Whether Facebook should force people to add a photo during profile creation
- Whether the FB Newsfeed should show "People You May Know" or an ad

**These aren't root-cause questions** — there's no "bug" to find, because both sides of the tradeoff may be working exactly as designed. The move is the same CTUC discipline as the broader product thinking framework: **identify who's affected on each side, what each side values, and make an explicit, defended call** rather than a hedge that avoids picking a side.

## Worked example: Instagram Stories — 24 hours vs. 48 hours

Prompt: "You are a PM at Instagram. Should stories be available for 24hrs or 48hrs?" The structure: score both options across the same three dimensions, side by side, rather than arguing each option's merits in isolation.

- **24-hour option**: Story Creation gets clear expectations for people, potentially leading to higher story creation; Story Consumption means more stories every time someone visits, but people may miss out on stories entirely if they don't visit every day; Connection means fewer connections per story if fewer people see it, but there may be a virtuous cycle of people seeing stories that make them want to engage every day.
- **48-hour option**: Story Creation potentially means fewer stories created, since there's more mental friction for users with less urgency; Story Consumption means people have more opportunity to see a story even if they don't visit the app every day, but stories may appear stale and there aren't enough new stories per day; Connection means a negative spiral — fewer new stories means fewer opportunities to engage, which means less need to visit the app at all.

{{DIAGRAM:0}}

> A tradeoff table should surface second-order interactions between rows, not just score each row independently — the 48-hour option's own consumption benefit is exactly what feeds its connection-side negative spiral of staleness and fewer visits.

There's no forced winner here; the exercise is building the table with correct causal reasoning in each cell, not memorizing "24 hours is right."

## Worked example: Canva — AI in the free tier vs. paid tier only

Prompt: "If you were a PM at Canva, would you offer AI in the free version, or would it only be part of the paid version?" The framing given before the table: **the free tier's job is to show people they can do design well and get them hooked on Canva; the paid tier's job is to give them superpowers and amplify their scale of impact** — the free/paid split should follow from which job a given feature serves, not from cost alone.

- **AI in the free version**: Conversion to Paid is reduced, since why pay if you already have it; Hooked on Canva is strong, a strong hook; Profitability incurs additional AI compute costs that go unpaid.
- **AI only in the paid version**: Conversion to Paid is higher; Hooked on Canva is medium, less of a hook than having it free; Profitability means people directly pay for the AI costs they generate.

The lesson: this is a **three-way tradeoff** — conversion, engagement/hook, and unit economics — not a two-way "free vs. paid" binary, and the free tier's hook value has to be weighed against the fact that AI compute cost, unlike most freemium features, scales directly with usage, so "give it away to hook people" doesn't amortize the way a fixed-cost feature would.

## 3. Estimation

Three common shapes, all top-down or bottom-up market-sizing exercises: **revenue estimation** ("what's the market size for this product — ecommerce, ads, productivity apps, hardware?"), **reach estimation** ("what's the potential user base for this product?"), and **engagement/action estimation** ("if you ran an ad campaign, how many downloads would you get? How many transactions? What impact would an influencer campaign have? How would you estimate ROI on your campaign?"). **State assumptions explicitly, show the math step by step, and sanity-check the output against a reference point** — a known competitor's scale, a known population figure — rather than presenting a bare number with no anchor.

{{DIAGRAM:1}}

## Worked example: "How many dentists are in the US?" — two independent approaches

**Approach 1, demand-side via patient visits**: Dentists equal Number of dental visits per year divided by (Number of appointments per dentist per year times % of slots filled). Number of dental visits per year equals US Population times % who go to dentists times Number of visits per year — worked numbers: 300M population times 50% times 2 visits/year equals 300M visits per year. Number of appointments per dentist per year equals Working days per year times slots per day — worked numbers: 250 working days times 10 slots/day equals 2,500 slots per year per dentist. % of slots filled is an assumed fill rate, run twice with different assumptions — 80% in one pass, 60% in another — to show how sensitive the final answer is to this one assumption. Result: Dentists = 300M divided by (2,500 times 0.6) equals .15M, landing in a 150K to 200K range once both fill-rate assumptions are considered.

**Approach 2, supply-side via graduating dentists**, used as a sanity check on Approach 1: Dentists equal New dental graduates per year times Number of years they work. New dental graduates per year equals Number of dental colleges in US times avg class size, where Number of dental colleges equals Number of states times avg colleges per state. Number of years they work is assumed at 25 years. Worked numbers: 50 states times 2.5 colleges/state times 100 students/college times 25 years equals 310,000.

The lesson: run two structurally independent approaches — one from the demand side via patient visits, one from the supply side via graduating professionals — and check that they land in the same order of magnitude rather than expecting them to match exactly. 150K to 200K on the demand side and 310K on the supply side aren't identical, but they're the same order of magnitude, which is the actual bar for a passing estimation answer in an interview: **internal consistency and a sanity-checked range, not a precise figure.**

## Worked example: Ad revenue for a new social-media video app

A fully decomposed formula chain, useful as a template for any ads-monetization estimation prompt:

- Ad Revenue per day = Ad Slots per day x CPM for Ad Slot
- Ad Slots per day = Number of people x Number of videos watched per day x Ad Load
- Ad Load = Number of ads shown per organic video watched

Fully expanded into one formula: **Ad Revenue per day = Number of people x Number of videos per day x Number of ads per organic video watched x CPM x 1000** — the times-1000 term converts CPM, cost per thousand impressions, into a per-single-impression rate before multiplying by a per-video ad count. This decomposition is reusable for any ad-supported product: swap in the platform's actual DAU, session frequency, and ad load to get a first-pass revenue estimate.

{{DIAGRAM:2}}`,
takeaways:["Tradeoff and estimation questions aren't root-cause questions — tradeoffs need an explicit, defended call between competing stakeholders, not a hedge, and estimation needs explicit stated assumptions plus a sanity-checked answer anchored to a known reference point, not a bare number","Tradeoff tables should surface second-order interactions between rows, not just score each option independently — in the Instagram Stories example, the 48-hour option's own consumption benefit (more chances to catch a story) is exactly what feeds its connection-side negative spiral (staleness, fewer visits)","The Canva AI free-vs-paid example shows tradeoffs are often three-way, not binary — conversion, engagement/hook, and unit economics — and features whose costs scale with usage (like AI compute) don't amortize the way fixed-cost freemium features do","For estimation questions, run two structurally independent approaches (e.g., demand-side via usage and supply-side via capacity, as in the \"how many dentists\" example) and check they land in the same order of magnitude — that internal consistency check, not a precise number, is the actual bar for a passing answer","A fully decomposed ad-revenue formula (people x videos/day x ads/video x CPM x 1000) is reusable for any ad-supported product estimation prompt — swap in the platform's actual DAU, session frequency, and ad load"],
cards:[{q:"What are the three categories of analytical-thinking interview follow-up questions, and what's the key difference in approach between Root Cause and Tradeoff questions?",a:"Root Cause Analysis, Tradeoff/Product Decisions, and Estimation. Root cause questions assume something is broken and need a located, testable diagnosis; tradeoff questions assume both sides may be working as designed and need an explicit, defended choice between competing stakeholder interests, not a diagnosis."},{q:"In the \"how many dentists in the US\" estimation example, what are the two independent approaches used, and what numbers did each land on?",a:"Demand-side (visits divided by appointment capacity): US population x % who visit dentists x visits/year, divided by (working days x slots/day x % filled), landed in a 150K–200K range. Supply-side (graduates x working years): states x colleges/state x class size x 25 working years, landed at 310,000. Different exact numbers, same order of magnitude — that's the actual pass bar."},{q:"What's the fully expanded ad-revenue formula for a new social media video app, and what does the x1000 term represent?",a:"Ad Revenue per day = Number of people x Number of videos per day x Number of ads per organic video watched x CPM x 1000. The x1000 converts CPM (cost per thousand impressions) into a per-single-impression rate."},{q:"In the Canva \"AI in free vs. paid tier\" tradeoff, what's the core tension the decision is framed around, beyond a simple free-vs-paid cost question?",a:"A three-way tradeoff between conversion-to-paid, how strongly the feature hooks users on Canva, and profitability — with the added wrinkle that AI compute cost scales directly with usage, unlike most freemium features, so giving it away free doesn't amortize the way a fixed-cost feature would."},{q:"In the Instagram Stories 24hr vs. 48hr tradeoff, what three dimensions is each option scored on, and what's the key second-order insight?",a:"Story Creation, Story Consumption, and Connection. The key insight: the 48-hour option's consumption benefit (more chances to catch a story) directly feeds its own connection-side negative spiral (staleness leads to fewer visits) — tradeoff tables need to surface these row-to-row interactions, not just score each row in isolation."},{q:"What three shapes do estimation prompts typically take, and what's the required discipline for any of them?",a:"Revenue estimation, reach estimation, and engagement/action estimation. The required discipline: state assumptions explicitly, show the math step by step, and sanity-check the output against a known reference point rather than presenting a bare number."}]},
{id:"intv-9",track:"intv",title:"Analytical Thinking — Product Tradeoffs Deep Dive",min:15,
body:`Product tradeoffs get a short CTUC-based treatment as one of three interview follow-up categories elsewhere; this lesson is a dedicated deep dive into that single category — it splits tradeoffs into **three distinct types**, gives each type its own approach framework, and works two of them all the way through to a scored decision using Instagram Reels vs. Stories and a Netflix product-decision simulation.

## The three types of product tradeoffs

**Type 1, tradeoffs between different features or goals**, covers cases where multiple features exist within one product and growth in one feature impacts a different feature or metric. Example prompts:

- For IG Reels: Reels engagement is up but Stories engagement is down — what would you do?
- For Spotify: engagement on music is down but podcasts is up.
- For Netflix: views on podcasts are increasing but movies and shows are decreasing.
- For Facebook Events: events engagement is increasing but friending is decreasing.
- For Facebook Reels: Reels engagement is up, newsfeed engagement is down.
- For DoorDash: a group-order feature launch increases engagement by 20% but overall rating decreases by 0.5%.

**Type 2, choosing between two use cases of a product**, covers cases where the product can be used in different ways and you'd prefer one usage pattern over another. Example prompts:

- For Reels: would you want 100 reels with 1M views each, or 1M reels with 100 views each?
- For FB Events: would you prefer 1 event with 1,000 attendees, or 10 events with 100 attendees each?
- For Meta Pay: a low number of high-value transactions vs. a high number of low-value transactions.

**Type 3, growth vs. integrity tradeoffs**, covers cases where product growth and platform integrity trade off against each other — essentially **precision-recall issues**. Example prompts:

- For Facebook Live: should content that violates community guardrails stay up and maintain the North Star Metric, or should you reduce that content by 95% and in turn hurt NSM?
- For content moderation: a bullying filter removes 95% of bullying content but also removes 20% of legitimate content in the process — would you launch that filter?

{{DIAGRAM:0}}

## Type 1 — confirming strategy and defining success

Worked through IG Reels vs. Stories. Prompt: "You are the PM on Instagram. Reels engagement is up but Stories engagement is down. What would you do?" The **five steps**, in order: confirm product strategy, define success, understand data deeply, evaluate the situation, next steps.

**Step 1, confirm product strategy:** Instagram's mission is to bring people closer to people and things they love. Both Stories and Reels serve that mission through different mechanisms — Stories is about sharing your moments and engaging with other people's moments; Reels is about engaging with content from your interests and sharing it with friends and family. The **strategic read that shapes everything downstream**: while both serve the mission today, in the long term people will spend more time on entertainment, meaning Instagram's long-term success is explicitly tied to exponential growth in Reels while maintaining Stories engagement, not to treating the two as equally weighted forever.

**Step 2, define success:** success metrics are **DAP** (Daily Active People) and **TS/DAP**, time spent per daily active person — shorthand for engagement depth, not just reach. Applied to the two features, Reels DAP and Reels TS/DAP are both growing exponentially, while Stories DAP and Stories TS/DAP are flat or slow-growth. Both features' metrics ladder up into the overall IG success metrics, so the real question isn't "is Reels good," it's "does the combination net out positive at the app level."

**Step 3, understand the data deeply:** four specific questions to answer before evaluating:

- How is engagement actually measured — DAP or TS/DAP?
- What is the absolute value of the TS/DAP increase in Reels and the TS/DAP drop in Stories, not just the relative percentage, since a big percentage swing on a small base can look scarier than it is?
- What is the overall app TS/DAP trend — up, down, or flat?
- What percent of Reels' growth is cannibalistic vs. incremental relative to Stories, based on the above?

{{DIAGRAM:1}}

## Type 1 — evaluating the situation and shipping next steps

**Step 4, evaluate the situation,** is a branching decision tree run in order. First: is this a good or bad thing overall? Check IG App TS/DAP: up, down, or flat?

- **If UP:** this could be good long-term, but still work both sides — Stories mitigation means asking how much Stories is down by, whether it's affecting all segments or just some, and whether it can be mitigated with small changes; Reels acceleration means asking how to pour fuel on the fire for Reels, given it's the winning bet.
- **If DOWN:** not a good thing. If down by a small amount, figure out how to mitigate the drop. If down by a lot, rethink the overall experience entirely — this isn't a tuning problem anymore.
- **If FLAT:** distinguish between two very different flat scenarios that look identical at the top line — a small drop in Stories offset by a small gain in Reels, low-stakes and fine to tune, versus a large drop in Stories offset by a large gain in Reels, high-stakes churn happening on both sides simultaneously, masked by a flat aggregate.

> A "flat" top-line metric can hide two large offsetting swings — always check the absolute values and the cannibalistic-vs-incremental split before concluding a tradeoff is low-stakes.

**Step 5, next steps:** three concrete deliverables close the answer — overall experience changes, Stories-specific experience changes, Reels-specific experience changes.

The lesson: this framework's real discipline is **Step 4's branching** — most candidates jump straight from "Reels up / Stories down" to "ship more Reels," skipping the app-level TS/DAP check that determines whether this is actually a win, where cannibalization is fine if the net is positive and matches strategy, or a problem in disguise, where a "flat" top line can hide two large offsetting swings.

## Type 2 — the two-step approach

The approach for Type 2 questions has just **two steps**: confirm product goals, then evaluate which outcome aligns better with the goals. This is much lighter than Type 1 because there's no "is this good or bad" ambiguity to resolve — both options are usage patterns of the same product, so the question is purely which one serves the stated goal better.

**Worked example, Reels:** "100 reels with 1M views each, or 1M reels with 100 views each?" Confirming product goals: customers/consumers should be shown the best reels that match their interest; creators should be helped to reach people who would love their content. Evaluating the options, scored across Customer experience and Creator experience:

- **Option 1**, 100 Reels at 1M views each, gives a good customer experience — popularity-driven, less personalized, best videos shown — but for creators, top creators win while torso and tail creators struggle.
- **Option 2**, 1M Reels at 100 views each, gives a bad customer experience since it may not surface good-quality videos, and all creators struggle.
- **Option 3**, a graduated distribution — 100 reels at 500K views, 1,000 reels at 30K views, 10,000 reels at 1K views, 100,000 reels at 100 views — gives a great customer experience, a blend of popular and personalized content, and for creators, top and torso creators win while tail creators have a real chance to break through.

{{DIAGRAM:2}}

The lesson: the interview trap is treating this as a binary between concentrated virality and maximum spread, when the actual best answer is a third option that blends both — a **graduated, power-law distribution** that serves customers and gives more creator tiers a path to reach, rather than picking one extreme.

## Type 2 — Meta Pay and flagging what you don't know

**Worked example, Meta Pay:** "low number of high-value transactions, or high number of low-value transactions?" Confirming product goals: all Meta customers/consumers use Meta Pay, with friends and family as well as businesses. Evaluating the options:

- For a **low number of high-value transactions**, customer adoption has no clear path to long-term product success, business adoption is genuinely unresolved and flagged for follow-up questions, and revenue is the same in both options.
- For a **high number of low-value transactions**, customer adoption and retention could translate into growing GMV over time, business adoption is again flagged "high?" needing follow-up, and revenue is again the same in both.

The lesson: the table intentionally leaves cells marked "?" rather than forcing a guess — modeling the interview behavior of explicitly **flagging what you don't know** and would ask a follow-up question about, instead of fabricating a confident answer for a cell you don't actually have data to fill in. Revenue being "same in both" is also a deliberate move: when one dimension doesn't differentiate the options, say so and move the deciding weight to the dimensions that do — here, customer adoption/retention path.

## Type 3 — growth vs. integrity tradeoffs

No separate step-by-step framework is broken out for Type 3 the way Types 1 and 2 get one; instead, a compressed instruction applies:

- Lay out the tradeoff clearly by explicitly naming the tradeoff curve, such as engagement vs. policy-violating content.
- Frame it as a **precision-recall problem**, since higher recall on removing bad content typically costs precision, meaning some legitimate content gets removed too, and vice versa.
- Explicitly choose what point on that curve you want to take, rather than pretending you can have both maximized simultaneously.

Applied to the two named examples: Facebook Live's guardrail-violating-content question is a recall question — how much of the bad content do you tolerate vs. remove, given removal also affects NSM; the bullying-filter question is a precision question stated numerically — 95% of bullying content removed, but at the cost of 20% legitimate content also removed. The implicit point: in Type 3 tradeoffs you should be able to state your answer as a **specific point on the curve** — "I'd accept X% false-positive rate to achieve Y% recall on real violations" — rather than a vague "we should moderate more."

## The generic six-step framework, worked through Netflix

Beyond the type-specific approaches above, one more general-purpose framework applies to any product decision, tradeoff or not — useful as a fallback structure when a prompt doesn't obviously fit Type 1/2/3: confirm current product experience, clarify decision goal, identify decision criteria, identify options, create a decision matrix, explain tradeoffs and recommendation.

Prompt: "You are the PM on Netflix. At the end of each episode, should you start the next episode automatically, or should you show trailers for other related shows to watch?"

{{DIAGRAM:3}}

**Step 1, confirm current product experience:** when a user finishes an episode, Netflix currently shows a message that the next episode will play in 5 seconds; the user can choose to watch it immediately or let it auto-play after 5 seconds. The decision on the table: keep this behavior, or change it to show options for other shows instead?

**Step 2, decision goal and hypothesis:** the goal is to improve retention for Netflix. The hypothesis is that ensuring people are watching multiple shows simultaneously, instead of just one show at a time, improves retention, for three stated reasons:

- People churn when they finish a show and don't have anything new lined up to watch.
- Finding a new show when you're impatient to watch something is frustrating.
- If people are already watching a few shows simultaneously, they never hit the moment of "I'm out of content and have to go find something."

**Step 3, decision criteria:** three explicit criteria, each with its own measurement — **deeper engagement**, measured by number of multiple-active-shows per user; **user frustration**, measured by session abandonment and weekly watch time; **early churn risk**, measured by number of days without a Netflix watch.

## Netflix decision matrix and the winning pattern

**Step 4, identify options:** play the next episode automatically as the baseline; show options for new shows as Test 1; show the option for new shows only when the user is at risk, specifically once they're roughly 70% into a series, as Test 2.

**Step 5, decision matrix,** options scored against criteria:

- **Play Next Episode (baseline):** scores poorly on deeper engagement since it doesn't drive multi-show engagement, well on user frustration since it's low friction and familiar, and medium on early churn risk.
- **Show options for new shows (Test 1):** scores well on deeper engagement, medium on user frustration due to added friction from having to choose, and well on early churn risk.
- **Show option for new shows only when at risk, ~70% into series (Test 2):** scores well on all three — deeper engagement, user frustration, and early churn risk.

**Step 6, explain tradeoffs and recommendation:** Test 2 dominates on all three criteria in the matrix — it gets the multi-show engagement benefit of Test 1 without the added choice-friction cost, because the intervention only fires when the user is actually likely to need it, near the end of a series, not on every single episode transition.

The lesson: the winning answer in a Type-1-style "should we change X or keep Y" framing is often neither extreme, always show or never show, but a **conditional, triggered version** of the change that captures the upside while avoiding the downside — the same shape of insight as Type 2's "graduated distribution beats either extreme" finding for Reels.`,
takeaways:["Product tradeoffs come in three distinct types with three different approach patterns: Type 1 (feature-vs-feature) needs a strategy check plus a data-driven \"is this actually good?\" branch before acting; Type 2 (use-case-vs-use-case) is a lighter goal-confirmation-then-scoring exercise; Type 3 (growth-vs-integrity) should be framed explicitly as a precision-recall curve with a stated operating point","A \"flat\" top-line metric can hide two large offsetting swings (big Stories drop + big Reels gain nets to flat) — always check the absolute values and the cannibalistic-vs-incremental split before concluding a tradeoff is low-stakes","The best answer to a binary-framed tradeoff prompt is often neither extreme — a graduated/blended option beat both \"100 reels, 1M views\" and \"1M reels, 100 views\" for Reels; a conditional/triggered version of a feature beat both \"always show\" and \"never show\" for Netflix's end-of-episode decision","When you don't have enough information to score a decision-matrix cell, mark it explicitly (the Meta Pay table's \"?\" cells) and flag it as a follow-up question, rather than fabricating a confident-sounding but ungrounded answer","The generic 6-step decision framework (confirm current experience, clarify decision goal, identify criteria, identify options, build a decision matrix, explain tradeoffs and recommend) works as a fallback for any product-decision prompt that doesn't cleanly fit one of the three named tradeoff types"],
cards:[{q:"What are the three types of product tradeoffs, and what's the one-line distinguishing feature of each?",a:"Type 1 — tradeoffs between different features/goals within one product (one feature's growth impacts another metric). Type 2 — choosing between two use cases of the same product (no \"good or bad,\" just which serves the stated goal better). Type 3 — growth vs. integrity (a precision-recall tradeoff between platform growth and platform safety/integrity)."},{q:"In the IG Reels vs. Stories Type 1 example, what are the five steps of the approach, and what's the key branching question in Step 4?",a:"Confirm product strategy, define success, understand data deeply, evaluate the situation, next steps. Step 4's key branch: is overall App TS/DAP up, down, or flat — and if flat, is it a small-drop/small-gain (low stakes) or large-drop/large-gain (high stakes, masked by the flat aggregate) situation?"},{q:"In the Reels view-distribution Type 2 example, why did neither \"100 reels/1M views\" nor \"1M reels/100 views\" win, and what did?",a:"Option 1 (concentrated) gave customers a good experience but only top creators won. Option 2 (maximally spread) gave all creators a bad shot but was a bad customer experience too. Option 3 — a graduated power-law distribution — won on both dimensions: a blend of popular and personalized content for customers, and a real path to break through for top and torso (not just tail) creators."},{q:"How does the framework treat Type 3 (growth vs. integrity) tradeoffs, and what should your final answer look like?",a:"As a precision-recall problem on an explicit tradeoff curve (e.g., engagement vs. policy-violating content). Your answer should name a specific operating point on that curve (e.g., \"95% recall on bullying content at a 20% false-positive cost is/isn't acceptable because...\") rather than a vague directional statement like \"we should moderate more.\""},{q:"In the Netflix end-of-episode decision matrix, which of the three tested options won across all three criteria, and why?",a:"\"Show option for new shows only when at risk\" (~70% into a series) won on deeper engagement, user frustration, and early churn risk simultaneously. It captured Test 1's engagement benefit without Test 1's frustration cost, because the intervention only fires when the user is actually likely to need it, rather than on every episode transition."},{q:"What is the generic 6-step product-decision framework given as a fallback beyond the three tradeoff types, and where was it demonstrated?",a:"Confirm current product experience, clarify decision goal, identify decision criteria, identify options, create a decision matrix, explain tradeoffs and recommendation. Demonstrated on the Netflix \"auto-play next episode vs. show other-show options\" decision."},{q:"In Type 2 tradeoffs, why is leaving a decision-matrix cell marked \"?\" better than filling it in with a guess?",a:"It models honest interview behavior — explicitly flagging what you don't know and would ask a follow-up question about, rather than fabricating a confident-sounding answer you don't have data to support. The Meta Pay business-adoption cells are marked this way in both options."}]},
{id:"intv-10",track:"intv",title:"Analytical Thinking — Base Metrics (Goal-Setting & the Metrics Taxonomy)",min:20,
body:`The "base metrics" question is the opening move of most PM interviews, not a follow-up: "If you were the PM for product X, what goals would you set and what metrics would you use to measure success?" This tests whether a candidate can use principled decision-making to execute well on a product vision — specifically, whether they can articulate the product purpose crisply, set goals, identify the right metrics, understand tradeoffs, prioritize opportunities, and debug product challenges, all inside a roughly 30-minute block, while demonstrating collaboration skill, since the interviewer is watching how you think out loud, not just the final metric name. This lesson merges the process for deriving goals and metrics from scratch, worked through **LinkedIn Jobs**, **YouTube Shorts**, **Facebook Stories**, and **DoorDash**, with a reference taxonomy of the standard metric categories across eight business-model archetypes, plus how that taxonomy's terminology adapts to specific named products within each archetype.

## Part 1: the process for deriving goals and metrics

**The three-step initial response:** Product Rationale, including product purpose, value to the company, and market positioning. Set Goals that capture product success, accounting for different user types and business outcomes. Identify Metrics that measure the goals well, are actionable, and force thoughtful choices, not just the first number that comes to mind.

**The five key decisions inside the metrics question.** Whatever the specific product, five decisions recur and are worth naming explicitly as you work through an answer:

- Is there a clear **Product Purpose/Mission** and a Goal that maps to it?
- Should you choose an **aggregate metric**, or a metric anchored to one side of a marketplace — buyer vs. seller, consumer vs. creator?
- What **stage of the funnel** should the metric represent?
- What are the **counter-metrics or guardrail metrics** that keep the primary metric honest?
- What is the metric's **specific definition**, typically a time window plus a product-usage threshold?

{{DIAGRAM:0}}

## Worked example 1: LinkedIn Jobs — purpose and the aggregate check

**Product Rationale — description:** the broader LinkedIn Careers Marketplace is two products — LinkedIn Jobs, which helps jobseekers find jobs that match their skills, and LinkedIn Recruiter, which helps recruiters find great candidates for open roles. LinkedIn Jobs itself has five surfaces: Discover Jobs (set preferences, get alerts, search, recommendations, understand desirability for a role and market dynamics), Apply for Jobs (referrals and apply directly), Improve Resumes (resume insights), Prepare for Interviews, and Post Jobs (companies post open roles).

**Product Rationale — context and motivation:** market context is that the best applicants come from referrals, and LinkedIn has the most comprehensive professional graph to connect people to others who can vouch for them. Discovering jobs you're a great candidate for is painful — most sites don't match people to jobs well, but LinkedIn holds information about both the candidate and the market for a specific job. Motivation: LinkedIn's mission is to create economic opportunity for everyone; helping people find jobs is the most important way to do that and ladders straight up to the mission. LinkedIn is uniquely positioned to identify the jobs someone is best suited for, connect them to people who can vouch for them, and coach them on what stands out in resumes and interviews.

**Purpose/Mission**, stated in one sentence: "Connect people with jobs that they are most suited for." **Goal**, an explicit English-language definition of success, distinct from the mission statement: "People use LinkedIn as the primary way to find jobs."

A deliberate check: should the goal metric be about job postings instead? **No** — the goal is to help people find jobs; companies posting jobs is necessary for the marketplace to function but not sufficient — you still need people to find those postings and apply. This is the aggregate-vs-one-sided-metric decision resolved explicitly, not by default.

## LinkedIn Jobs — scoring candidates and defining the primary metric

Candidate metrics split by type:

- **Aggregate metrics:** total number of job applications; total number of referrals; total number of jobs closed on LinkedIn.
- **Job Seeker Centric metrics:** number of people who apply for jobs in a quarter/year via LinkedIn; number of people who get referred via LinkedIn; number of people who got a job via LinkedIn.
- **Job Creator Centric metrics:** number of jobs posted on LinkedIn; number of jobs with x applicants; number of jobs closed via applicants on LinkedIn.

{{DIAGRAM:1}}

Prioritization scores each candidate against four questions: does it capture the "people use the product" half of the goal, does it capture "progress towards finding a job," can LinkedIn actually impact this outcome, and is it measurable? Total job applications and total referrals, both aggregate, fail to capture "people use product" or "progress toward job" even though they're measurable. Total jobs closed captures progress "maybe" but LinkedIn can't directly impact it and it's not measurable, only a proxy. The metric that clears all four bars is **"# of people who apply for jobs in a quarter/year via LinkedIn"** — yes on all four.

**Selection:** Number of people who apply for jobs in a quarter/year via LinkedIn becomes the **primary metric**, the only one that clears all four bars. Number of jobs with x applicants is kept on as a **counter metric**, since a primary metric anchored purely on the applicant side could be gamed or blind-sided by a collapse on the job-creator side.

**Precise metric definition** — working name: "Number of people who apply for X jobs in a Y time period via LinkedIn." Two variables to pin down. Frequency (Y): people apply for jobs potentially once or twice a year, a few times at max, and there's real seasonality — fewer openings at year-end, more early in the year. A full year is the more stable window but too coarse to operate against day-to-day, so **monthly** is picked as the operational time period, using year-over-year comparisons to smooth out seasonality. Threshold (X): since people apply to many jobs at once when actively job-searching, start with **5 applications** as the threshold and iterate from there based on what the data shows.

> A finished metric definition always has two explicit knobs — a time window and a usage threshold — and naming why those specific numbers were chosen, even roughly, is what separates a defined metric from a vague one.

Final metric: **Monthly Job Applicants**, defined as a job applicant being someone who applied for more than 5 jobs in the month.

## LinkedIn Jobs — accounting for the other side of the marketplace

What about the other side of the marketplace, job creators? Two options, not mutually exclusive.

- **Option 1, expand the definition**, explicitly accounting for match quality: "# of people who apply for X jobs that match their skills well in Y months" (roles, level/title, skills), and "# of people who apply for X jobs that they are in the top 25% of candidates for in Y months," which accounts for market dynamics, not just raw skill match, shows people jobs they have a realistically higher likelihood of getting, and spreads supply against demand rather than concentrating everyone on the same "dream jobs."
- **Option 2, separate counter/guardrail metrics** that watch the other side directly: "# of jobs with x applicants" and "% of jobs that get x applicants" — the same job-creator metrics already identified as counter metrics above.

## Worked example 2: YouTube Shorts

**Product Type:** Media – By Creators, same pattern as IG Reels/TikTok. Characteristics: roughly **1% of people create content for 99% of people to consume** — a structurally different ratio from the Facebook Stories example below, worth contrasting explicitly. Purpose: entertain and inform people with bite-sized content. Goal: YouTube Shorts is the primary place for people to watch short-form video.

Check: should the goal metric be about Creators instead? **No** — same logic as LinkedIn: the goal is for people to use Shorts for their entertainment/learning needs; creators posting Shorts is necessary for the marketplace to function but not sufficient on its own — people still have to discover and consume.

Candidate metrics, scored on people, engagement, whether YouTube can impact it, and whether it's measurable: total shorts watched per day and total minutes of shorts watched per day, both aggregate, don't capture "people" but score on engagement, impact, and measurability. Total shorts produced, aggregate, captures none of people or engagement. The metric that captures all four is **"# of people who watch x shorts in Y days."** "# of people who watch shorts for x minutes in Y days" also scores well on people and engagement but is harder to measure accurately and YouTube can only "maybe" impact it. Creator-side candidates — "# of creators with a successful short per day/week" and "# of creators with x shorts produced per week" — don't capture people or engagement.

**Selection rationale:** between the two consumer-centric finalists, the count-based metric is picked over the time-based metric because it's an easier metric to act on operationally, even though both score well. Metric definition: Shorts should be a daily habit — people should watch a few shorts a day. "Watch" is defined as completing the video, not just starting it. Final metric: **Daily Active Shorts Users**, where "Active" is defined as 3 shorts watched per day.

## YouTube Shorts — counter and guardrail metrics

Secondary/Counter/Guardrail metrics fall into three explicit themes, to make sure the North Star isn't growing in an unhealthy way:

- **Theme 1, Consumer side:** Time spent/DAU; Videos watched/DAU; Quality of content; Personalization mismatch (false positives — recommending content the person doesn't actually want); Personalization diversity of interests/creators (false negatives — over-narrowing someone into one content bubble).
- **Theme 2, Creator side:** Number of creators with a successful short per day/week, where a successful short is explicitly defined as one that gets x number of plays; number of creators with x shorts produced per week; number of shorts that are successful; high-quality content that can be shown to everyone.
- **Theme 3, Cannibalization/Ecosystem:** the tradeoff between long-form video and short-form video; impact on overall YouTube usage; long-form-video creator distribution, i.e. whether long-form creators are losing reach or revenue to the Shorts shift.

## Worked example 3: Facebook Stories

**Product Type:** Media – By Friends & Family, same pattern as IG Stories/Snap/WhatsApp Status. Characteristics: roughly **70 to 100% of people create content for 100% of people** — explicitly contrast this against Shorts' 1%-create-for-99%-consume ratio: Stories is an "everyone is both creator and consumer" media type, not a creator-economy media type, and that distinction should shape which metrics matter. Purpose: connect people over their daily life experiences. Goal: everyone shares moments that matter to them with friends and family.

What should the metric capture: people who share their moments; connections over shared content — note that **connections**, not just raw sharing volume, is baked into the goal from the start here, unlike the Shorts example, which was purely consumption-focused.

Candidate metrics, scored on people share, connections, whether FB can impact it, and measurability: total stories consumed and total minutes watched per day, both aggregate, don't capture people sharing. Total stories produced per day, aggregate, captures neither people sharing nor connections in this framing. "# of people who watched X stories in Y days" captures connections but not people sharing. "# of people who created X stories in Y days" captures people sharing but not connections. The metric that captures both halves is **"# of people who received reactions from X stories in Y Days"** — yes on people share, connections, FB can impact, and measurable.

**Selection:** chosen specifically because it captures both halves of the goal simultaneously — people sharing and the connection that results — unlike a pure creation-count or pure consumption-count metric. Metric definition — working name: "# of people who created X Stories in Y Days that led to connections." Two candidate definitions are offered side by side rather than picking one outright: **Weekly Successful Stories Creators**, someone who creates 1 story with 3 or more reactions/likes on a weekly cadence, and **Daily Successful Stories Creators**, the same 3-or-more threshold but daily cadence — leaving the cadence choice as an explicit, named tradeoff rather than resolving it silently.

## Worked example 4: DoorDash — anchoring on the buyer side

**Product Type:** Marketplace – Local. Characteristics: SMBs and delivery workers serve people who order food. Purpose: grow the local economy by providing delivery from local businesses. Goal: people make more transactions with local businesses. What should the metric capture: economic impact; potentially the number of people making transactions.

Check: should the goal metric be about restaurants/sellers instead? The answer **flips the usual "check the other side" logic** seen in the LinkedIn and Shorts examples: if the platform enables more transactions from more people, businesses will be successful as a downstream consequence — so the primary metric correctly anchors on the buyer side, with seller-side success treated as a consequence to monitor, not a separate goal to independently optimize for.

{{DIAGRAM:3}}

Candidate metrics, scored on economic impact, people, whether DoorDash can impact it, and measurability: total number of transactions on DoorDash, aggregate, captures economic impact directly, is a reasonable proxy for people, DoorDash can impact it, and it's measurable — this becomes the leading candidate. Gross Merchandise Value, aggregate, captures economic impact but people only indirectly, and DoorDash can maybe impact it. **Net Profit**, aggregate, captures neither economic impact in the intended sense nor people, even though it's measurable and DoorDash can impact it — a reminder that a metric being controllable and trackable doesn't mean it's the right thing to optimize for; goal-fit has to be checked independently of operability. Buyer-centric candidates like "# people making x purchases in Y days" and "# people spending $x purchase in Y days" capture people well. Seller-centric candidates like "# businesses who get x sales in Y days" don't capture economic impact or people in the intended framing.

Counter/Guardrail metrics fall into named themes: Theme 1, Consumer side — number of people placing an order daily. Theme 2, Restaurant side — number of successful restaurants. Theme 3, Cannibalization/Ecosystem, and Theme 4 were both flagged as themes to fill in but left as open gaps in the source material — worth noting as a live gap to reason through yourself in an interview, for example Theme 3 candidates could include whether DoorDash's own delivery cannibalizes a restaurant's dine-in or its own delivery staff, and Theme 4 candidates could include driver-side guardrails like a pay-per-hour floor or acceptance-rate health.

## Part 2: the metrics taxonomy reference — four universal buckets

Every business type, regardless of vertical, decomposes into the same four buckets. **Memorize the buckets, not the specific metric names** — the names are just how each bucket manifests per archetype.

- **Aggregate Metrics** cover Overall Monetization, Total Consumption, and Competition.
- **Customer-Centric Metrics** cover Customer Growth, Customer Engagement, and Customer Retention.
- **Partner-Centric Metrics** cover Partner Growth, Partner Engagement, and Partner Retention.
- **Quality/Trust Metrics** vary by archetype and are always a separate, parallel bucket, not a subtype of the above three.

{{DIAGRAM:2}}

## Metrics by business archetype

**For Media:** Aggregate covers Monetization (MRR/ARR, Ad Revenue as secondary), Consumption (total time spent/watch time, total content items watched, total content available), Competition (market share, primacy-market share). Customer-Centric covers Growth (Active People — DAP/WAP/MAP — and Active Paid Subscribers), Engagement (Time Spent/Person, TS/DAP, TS/WAP, and Media/Person like Songs/DAP or Articles/DAP), Retention (DAP/MAP). Partner-Centric covers Growth (Active Creators, Admins, Moderators, Communities — DAP/WAP/MAP), Engagement (Content/Creator, Posts/DAP, Videos/DAP), Retention (D30/60/90/180 for creators and communities, DAP by Creator Stage from Experimenting to Star to Super Star, DAP by Community Stage from Experimenting to Thriving to Exploding). Quality/Trust covers Content Quality, Personalization Quality, Community Quality, Service Quality.

**For Marketplaces:** Aggregate covers Monetization (GMV, Gross Revenue, Net Revenue, MRR/ARR, Ads Revenue), Consumption (total transactions), Competition (market share). Customer-Centric covers Growth (Active Shoppers, Active Leads, Active Buyers, Active Paid Subscribers), Engagement (Basket Value, $/Transaction), Retention (Transactions/MAP, Lifetime Value). Partner-Centric covers Growth (Active Businesses like drivers, restaurants, service businesses, realtors, rental owners; Active Listings like jobs, rentals, houses, items/SKUs, flights, hotel rooms; Active Paid Subscribers/Listings; Active Advertisers), Engagement (Successful Businesses/Listings, where the success definition varies by business type — occupancy, $/day, leads/day, matches/week, transactions/day or week), Retention (Day 30/60/90/180/360 for businesses and listings). Quality/Trust covers Listing Quality, Business Quality, Search Quality, Recommendations Quality, Service Quality, Community Quality.

**Ecommerce** follows the same shape as Marketplaces for Aggregate and Customer-Centric metrics; Partner-Centric covers Active Businesses (stores, restaurants, grocery chains), Active Listings (items/SKUs, flights, hotel rooms), Active Paid Subscribers/Listings, and Active Advertisers, with the same engagement and retention pattern as Marketplaces.

**Messaging's** Aggregate covers Monetization (MRR/ARR subscription, Ads Revenue as secondary), Consumption (total messages sent, total time spent), Competition (primacy, market share). Customer-Centric covers Growth (Active People, Active Paid Subscribers, Active Organizations), Engagement (Time Spent/Person, Paid Subscribers/Active Organization), Retention (DAP/MAP, Paid Retention D30/D90/180/360, Revenue Retention, Lifetime Value). Messaging products in this taxonomy have **no partner side at all**.

**Productivity's** Aggregate covers Monetization (MRR/ARR, Ads Revenue), Consumption (Total Artifacts Created, Total Workflows Created, Total Actions Taken), Competition (market share). Customer-Centric mirrors Messaging's shape. Partner-Centric covers Growth (Active Partners, Active Integrations, Partner Revenue), Engagement (Successful Partners/Integrations), Retention (Day 90/180/365).

**Portal to the Internet's** Aggregate covers Monetization (Revenue), Consumption (Devices Sold, App Installs, Total Search Queries, Total Time Spent), Competition (market share). Customer-Centric covers Growth (Active People, Active Paid Subscribers), Engagement (Time Spent/Person, Queries/Person, Devices/Person), Retention (DAP/MAP). Partner-Centric mirrors Productivity's shape. **Business Products** follows the same shape as Productivity for all four buckets.

**Advertising Products'** Aggregate covers Monetization (Revenue), Consumption (Ad Inventory/Supply — Total Ad Slots, Monetization Efficiency $/TS, CPM, CPC), Competition (market share). Customer-Centric covers Growth (Active Advertisers), Engagement (Spend/Advertiser), Retention (Day 30/60/90/180/360, Revenue Retention, Lifetime Value). Partner-Centric mirrors Productivity's shape. Quality/Trust covers Organic Product Usage, ROAS, Ads Quality, Ad Click Quality, Fraudulent Advertisers.

## Adapting the taxonomy's terminology to a specific named product

The bucket structure — Aggregate, Customer-Centric, Partner-Centric — stays fixed, but the **nouns change completely** depending on the specific product inside an archetype. This is the step most candidates skip, defaulting to generic terms like "users" or "content" instead of the product's actual vocabulary.

- **Within Media:** By Studios (Netflix, Disney, HBO, CBS, Peacock, YouTube TV) uses Shows/Series/Channels as the aggregate unit, Consumers as customer-centric, and Studios/Series/Channels/Creators as partner-centric. Traditional Publishers (NYT, Economist, WSJ) uses Papers/Magazines/Sites, Consumers, Publications/Writers/Bloggers. Music/Podcasts/Audiobooks (Spotify, Podcasts, Audible) uses Books/Podcasts/Albums/Songs, Consumers, Podcasters/Musicians/Authors. By Creators (IG Reels, TikTok, YouTube Shorts, IG/WhatsApp Channels) uses Reels/TikToks/Shorts/Posts/Stories/Channels, Consumers, Creators/Influencers. By Community (Reddit, FB Public Groups, Forums, SubReddits, Discord servers) uses Communities/Groups/Forums/SubReddits/Servers, Consumers, Communities/Admins/Moderators. By Friends & Family (FB Feed/Stories, IG Stories, WhatsApp Status) uses Stories/Posts/Status, Consumers, Creators.
- **Within Marketplaces:** Local (Yelp, Thumbtack, OpenTable, Tripadvisor) uses Connections/Messages/Leads/Bookings, Shoppers/Buyers, Restaurants/Service Providers/Local Businesses. Ecommerce (eBay, FB Marketplace, Etsy) uses Purchases/Transactions, Shoppers/Buyers, Sellers. Real Estate (Redfin, Zillow) uses Connections/Leads/Bookings, Home Buyers/Home Renters, Home Sellers/Landlords. Short-Term Rentals (Airbnb, VRBO) uses Bookings — Nights Booked, Renters/Travelers, Landlords. Transportation (Uber, Uber Freight, Lyft, DoorDash, Instacart) uses Rides — Rides Completed, Riders, Drivers/Shoppers/Delivery Workers. Travel (Kayak, Expedia, Hotels.com) uses Bookings — Flights/Hotels/Cars Booked, Travelers, Airlines/Hotels/Car Rentals. Jobs (Upwork, LinkedIn, Indeed) uses Applications/Leads/Jobs/Projects, Job Seekers, Companies/Recruiters/Hiring Managers/Project Owners.

## The dating marketplace exception

Dating (Tinder, Match, Bumble) uses **Matches** as the aggregate unit, with **no distinct customer/partner split** — both sides are the same role. This structural difference is worth flagging: in every other marketplace, customers and partners are structurally different roles — shoppers vs. sellers, riders vs. drivers. In dating, both sides of a match are the same role, so the Customer-Centric/Partner-Centric split doesn't cleanly apply, and the aggregate unit, Matches, has to carry more of the metric weight — useful to flag out loud if you're asked to design metrics for a dating product.`,
takeaways:["The base-metrics question has a fixed three-step shape: Product Rationale (purpose + value + positioning) then Set Goals (an explicit English-language success statement, separate from the mission) then Identify Metrics (scored against the goal, not picked ad hoc)","Always explicitly interrogate whether the goal metric should be about the other side of the marketplace — and be ready to argue either way with a specific rationale, the way DoorDash's buyer-anchored answer inverted the \"check the other side\" instinct that LinkedIn Jobs and YouTube Shorts both confirmed","Score every candidate metric against the same small set of yes/no/maybe questions — does it capture the goal, can the team actually impact it, is it measurable — a metric that's measurable and impactable but doesn't capture the goal (DoorDash's Net Profit) is a trap, not a finalist","A finished metric definition always has two explicit knobs: a time window (why monthly, not yearly or weekly) and a usage threshold (why 5 applications, why 3 reactions, why 3 shorts) — naming why those specific numbers were chosen, even roughly, is what separates a defined metric from a vague one","Every business type decomposes into the same four buckets (Aggregate, Customer-Centric, Partner-Centric, Quality/Trust) — but the nouns inside each bucket are entirely product-specific; naming the actual vocabulary of the product (e.g., \"Rides Completed\" for Uber, not generic \"transactions\") signals real product fluency in an interview"],
cards:[{q:"What are the three steps of the \"initial response\" to a base-metrics question, in order?",a:"Product Rationale (purpose, value to company, market positioning) then Set Goals (capture product success across user types and business outcomes) then Identify Metrics (measure the goals well, are actionable, force thoughtful choices)."},{q:"In the LinkedIn Jobs example, what was the primary metric selected, what was the counter metric, and what two variables define the primary metric precisely?",a:"Primary: Monthly Job Applicants (someone who applied to >5 jobs in a month). Counter: Number of jobs with x applicants (job-creator side). The two defining variables: the time window (monthly, chosen over yearly for operability, using YoY comparisons to smooth seasonality) and the application-count threshold (5, chosen as a starting point to iterate on)."},{q:"Why did the DoorDash example anchor its primary metric on the buyer side rather than checking \"should this be about restaurants\" the way LinkedIn and Shorts did?",a:"Because the stated logic is that if the platform enables more transactions from more people, businesses become successful as a downstream consequence — so buyer-side transaction volume is the correct anchor, with seller-side health tracked as a guardrail/consequence metric rather than a co-equal goal."},{q:"What are the four universal metric buckets in the taxonomy, and which archetype is missing one of them entirely?",a:"Aggregate, Customer-Centric, Partner-Centric, and Quality/Trust. Messaging products are marked N/A for Partner-Centric metrics — in this taxonomy, messaging has no partner side."},{q:"How does the Dating marketplace sub-type (Tinder, Match, Bumble) break the Customer-Centric/Partner-Centric split that every other marketplace sub-type uses?",a:"In every other marketplace, customers and partners are structurally different roles (shoppers vs. sellers, riders vs. drivers). In dating, both sides of a match are the same role — there's no distinct \"customer\" and \"partner,\" so the split doesn't cleanly apply and the aggregate unit (Matches) has to carry more of the metric weight."},{q:"In the Facebook Stories example, why was \"# of people who received reactions from X stories in Y Days\" chosen over \"# of people who created X stories in Y Days\"?",a:"Because the goal was explicitly two-part — \"people share moments\" and \"connections over shared content\" — and the reactions-based metric captures both halves simultaneously (someone only receives a reaction if they both created content and it drove a connection), while a pure creation-count metric only captures the sharing half."},{q:"Why is a metric like DoorDash's \"Net Profit\" a trap candidate even though it's measurable and DoorDash can directly impact it?",a:"Because it fails the goal-fit test — it doesn't capture economic impact in the intended sense or people making transactions. Being controllable and trackable doesn't make a metric the right thing to optimize for; goal-fit has to be checked independently of operability."}]},
{id:"intv-11",track:"intv",title:"Leadership Interviews: Five Dimensions and Story Craft",min:11,
body:`The leadership interview evaluates one thing: can this candidate lead a group of people to take on challenges and win consistently? Restated more precisely, it assesses the candidate's ability to identify, solve, and learn from important and ambiguous problems — spanning product, people (self, team, org), and process — in order to deliver results for themselves and their team. The prompts are almost always past-behavioral: "Tell me about a time when you did ___," "Tell me about a scenario when X happened and what did you do?", "If X happened on your team, what would you do?", "What would you do in this situation?" Because the question format is fixed and predictable, the entire interview is really a **story bank problem**: prepare 6–10 well-chosen stories mapped to the dimensions they demonstrate, and you've de-risked most of the interview before you walk in.

## What companies are actually scoring

Companies evaluate whether a candidate is **proactive** in identifying opportunities, **takes ownership and accountability** for outcomes, is **resourceful and resilient** to drive results, can **resolve conflict** within teams and across the organization, and can **grow self and team** continuously to improve and accomplish larger goals. Each of the five gets its own set of specific behavioral signals — treat these as a checklist when editing a story, not just a label.

- **Proactive** means: did the candidate identify problems or opportunities on their own — could be product, people, or process; take initiative to develop a plan by working with subject-matter experts; get people to volunteer to help with developing the plan or prototype; get buy-in to invest in the problem or solution.
- **Ownership and accountability** means: did the candidate demonstrate that they can or will bring clarity on project outcomes, plans, and responsibilities for the team; do anything to ensure project success and meet commitments; anticipate obstacles to prepare better and adapt or iterate plans; make decisions in ambiguous situations while driving alignment with the team; take accountability for mistakes and setbacks and learn from them.
- **Resourceful and resilient** means: did the candidate demonstrate that they can or will work within resource constraints to build momentum; find creative solutions to product and resource challenges; rally the team to deliver on milestones through clear communication; push self and team to move fast and iterate; work through setbacks by motivating the team and finding solutions; articulate resource needs in a compelling manner to accelerate progress.
- **Resolves conflict** means: did the candidate demonstrate that they can or will identify conflicts early and lean in to drive resolution; facilitate open communication to encourage diverse perspectives and discussions; view conflicts as an opportunity to identify disagreements and drive deeper alignment; manage their own emotions and work around others' to drive positive outcomes; show empathy and be respectful to strengthen relationships; get alignment between people by framing solutions and leveraging data and insights.
- **Grow self and team continuously** means: did the candidate demonstrate that they are viewing themselves and team as versions, getting better with each new iteration; self-aware of their skill gaps and working on improving those areas; seeking feedback every day, identifying blind spots and growth opportunities; synthesizing and applying learnings to new situations; energized by working on challenging goals to stretch themselves; supporting team development by helping others reach their goals.

## Good vs. great — which dimensions are the differentiators

Interviewers score each dimension on two axes: whether it's a **"game changer"** skill or a **"table stakes"** skill, and the score a "good interview / solid candidate" gets versus a "great interview / makes stuff happen, want on my team" candidate.

- **Proactive** and **Resourceful & Resilient** are both classified as **game changers**, where a solid candidate scores a 4 out of 5 and a great candidate scores a 5 out of 5.
- **Ownership & accountability, Resolve Conflict, and Grow Self & Team Continuously** are all classified as **table stakes**, where both solid and great candidates typically score 4 to 5 out of 5 on each — they don't move the needle much.

{{DIAGRAM:0}}

The practical implication for prep: every one of your 6–10 stories should be strong on some dimension, but make sure your best, most specific, most self-directed stories are the ones you use to cover Proactive and Resourceful & Resilient — **that's where prep effort has the highest return.**

## The 6–10 question bank

A practical prep set, each mapped to the dimension(s) it's designed to surface:

- "Tell me about a time when you got buy-in for an idea when no one believed in it" — **Proactive, Resourceful & Resilient**
- "Tell me about a time your project failed and what you did learn from it" — **Grow Self, Ownership & Accountability**
- "Tell me about a scenario when someone on your team wasn't pulling their weight and what did you do" — **Resolve Conflict, Ownership & Accountability**
- "What is the most important thing you learned about yourself in the last year, and what changes did you make as a result of it?" — **Grow Self**
- "Your team is pushing an aggressive goal for a project. You need a key component built by another team, and it's not on their roadmap. What will you do?" — **Resolve Conflict**
- "What past project are you most proud of, and why?" — **Resourceful & Resilient**
- "What is the most challenging thing you accomplished, and what did you learn from it?" — **Resourceful & Resilient**
- "The data scientist on your team is strong at pulling data and gathering insights but struggling with relationships with engineers. What will you do in that scenario?" — **Grow Team**
- "Tell me about a time when the idea you believed in was not staffed. What did you do?" — **Proactive, Resourceful & Resilient**
- "Tell me about a time when you got strong feedback from your manager" — **Grow Self**

Notice the deliberate spread: the buy-in question and the not-staffed question both hit Proactive and Resourceful & Resilient, the game-changers — meaning the question bank itself is weighted toward the dimensions that matter most, and you should weight your prep the same way.

## Worked example: the "Proactive" evaluation, end to end

A single question walked through the full evaluation lifecycle doubles as a template for how to self-score your own prepared stories before the interview. Question: "Tell me about a time when you got buy-in for an idea when no one believed in it?" Goal: signal on whether the candidate was proactive and resourceful.

**Evaluation summary sentence:** "Proactively identified key user problems, resourcefully got buy-in and solved the problem, leading to X result. [5/5]" — note the summary sentence explicitly names both dimensions being demonstrated and states a numeric self-score before the details even start.

The evaluation details break into **Context** (at Company A while working on Product Area X, they noticed data or insight and identified an opportunity), **Actions** (they recruited a couple of people to build a prototype to show value, pitched it to the leadership team, and got buy-in to invest in this project by prioritizing it on the roadmap and launching a new product), and **Impact** (the product or feature led to a specific result). The bracketed blanks in the source template are intentional — this is the fill-in-the-blank template you should be completing for each of your 6–10 stories ahead of time, not improvising live.

{{DIAGRAM:1}}

## Story structure: Context, Actions, Impact

Every answer compresses to three parts: **Context** (the situation and the opportunity or problem you noticed), **Actions** (what you specifically did — not the team, you), and **Impact** (the measurable result). Lead with a one-line summary naming the dimension(s) explicitly in plain language before the details — this tells the interviewer exactly what to score before they've even heard the story.

> Lead every story with a one-line summary that names the dimension you're demonstrating and states a self-score — it tells the interviewer exactly what to score before they've even heard the details.

## Filters for writing and editing career stories

An eight-point editing checklist for turning a rough memory into an interview-ready story:

- **Setup:** transport the listener into your situation; help them understand the problem or opportunity with specific, plain-spoken, brief context.
- **Altitude:** make sure people unfamiliar with your company or product can understand the story by sharing context and details at the right level — don't assume the interviewer knows your org chart.
- **Progression:** each sentence should encourage the listener to want the next sentence, moving the story forward and creating suspense and anticipation.
- **Action:** each action step needs to show progress against the problem or opportunity by revealing an intermediate outcome, not just listing activities.
- **Accomplishment:** the actions and results should clearly solve the problem or opportunity originally laid out, tied together crisply, and ideally measurable.
- **Language:** write like you speak; use fifth-grade vocabulary.
- **Editing:** remove everything that can get in the way of landing your message.
- **Speak it:** say it out loud and listen for gaps in the narrative — text alone hides pacing and logic problems that speaking reveals immediately.

## Worked example: compressing the same story to fit the clock

The deck demonstrates writing one story at two very different lengths, which is the actual skill being tested — not memorizing a script, but being able to **compress or expand the same underlying story** on the interviewer's cue.

{{DIAGRAM:2}}

**Full version** (written in 20–30 minutes). Prompt: "Tell me about a time when you got leadership buy-in when it was not popular." Context: Around August 2020, people started to worry about voter turnout for the US 2020 elections due to COVID lockdowns. Meta leadership decided to invest in voter turnout efforts and set big goals for the company: 4M people registered to vote through the company's efforts. The candidate was asked to lead the voter turnout efforts on the Instagram app, especially for younger folks who are more active on IG versus other Meta apps. IG leadership wanted the core strategy to lean into creator partnerships — getting creators to share stories asking people to vote. Everyone thought it was a great plan, but the candidate noticed that the data showed otherwise, and that a different strategy was needed to hit the goals.

Actions: from past data analysis on creators, the candidate knew that even though creators had large followings, their stories were viewed by only a small portion of their followers; that actions taken on stories had even lower conversion rates; and that as a result, even a creator with 100M followers would only convert to the low tens of thousands, and would only be willing to share so many stories about the election. The candidate also identified that the specific creators who signed up to promote elections would determine which users would even see the election information — meaning the effort wasn't uniformly spreading the information. Pulling this together showed the current creator-led strategy would only lead to under 10% of the goal, so the candidate presented IG leadership with an alternate plan to do IG-led promotions across the app instead — customizable by state, targeting users who hadn't already taken action, and so on — and partnered with the Data Science team to show a path to the full goal. IG leadership across functions bought into the new plan and put their full support behind it; a small team shipped 50+ launches in a 30-day window leading up to the elections.

Impact: the team exceeded the goals set for the IG app for voter registration, due to the strategy shift the candidate got buy-in for.

**Compressed version** (30 seconds to 1 minute). Context: US 2020 elections; existing creator-led strategy wouldn't work. Insight: influencers can't drive the outcome at the scale needed; IG itself needs to drive outcomes directly. Action: partnered with Data Science, got leadership review and buy-in; small team shipped 50 things in 30 days. Impact: X million registrations.

The compressed version keeps exactly the same four beats — **Context, Insight, Action, Impact** — as single lines each; nothing new is introduced, detail is simply cut. This is why prepping stories as a structured Context/Actions/Impact outline, rather than a memorized paragraph, matters: you can drop sub-bullets to compress or add them back to expand, live, without losing the shape of the story.`,
takeaways:["Interviews probe five dimensions: proactive, ownership & accountability, resourceful & resilient, resolve conflict, grow self & team — Proactive and Resourceful & Resilient are the real differentiators (game changers, 4 vs. 5); the other three are table stakes (solid candidates already score 4–5)","Prep 6–10 stories mapped to specific past situations, each pre-scored with a one-line dimension-naming summary and structured as Context → Actions → Impact, using the fill-in-the-blank template (Context: at Company X working on Y, noticed Z; Actions: specifically did A, B, C; Impact: result)","Practice each story at two lengths — full (20–30 min of spoken sub-bullet detail) and compressed (30 sec–1 min, same four beats as single lines) — so you can expand or compress live without losing the story's shape; the 8-point editing checklist (Setup, Altitude, Progression, Action, Accomplishment, Language, Editing, Speak it) is the tool for getting from rough memory to either version"],
