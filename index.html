Higher-order jobs on the platform include goal setting (how much to invest, geography constraints, expected ROI), research tools (geographic market insights, real estate type, pricing, time-to-close, financing), partnership (finding an agent, group, or advisor), deal-flow tools (search and alerts, pipeline management, virtual visits), transaction support (due diligence, financing, closing support), and post-transaction support (property management, reselling). The high-level problems named are Research, Goal Setting & Advice, and Deal Flow Tools & Support.

The deep problem expansion on Research — "**I have money to invest in real estate but I don't know what to buy!**" — surfaces questions like which geographies perform well, what investment level is needed, what real estate type is good for a given geography, what typical ROI looks like, what drives growth and risk, what the economic outlook is, renting-versus-buying trends, inventory trends, and what types of real estate investment exist. High-level solution directions considered were partnering/integrating with an existing product, licensing data and building on top of it, creating an own dataset and full product, or buying a company.

The chosen solution is a **Real Estate Investment Tool** for casual investors, expanded into three modules:

- **Geography Analysis** — tools to evaluate real estate returns by city, economic drivers and risks per city, trends and anomalies
- **Housing Type Analysis** — housing mix in a geography, price differences by housing type, returns by housing type, inventory trends by housing type
- **Investment Portfolio** — level of investment by market, portfolio mix given an investment amount, types of investment vehicles and approaches, loan types and tax implications

## Redfin — deep dive: First Time Home Buyers

Higher-order jobs include researching the housing market, financial analysis plus mortgage pre-approval, finding a real estate agent, understanding the buying process, finding houses in the desired budget and attributes, touring houses, making offers, due diligence, closing, and move-in support. High-level problems are housing market research, mortgage research and pre-approvals, finding a real estate agent, **finding houses that fit your budget and needs** (the one selected for deep dive), house tours, and move-in support.

The problem expansion on "finding houses that fit your budget and needs" surfaces four sub-problems: understanding the stack-ranked priority order of what you need from a house, clarity on budget across different buckets of houses and neighborhoods, the inability to articulate needs well using common search filters, and difficulty comparing houses and articulating tradeoffs. High-level solution directions were onboarding flows that capture people's needs, or visual games that help articulate needs — the latter was selected, expanding into three parts:

- **Browse Homes Game** — users rate houses and specific features, guess the price and have it revealed, decide whether to "buy it at that price or not," and ask to "show me houses similar to X" at different prices or neighborhoods
- **Custom Search** — rated features become search "pills" like open floor kitchen, backyard with tiles, front yard with grass, or attached bathrooms
- **Housing Comparison Modules** — custom dimensions that matter to the user, shown side by side`,
takeaways:["A marketplace's core definition: connects Demand (willing to pay) with Supply (can provide), without holding inventory; a 'combined' variant (food/grocery delivery, travel bundles) bundles multiple suppliers' services rather than just connecting two parties.","Six value-proposition levers recur across marketplace types — Selection, Trust, Connecting & Transacting, Lowering Price, Delivering Faster, Reducing Friction — and Trust is the one lever that shows up in nearly every marketplace type's value prop, making it close to a universal requirement rather than a differentiator.","Demand-side problems run in funnel order — Selection → Finding → Trust → Purchase — and supply-side problems run Profile/Storefront → Traffic → Connection/Transaction → Fulfillment → Trust & Reputation; both are reusable checklists for any two-sided marketplace prompt.","The Redfin case study demonstrates the full method end to end: build a context table (consumer/tech/competitive trends) → state why the incumbent needs to innovate now → segment demand by a few factors → pick one segment → expand its single highest-priority problem into granular sub-questions → pick a solution direction → expand that solution into concrete product modules.","Real, specific facts worth remembering for interview color: Redfin's motivation stems from the realtor 6% commission becoming negotiable (eroding Redfin's own value proposition) and PE firms buying up single-family-home inventory (a genuinely new competitive threat class, not just 'more real estate portals')."],
cards:[{q:"What is the core definition of a marketplace, and how does the 'combined supplier' variant differ from it?",a:"A marketplace connects people willing to pay (Demand) with people/businesses who can provide it (Supply), without holding inventory. The combined variant (food delivery, grocery delivery, travel bundles, Fulfillment by Amazon) brings two or more supplier types together and combines their services into one experience, rather than simply connecting two parties directly."},{q:"What are the six core value-proposition levers marketplaces draw on, and which one appears in almost every marketplace type's value proposition?",a:"Selection, Improving Trust, Connecting & Transacting, Lowering Price, Delivering Faster, Reducing Friction. Trust appears in nearly every one of the eight marketplace types compared — closer to a baseline requirement than a differentiator."},{q:"What are the four demand-side problem buckets, in the order a buyer experiences them?",a:"Selection (is what I want even on the platform?) → Finding (can I find/discover it easily?) → Trust (can I trust the quality/the person?) → Purchase (can I shortlist, transact, track, and get support?)."},{q:"Why does Redfin specifically need to innovate now, according to the deck's Motivation slide?",a:"Three reasons: the standard 6% realtor commission is now negotiable and cuts directly into Redfin's own value proposition; the housing market is fragmenting further as private-equity firms buy up single-family-home inventory; and AI is poised to redefine the home buying/selling user experience — Redfin needs to get ahead of these shifts rather than react."},{q:"In the Casual Real Estate Investors deep dive, what three product modules did the chosen solution ('Real Estate Investment Tool for casual investors') expand into?",a:"Geography Analysis (city-level return tools, economic drivers/risks, trends/anomalies), Housing Type Analysis (housing mix, price differences, returns, and inventory trends by housing type), and Investment Portfolio (level of investment by market, portfolio mix, investment vehicle types, loan/tax implications)."},{q:"What solution was designed for First Time Home Buyers' 'can't articulate needs / can't compare houses' problem, and what were its three components?",a:"'Visual games that help articulate the needs and then help with comparing houses' — three components: a Browse Homes Game (rate houses/features, guess-the-price, 'show me similar at different price/neighborhood'), Custom Search (rated features become search 'pills' like open floor kitchen or backyard with tiles), and Housing Comparison Modules (custom dimensions with side-by-side comparison)."}]},
{id:"intv-21",track:"intv",title:"Theme 3: Ecommerce — Making It Easy to Spend Money",min:16,
body:`Satish Mummareddy frames Theme 3 as "makes it easy to spend money!" Ecommerce shares its skeleton with Marketplaces — the same demand and supply problem grid, the same value-creation shape — but it stands as its own theme because ecommerce businesses typically hold and sell their own inventory, or a hybrid of owned and marketplace inventory, which shifts the value proposition toward **selection breadth, price, delivery speed, and omnichannel experience** rather than pure matchmaking.

{{DIAGRAM:0}}

## The three ecommerce sub-types

- **Everything Stores** — Amazon, Walmart, Target, Costco, Sam's Club
- **Local ecommerce** — DoorDash, Uber Eats, Instacart, Safeway, Kroger, Amazon Fresh, Walmart
- **Verticals** — United, Marriott, Best Buy, Home Depot, HelloFresh and Blue Apron, Chewy, Sephora, Ann Taylor

## Value creation process

The provider — a business, or a platform plus a business — sends goods to the customer, who may be a consumer or a business; the customer pays back with money, time, signals, or contact information, following the same "**non-money can be leveraged into money**" principle as Marketplaces.

## Core value proposition: basic + five differentiation levers

The **basic value proposition, or table stakes**, is the convenience of shopping and purchasing without stepping into a store, plus improving trust through verified suppliers and partners. Differentiation levers are where ecommerce companies actually compete:

- **Selection** — increased selection by removing physical-store constraints, plus creating or curating differentiated supply
- **Shopping Experience** — customized to the product vertical, personalized to the shopper
- **Lower Price** — via consolidated logistics and economies of scale
- **Faster Deliveries** — via better last-mile logistics and delivery infrastructure
- **Omni Channel Experiences** — bridging online and physical

{{DIAGRAM:1}}

## The company scorecard: who leans on which lever

A company-by-company scorecard across three sub-markets checks which levers each company actually leans on. Among **Everything Stores**: Amazon checks Online Purchases, Trusted Supply, Widest Selection, Lower Price, and Faster Deliveries, but is uniquely weak on Omni Channel. Walmart checks Online Purchases, Lower Price, Faster Deliveries, and Omni Channel, but not Widest Selection or Differentiated Supply. Costco checks Online Purchases, Trusted Supply, Differentiated Supply, Lower Price, Faster Deliveries, and Omni Channel. Target checks Online Purchases, Trusted Supply, Faster Deliveries, and Omni Channel, but not Widest Selection, Differentiated Supply, or Lower Price. Sam's Club checks Online Purchases, Trusted Supply, Widest Selection, Lower Price, and Omni Channel, but not Faster Deliveries or Differentiated Supply.

Among **vertical players**, Petsmart, Home Depot, Best Buy, Sephora, and Macy's lean on Trusted Supply, Curated Vertical Supply, and Omni Channel; Chewy and United lean on Curated Vertical Supply alone; Ann Taylor and Coach lean on Curated Vertical Supply plus Omni Channel; and Blue Apron leans on Curated Vertical Supply only. Among **Local players**, DoorDash Restaurant, Uber Eats, and Instacart lean on Online Purchases, Trusted Supply, and Faster Deliveries; DoorDash Groceries uniquely also claims Widest Selection and Curated Vertical Supply; and Safeway, Giant, and Kroger, as grocers-gone-digital, lean on Online Purchases, Trusted Supply, and Omni Channel rather than selection or speed.

> Amazon is the only Everything Store not claiming a strong Omni Channel value proposition, since it's online-only at core, unlike Walmart, Costco, Target, and Sam's Club, which all have physical footprints to lean on — a useful interview-answer contrast between "pure-play online" and "omnichannel incumbent" strategies.

## Demand-side and supply-side problems and solutions

These mirror the Marketplaces theme's grid almost exactly, with the same four demand-side buckets in funnel order and the same five supply-side buckets. On the **demand (shopper) side**: Selection asks whether the platform has what the shopper wants or didn't know they wanted; Finding asks whether the shopper can find and discover it easily, whether it's available, and whether it serves their area; Trust asks about quality, whether the product matches what's advertised, and whether the shopper can trust the seller with their money; Purchase asks whether the shopper can shortlist, learn more, transact, track, return, and share their experience. Solutions parallel Marketplaces: sales enablement, piggybacking, referrals, affiliates, SEO, and self-serve onboarding for Selection; onboarding flows, search, explore, and influencer discovery for Finding; ratings, badges, background checks, verification, ranking signals, return policies, insurance, and real-time tracking for Trust; and saves, messaging, transaction integrations, order tracking, returns, reviews, and virtual try-ons for Purchase.

On the **supply (seller) side**: Storefront problems ask how to represent oneself authentically, share products, set expectations, be reachable, and share reputation. Traffic problems ask how to get enough visitors and move them to conversion. Connection/Transaction problems ask how to connect and transact directly and allow booking. Fulfillment problems ask how to manage inbound orders, fulfill them, handle returns, and get paid on time. Trust & Reputation problems ask how to maintain an accurate reputation, trust customers, and handle bad behavior. Solutions parallel Marketplaces: menus and catalog management, product details, business hours and rules, contact mechanisms, ratings, and verifications for Storefront; supply-driven growth, performance marketing, viral loops, SEO, search rankings, and lead qualification for Traffic; messaging, email, CRM, and calendar integrations for Connection/Transaction; order management, packing, shipping, tracking, returns, payments receivable, and taxes for Fulfillment; and demand/customer ratings, insurance, support, and appeals for Trust & Reputation.

## Technologies impacting Ecommerce / Omni Channel

Thirteen technology trends, each tied to a specific ecommerce use case:

- **Embedding-based recommendations** improve recommendations across categories
- **Gen AI image/video understanding** supports explore and discovery of products
- **Gen AI image/video generation** supports virtual try-ons
- **Gen AI voice and language** supports shopping assistants
- **AR/VR technologies** support an immersive shopping experience
- **Indoor maps and AR** support omnichannel shopping with aisle directions in physical stores
- **Smart carts** improve the shopping and checkout experience
- **AI and IoT** support better home-inventory management systems
- **Realtime inventory tracking** supports better delivery expectations
- **5G adoption** supports universal access to immersive shopping experiences
- **Digital payments** make ecommerce accessible for everyone
- **Robots** enable faster and cheaper order packaging in fulfillment centers
- **Drones and self-driving cars** enable cheaper, faster delivery with expanded service areas

{{DIAGRAM:2}}

## Innovating in Ecommerce — named product-idea brainstorms per retailer

The material closes with a "what could this specific retailer build" exercise — a directly reusable interview-answer pattern of taking a named company plus the technology list above and generating concrete product ideas.

- **Home Depot**: 3D Model Software (create a 3D model of your home indoors/outdoors); Personalized Home Improvement Ideas (photograph a space, get ideas); Personalized Home Improvement Guides (share a project, get a guided plan); Visualize Home Improvements (visualize adding plants, furniture, or yard changes); Home Maintenance Guides and Planning (photograph appliances, get maintenance recommendations).
- **Sephora**: Virtual Try-Ons for makeup (visualize components, combinations, and hairstyles); Skin Care Personalization (virtual skin testing plus supporting tools); Hair Care Personalization (virtual hair analysis plus routines); better visual search and discovery.
- **Ann Taylor**: size recommendations via quick scans; style recommendations via body-shape scans; Virtual Try-Ons for clothes; better visual search and recommendations, including text or voice-based instructions.
- **Coach**: Visualize on Clothes (bags, shoes, jewelry paired against clothing); Visual Search & Discovery (smarter "more like this" navigation by color, style, size).
- **Petco**: VR Dog (simulate your dog with different toys, beds, or pet-care products before buying); a Dog Care Assistant (coaching on life-stage needs, planning and reminders).
- **Amazon**: better home inventory and planning; shopping assistants for managing everything at home; primary health care assistants leveraging LLMs and remote monitoring.

The method underneath every one of these is to take the retailer's core inventory or relationship — Home Depot's home projects, Sephora's beauty products, Petco's pet needs — and cross it against the technology-trend list, such as generative AI image generation producing a virtual try-on, or AI/IoT producing an inventory and planning assistant, to generate a grounded, specific product idea rather than a generic one.`,
takeaways:["Ecommerce shares the same demand/supply problem grid as Marketplaces, but its value proposition centers on five differentiation levers beyond the 'convenience + trust' baseline: Selection, Shopping Experience, Lower Price, Faster Deliveries, and Omni Channel Experiences.","The company scorecard shows real strategic variation even within 'Everything Stores': Amazon is the only major player not claiming a strong Omni Channel value prop, since it lacks the physical-store footprint that Walmart, Costco, Target, and Sam's Club all lean on.","Vertical players (Chewy, Blue Apron, Petsmart, Sephora) generally compete on Curated Vertical Supply and Trusted Supply rather than trying to win on price or widest selection — a different playbook than the Everything Stores.","Thirteen specific emerging technologies reshape ecommerce (embeddings-based recs, three flavors of Gen AI — image/video understanding, image/video generation, voice/language — AR/VR, indoor maps, smart carts, AI/IoT home inventory, realtime inventory tracking, 5G, digital payments, robots, drones/self-driving delivery), each tied to a specific named use case.","The 'Innovating in Ecommerce' exercise is a reusable interview-answer method: take a specific company's core inventory/relationship and cross it against the technology-trend list to generate grounded product ideas (e.g., Home Depot's 3D home model, Sephora's virtual makeup try-on, Petco's VR dog simulator) rather than generic 'add AI to it' answers."],
cards:[{q:"What is the basic ecommerce value proposition (table stakes), and what five levers do companies actually differentiate on?",a:"Basic: convenience of shopping without stepping into a store, plus improving trust via verified suppliers/partners. Differentiation levers: Selection (increased/differentiated/curated supply), Shopping Experience (customized/personalized), Lower Price (consolidated logistics/economies of scale), Faster Deliveries (last-mile logistics), Omni Channel Experiences."},{q:"Why is Amazon a notable outlier among the 'Everything Stores' in the scorecard?",a:"It's the only one of the five (Amazon, Walmart, Costco, Target, Sam's Club) that does NOT claim a strong Omni Channel value proposition — the other four all leverage physical-store footprints to bridge online and in-store, while Amazon competes as an online-first/online-only player."},{q:"How do Vertical players (Chewy, Blue Apron, Sephora, Petsmart) typically differ from Everything Stores in which value-prop levers they lean on?",a:"Vertical players generally compete on Curated Vertical Supply and Trusted Supply rather than Widest Selection or Lower Price — depth and trust within a specific category rather than breadth or scale economics."},{q:"Name four of the thirteen technologies listed as impacting ecommerce/omnichannel, with their stated use case.",a:"Any four, e.g.: Gen AI image/video generation → virtual try-ons; Gen AI voice/language → shopping assistants; AI & IoT → home inventory management; realtime inventory tracking → better delivery expectations; indoor maps & AR → in-store aisle navigation; robots → faster/cheaper fulfillment-center packaging."},{q:"What method does the 'Innovating in Ecommerce' section demonstrate for generating product ideas for a specific retailer?",a:"Cross the retailer's core inventory/customer relationship against the technology-trend list — e.g., Home Depot (home projects) + Gen AI image generation → 'visualize home improvements' and personalized project guides; Petco (pet needs) + AR/VR → 'VR Dog' simulator for previewing toys/products before buying."},{q:"What concrete product ideas were generated for Sephora and Amazon respectively?",a:"Sephora: Virtual Try-Ons for makeup (visualize components/combinations/hairstyles on your skin), Skin Care Personalization (virtual skin testing), Hair Care Personalization (virtual hair analysis), better visual search. Amazon: better home inventory and planning, shopping assistants for managing everything at home, and primary health care assistants leveraging LLMs and remote monitoring."}]},
{id:"intv-22",track:"intv",title:"Theme 4: Messaging — Always On Connection to People",min:15,
body:`Satish Mummareddy frames Theme 4 as "Always On Connection to People!" Unlike the other themes, Messaging is organized less around a static problems-and-solutions grid and more around **history and inflections** — the argument is that messaging-app winners are determined almost entirely by who correctly rides a technology, user-mindset, or regulatory inflection at the right time, because market share in messaging is otherwise extremely hard to move.

{{DIAGRAM:0}}

## Two messaging categories

- **Private communication apps**: WhatsApp, iMessage, Messenger, Instagram Direct, Snap, LinkedIn, X, Telegram
- **Large-group communication apps**: Slack, Discord, Microsoft Teams, Google Chat and Meet, Workplace, WhatsApp, Telegram

## The messaging-app timeline (2000–2024) and the inflection driving each era

In **2000**, the leading apps were QQ, AOL-AIM, ICQ, Yahoo! Messenger, and MSN Messenger, driven by early internet adoption on desktops and a portal-with-content model. In **2005**, the leaders were QQ, MSN Messenger, AOL-AIM, Skype, ICQ, and Yahoo! Messenger, driven by all-day desktop use adoption. In **2010**, the leaders were QQ, MSN Messenger, Skype, BBM, ICQ, WhatsApp, Yahoo! Messenger, and Kik, driven by video-calling capabilities and people getting mobile devices. In **2015**, the leaders were WhatsApp, QQ, Facebook Messenger, WeChat, Skype, iMessage, Kik, Snapchat, BBM, Line, and Viber, driven by widespread mobile-device adoption, data-plan costs varying by country, group messaging, and ephemeral messaging. In **2020**, the leaders were WhatsApp, Facebook Messenger, Instagram Direct, WeChat, QQ, iMessage, Telegram, Discord, Kik, Skype, Viber, Snapchat, and Line, driven by ephemeral messaging, better self-expression tools, content-driven sharing, business messaging, community messaging, and privacy concerns. In **2024**, the leaders are WhatsApp, WeChat, Instagram Direct, Facebook Messenger, Telegram, Snapchat, QQ, iMessage, and Discord, driven by content-driven messaging, privacy concerns, community messaging, and creator broadcasts.

{{DIAGRAM:1}}

> "Technology Inflections, User mindset shifts/needs, and regulatory environments drove adoption of different messaging apps over time" — a "why did app X win in year Y" interview question should be answered by naming which of those three forces was in play, not by appealing to generic product quality.

## Network effects and fragmentation

Messaging usage fragments sharply by **geography** — WhatsApp is dominant across most of the world, Messenger is strong in the US and Australia, and Viber, WeChat, Line, Telegram, imo, and Kakaotalk are each dominant in specific regional pockets — and by **age cohort** within a single country. In the US, 18–34 year-olds skew toward Messenger, Instagram DM, iMessage, and Snapchat; 35–54 year-olds still lean Messenger-heavy with WhatsApp rising; and 55-plus is overwhelmingly Messenger with much less platform diversity.

The stated conclusion: "**Messaging apps need a dense social graph and a primary use case for that audience to survive!**" — meaning an app can't win a demographic without both enough of that demographic's existing contacts already on it, and one clear reason to open it that isn't already served elsewhere.

## Core value proposition — four pillars

- **Core Communication** — chats; voice calls ("wherever you go, you can say hi"); video calls; group video calls ("see your favorite people all at once"); voice messages with record, pause, continue-recording, and faster playback speeds of 1x, 1.5x, and 2x.
- **Identity & Self Expression** — figuring out your own identity, self-expression, sharing feeling or mood, sharing things you care about, bonding over content, music, and videos; concrete surfaces include WhatsApp Status and Instagram Stories, Snap's lenses and filters (e.g. "Wild West AI Lens," "Anime Style Lens"), and customizable backgrounds, emojis, and reactions in chat.
- **Community** — a status or story feed inside messaging apps (e.g. a "Highlights" feed); WhatsApp Channels, described as "a private way to follow what matters," a one-way broadcast channel; and Community Messaging, meaning create-a-community flows with topic-based sub-channels like "General," "Social," and "Audio" — for example a "Women Who Surf" community with weekly-meetup and surf-report sub-channels.
- **Connecting over Content and Commerce** — messages related to shared content, such as sharing a LinkedIn post or a "Congratulations" moment directly into a DM thread; sharing a Reel or post into a chat with a reply or reaction; Facebook Marketplace messaging (buyer-seller chat threads tied to a listing); and Instagram/Messenger Business Messaging & Payments, meaning a business chat thread with product cards and in-chat payment requests, such as a "Request $35.00 for Brunch" style flow.

{{DIAGRAM:2}}

## Hard truths about competing in messaging

Several blunt points are worth remembering close to verbatim for an interview:

- It's **extremely hard to move market share** in messaging.
- Messaging apps rise or fall based on **inflections, not steady incremental improvement**.
- **Network effects** matter a lot, since an app's value is a function of who's already on it.
- **Platform shifts, core communication capabilities, and regional regulations** determined the last round of winners and losers — three distinct force categories, not one.
- A new entrant needs a **network wedge** or a **capabilities wedge** to break in — either a pocket of users with no existing dense graph elsewhere, or a genuinely new capability competitors lack.
- Messaging has **stagnated over the last five years**, with the industry's main focus narrowing to privacy and end-to-end encryption rather than new capability waves.

## Previous waves

The roughly chronological list of prior waves: adoption of the internet, then adoption of mobile, then voice and video calling capabilities, then group messaging, then creative self-expression, then community messaging, then commerce messaging, then content-driven messaging, then privacy-focused messaging.

## Current inflections and how to spot the next opportunity

Current inflections flagged as live right now include **new types of collaborative hobbies** such as Roblox and collaborative games and streaming; **new types of content**, generative-AI-driven; **new types of self-representation**, also generative-AI-driven, such as AI avatars and personas; and **new types of contacts**, meaning synthetic characters such as AI companions or characters as a new category of "who you message."

**Network inflections** are points where a person's entire social graph shifts at once, historically a major driver of new-app adoption — the high-school-to-college transition and the college-to-work transition are both named, since each one is a moment where an old graph becomes less relevant and a person is more open to trying a new app with their new cohort.

The prescriptive takeaway for identifying opportunities in messaging is to **lean into a network inflection or a content inflection** — meaning don't try to win users away from an app they're already embedded in for the same use case; instead, find a moment where their graph is genuinely shifting, a network inflection, or a genuinely new content type nothing else supports well yet, a content inflection, like generative-AI-driven content or synthetic-character contacts.`,
takeaways:["Messaging's timeline is a case study in the core claim: winners are determined by riding a technology inflection (mobile adoption, video calling), a user-mindset shift (ephemeral messaging, content-driven sharing), or a regulatory environment (privacy/encryption focus) — not by generic product-quality improvement.","Messaging fragments hard by both geography and age cohort, and the rule for why an app survives in a given segment is simple: it needs a dense social graph (enough of that segment's existing contacts) plus a primary use case unique enough to justify opening it.","The four value-prop pillars — Core Communication, Identity & Self Expression, Community, Connecting over Content/Commerce — are a reusable checklist for scoping any 'design a messaging feature' prompt.","The 'hard truths' are a rare moment of the material being explicitly pessimistic about a category: messaging market share is extremely hard to move, network effects dominate, and the space has genuinely stagnated for five years around privacy/encryption rather than new capabilities — meaning a 'build a new messenger' interview answer needs a real network or capabilities wedge, not just better UX.","The prescriptive answer to 'how do you find a messaging opportunity' is to target a network inflection (a moment someone's whole social graph shifts, e.g., high school→college) or a content inflection (a genuinely new content type, e.g., Gen AI-driven content or synthetic-character contacts) rather than attacking an existing app's entrenched use case directly."],
cards:[{q:"What three forces drove adoption of different messaging apps across the 2000–2024 timeline?",a:"Technology inflections (e.g., mobile adoption, video calling), user mindset shifts/needs (e.g., ephemeral messaging, content-driven sharing), and regulatory environments (e.g., the recent privacy/end-to-end-encryption focus)."},{q:"What two things does a messaging app need to survive within a given demographic or geographic segment?",a:"A dense social graph (enough of that segment's contacts are already on it) and a primary use case for that specific audience — network presence alone isn't sufficient without a clear reason to open the app."},{q:"What are the four core value-proposition pillars of a messaging product?",a:"Core Communication (chats, voice/video calls, group video, voice messages), Identity & Self Expression (status/stories, lenses/filters, reactions), Community (status feeds, channels, community messaging), and Connecting over Content/Commerce (sharing content into DMs, marketplace messaging, business messaging & payments)."},{q:"What are the six 'hard truths' about competing in the messaging space?",a:"(1) Extremely hard to move market share; (2) apps rise/fall based on inflections, not steady improvement; (3) network effects matter a lot; (4) platform shifts, core communication capabilities, and regional regulations determined the last round of winners/losers; (5) new entrants need a network wedge or a capabilities wedge; (6) messaging has stagnated over the last 5 years, focused mainly on privacy & end-to-end encryption."},{q:"What is the recommended method for identifying a new messaging opportunity, and what two current inflections are named as live examples?",a:"Lean into a network inflection (a moment someone's whole social graph shifts, e.g., high school→college or college→work transitions) or a content inflection (a genuinely new content type). Current examples named: new collaborative hobbies (Roblox, collaborative games/streaming) and new Gen AI-driven content, self-representation, and synthetic-character contacts."},{q:"Give a concrete example of 'Connecting over Content/Commerce', and name the specific product surface.",a:"IG and Messenger Business Messaging & Payments — a business chat thread showing product cards (e.g., 'The Vassar Shades,' 'The Berkeley Top') alongside an in-chat payment request feature ('$35.00 Request for Brunch — Completed')."}]},
{id:"intv-23",track:"intv",title:"Productivity: Do More With Less",min:14,
body:`Satish Mummareddy frames this theme as "Do More With Less!" The core definition: productivity products give individual people and businesses one or more "**superpowers**" to live their lives or do their jobs better. Product types named in the deck span three groups: Personal tools (Notion, Coda, DropBox, TaskList apps, Grammarly), Enterprise tools (DropBox, Box, the Google bundle, Microsoft 365, Atlassian, Okta/OneLogin), and No/Low-Code Tools (Zapier, Airtable).

## Value creation process

A **Provider** — a Business, or a Platform plus a Business — sends a Service or Goods to a **Customer**, who may be a Consumer or a Business. The Customer pays back with Money, Time, Signals, and Contact Information.

## The nine "superpowers" — the deck's category taxonomy

Each superpower maps to concrete product types and named example products, giving a ready-made checklist for classifying "what productivity category is this idea in":

- **Manage Time** — Calendar, Scheduling, Focus Tools, Eliminate Distraction (Google/Outlook/Mac/iOS Calendar; Calendly, Zoom Scheduler, Zoho Bookings; Focus, Pomodor, Session, Toggl Track, BFT, Flipd, Focus Noodles; Opal, Screen Time, Rescue Time)
- **Manage Work Load / Distribution** — To-Do, Reminder, Project Management (Todoist, Google Tasks/Keep, Things 3, Microsoft To Do, Notes; Reminders and Post-It; Trello, Asana, Microsoft Planner, Monday, ClickUp, Jira)
- **Manage Communication** — Email, Messaging, Video Conference, Forms (Gmail, Outlook, Mac Mail, iOS Mail, Hey, Superhuman; WhatsApp, Slack, Google Chat, Microsoft Teams; Zoom, Google Meet, Microsoft Teams; Slack)
- **Manage Work Artifacts** — File Management and File Storage (Google Drive, Dropbox, Box)
- **Manage Ideas & Data** — Notes, Documents, Slides, Sheets, Forms, Audio Transcription, Wikis, Microsites (Notes, Notion, Evernote, OneNote, Keep, Obsidian; Google Docs, Microsoft Word, Notion, Coda; Slides, Powerpoint, Figma; Sheets, Excel, Coda; Google Forms, Microsoft Forms, Convertkit, Typeform; Otter; Confluence, Coda, Notion, Microsoft Sharepoint)
- **Improve Performance** — Habit Tracking, Writing, Speech, Meditation, Mindfulness (Productive, Habitica, Habitify; Grammarly, ChatGPT; Poised; Headspace, Calm, Waking Up; Otherworld, iBreathe)
- **Automation** — Single Sign On, Password Storage, Tool Integration, Workflows, Contracts (Okta, OneLogin, Auth0; 1Password, Keeper, Nordpass; AirTable, Zapier, Softr; Docusign, Echosign)
- **Assistants** — Summaries, Writing Tools, Q&A, Data Cleanup, Analysis, Automation, either standalone or integrated into other products
- **Collaboration** — cuts across all other superpowers rather than being its own product category; it's a cross-cutting quality any of the other eight superpowers can be built with or without, for example a to-do list built for solo use versus one built for shared team use

{{DIAGRAM:1}}

## The nine-dimension quality framework — common problems & solutions

This is the deck's most reusable artifact: a nine-question checklist for diagnosing why a productivity product isn't landing, each paired with concrete solution-design prompts.

- **Promise** — do they deliver the value they promise, and to what extent? What is the principle or approach to delivering it, what are the different unique approaches, and what is the tradeoff of value versus time and effort?
- **Ease of Use** — is it frictionless to use consistently? Can the user take core actions in one step, and navigate quickly to accomplish goals?
- **Time to Value** — how much time does it take to deliver value? How do you demonstrate value in the least time, what's the smallest chunk of value that causes an "aha" moment, and how do you educate users toward the actions that show proof of value?
- **Effort to Value** — how much work does it take to get value? How do you automate onboarding to reduce effort, and how do you mix incremental onboarding with value?
- **Habit Loop** — does it sustain value delivery over long periods? How do you get permission to coach and "nag" users, what mechanisms build self-sustaining habits, and what gets people back on the horse if they fall off?
- **Personalization** — can it be customized to a specific user's preferences? What dimensions of personalization exist, how much control do you give people, and is control granular or high-level?
- **Seamlessness — All Devices** — does it work across all the user's devices in lockstep? What devices need day-one seamlessness, how does functionality change by device, and is the experience native?
- **Seamlessness — Cross Tool Integration** — can it integrate with related tools to reduce junk work? What other tools does the audience use, what integrations keep people in-product, and what integrations make other products more valuable too?
- **Skill Growth** — does it help people become super users over time? What shortcuts or power tools amplify value, how do you incrementally build muscle memory, and how do you incentivize power-user features?
- **Privacy** — can the user create an account, login/logout, and store information trustworthily? What login mechanisms, how easy or difficult should login/out be and why, what data do we really need and where, what will we use it for, and what controls and safeguards do users get, and how do we keep it safe?

> This grid is directly usable as an audit checklist on any existing productivity product, not just a design tool for a new one — the deck implicitly treats "run your product through these nine questions" as the standard health check for the category.

{{DIAGRAM:0}}

## Case study 1: Mindfulness — context, tech, and competition

Context and motivation: there's acceleration in mental-health diagnoses, therapy, and antidepressant prescriptions across all US demographics; a loneliness epidemic across the world across all demographics; and stress and anxiety at all-time highs, worsened by 24/7 work culture, single-parent households, lack of good role models, and early exposure to social media. Restated concretely: **stress, anxiety, and loneliness are rising across demographics, and people are more open to therapy and meditation apps than before.**

Tech trends, same high-to-low pattern: language models are now smart enough to help people think through their challenges; multimodal agents make it easy to use speech to communicate; synthetic voice and music generation helps people find tones that resonate with them; and embodied AI agents can play the role of friends and coaches. Restated concretely: **Gen AI provides capabilities to build better solutions to help people manage their stress.**

The competitive landscape names five categories of players and their competitive strength: **Meditation Apps** (Headspace, Calm) have strong public awareness, brand recognition, and distribution through company benefits programs. **Breathing Apps** (Othership, Breathwrk) are easy to learn with immediate impact. **Sleep Aid Apps** (Sound) are easy to get started. **Holistic Programs** (Art of Living, Positive Intelligence) offer upfront education, peer/coach accountability, and a strong community. **AI Agents** (Character.AI, Replika, ChatGPT, Claude, and other Meta AIs and Characters) have strong distribution channels and strong technology teams.

## Case study 1: Mindfulness — segments and prioritized problems

The target audience breaks into five segments: **Tweens** (developing skills early in life), **Teens** (social pressure and competitive academics), **Young Adults** (dating and career-success pressure), **Busy Professionals/Families** (the prioritized segment — life, career, and kids), and **Non-tech-savvy Professionals** (middle-class, not early adopters of technology).

Customer problems for the prioritized Busy Professionals segment break into five buckets:

- **Job & Financial Insecurity** — no job or financial security
- **Managing Work** — work overload (overwhelmed, paralyzed) and procrastination (disorganized, feeling behind)
- **Human Relationships** (further prioritized) — work conflict, spouse partnership, other family relationship-building
- **Positive Intelligence** — can't let go of negative interactions, work-life sabotage carrying negative emotions between home and work
- **Burnout** — work-life incongruence and lack of joy

The deck notes all five manifest as anxiety, lack of sleep, lack of focus, depression, and more.

## Case study 1: Mindfulness — solution vectors by altitude

Solution vectors for the prioritized problem — Human Relationships — are ranked by altitude from lowest to highest:

- **A. Calming Mindfulness Activities** — breathing, meditation, physical scans
- **B. Interactive Journal** — prompts to understand and process emotions
- **C. Trigger Analyzer** — understand action/story patterns that trigger you
- **D. Difficult Conversation Planner** — a wizard that helps you plan for a difficult conversation
- **E. Human Relationship Coach** — a trained human coach who helps debug relationship issues
- **F. AI Relationship Coach** — an AI agent that helps debug relationship challenges
- **G. AI Life Coach** (highest altitude) — an AI agent that helps manage life, career, and relationships

A deep dive on solution A covers teaching a toolkit in under five minutes — three breathing techniques and three physical scans — plus "quick start" shorts (five-minute exercise shortcuts that ramp up if the user stays engaged) and a solve-a-specific-problem flow (listen to the problem, suggest routines, help complete one).

A deep dive on solution D, a multimodal chat agent, covers Understand Your Scenario (listens, creates follow-up questions), Prepare by Writing & Editing (helps write goals, facts, assumptions, and conclusions; frames the conversation; gives feedback on how words may land; helps edit them), and Practice Verbally (helps deliver it verbally and talks through risks and blind spots).

A deep dive on solution F covers Regain Control (breathe or physical-scan to calm the nervous system; journal to understand emotions, triggers, hypotheses, next actions), Debug Relationship (understand dynamics through conversation, plan conversations to normalize and strengthen relationships), Prepare for difficult conversations (understand scenario, write and edit, practice verbally), and Process the conversation and give feedback (listen and give feedback on what you could do better).

A deep dive on solution G, the AI Life Coach, helps with EQ, communication, career, work-life balance, and relationships specifically — developing emotional intelligence, positive intelligence, resilience, personal leadership, communication and interpersonal skills, career management, and work-life integration. On relationships specifically, it wraps solutions E, F, and D into one flow: Regain Control, then Debug Relationship, then Prepare for difficult conversations (prioritized within this), then Process the conversation and give feedback.

{{DIAGRAM:2}}

> The "lower altitude" re-run is itself a demonstrated interview technique: state the framing abstractly first so the interviewer can follow the logic, then immediately grind it down to specifics so the answer doesn't stay abstract.

## Case study 2: Time Management

The target audience here starts with one prioritized segment rather than the full segmentation exercise: **Mid-Career Tech-Savvy Professionals**, described as rising up in their careers, with workload increasing but their systems not scaling, constantly feeling behind on high-priority work, some days not understanding where the time went, and a work day that effectively starts at 5PM because that's when they can finally get their "real work" done.

The promise time-management products should make is: **help me make the most productive use of my time.** That breaks into four sub-promises: my time is invested in my most important priorities; my time is not wasted on unnecessary things; I have control over where my time goes; and I am making sure my time is proportionally invested among my priorities and not neglecting key aspects of my life.

The deck's delivery-of-promise gap analysis is a blunt assessment of the existing market: none of the existing products deliver on that promise; they track events and schedule but don't help people use their time well; they don't help people track and allocate time toward high-priority goals; and they don't help people lead a holistic life.

{{DIAGRAM:3}}

Three solution vectors are considered: a **Calendar plugin**, browser and native, for existing calendar apps to provide analytics; a **Calendar plugin** for existing calendar apps that integrates goals and tasks into them; and a **new app** that integrates goals, tasks, and calendar into one product.

The chosen direction, "**Holistic Goals/Tasks + Calendar Product**," works by rethinking how people view time and work as one single thing rather than separate systems; allowing people to set up a hierarchy of goals, projects, and tasks; deeply integrating tasks and calendar so tasks move into the calendar and event notes move into tasks; building in weekly planning and daily planning routines; and showing real-time analytics of where your time is actually being spent.`,
takeaways:["Productivity products deliver one or more of nine \"superpowers\": Manage Time, Manage Work Load/Distribution, Manage Communication, Manage Work Artifacts, Manage Ideas & Data, Improve Performance, Automation, Assistants, and Collaboration (the last one cuts across all the others rather than being a standalone category).","The nine-dimension quality framework — Promise, Ease of Use, Time to Value, Effort to Value, Habit Loop, Personalization, Seamlessness (devices + cross-tool), Skill Growth, Privacy — is a reusable audit checklist for diagnosing why any productivity product is or isn't landing, not just a design tool for new ones.","The Mindfulness case study demonstrates a \"state it high-altitude, then restate it at low altitude\" technique for both user/tech trends and customer problems — give the abstract framing first, then immediately ground it in concrete specifics, rather than staying abstract throughout an interview answer.","Solution vectors can be explicitly ranked by \"altitude\" from lowest (simple standalone content, e.g., breathing exercises) to highest (a fully agentic AI Life Coach) — a useful way to show an interviewer you understand a build sequence, not just a final-state vision.","The Time Management case study models a blunt, useful move: explicitly stating that the existing market fails to deliver the stated promise before proposing a new solution — grounding the \"why now\" in a real, named product gap rather than a generic opportunity claim."],
cards:[
 {q:"What are the nine \"superpowers\" productivity products deliver, per the deck's taxonomy?",a:"Manage Time, Manage Work Load/Distribution, Manage Communication, Manage Work Artifacts, Manage Ideas & Data, Improve Performance, Automation, Assistants, and Collaboration (Collaboration cuts across all the others rather than being its own category)."},
 {q:"List the nine dimensions in the deck's productivity quality-diagnosis framework.",a:"Promise, Ease of Use, Time to Value, Effort to Value, Habit Loop, Personalization, Seamlessness–All Devices, Seamlessness–Cross Tool Integration, Skill Growth, Privacy."},
 {q:"In the Mindfulness case study, what were the five customer-problem buckets for the prioritized \"Busy Professionals\" segment, and which one got prioritized further?",a:"Job & Financial Insecurity, Managing Work, Human Relationships (prioritized), Positive Intelligence, Burnout. Human Relationships was prioritized further into: work conflict, spouse partnership, and other-family relationship-building."},
 {q:"What are the seven solution vectors (A–G) the Mindfulness case study proposed for the Human Relationships problem, ranked from lowest to highest altitude?",a:"A. Calming Mindfulness Activities → B. Interactive Journal → C. Trigger Analyzer → D. Difficult Conversation Planner → E. Human Relationship Coach (human) → F. AI Relationship Coach → G. AI Life Coach (highest altitude, broadest scope)."},
 {q:"What gap did the Time Management case study identify in the existing market, and what was the chosen solution direction?",a:"Existing calendar/task products track events and schedules but don't help people use their time well, allocate time to high-priority goals, or lead a holistic life. The chosen direction: a \"Holistic Goals/Tasks + Calendar Product\" that deeply integrates tasks into the calendar (not a separate plugin), with goal hierarchies, weekly/daily planning routines, and real-time time-spend analytics."},

]},
{id:"intv-24",track:"intv",title:"Gen AI: Amplifying / Replacing Humans on Tasks",min:15,
body:`Satish Mummareddy frames this theme as "**Amplifying / Replacing Humans on Some Tasks!**" Unlike the other themes, this deck isn't organized around a customer-jobs or problems/solutions grid — it's structured as a **capability catalog**: what generative AI can technically do today, organized by modality, followed by real named companies showing how each capability gets embedded into an existing product versus spun up as a standalone agent. Product types the deck names: **Gen AI Business Agents**, **Consumer Agents**, and **Creator Agents & Tools**.

## Core AI technologies — the deck's own taxonomy

The deck's own taxonomy of **Core AI Technologies** breaks into eight categories:

- **Language** — Large Language Models, **RAG** (retrieval augmented generation), and Tool Use for LLMs
- **Image** — image generation and image segmentation/matching/clustering
- **Video** — video understanding and video synthesis
- **Audio** — audio to text and text-to-audio synthesis and cloning
- **Emotive Avatars**
- **Translation** — language translation text-to-text and speech-to-speech
- **Special Purpose** — domain LLMs such as **MedPaLM** for medical knowledge
- **Embeddings** — for personalization

{{DIAGRAM:0}}

Named reference resources the deck points to for tracking the frontier:

- **Hugging Face** — models and datasets across NLP, computer vision, audio, tabular, and reinforcement learning, multimodal
- **PapersWithCode** — state-of-the-art model leaderboards across speech, vision, NLP, reasoning, and code
- **Meta Llama documentation site** — model cards, prompt formats, fine-tuning guides

## Capability showcase: Language and Text

In Language and Text, the deck shows a run of demos, each mapped to a distinct product capability:

- **General knowledge Q&A** — a ChatGPT 4o example asking who was the first president of the US
- **Deeper research** — a 25-year-old college student's 100-line essay prompt, expanded into a full chronological biography with citations-style structure
- **Editing** — shortening a long document to a target length, e.g., "shorten it to 25 lines"
- **Tone and style rewriting** — "make it playful and shorter" transforms a formal biography into a casual one
- **Work tasks / PRD generation** — prompting an LLM as "the PM for a top-tier company" to write a full Product Requirements Document; the deck's demo generates a complete PRD for a "Real-Time Image Generation in Chatbot" feature, including vision, user problems, solutions, timeline phases, and conclusion
- **Retrieval Augmented Generation (RAG)** — grounding answers in real sources, e.g. asking about the historical Yahoo-Google search deal and getting a sourced, dated answer with citations, and building structured comparison tables from research, such as a full spec comparison table across five Oculus headset generations built from a single prompt
- **Role Playing, Personality, and Characters** — prompting an LLM to take on a specific persona; the deck's demo, "play the role of a life coach, be blunt, a little abrasive and pushy," produces a genuinely different tone and directive structure than a neutral assistant, with organized output across Work, Mindset, and Eating Healthy/Exercise sections and blunt directive language throughout

**RAG** and **persona prompting** are treated by the deck as first-class, product-relevant Language capabilities — not chatbot trivia. RAG is what makes an answer sourced and defensible; persona prompting is what makes an assistant's tone and behavior consistent and controllable.

## Capability showcase: Image

In Image, the deck shows a wide spread of named tools, each demonstrating a distinct capability:

- **Text-to-image, compared across platforms** — the same prompt run through Meta AI in WhatsApp, OpenAI/ChatGPT, and Midjourney, each rendering a different interpretation of the identical prompt
- **Outpainting / "outfilling"** — expanding an image's background beyond its original frame while preserving the subject
- **Changing background** — same subject with swapped background environments, multiple option variants, and upscaling
- **Grounded regeneration** — generating "subtle variations" versus "strong variations," a dial between minor edits and near-total reinterpretation
- **Human modeling for headshots** via **HeadshotPro**, which generates professional headshot photography from a handful of casual reference photos
- **Human modeling for any scene and clothing** via **PhotoAI**, which places a modeled person into arbitrary scenes and outfits (e.g. "walking through Chinatown in Bangkok sunset golden hour") with a "try on clothes" feature
- **Scene modeling and regeneration** via **InteriorAI**, which takes a photo and redesigns your interior in seconds using AI
- **3D models** via **Meshy.ai** — Text-to-3D generates 3D models from text prompts in seconds, Image-to-3D turns a 2D image into a 3D model in minutes, and AI Texturing textures 3D models automatically
- **Realtime generation** — live streaming image generation as a prompt is typed or adjusted

## Capability showcase: Video

In Video, the deck names several distinct companies and capability sets:

- **Text-to-video and image-to-video** via **KlingAI** — prompt-driven video generation from a still image plus a text description, e.g. "beautiful Chinese model filming a commercial for makeup, smiling, hair blowing in the wind"
- **Runway** — an extensive named capability list, each with example outputs: Hair and Fur Simulation, Animals, Landscape Flythroughs, Fire/Smoke/Fluid Simulation, Character Rendering, Anime, Green Screen, Fluid Simulations, Special Effects, B-Roll, Surreal Metamorphosis, and Fabric Simulations
- **Pika and Luma** — other named video-gen companies to know
- **Image/video segmentation and understanding** via Meta's **Segment Anything 2 (SAM 2)**, demonstrated by tracking multiple selected objects across video frames and applying visual effects — erase, gradient, blur, spotlight, text overlay — to specific tracked objects while leaving the rest of the frame untouched

## Capability showcase: Audio, Music, and Avatars

In Audio, **ElevenLabs** is shown across five sub-capabilities:

- **Text to Speech**
- **Speech to Speech** — voice conversion between speaker profiles
- **Dubbing – Language Translation** — video dubbed into a new spoken language and synced to the speaker
- **Dubbing – Sound Effects** — text-to-sound-effect generation, e.g. "dog barking"
- **Dubbing – Voice Cloning** — cloning an "original" voice into a reusable "clone" voice profile

In Music, **Suno** is shown doing **Lyrics + Music generation** from a single prompt — e.g. "a k-pop song by a man to the love of their life they've been married to for 25 years" produces full lyrics plus a rendered song — and **Edit Just Music**, regenerating the musical arrangement while keeping lyrics fixed, e.g. specifying "melodic, drum and bass."

In Avatars, **Synthesia** is shown doing:

- **Text to expressive avatar rendering** — an avatar delivers scripted lines with matching emotional expression
- **Avatars that speak different languages** — the same avatar with multiple language tracks
- **A large pre-built avatar library** to choose from
- **Creating your own personal avatar** via a three-step flow — choose your setup, record yourself via webcam, and submit for consent-based avatar creation — with additional controls for hand movements, voice cloning (record in one language, get a cloned voice in up to 29 languages), and different camera framings (standing, sitting, walking)

## AI integrated into existing products — named company examples

The deck's core teaching move here: for each company, it names the **specific AI feature and the problem it solves**, not just "they use AI."

- **Notion** — AI-assisted Docs (Q&A with documents that answers questions using your workspace's own docs/wikis/projects as source), Writing Tools (find the right words, explain/translate/edit voice and tone), and Autofill Tables (auto-generate insights, summaries, action items, and next steps across a database)
- **Shopify (core)** — Replace Backgrounds (place a product photo on a new background via text prompt) and Write Product Descriptions (generate on-brand product copy with adjustable tone — daring, sophisticated, expert, playful, persuasive)
- **Shopify Sidekick** (the agent layer) — FAQs (auto-answers shipping/returns/product questions), Email Effectiveness (generates subject lines and body copy with adjustable tone), Live Customer Chat (drafts/sends real-time customer responses), Automate Tasks (e.g. "create a student discount code for 10% off in June" executed directly), Analysis and Expert Advice (e.g. "what are my best-selling products" returns a live sales report), and Creative Assistant (suggests and drafts blog post ideas — gift guides, roundups, how-tos, interviews)
- **Meta** — Ads Image Generation, Ads Text Generation, and Ads Text Overlays and Image Expansion inside its ad-creation tools, plus Meta AI inside WhatsApp as a general-purpose assistant teaching poker strategy, answering trivia, and generating images inline in a chat thread
- **Intercom's Fin** — an AI chatbot claiming to resolve 50% of support questions, conversational with true LLM understanding rather than canned scripts, answering from multiple sources (help articles, Zendesk help center, PDFs) with question routing, an AI-powered inbox, omnichannel coverage across web, mobile, WhatsApp, and SMS, and multilingual support across 45+ languages

**HubSpot AI** is organized by hub:

- **Marketing Hub** — Content Assistant across landing pages, social, marketing email, CTAs, and SMS, plus Image Generation, an AI Email Subject Line Generator, and Social Post Captions & Blog Summaries into Social
- **Sales Hub** — an Assistant for Sales Email Generation, Predictive Lead Scoring, AI Forecasting, and Conversation Intelligence
- **Service Hub** — a Content Assistant in Inbox, AI Call and Conversation Summaries, and AI Voicebots
- **Content Hub** — an AI Website Builder, Content Assistant for Pages/Blog, Image Generation, Meta Description Generator, Title Generator, and Blog Generator
- **Operations Hub** — AI-Powered Formatting Recommendations, Duplicate Management, Anomaly Detection, and Gen AI Formulas in Datasets
- **Cross-hub features** — Workflow descriptions, AI-assisted report creation and descriptions, ChatSpot, AI-Powered In-App Help, and AI Microapps

## HubSpot's roadmap format — a reusable template

HubSpot's own AI product roadmap structure is a directly reusable format for how to communicate a Gen AI roadmap: it splits every initiative into **"Currently in Development"** versus **"Being Planned,"** each still organized by hub.

- **Currently in development** — AI Chatbot (auto-answer inquiries/detect cases), Content Remix (repurpose one piece of content into many formats), Brand Voice (define and consistently apply a brand voice), and ChatSpot In-App (natural-language interaction with your HubSpot data)
- **Being planned** — AI-Powered Guided Prospecting/Selling, AI Social Agent (analyze post performance, suggest tailored content, streamline social engagement), AI Messaging Insights Agent, AI Voicebots, AI Forecasting, Conversation Intelligence, AI-Generated Podcasting, and AI-Assisted Reporting

{{DIAGRAM:1}}

## AI agents — a taxonomy of named examples

The deck implicitly sorts agents into categories by **who they serve and what relationship they hold with the user**:

- **General-purpose agents** — Meta AI, ChatGPT, Perplexity — answer arbitrary questions, generate images inline, and, for Perplexity specifically, return sourced, cited answers with related-question suggestions
- **Character AIs from Meta** — let users create a custom AI character by choosing an avatar and defining personality/purpose via a short description (e.g. "tells best time stories to 5-year-old kids, make them laugh before bed"), browse a library of others' created characters (e.g. "Relationship Coach," "Empathic Alex," "FantasyForger," "MemeMaster"), and converse with them in a chat-like interface
- **Companion agents** like **Replika** — offer a fully customizable 3D avatar companion where appearance, outfit, and relationship style are user-configurable
- **Roleplaying AIs** like **SpicyChat** — offer a large browsable library of roleplay character personas across genres and tags (anime, fantasy, LGBTQ+, drama, horror, and more)
- **Creator AI agents from Meta** — let a specific human creator (the deck's example is "Rocky Kanaka," a real Instagram pet-rescue creator) deploy an AI version of themselves that responds to fans in their own voice, trained on their own past content
- **Educational tutor agents** like **Khanmigo**, from Khan Academy — act as an embedded tutor inside a course (e.g. guiding a student through "Intro to Computer Science - Python" without just giving away answers), debug a student's code interactively, and build interest in a subject through guided questioning, e.g. macroeconomics
- **Vertical business agents** — Shopify Sidekick for ecommerce, Intercom Fin for customer support, HubSpot AI for SMB marketing/sales/service — function as standalone conversational agents layered onto those product suites rather than one-off feature buttons

The **Creator AI Agent**'s configuration flow is worth detailing on its own: the creator selects which content types the AI can learn from (posts, reels, comments, stories/highlights, archived stories, broadcast channels, threads posts), adds personal facts and pre-approved Q&A answers, and sets **"topics to avoid"** with three response modes — redirect conversation (gently change the subject), refuse to answer (firmly hold the boundary), or no response (the AI stays silent).

{{DIAGRAM:2}}

Khanmigo also has a separate **teacher-facing toolset**: Lesson Plan, Leveler (adjust complexity of a lesson), Chunk Text, Exit Ticket, Clear Directions, Real World Context Generator, Multiple Choice Assessment, Discussion Prompts, Lesson Hook, Make It Relevant, Learning Objective(s), and Questions Generator.

## Open framing questions the deck poses

The deck's final section, "**Product Thinking With Gen AI**," poses three questions as section headers with no filled-in content in the source deck, left as live-discussion prompts rather than pre-written answers:

- "When to Integrate into product vs. Agent?"
- "What value do you add via integrations?"
- "What purpose does an AI Agent serve?"

These are worth treating as a standing checklist for any Gen AI feature decision. The deck's own worked examples above — Shopify's inline AI features like background-replacement versus its separate Sidekick agent; HubSpot's per-hub inline Content Assistants versus its cross-hub ChatSpot agent — are the closest thing to an implicit answer.

> Simple, single-step, in-context tasks tend to become inline product features, while multi-step, cross-tool, or conversational tasks tend to become a standalone agent.

{{DIAGRAM:3}}`,
takeaways:["The deck organizes Gen AI capability by modality (Language, Image, Video, Audio, Avatars, Music) with real named tools for each — Hugging Face and PapersWithCode as capability trackers; ElevenLabs (audio), Suno (music), Synthesia (avatars), Runway/KlingAI/Pika/Luma (video), Meshy.ai/PhotoAI/InteriorAI/HeadshotPro (image) as the named point solutions.","RAG (retrieval augmented generation) and role-play/persona prompting are treated as first-class product-relevant Language capabilities, not just chatbot trivia — RAG for grounded, sourced answers; persona prompting for consistent tone/behavior (the \"blunt life coach\" demo).","Real companies embed Gen AI two ways: as inline product features (Notion's writing tools, Shopify's background replacement, HubSpot's per-hub Content Assistants) and as standalone conversational agents (Shopify Sidekick, Intercom Fin, HubSpot's ChatSpot, Khanmigo) — the deck's implicit rule is that simple in-context tasks become features while multi-step/cross-tool tasks become agents.","Agents further split by relationship type: general-purpose (ChatGPT, Perplexity, Meta AI), character/companion (Meta Character AI, Replika, SpicyChat), creator-personas (Meta's Creator AI Agent, trained on one real person's content and voice), tutors (Khanmigo), and vertical business agents (Shopify Sidekick, Intercom Fin, HubSpot AI).","HubSpot's roadmap format — organize every AI initiative by business hub, and split each into \"Currently in Development\" vs. \"Being Planned\" — is a clean, reusable template for communicating any company's own Gen AI roadmap.","The deck ends with three deliberately open, unanswered framing questions (integrate vs. agent, value of integrations, purpose of an agent) meant to be worked through live rather than memorized — treat them as a standing checklist rather than expecting a scripted answer."],
