    const n=id?(DB.notes||[]).find(x=>x.id===id):null;
    openSheet(`<h3>${n?"Edit note":"New note"}</h3>
    <label class="f">Title</label><input type="text" id="nt" value="${esc(n?n.title:(title||""))}">
    <label class="f">Note</label><textarea id="nb">${esc(n?n.body:(body||""))}</textarea>
    <div class="btnrow"><button class="btn solid" onclick="APP.saveNote('${id||""}')">Save</button>
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);},
  saveNote(id){
    const t=$("#nt").value.trim(),b=$("#nb").value.trim();
    if(!t&&!b)return closeSheet();
    if(id){const n=DB.notes.find(x=>x.id===id);n.title=t;n.body=b;n.u=Date.now();}
    else DB.notes.push({id:"n"+Date.now(),title:t,body:b,u:Date.now()});
    saveLocal();closeSheet();nav("review");toast("Saved");},
  delNote(id){const n=DB.notes.find(x=>x.id===id);if(n){n.del=true;n.u=Date.now();saveLocal();}REVTAB="notes";nav("review");},
  noteToCard(id){
    const n=DB.notes.find(x=>x.id===id);
    openSheet(`<h3>New flashcard</h3>
    <label class="f">Front — the question</label><input type="text" id="cq" value="${esc(n.title)}">
    <label class="f">Back — the answer</label><textarea id="ca">${esc(n.body.slice(0,300))}</textarea>
    <div class="btnrow"><button class="btn solid" onclick="APP.saveCard()">Add to rotation</button>
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);},
  saveCard(){
    const q=$("#cq").value.trim(),a=$("#ca").value.trim();
    if(!q||!a)return;
    DB.custom.push({id:"c"+Date.now(),q,a,u:Date.now(),src:"Your note"});
    saveLocal();closeSheet();toast("Card added to rotation");},
  editProject(id){
    const p=id?(DB.projects||[]).find(x=>x.id===id):null;
    const lines=a=>(a||[]).join("\n");
    openSheet(`<h3>${p?"Edit project":"New project"}</h3>
    <label class="f">Name</label><input type="text" id="pn" value="${esc(p?p.name:"")}">
    <label class="f">Status</label><select id="ps">${["active","planning","launched","paused"].map(s=>`<option ${p&&p.status===s?"selected":""}>${s}</option>`).join("")}</select>
    <label class="f">One-line summary</label><input type="text" id="psu" value="${esc(p?p.summary:"")}">
    <label class="f">Details — one per line</label><textarea id="pd">${esc(lines(p&&p.details))}</textarea>
    <label class="f">Decisions — one per line</label><textarea id="pde">${esc(lines(p&&p.decisions))}</textarea>
    <label class="f">Open questions — one per line</label><textarea id="pq">${esc(lines(p&&p.questions))}</textarea>
    <div class="btnrow"><button class="btn solid" onclick="APP.saveProject('${id||""}')">Save</button>
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);},
  saveProject(id){
    const split=v=>v.split("\n").map(x=>x.trim()).filter(Boolean);
    const data={name:$("#pn").value.trim(),status:$("#ps").value,summary:$("#psu").value.trim(),
      details:split($("#pd").value),decisions:split($("#pde").value),questions:split($("#pq").value),u:Date.now()};
    if(!data.name)return;
    if(id){Object.assign(DB.projects.find(x=>x.id===id),data);}
    else{data.id="p"+Date.now();DB.projects.push(data);}
    saveLocal();closeSheet();REVTAB="projects";deskTab="projects";nav("review");toast("Saved");},
  delProject(id){const p=DB.projects.find(x=>x.id===id);if(p){p.del=true;p.u=Date.now();saveLocal();}REVTAB="projects";deskTab="projects";nav("review");},
  closeSheet,
  settings(){
    openSheet(`<h3>Settings</h3>
    <div class="setsec">Guide</div>
    <button class="btn setbtn" onclick="APP.guide()">📖 How this system works — read me</button>
    <button class="btn setbtn" onclick="APP.logExternal()">➕ Log learning done outside the app</button>
    <div class="setsec">Appearance</div>
    <select id="sth">${["light","dark","auto"].map(s=>`<option ${themePref()===s?"selected":""}>${s}</option>`).join("")}</select>
    <div class="setsec">Connection — your private repo</div>
    <label class="f">GitHub token</label><input type="password" id="stok" value="${esc(token())}" autocomplete="off">
    <label class="f">Repository (owner/repo)</label><input type="text" id="srepo" value="${esc(repo())}">
    <button class="btn solid setbtn" style="text-align:center" onclick="APP.saveSettings()">Save connection &amp; sync now</button>
    <div class="setsec">Your data</div>
    <button class="btn ghost setbtn" onclick="APP.exportData()">⬇ Download a backup of my progress</button>
    <button class="btn danger setbtn" onclick="APP.reset()">Erase app data on this device only</button>
    <p class="dim" style="font-size:12px;margin-top:10px">Erasing this device never touches your repo — progress restores on next sign-in.</p>`);},
  saveSettings(){
    const th=$("#sth");if(th&&th.value){localStorage.setItem("meridian.theme",th.value);applyTheme();}
    localStorage.setItem("meridian.token",$("#stok").value.trim());
    localStorage.setItem("meridian.repo",$("#srepo").value.trim());
    closeSheet();Promise.all([pull(),fetchData()]).then(()=>{render();toast("Synced");});},
  guide(){
    if(DATA.guide){openSheet(`<h3>How this system works</h3><div class="prose" style="font-size:14px">${md(DATA.guide)}</div>
      <p class="dim" style="font-size:12px;margin-top:10px">This guide auto-updates whenever the workflow changes (last: ${esc((DATA.guideUpdated||"").slice(0,10))}).</p>
      <div class="btnrow"><button class="btn ghost" onclick="APP.closeSheet()">Close</button></div>`);return;}
    openSheet(`<h3>How this system works</h3><p class="muted">Guide not loaded yet — sync first.</p>
    <div class="btnrow"><button class="btn ghost" onclick="APP.closeSheet()">Close</button></div>`);},
  logExternal(){
    openSheet(`<h3>Log external learning</h3>
    <p class="muted" style="font-size:13.5px;margin-bottom:10px">NotebookLM audio, a course, practice drills — anything done outside the app. Counts toward today's ring.</p>
    <label class="f">Minutes</label><input type="text" id="exM" inputmode="numeric" placeholder="e.g. 25">
    <label class="f">What was it?</label><input type="text" id="exW" placeholder="e.g. NotebookLM audio — ML ranking topic">
    <div class="btnrow"><button class="btn solid" onclick="APP.saveExternal()">Log it</button>
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);},
  saveExternal(){
    const m=parseInt($("#exM").value,10),w=$("#exW").value.trim();
    if(!m||m<1)return toast("Enter minutes");
    logMin(Math.min(m,240));bumpStreak();
    DB.notes.push({id:"n"+Date.now(),title:"External learning — "+todayStr(),body:(w||"logged")+" ("+m+" min)",u:Date.now()});
    saveLocal();closeSheet();toast("+"+m+" min logged");render();},
  exportData(){
    const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="meridian-backup-"+todayStr()+".json";a.click();},
  reset(){if(confirm("Erase local data on this device? (Your repo is untouched.)")){localStorage.removeItem("meridian.db");localStorage.removeItem("meridian.data");location.reload();}},
  async connect(){
    const t=$("#tok").value.trim(), r=$("#repoIn").value.trim();
    if(!t)return toast("Paste your token first");
    localStorage.setItem("meridian.token",t);
    localStorage.setItem("meridian.repo",r);
    toast("Connecting…");
    try{
      await fetchData();
      if(!DATA.items.length)throw new Error("no data");
      await pull();
      localStorage.setItem("meridian.setup","1");nav("today");toast("Connected ✓");
    }catch(e){toast("Couldn't load your repo — check token & name");localStorage.removeItem("meridian.token");}
  }
};
window.APP=APP;

function vMore(){
  const acts=DB.newsActions||{};
  const unread=(DATA.news||[]).filter(n=>!acts[n.id]||acts[n.id].a==="keep").length;
  let g30n=0,g30a=0;for(let i=0;i<30;i++){const k=todayStr(new Date(Date.now()-i*DAY));const e=(DB.meta.gradelog||{})[k];if(e){g30n+=e.n;g30a+=e.a;}}
  const ret=g30n?Math.round((1-g30a/g30n)*100):null;
  const syncAge=DB.updatedAt?ago(DB.updatedAt):"—";
  const row=(ico,label,fn,meta)=>`<div class="yourow" onclick="${fn}"><span class="yi">${ico}</span><span>${label}</span>${meta?`<span class="ym">${meta}</span>`:`<span class="ym">›</span>`}</div>`;
  const goals=(DB.goals||[]).filter(g=>!g.del).length;
  return header("You")+`
  <div style="display:flex;align-items:center;gap:12px;margin:4px 0 12px">
    <div style="width:46px;height:46px;border-radius:50%;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-weight:650;color:var(--accent);font-size:17px">W</div>
    <div><div style="font-size:15.5px;font-weight:600">Waqas</div>
    <div style="font-size:11.5px;color:var(--ink3)"><span class="syncdot ${syncState}"></span> synced ${syncAge} · vault connected</div></div>
  </div>
  <div class="pillrow" style="margin-bottom:14px">
    <span class="spill" style="background:color-mix(in srgb,#EF9F27 18%,var(--card));color:#854F0B">🔥 ${DB.meta.streak||0}</span>
    ${ret!=null?`<span class="spill" style="background:color-mix(in srgb,#1D9E75 16%,var(--card));color:#0F6E56">${ret}%</span>`:""}
    <span class="spill" style="background:color-mix(in srgb,#7F77DD 15%,var(--card));color:#534AB7">${DB.meta.xp||0} xp</span>
  </div>
  <div class="setsec">Learning</div>
  <div class="card" style="padding:2px 12px">
    ${row("📊","Progress","APP.go('stats')","")}
    ${row("🎯","Goals","APP.goalSheet()",goals?goals+" active":"")}
    ${row("🗓","Planner","APP.go('planner')","")}
    ${row("📰","News briefings","APP.go('news')",unread?`<b style="color:var(--accent)">${unread} new</b>`:"")}
  </div>
  <div class="setsec">App</div>
  <div class="card" style="padding:2px 12px">
    ${row("🎨","Appearance","APP.themeCycle()",themePref())}
    ${row("🔌","Vault connection","APP.connSheet()","✓")}
    ${row("🔒","Where my data lives","APP.dataMap()","")}
    ${row("📖","How this system works","APP.guide()","")}
    ${row("⬇","Back up my progress","APP.exportData()","")}
    ${row("🗑","Erase app data on this device","APP.reset()","")}
  </div>`;
}
function retentionTrend(){
  const gl=DB.meta.gradelog||{};
  const weeks=[...Array(6)].map((_,i)=>{
    let n=0,a=0;
    for(let dY=0;dY<7;dY++){const k=todayStr(new Date(Date.now()-((5-i)*7+dY)*DAY));if(gl[k]){n+=gl[k].n;a+=gl[k].a;}}
    return {r:n?Math.round((1-a/n)*100):null,n};
  });
  if(!weeks.some(w=>w.n))return "";
  return `<div class="card"><div class="eyebrow">Retention — last 6 weeks</div>
    <div class="trend">${weeks.map((w,i)=>`<div class="tb"><i style="height:${w.r==null?2:Math.max(4,w.r*0.6)}px;${w.r==null?"background:var(--line)":w.r<70?"background:var(--red)":w.r<85?"background:var(--amber)":""}"></i><span>${w.r==null?"–":w.r}</span></div>`).join("")}</div></div>`;
}
function trackPace(){
  const pls=(DATA.studyPlans||[]).map(effPlan).map(pl=>({pl,st:planStats(pl)})).filter(x=>x.st.done>0&&x.st.pct<100);
  if(!pls.length)return "";
  return `<div class="card"><div class="eyebrow">Track progress</div>
    ${pls.map(x=>`<div style="margin-top:8px"><div class="row"><span style="font-size:13.5px;font-weight:600">${esc(x.pl.title)}</span><span class="dim" style="font-size:12px">${x.st.done}/${x.st.total}</span></div>
    <div class="pbar" style="margin:4px 0 2px"><i style="width:${x.st.pct}%"></i></div></div>`).join("")}</div>`;
}
function vStats(){
  const units=unlockedUnits(), mastered=units.filter(u=>DB.srs[u.id]&&(DB.srs[u.id].s||0)>=21).length;
  let g30n=0,g30a=0;for(let i=0;i<30;i++){const k=todayStr(new Date(Date.now()-i*DAY));const e=(DB.meta.gradelog||{})[k];if(e){g30n+=e.n;g30a+=e.a;}}
  const ret=g30n?Math.round((1-g30a/g30n)*100):null;
  const tiles=`<div style="display:flex;gap:8px;margin-bottom:14px">
    <div class="statile" style="background:color-mix(in srgb,#1D9E75 15%,var(--card))"><div class="n" style="color:#0F6E56">${ret==null?"—":ret+"%"}</div><div class="l" style="color:#0F6E56">retention 30d</div></div>
    <div class="statile" style="background:color-mix(in srgb,#EF9F27 16%,var(--card))"><div class="n" style="color:#854F0B">${DB.meta.streak||0}</div><div class="l" style="color:#854F0B">day streak</div></div>
    <div class="statile" style="background:color-mix(in srgb,#7F77DD 15%,var(--card))"><div class="n" style="color:#534AB7">${mastered}</div><div class="l" style="color:#534AB7">mastered</div></div>
  </div>`;
  const cl=DB.meta.catlog||{};
  const weak=Object.keys(cl).filter(c=>cl[c].n>=5).map(c=>({c,r:Math.round((1-cl[c].a/cl[c].n)*100)})).sort((a,b)=>a.r-b.r).slice(0,5);
  const weakHtml=weak.length?`<div class="card"><div class="eyebrow">Weakest areas · tap to open</div><div style="margin-top:8px">
    ${weak.map(w=>{const col=w.r>=85?"#1D9E75":w.r>=70?"#EF9F27":"#E24B4A";
    return `<div class="wkbar" style="cursor:pointer" onclick="APP.lib('cats');APP.libFilter('${w.c}')">
      <span class="wlab">${esc(catOf(w.c).name)}</span><span class="wtrk"><i style="width:${w.r}%;background:${col}"></i></span><span class="wpct" style="color:${col}">${w.r}%</span></div>`;}).join("")}</div></div>`:"";
  return header("Progress")+`<button class="back" onclick="APP.go('today')">← Plan</button>`
    +tiles+retentionTrend()+weakHtml+trackPace()+statsBody();
}
function plannerSchedule(){
  const act=(DATA.studyPlans||[]).map(effPlan).map(pl=>({pl,st:planStats(pl)})).filter(x=>x.st.done>0&&x.st.pct<100).sort((a,b)=>b.st.pct-a.st.pct);
  const blocks=[];
  if(act[0])blocks.push({days:"Mon · Wed · Fri",dows:[1,3,5],label:act[0].pl.title+" · 1 step each",id:act[0].pl.id});
  if(act[1])blocks.push({days:"Tue · Thu",dows:[2,4],label:act[1].pl.title+" · 1 step each",id:act[1].pl.id});
  blocks.push({days:"Sat",dows:[6],label:"Artifact / capstone work · 40 min block",col:"#EF9F27"});
  blocks.push({days:"Sun 6pm",dows:[0],label:"Weekly review lands · goals check",col:"#D85A30"});
  return blocks;
}
function vPlanner(){
  const now=new Date(), y=now.getFullYear(), m=now.getMonth();
  const first=new Date(y,m,1), startDow=(first.getDay()+6)%7, dim=new Date(y,m+1,0).getDate();
  const monthName=now.toLocaleDateString(undefined,{month:"long",year:"numeric"});
  const sched=plannerSchedule();
  let grid=`<div class="mgrid7" style="font-size:10.5px;color:var(--ink3);margin-bottom:4px"><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span></div><div class="mgrid7">`;
  for(let i=0;i<startDow;i++)grid+=`<span></span>`;
  for(let d=1;d<=dim;d++){
    const dt=new Date(y,m,d), k=todayStr(dt), isToday=k===todayStr(), past=dt<now&&!isToday;
    let dots="";
    if(past){const met=dayMet(k);if(met)dots=`<i style="background:${met===2?"#1D9E75":"#9FE1CB"}"></i>`;}
    else if(!isToday){const dow=dt.getDay();for(const b of sched){if(b.dows.includes(dow)){dots+=`<i style="background:${b.col||tcol(b.id)}"></i>`;if(dots.length>90)break;}}}
    grid+=`<span class="pday ${isToday?"today":""}">${d}${dots?`<span class="dots">${dots}</span>`:""}</span>`;
  }
  grid+=`</div>`;
  return header("Planner · "+monthName)+`<button class="back" onclick="APP.go('today')">← Plan</button>
  <div class="card">${grid}</div>
  <div class="eyebrow" style="margin:14px 0 8px">This week's schedule</div>
  ${sched.map(b=>{const c=b.col||tcol(b.id);return `<div class="schedblk" style="background:color-mix(in srgb,${c} 15%,var(--card))">
    <div style="font-size:12.5px;font-weight:600;color:${c}">${b.days}</div>
    <div style="font-size:12.5px;color:var(--ink2)">${esc(b.label)}</div></div>`;}).join("")}
  <p class="dim" style="font-size:11.5px;margin-top:10px">Shaped by your coach plan and active tracks — it updates as you complete steps and set 🎯 goals.</p>`;
}
/* ---------- router ---------- */
function render(){
  const setup=!localStorage.getItem("meridian.setup");
  $("#nav").style.display=setup?"none":"";
  let html;
  if(setup)html=vSetup();
  else switch(VIEW.name){
    case "inbox":html=vInbox();break;
    case "news":html=vNews();break;
    case "plan":html=vToday();break;
    case "library":html=vLibrary();break;
    case "item":html=vItem();break;
    case "review":html=vReview();break;
    case "note":html=vNote();break;
    case "project":html=vProject();break;
    case "gloss":html=GFULL?vGlossFull():vGlossTab();break;
    case "more":html=vNews();break;
    case "planner":html=vPlanner();break;
    case "stats":html=vStats();break;
    default:html=vToday();
  }
  $("#app").innerHTML=html;
  document.querySelectorAll("nav button").forEach(b=>{
    b.classList.toggle("active",b.dataset.v===VIEW.name||(VIEW.name==="item"&&b.dataset.v==="library")||(VIEW.name==="gloss"&&b.dataset.v==="library")||(VIEW.name==="stats"&&b.dataset.v==="today")||(VIEW.name==="planner"&&b.dataset.v==="today")||((VIEW.name==="note"||VIEW.name==="project")&&b.dataset.v==="review"));
    b.onclick=()=>APP.go(b.dataset.v);
  });
  if(!setup){

    const nb=$("#newBadge"),nn=newSince().count;
    if(nb){nb.style.display=nn&&VIEW.name!=="today"?"":"none";nb.textContent=nn>9?"9+":nn;}
    const nwb=$("#newsBadge");
    if(nwb){const acts=DB.newsActions||{};const un=(DATA.news||[]).filter(x=>!acts[x.id]).length;
      nwb.style.display=un&&VIEW.name!=="news"?"":"none";nwb.textContent=un>9?"9+":un;}
    if(VIEW.name==="gloss")bindGlossCarousel();
  }
}

/* ---------- boot ---------- */
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){closeSheet();return;}
  const tag=(e.target&&e.target.tagName||"").toLowerCase();
  if(tag==="input"||tag==="textarea"||tag==="select")return;
  if(e.key==="/"||((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k")){e.preventDefault();APP.search();}
});
try{const sp=new URLSearchParams(location.search);
  if(sp.get("share_text")||sp.get("share_url")||sp.get("share_title")){
    CAPNOTE=[sp.get("share_title"),sp.get("share_text"),sp.get("share_url")].filter(Boolean).join("\n");
    history.replaceState(null,"",location.pathname);
    if(localStorage.getItem("meridian.setup"))VIEW={name:"inbox",p:null};
  }}catch(e){}
render();
startTicker();
if(token()){Promise.all([fetchData(),pull(),fetchMeetings()]).then(render);}
if("serviceWorker" in navigator&&location.protocol.startsWith("http")){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
