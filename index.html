<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Meridian — AI PM Mastery</title>
<meta name="description" content="Your private system for becoming a world-class AI product manager.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Meridian">
<meta name="theme-color" content="#FAF9F5" id="themeColor">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
:root{
  --bg:#FAF9F5; --bg2:#F3F1EA; --card:#FFFFFF; --card2:#FFFFFF;
  --line:#E4E1D6; --line2:#ECEAE0;
  --accent:#5B4FE9; --accent2:#4A3FD4; --accent-soft:#EEEDFE; --accent-dim:#8B84EF;
  --gold:var(--accent); --gold2:var(--accent2); --gold-dim:var(--accent-dim);
  --ink:#1F1E24; --ink2:#6E6B78; --ink3:#8A8794;
  --green:#1D9E75; --green-soft:#E1F5EE;
  --amber:#B97815; --amber-soft:#FAEEDA;
  --red:#C94F28; --red-soft:#FAECE7;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",Segoe UI,Roboto,sans-serif;
  --serif:var(--sans);
  --radius:16px;
  --shadow:0 1px 2px rgba(31,30,36,.04),0 4px 14px rgba(31,30,36,.05);
}
[data-theme=dark]{
  --bg:#131217; --bg2:#1A1920; --card:#1D1C24; --card2:#1D1C24;
  --line:#2C2A36; --line2:#26242e;
  --accent:#8B80F5; --accent2:#7A6FF0; --accent-soft:#272348; --accent-dim:#6F66D9;
  --ink:#EDEBF4; --ink2:#A5A2B0; --ink3:#787580;
  --green:#3FC79E; --green-soft:#12362B;
  --amber:#F0B45C; --amber-soft:#3A2D12;
  --red:#F08A64; --red-soft:#3B2015;
  --shadow:none;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100%;
  font-size:16px;line-height:1.6;letter-spacing:.1px;min-height:100dvh}
#app{max-width:640px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 16px) 20px 110px;min-height:calc(100dvh - 40px)}
h1,h2,h3{font-weight:650;letter-spacing:-.2px}
.eyebrow{font-size:11px;letter-spacing:1.8px;text-transform:uppercase;color:var(--ink3);font-weight:600;margin-bottom:6px}
.hairline{height:1px;background:var(--line2);margin:22px 0}
.muted{color:var(--ink2)} .dim{color:var(--ink3)}
.gold{color:var(--accent);font-weight:600}

/* header */
.brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.brand h1{font-size:22px;letter-spacing:.2px}
.brand .mark{color:var(--accent);margin-right:2px}
.datebar{font-size:12.5px;color:var(--ink3);margin-bottom:18px}
.streakpill{display:inline-flex;align-items:center;gap:5px;background:var(--amber-soft);color:var(--amber);
  border-radius:999px;padding:4px 12px;font-size:13px;font-weight:600}

/* cards */
.card{background:var(--card);border:1px solid var(--line2);box-shadow:var(--shadow);
  border-radius:var(--radius);padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
.card.lux{border-color:var(--line)}
.card h3{font-size:17.5px;margin-bottom:5px}
.card .body{font-size:14.5px;color:var(--ink2)}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.tap{cursor:pointer;transition:transform .12s ease,border-color .2s}
.tap:active{transform:scale(.985)}

/* buttons */
.btn{display:inline-block;border:1px solid var(--line);background:var(--card);color:var(--accent);
  font-family:var(--sans);font-size:14.5px;font-weight:600;letter-spacing:.1px;
  padding:12px 22px;border-radius:14px;cursor:pointer;transition:all .2s}
.btn:active{transform:scale(.97)}
.btn.solid{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.small{padding:8px 16px;font-size:13px}
.btn.ghost{color:var(--ink2);border-color:var(--line2)}
.btn.danger{color:var(--red);border-color:var(--red-soft)}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}

/* nav */
nav{position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-top:1px solid var(--line2);padding:8px 8px calc(env(safe-area-inset-bottom) + 8px)}
nav .inner{max-width:640px;margin:0 auto;display:flex;justify-content:space-around}
nav button{background:none;border:none;color:var(--ink3);font-family:var(--sans);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10.5px;font-weight:600;
  letter-spacing:.4px;padding:4px 10px;transition:color .2s}
nav button .ico{font-size:18px;line-height:1.2}
nav button.active{color:var(--accent)}

/* stats strip */
.stats{display:flex;gap:10px;margin-bottom:14px}
.stat{flex:1;background:var(--card);border:1px solid var(--line2);border-radius:14px;padding:12px 8px;text-align:center}
.stat .n{font-size:22px;font-weight:650;color:var(--ink)}
.stat .l{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink3);margin-top:2px;font-weight:600}
.stat.hi .n{color:var(--accent)}

/* goal ring */
.ringwrap{display:flex;gap:16px;align-items:center}
.ringwrap svg{flex-shrink:0}
.ringlabel{font-size:14.5px;color:var(--ink2);line-height:1.5}

/* pills / badges */
.pill{display:inline-block;font-size:11px;letter-spacing:.6px;text-transform:uppercase;font-weight:600;
  background:var(--accent-soft);color:var(--accent);border-radius:999px;padding:4px 11px}
.pill.ok{background:var(--green-soft);color:var(--green)}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;
  border-radius:999px;background:var(--accent);color:#fff;font-size:12px;font-weight:700;padding:0 8px}
.check{color:var(--green);font-size:15px;font-weight:700}

/* library */
.track{display:flex;align-items:center;gap:14px}
.track .glyph{font-size:18px;color:var(--accent);width:42px;height:42px;background:var(--accent-soft);
  display:flex;align-items:center;justify-content:center;border-radius:12px;flex-shrink:0}
.track .meta{flex:1;min-width:0}
.track .meta h3{font-size:16px;margin-bottom:2px}
.track .meta p{font-size:12.5px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progress-ring{font-size:12px;color:var(--ink3);flex-shrink:0;text-align:right;font-weight:600}
.bar{height:5px;background:var(--bg2);border-radius:3px;margin-top:8px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--accent);border-radius:3px;transition:width .5s ease}
.bar.g i{background:var(--green)}

/* lesson reader */
.reader h2{font-size:24px;line-height:1.25;margin:10px 0 4px}
.reader .lede{color:var(--ink3);font-size:13px;margin-bottom:16px}
.reader .prose p{margin-bottom:14px;color:var(--ink);font-size:16px}
.reader .prose h4{color:var(--ink);font-size:17px;font-weight:650;margin:22px 0 8px}
.reader .prose strong{color:var(--accent2);font-weight:650}
[data-theme=dark] .reader .prose strong{color:var(--accent)}
.reader .prose ul{margin:4px 0 16px;padding-left:0;list-style:none}
.reader .prose ul li{position:relative;padding-left:22px;margin-bottom:9px;color:var(--ink);font-size:16px;line-height:1.55}
.reader .prose ul li::before{content:"";position:absolute;left:4px;top:9px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
.reader .prose blockquote{margin:16px 0;padding:12px 16px;border-left:3px solid var(--accent);background:var(--accent-soft);border-radius:0 10px 10px 0;color:var(--ink);font-size:15.5px;line-height:1.55}
.reader .prose blockquote strong{color:var(--accent2)}
.reader .dg-inline{padding:18px 14px 14px;margin:18px 0}
.reader .dg-inline .eyebrow{text-align:center}
.takeaways{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin:18px 0}
.takeaways li{margin:0 0 10px 18px;font-size:14.5px;color:var(--ink2)}
.takeaways li::marker{color:var(--accent)}

/* review card */
.flash{min-height:260px;display:flex;flex-direction:column;justify-content:center;text-align:center;
  padding:32px 24px;margin:8px 0 16px}
.flash .q{font-size:20px;line-height:1.45;font-weight:600}
.flash .a{margin-top:20px;padding-top:20px;border-top:1px solid var(--line);font-size:16px;color:var(--ink2);line-height:1.6;text-align:left}
.flash .yours{margin-top:16px;padding:12px;border-radius:12px;background:var(--bg2);font-size:14.5px;color:var(--ink2);text-align:left}
.grade{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.grade button{border:1px solid var(--line2);background:var(--card);color:var(--ink2);border-radius:12px;
  padding:12px 4px;font-size:13px;cursor:pointer;font-weight:600}
.grade button span{display:block;font-size:10.5px;color:var(--ink3);margin-top:3px;font-weight:400}
.grade .g-again{color:var(--red);background:var(--red-soft);border-color:var(--red-soft)}
.grade .g-good{color:var(--accent);background:var(--accent-soft);border-color:var(--accent-soft)}
.grade .g-easy{color:var(--green);background:var(--green-soft);border-color:var(--green-soft)}
.modetabs{display:flex;gap:8px;margin-bottom:12px}
.modetabs button{background:var(--card);border:1px solid var(--line2);color:var(--ink3);border-radius:999px;
  padding:7px 16px;font-size:12.5px;cursor:pointer;font-weight:600}
.modetabs button.active{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}

/* forms */
input[type=text],input[type=password],textarea,select{width:100%;background:var(--card);border:1px solid var(--line);
  color:var(--ink);border-radius:12px;padding:12px 14px;font-family:var(--sans);font-size:15px;outline:none;margin-bottom:10px}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{min-height:110px;resize:vertical;line-height:1.5}
label.f{display:block;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);margin:10px 0 6px;font-weight:600}

/* subtabs */
.subtabs{display:flex;gap:8px;margin-bottom:16px}
.subtabs button{flex:1;background:var(--card);border:1px solid var(--line2);color:var(--ink3);border-radius:999px;
  padding:9px 0;font-size:12.5px;cursor:pointer;font-weight:600}
.subtabs button.active{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}

/* misc */
.empty{text-align:center;padding:44px 20px;color:var(--ink3)}
.empty .glyph{font-size:32px;color:var(--accent-dim);margin-bottom:10px}
.back{color:var(--ink3);font-size:13px;cursor:pointer;display:inline-block;margin-bottom:14px;background:none;border:none;font-weight:600;font-family:var(--sans)}
.listitem{padding:14px 2px;border-bottom:1px solid var(--line2);cursor:pointer}
.listitem h4{font-size:15.5px;font-weight:600}
.listitem p{font-size:12.5px;color:var(--ink3);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tag{font-size:11px;color:var(--ink3)}
.fab{position:fixed;right:max(20px,calc((100vw - 640px)/2 + 20px));bottom:calc(env(safe-area-inset-bottom) + 86px);
  width:52px;height:52px;border-radius:50%;background:var(--accent);
  color:#fff;font-size:26px;border:none;cursor:pointer;z-index:40;box-shadow:0 8px 24px rgba(91,79,233,.3);
  display:flex;align-items:center;justify-content:center}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 92px);
  background:var(--ink);color:var(--bg);padding:11px 22px;border-radius:999px;
  font-size:13.5px;font-weight:600;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.modal{position:fixed;inset:0;background:rgba(20,19,26,.5);z-index:60;display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.sheet{background:var(--bg);border:1px solid var(--line2);border-bottom:none;border-radius:22px 22px 0 0;
  width:100%;max-width:640px;max-height:86vh;overflow-y:auto;padding:24px 22px calc(env(safe-area-inset-bottom) + 26px)}
.sheet h3{font-size:19px;margin-bottom:14px}
.syncdot{width:7px;height:7px;border-radius:50%;background:var(--ink3);display:inline-block;margin-right:6px}
.syncdot.ok{background:var(--green)} .syncdot.err{background:var(--red)} .syncdot.busy{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.4}}
.week{display:flex;gap:6px;align-items:flex-end;height:64px;margin-top:10px}
.week .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.week .colbar{width:100%;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px;opacity:.9}
.week .coll{font-size:10px;color:var(--ink3)}
.setup-logo{text-align:center;margin:56px 0 34px}
.setup-logo .ring{width:88px;height:88px;background:var(--accent-soft);border-radius:50%;margin:0 auto 18px;
  display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--accent)}
.setup-logo h1{font-size:28px;letter-spacing:3px}
.setup-logo p{color:var(--ink3);font-size:12.5px;letter-spacing:1.8px;text-transform:uppercase;margin-top:6px}
details.help{margin:12px 0;font-size:13.5px;color:var(--ink2)}
details.help summary{color:var(--ink3);cursor:pointer;font-size:12.5px;font-weight:600;margin-bottom:8px}
details.help ol{margin:8px 0 8px 18px} details.help li{margin-bottom:6px}
details.help a{color:var(--accent)}

/* 3.0 additions */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{border:1px solid var(--line);background:var(--card);color:var(--ink2);border-radius:999px;padding:6px 14px;font-size:12.5px;font-weight:600;cursor:pointer}
.chip.active{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
.lanechip{display:inline-block;font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;font-weight:700;border-radius:6px;padding:3px 8px}
.lane-retrieve{background:var(--green-soft);color:var(--green)}
.lane-gist{background:var(--amber-soft);color:var(--amber)}
.lane-understand{background:#E6F1FB;color:#185FA5}
[data-theme=dark] .lane-understand{background:#12283b;color:#7db4e8}
.lane-learn{background:var(--accent-soft);color:var(--accent)}
.lane-evaluate{background:var(--red-soft);color:var(--red)}
.choice{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);color:var(--ink);
  border-radius:12px;padding:12px 14px;font-size:14.5px;margin-bottom:8px;cursor:pointer;font-family:var(--sans)}
.choice.correct{border-color:var(--green);background:var(--green-soft)}
.choice.wrong{border-color:var(--red);background:var(--red-soft)}
.quote{border-left:3px solid var(--accent);border-radius:0;padding:4px 0 4px 14px;margin:4px 0}
.quote .qt{font-size:15px;line-height:1.55;color:var(--ink)}
.quote .qa{font-size:12.5px;color:var(--ink3);margin-top:6px}
.srch{margin-bottom:12px}
.glossitem{padding:12px 2px;border-bottom:1px solid var(--line2)}
.glossitem h4{font-size:15px;font-weight:650}
.glossitem p{font-size:13.5px;color:var(--ink2);margin-top:3px}
.glossitem .gcat{font-size:11px;color:var(--ink3)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-left:6px;vertical-align:2px}
.inboxtile{display:inline-flex;align-items:center;gap:5px;background:var(--accent-soft);color:var(--accent);border-radius:999px;padding:4px 12px;font-size:13px;font-weight:600;cursor:pointer}
.setsec{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink3);font-weight:600;margin:18px 0 8px}
.setbtn{display:block;width:100%;text-align:left;margin-bottom:8px}
.histbox{border:1px dashed var(--line);border-radius:12px;padding:12px;margin-top:10px;font-size:13px;color:var(--ink3)}
.artif{margin-top:14px}
.artif h5{font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;font-weight:600}

</style>
</head>
<body>
<div id="app"></div>
<nav id="nav" style="display:none"><div class="inner">
  <button data-v="today"><span class="ico">◉</span>Today</button>
  <button data-v="news"><span class="ico">☰</span>News</button>
  <button data-v="library"><span class="ico">▤</span>Library</button>
  <button data-v="review"><span class="ico">◈</span>Review</button>
  <button data-v="progress"><span class="ico">△</span>Stats</button>
</div></nav>
<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<script>
/* ===================== MERIDIAN APP v3 ===================== */
/* Repo-backed lanes architecture. Content + state live in a private GitHub repo. */
"use strict";
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const DAY=86400000;
const clamp=(x,lo,hi)=>Math.min(hi,Math.max(lo,x));
const todayStr=(d=new Date())=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const LANES=[["retrieve","Retrieve","Exact facts, fast"],["gist","Gist","Orientation, relevance"],["understand","Understand","Mental models"],["learn","Learn","Durable recall"],["evaluate","Evaluate","Judgment, synthesis"]];
const laneName=id=>(LANES.find(l=>l[0]===id)||["","?"])[1];
const laneChip=id=>`<span class="lanechip lane-${esc(id)}">${esc(laneName(id))}</span>`;

/* ---------- content (from private repo) ---------- */
let DATA={v:3,categories:[],items:[],glossary:[],quotes:[],challenges:[]};
try{const c=localStorage.getItem("meridian.data");if(c)DATA=JSON.parse(c);}catch(e){}

/* ---------- state ---------- */
function defaultDB(){return {v:3,updatedAt:0,srs:{},done:{},notes:[],projects:[],custom:[],itemState:{},inboxDecisions:{},newsActions:{},
  meta:{streak:0,lastDay:"",xp:0,revlog:{},intake:{},gradelog:{},minlog:{},catlog:{}}};}
let DB=defaultDB();
try{const raw=localStorage.getItem("meridian.db");if(raw)DB=Object.assign(defaultDB(),JSON.parse(raw));
  DB.meta=Object.assign(defaultDB().meta,DB.meta||{});}catch(e){}
let VIEW={name:"today",p:null}, libTab="lanes", syncState="off", syncTimer=null, FLOW=false, stateSha=null;

function saveLocal(){DB.updatedAt=Date.now();localStorage.setItem("meridian.db",JSON.stringify(DB));queueSync();}
function token(){return localStorage.getItem("meridian.token")||"";}
function repo(){return localStorage.getItem("meridian.repo")||"";}

/* ---------- theme ---------- */
function themePref(){return localStorage.getItem("meridian.theme")||"light";}
function applyTheme(){
  let t=themePref();
  if(t==="auto")t=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";
  document.documentElement.dataset.theme=t;
  const mc=$("#themeColor");if(mc)mc.content=t==="dark"?"#131217":"#FAF9F5";
}
applyTheme();
if(window.matchMedia)window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change",applyTheme);

/* ---------- effective items (data + user overlay) ---------- */
function itemState(id){return DB.itemState[id]||{};}
function items(){return DATA.items.map(it=>{
  const st=itemState(it.id);
  return Object.assign({},it,{lane:st.lane||it.lane,cats:st.cats||it.cats,edits:st.edits||{},history:(it.history||[]).concat(st.history||[])});
});}
function item(id){return items().find(x=>x.id===id);}
function catOf(id){return DATA.categories.find(c=>c.id===id)||{id,name:id,glyph:"·"};}
function artifact(it,key){return (it.edits&&it.edits[key])||(it.artifacts&&it.artifacts[key]);}

/* ---------- review units ---------- */
/* Every reviewable artifact is a unit: card / mcq / prompt / drill — all scheduled by FSRS. */
function allUnits(){
  const out=[];
  for(const it of items()){
    if(it.lane!=="learn"&&it.lane!=="retrieve")continue;
    const push=(arr,type,pref)=>((arr||[]).forEach((a,i)=>out.push({id:it.id+"#"+pref+i,type,a,item:it,cat:(it.cats||[])[0]||"misc"})));
    push(artifact(it,"cards"),"card","c");
    push(artifact(it,"quiz"),"mcq","q");
    push(artifact(it,"prompts"),"prompt","p");
    push(artifact(it,"drills"),"drill","d");
  }
  (DB.custom||[]).forEach(c=>{if(!c.del)out.push({id:c.id,type:"card",a:{q:c.q,a:c.a},item:null,cat:c.track||"note",src:c.src||"Your note"});});
  return out;
}
function unlockedUnits(){
  return allUnits().filter(u=>{
    if(!u.item)return true;
    if(artifact(u.item,"lesson"))return !!DB.done[u.item.id];
    return true;
  });
}

function interleave(arr){
  const by={};arr.forEach(u=>{(by[u.cat]=by[u.cat]||[]).push(u);});
  const keys=Object.keys(by);const out=[];let more=true;
  while(more){more=false;for(const k of keys){const u=by[k].shift();if(u){out.push(u);more=true;}}}
  return out;
}

/* ---------- FSRS-4.5 ---------- */
const FW=[0.4872,1.4003,3.7145,13.8206,5.1618,1.2298,0.8975,0.031,1.6474,0.1367,1.0461,2.1072,0.0793,0.3246,1.587,0.2272,2.8755];
const F_FACTOR=19/81, F_DECAY=-0.5;
function fsR(days,s){return Math.pow(1+F_FACTOR*Math.max(0,days)/s,F_DECAY);}
function fsS0(G){return Math.max(0.1,FW[G-1]);}
function fsD0(G){return clamp(FW[4]-Math.exp(FW[5]*(G-1))+1,1,10);}
function fsNext(e,G,elapsed){
  const r=fsR(elapsed,e.s);
  let d=e.d-FW[6]*(G-3);
  d=clamp(FW[7]*fsD0(4)+(1-FW[7])*d,1,10);
  let s;
  if(G===1){
    s=FW[11]*Math.pow(e.d,-FW[12])*(Math.pow(e.s+1,FW[13])-1)*Math.exp(FW[14]*(1-r));
    s=Math.min(s,e.s);
  }else{
    const hard=G===2?FW[15]:1, easy=G===4?FW[16]:1;
    s=e.s*(Math.exp(FW[8])*(11-e.d)*Math.pow(e.s,-FW[9])*(Math.exp(FW[10]*(1-r))-1)*hard*easy+1);
  }
  return {d:d,s:clamp(s,0.1,36500)};
}
function fsInterval(s){return clamp(Math.round(s),1,365);}
function migrateSRS(){
  let n=0;
  for(const k in DB.srs){const e=DB.srs[k];
    if(e&&e.s==null){
      e.s=Math.max(0.5,e.iv||0.5);
      e.d=clamp(6.4-((e.ease||2.5)-2.5)*3.2,1,10);
      e.lapses=e.lapses||0;e.last=e.u||Date.now();
      delete e.iv;delete e.ease;n++;
    }}
  return n;
}
migrateSRS();
function grade(unit,g){
  const now=Date.now(), G=g+1, id=unit.id;
  let e=DB.srs[id];
  if(!e){
    const t=todayStr();DB.meta.intake=DB.meta.intake||{};DB.meta.intake[t]=(DB.meta.intake[t]||0)+1;
    e={s:fsS0(G),d:fsD0(G),reps:0,lapses:0,last:now};
  }else{
    const nx=fsNext(e,G,Math.max(0,(now-(e.last||now))/DAY));
    e.s=nx.s;e.d=nx.d;
  }
  if(g===0){e.lapses=(e.lapses||0)+1;e.due=now+600000;}
  else{e.due=now+fsInterval(e.s)*DAY;}
  e.reps=(e.reps||0)+1;e.last=now;e.u=now;DB.srs[id]=e;
  const t=todayStr();
  DB.meta.revlog[t]=(DB.meta.revlog[t]||0)+1;
  const gl=DB.meta.gradelog[t]||{n:0,a:0};gl.n++;if(g===0)gl.a++;DB.meta.gradelog[t]=gl;
  const cat=unit.cat||"misc";
  const cl=DB.meta.catlog[cat]||{n:0,a:0};cl.n++;if(g===0)cl.a++;DB.meta.catlog[cat]=cl;
  DB.meta.minlog[t]=Math.round(((DB.meta.minlog[t]||0)+0.5)*10)/10;
  DB.meta.xp+=2;bumpStreak();saveLocal();
}
function ivPreview(id,g){
  const G=g+1,e=DB.srs[id];
  if(!e)return fsInterval(fsS0(G))+" d";
  return fsInterval(fsNext(e,G,Math.max(0,(Date.now()-(e.last||Date.now()))/DAY)).s)+" d";
}
function bumpStreak(){
  const t=todayStr(),y=todayStr(new Date(Date.now()-DAY));
  if(DB.meta.lastDay===t)return;

}

async function gh(path,opt={},raw){
  opt.headers=Object.assign({Authorization:"Bearer "+token(),
    Accept:raw?"application/vnd.github.raw+json":"application/vnd.github+json"},opt.headers||{});
  const r=await fetch("https://api.github.com"+path,opt);
  if(!r.ok){const err=new Error("GitHub "+r.status);err.status=r.status;throw err;}
  return raw?r.text():r.json();
}
const REPO_STATE="app/app-state.json", REPO_DATA="app/app-data.json";

    const d=JSON.parse(txt);

      if(DATA.generated)localStorage.setItem("meridian.prevGen",DATA.generated);
      DATA=d;localStorage.setItem("meridian.data",txt);render();

}
function mergeItems(a,b){const m={};[...(a||[]),...(b||[])].forEach(x=>{if(!x||!x.id)return;if(!m[x.id]||(x.u||0)>(m[x.id].u||0))m[x.id]=x;});return Object.values(m);}
function mergeDB(rem){
  if(!rem||!rem.v)return;
  const out=defaultDB();
  out.srs=Object.assign({},rem.srs);
  for(const k in DB.srs){if(!out.srs[k]||(DB.srs[k].u||0)>(out.srs[k].u||0))out.srs[k]=DB.srs[k];}
  out.done=Object.assign({},rem.done,DB.done);
  out.notes=mergeItems(rem.notes,DB.notes);
  out.projects=mergeItems(rem.projects,DB.projects);
  out.custom=mergeItems(rem.custom,DB.custom);
  out.itemState=Object.assign({},rem.itemState);
  for(const k in DB.itemState){const a=out.itemState[k],b=DB.itemState[k];
    if(!a||(b.u||0)>=(a.u||0))out.itemState[k]=b;}
  out.inboxDecisions=Object.assign({},rem.inboxDecisions,DB.inboxDecisions);
  out.newsActions=Object.assign({},rem.newsActions||{},DB.newsActions||{});
  const rl=rem.meta||{},ll=DB.meta;
  out.meta.xp=Math.max(rl.xp||0,ll.xp||0);
  out.meta.revlog=Object.assign({},rl.revlog);for(const d in ll.revlog){out.meta.revlog[d]=Math.max(out.meta.revlog[d]||0,ll.revlog[d]);}
  out.meta.intake=Object.assign({},rl.intake||{},ll.intake||{});
  out.meta.gradelog=Object.assign({},rl.gradelog||{});
  for(const d in (ll.gradelog||{})){const a=out.meta.gradelog[d]||{n:0,a:0},b=ll.gradelog[d];out.meta.gradelog[d]=b.n>=a.n?b:a;}
  out.meta.catlog=Object.assign({},rl.catlog||{});
  for(const c in (ll.catlog||{})){const a=out.meta.catlog[c]||{n:0,a:0},b=ll.catlog[c];out.meta.catlog[c]=b.n>=a.n?b:a;}
  out.meta.minlog=Object.assign({},rl.minlog||{});
  for(const d in (ll.minlog||{})){out.meta.minlog[d]=Math.max(out.meta.minlog[d]||0,ll.minlog[d]);}
  if((rl.lastDay||"")>(ll.lastDay||"")){out.meta.lastDay=rl.lastDay;out.meta.streak=rl.streak||0;}
  else if((rl.lastDay||"")<(ll.lastDay||"")){out.meta.lastDay=ll.lastDay;out.meta.streak=ll.streak||0;}
  else{out.meta.lastDay=ll.lastDay;out.meta.streak=Math.max(rl.streak||0,ll.streak||0);}
  out.updatedAt=Date.now();DB=out;
  migrateSRS();
  localStorage.setItem("meridian.db",JSON.stringify(DB));
}
async function pull(){
  if(!token())return;
  setSync("busy");
  try{
    const f=await gh(`/repos/${repo()}/contents/${REPO_STATE}`);
    stateSha=f.sha;
    mergeDB(JSON.parse(decodeURIComponent(escape(atob(f.content.replace(/\n/g,""))))));
    setSync("ok");
  }catch(e){
    if(e.status===404){stateSha=null;setSync("ok");}
    else{console.warn(e);setSync("err");}
  }
}
async function push(attempt=0){
  if(!token())return;
  setSync("busy");
  try{
    const body={message:"app state "+new Date().toISOString(),
      content:btoa(unescape(encodeURIComponent(JSON.stringify(DB))))};
    if(stateSha)body.sha=stateSha;
    const r=await gh(`/repos/${repo()}/contents/${REPO_STATE}`,{method:"PUT",body:JSON.stringify(body)});
    stateSha=r.content.sha;
    setSync("ok");
  }catch(e){
    if((e.status===409||e.status===422)&&attempt<2){await pull();return push(attempt+1);}
    console.warn(e);setSync("err");
  }
}
function queueSync(){if(!token())return;clearTimeout(syncTimer);syncTimer=setTimeout(push,3000);}
function setSync(s){syncState=s;const d=document.querySelector(".syncdot");if(d)d.className="syncdot "+s;}
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="hidden"&&token()){clearTimeout(syncTimer);try{push();}catch(e){}}});

function md(body,dgs){
  const fmt=s=>esc(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  return String(body||"").trim().split(/\n\n+/).map(p=>{
    p=p.trim();
    const dm=p.match(/^\{\{DIAGRAM:(\d+)\}\}$/);
    if(dm){
      const dg=dgs&&dgs[+dm[1]];
      if(!dg)return "";
      return `<div class="card lux dg-inline"><div class="eyebrow">${esc(dg.cap||"How it flows")}</div>${dgSVG(dg)}</div>`;
    }
    if(p.startsWith("## ")){
      const lines=p.split("\n");const hd=lines.shift();
      let out="<h4>"+esc(hd.slice(3))+"</h4>";
      if(lines.length)out+="<p>"+fmt(lines.join(" "))+"</p>";
      return out;
    }
    if(p.startsWith("- ")){
      const its=p.split("\n").filter(l=>l.trim().startsWith("- ")).map(l=>l.trim().slice(2));
      return "<ul>"+its.map(x=>"<li>"+fmt(x)+"</li>").join("")+"</ul>";
    }
    if(p.startsWith("> ")){
      const lines=p.split("\n").map(l=>l.replace(/^>\s?/,""));
      return "<blockquote>"+fmt(lines.join(" "))+"</blockquote>";
    }
    return "<p>"+fmt(p.replace(/\n/g," "))+"</p>";
  }).join("");
}
function dgWrap(s,max){
  const words=String(s).split(" ");const lines=[];let cur="";
  words.forEach(w=>{if((cur+" "+w).trim().length>max){if(cur)lines.push(cur.trim());cur=w;}else cur+=" "+w;});
  if(cur.trim())lines.push(cur.trim());return lines.slice(0,3);
}
function dgBox(x,y,w,h,label,accent){
  const lines=dgWrap(label,Math.floor(w/7.2));
  const lh=15, ty=y+h/2-(lines.length-1)*lh/2;
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="10" style="fill:${accent?'var(--accent-soft)':'var(--card)'};stroke:${accent?'var(--accent)':'var(--line)'};stroke-width:1"/>`+
    lines.map((ln,i)=>`<text x="${x+w/2}" y="${ty+i*lh}" text-anchor="middle" dominant-baseline="middle" style="fill:var(--ink)" font-size="12" font-family="-apple-system,sans-serif">${esc(ln)}</text>`).join("");
}
function dgArrow(x1,y1,x2,y2){
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" style="stroke:var(--accent-dim)" stroke-width="1.2" marker-end="url(#dgA)"/>`;
}
function dgSVG(dg){
  const W=330, bh=48, gap=24;
  const defs=`<defs><marker id="dgA" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" style="fill:var(--accent-dim)"/></marker></defs>`;
  let inner="",H;
  if(dg.t==="cycle"){
    H=dg.s.length*(bh+gap)-gap+8;
    dg.s.forEach((s,i)=>{
      const y=4+i*(bh+gap);
      inner+=dgBox(46,y,W-92,bh,s,i===0);
      if(i<dg.s.length-1)inner+=dgArrow(W/2,y+bh,W/2,y+bh+gap-2);
    });
    const y0=4+bh/2, y1=4+(dg.s.length-1)*(bh+gap)+bh/2;
    inner+=`<path d="M ${W-46} ${y1} C ${W-8} ${y1}, ${W-8} ${y0}, ${W-44} ${y0}" fill="none" style="stroke:var(--accent-dim)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#dgA)"/>`;
  }else if(dg.t==="split"){
    const bar=dg.s.indexOf("|");
    const left=dg.s.slice(1,bar), right=dg.s.slice(bar+1);
    const rows=Math.max(left.length,right.length);
    H=(bh+gap)+rows*(bh+gap)-gap+8;
    inner+=dgBox(70,4,W-140,bh,dg.s[0],true);
    const bw=(W-40)/2-10;
    inner+=dgArrow(W/2-20,4+bh,20+bw/2,4+bh+gap-2);
    inner+=dgArrow(W/2+20,4+bh,W-20-bw/2,4+bh+gap-2);
    left.forEach((s,i)=>{const y=4+(bh+gap)*(i+1);inner+=dgBox(20,y,bw,bh,s,false);
      if(i<left.length-1)inner+=dgArrow(20+bw/2,y+bh,20+bw/2,y+bh+gap-2);});
    right.forEach((s,i)=>{const y=4+(bh+gap)*(i+1);inner+=dgBox(W-20-bw,y,bw,bh,s,false);
      if(i<right.length-1)inner+=dgArrow(W-20-bw/2,y+bh,W-20-bw/2,y+bh+gap-2);});
  }else{
    H=dg.s.length*(bh+gap)-gap+8;
    dg.s.forEach((s,i)=>{
      const y=4+i*(bh+gap);
      inner+=dgBox(30,y,W-60,bh,s,i===0||i===dg.s.length-1);
      if(i<dg.s.length-1)inner+=dgArrow(W/2,y+bh,W/2,y+bh+gap-2);
    });
  }
  return `<svg viewBox="0 0 ${W} ${H+4}" style="width:100%;height:auto;display:block;margin-top:10px" xmlns="http://www.w3.org/2000/svg">${defs}${inner}</svg>`;
}

    <div><h3 style="font-size:15.5px">${esc(it.title)}${freshDot(it)}</h3>
    <div class="body">${laneChip(it.lane)} ${(it.cats||[]).map(c=>esc(catOf(c).name)).join(" · ")}</div></div>
    ${DB.done[it.id]?'<span class="check">✓</span>':'<span class="dim">→</span>'}</div></div>`).join(""):

/* ---------- Review ---------- */
let SESSION=null;
function reviewMode(){return localStorage.getItem("meridian.mode")||"flip";}
function vReview(){
  if(!SESSION){
    const due=interleave(dueUnits());
    const fresh=newUnits().slice(0,newAllowance());
    const q=[...due,...fresh];
    if(!q.length){
      const locked=allUnits().length-unlockedUnits().length;
      return header("Review")+`<div class="empty"><div class="glyph">◈</div>
      <h3 style="margin-bottom:6px">All clear</h3>
      <p style="font-size:14px">Nothing due right now.${locked?"<br>Complete lessons to unlock "+locked+" more.":""}</p>
      <div style="margin-top:18px">${FLOW&&nextLessonItem()?`<button class="btn solid" onclick="APP.item('${nextLessonItem().id}')">Next: today's lesson →</button>`:`<button class="btn" onclick="APP.go('library')">Open library</button>`}</div></div>`;
    }
    SESSION={q,i:0,shown:false,doneCount:0,typed:"",picked:null,missed:null};
  }
  const s=SESSION;
  if(s.i>=s.q.length){
    const n=s.doneCount;SESSION=null;
    const l=nextLessonItem();
    return header("Review")+`<div class="empty"><div class="glyph">✦</div>
      <h3 style="margin-bottom:6px">Session complete</h3>
      <p style="font-size:14px">${n} reviewed · +${n*2} XP</p>
      <div style="margin-top:18px" class="btnrow">
      ${FLOW&&l?`<button class="btn solid" onclick="APP.item('${l.id}')">Next: today's lesson →</button>`:""}
      <button class="btn ${FLOW&&l?"ghost":"solid"}" onclick="APP.go('today')">Back to Today</button></div></div>`;
  }
  const u=resolveUnit(s.q[s.i]);
  const head=header("Review · "+(s.i+1)+" of "+s.q.length);
  const src=u.item?catOf(u.cat).name:(u.src||"Your note");
  let inner=`<div class="eyebrow">${esc(src)} · ${u.type==="card"?"recall":u.type==="mcq"?"quiz":u.type==="prompt"?"short answer":"scenario"}</div>`;
  let controls="";
  if(u.type==="mcq"){
    const a=u.a;
    inner+=`<div class="q">${esc(a.q)}</div>`;
    if(!s.shown){
      controls=a.choices.map((c,i)=>`<button class="choice" onclick="APP.pick(${i})">${esc(c)}</button>`).join("");
    }else{
      controls=a.choices.map((c,i)=>{
        const cls=i===a.correct?"correct":(i===s.picked?"wrong":"");
        return `<button class="choice ${cls}">${esc(c)}</button>`;}).join("")+
        (a.why?`<div class="flash" style="min-height:0;padding:12px;text-align:left"><div class="a" style="margin:0;padding:0;border:none">${esc(a.why)}</div></div>`:"")+gradeRow(u);
    }
  }else if(u.type==="prompt"||u.type==="drill"){
    const a=u.a;
    inner+=`<div class="q">${esc(a.q||a.scenario)}</div>`;
    if(s.shown){
      if(s.typed)inner+=`<div class="yours"><strong>Your answer:</strong> ${esc(s.typed)}</div>`;
      inner+=`<div class="a">${esc(a.model||a.a)}</div>`;
      controls=gradeRow(u);
    }else{
      controls=`<textarea id="typedIn" placeholder="${u.type==="drill"?"How would you handle it? Type or think out loud, then compare":"Type what you remember, then compare"}" style="min-height:100px">${esc(s.typed||"")}</textarea>
      <button class="btn solid" style="width:100%" onclick="APP.checkTyped()">Compare with model answer</button>`;
    }
  }else{ /* card */
    const mode=reviewMode();
    inner+=`<div class="q">${esc(u.a.q)}</div>`;
    if(s.shown){
      if(mode==="type"&&s.typed)inner+=`<div class="yours"><strong>Your answer:</strong> ${esc(s.typed)}</div>`;
      inner+=`<div class="a">${esc(u.a.a)}</div>`;
      controls=gradeRow(u);
    }else if(mode==="type"){
      controls=`<textarea id="typedIn" placeholder="Type what you remember — then check" style="min-height:90px">${esc(s.typed||"")}</textarea>
      <button class="btn solid" style="width:100%" onclick="APP.checkTyped()">Check answer</button>`;
    }else{
      controls=`<button class="btn solid" style="width:100%" onclick="APP.reveal()">Show answer</button>`;
    }
  }
  const modeTabs=u.type==="card"?`<div class="modetabs">
    <button class="${reviewMode()==="flip"?"active":""}" onclick="APP.setMode('flip')">Flip</button>
    <button class="${reviewMode()==="type"?"active":""}" onclick="APP.setMode('type')">Type answer</button></div>`:"";
  let missBox="";
  if(s.missed&&s.missed.item){
    const les=artifact(s.missed.item,"lesson");
    missBox=`<div class="takeaways" style="border-color:var(--red)"><div class="eyebrow" style="color:var(--red)">Missed — re-anchor before it returns</div>
    <ul>${(les&&les.takeaways||[]).map(x=>`<li>${esc(x)}</li>`).join("")||"<li>Review the item.</li>"}</ul>
    <button class="btn small ghost" onclick="APP.item('${s.missed.item.id}')">Open item</button></div>`;
  }
  return head+modeTabs+`<div class="card lux flash">${inner}</div>${controls}${missBox}`;
}
function gradeRow(u){
  return `<div class="grade">
    <button class="g-again" onclick="APP.grade(0)">Again<span>10 min</span></button>
    <button onclick="APP.grade(1)">Hard<span>${ivPreview(u.id,1)}</span></button>
    <button class="g-good" onclick="APP.grade(2)">Good<span>${ivPreview(u.id,2)}</span></button>
    <button class="g-easy" onclick="APP.grade(3)">Easy<span>${ivPreview(u.id,3)}</span></button></div>`;
}

/* ---------- Stats ---------- */
function vProgress(){
  const units=unlockedUnits();const seen=units.filter(u=>DB.srs[u.id]).length;
  const mastered=units.filter(u=>DB.srs[u.id]&&(DB.srs[u.id].s||0)>=21).length;
  const doneLessons=Object.keys(DB.done).filter(k=>k.indexOf("challenge")<0).length;
  const days=[...Array(7)].map((_,i)=>{const d=new Date(Date.now()-(6-i)*DAY);return{k:todayStr(d),l:"SMTWTFS"[d.getDay()]};});
  const mx=Math.max(1,...days.map(d=>DB.meta.revlog[d.k]||0));
  let gN=0,gA=0;const gl=DB.meta.gradelog||{};
  for(let i=0;i<30;i++){const k=todayStr(new Date(Date.now()-i*DAY));if(gl[k]){gN+=gl[k].n;gA+=gl[k].a;}}
  const retention=gN?Math.round((1-gA/gN)*100):null;
  const fc=[...Array(7)].map((_,i)=>{
    const start=Date.now()+i*DAY, end=start+DAY;let n=0;
    for(const k in DB.srs){const e=DB.srs[k];if(e&&!e.susp&&e.due>=(i===0?0:start)&&e.due<end)n++;}
    return n;});
  const fmx=Math.max(1,...fc);
  const cl=DB.meta.catlog||{};
  const catRows=Object.keys(cl).filter(c=>cl[c].n>=5).map(c=>({c,r:Math.round((1-cl[c].a/cl[c].n)*100),n:cl[c].n}))
    .sort((a,b)=>a.r-b.r);
  return header("Stats")+`
  <div class="stats">
    <div class="stat hi"><div class="n">${DB.meta.streak||0}</div><div class="l">Streak</div></div>
    <div class="stat"><div class="n">${retention==null?"—":retention+"%"}</div><div class="l">Retention 30d</div></div>
    <div class="stat"><div class="n">${seen}</div><div class="l">Seen</div></div>
    <div class="stat"><div class="n">${mastered}</div><div class="l">Mastered</div></div>
  </div>
  ${catRows.length?`<div class="card"><div class="eyebrow">Retention by category — weakest first</div>
    ${catRows.map(r=>`<div style="margin-top:12px"><div class="row" style="font-size:13.5px"><span>${esc(catOf(r.c).name)}</span><span class="dim">${r.r}% · ${r.n} reviews</span></div>
    <div class="bar ${r.r>=85?"g":""}"><i style="width:${r.r}%"></i></div></div>`).join("")}
    <p class="dim" style="font-size:12px;margin-top:10px">The nightly pipeline biases new material toward your weakest categories.</p></div>`:""}
  <div class="card"><div class="eyebrow">Reviews · last 7 days</div>
    <div class="week">${days.map(d=>{const v=DB.meta.revlog[d.k]||0;
      return `<div class="col"><div class="colbar" style="height:${Math.round(v/mx*46)+2}px"></div><div class="coll">${d.l}</div></div>`;}).join("")}</div></div>
  <div class="card"><div class="eyebrow">Due forecast · next 7 days</div>
    <div class="week">${fc.map((v,i)=>{const d=new Date(Date.now()+i*DAY);
      return `<div class="col"><div class="colbar" style="height:${Math.round(v/fmx*46)+2}px;background:var(--green)"></div><div class="coll">${i===0?"now":"SMTWTFS"[d.getDay()]}</div></div>`;}).join("")}</div>
    <p class="dim" style="font-size:12px;margin-top:8px">FSRS at 90% target retention. Lessons done: ${doneLessons}.</p></div>`;
}

/* ---------- Setup ---------- */
function vSetup(){
  return `<div class="setup-logo"><div class="ring">◆</div><h1>MERIDIAN</h1><p>Learning System</p></div>
  <div class="card lux"><h3 style="margin-bottom:10px">Connect your private repo</h3>
  <div class="body" style="margin-bottom:12px">All content and progress live in your private GitHub repository. Nothing personal is stored in this public app.</div>
  <label class="f">GitHub token (repo access)</label>
  <input type="password" id="tok" placeholder="github_pat_… or ghp_…" autocomplete="off">
  <label class="f">Repository</label>
  <input type="text" id="repoIn" placeholder="owner/repo — your private vault repository">
  <div class="btnrow"><button class="btn solid" onclick="APP.connect()">Connect &amp; begin</button></div></div>`;
}
</script>
<script>
"use strict";
/* ===================== ACTIONS ===================== */
function setItemState(id,patch){
  const st=DB.itemState[id]||{};
  DB.itemState[id]=Object.assign(st,patch,{u:Date.now()});
  saveLocal();
}
const APP={
  go(name,p){if(name==="review")SESSION=null;if(name==="today")FLOW=false;if(name==="library")libFilter=null;nav(name,p);},
  startFlow(){FLOW=true;SESSION=null;nav("review");},
  lib(t){libTab=t;libFilter=null;nav("library");},
  libFilter(id){libFilter=id;nav("library");},
  desk(t){deskTab=t;nav("library");},
  item(id){nav("item",id);},
  glossSearch(v){glossQuery=v;
    const box=document.querySelector(".srch");
    const app=$("#app");const pos=box?box.selectionStart:0;
    app.innerHTML=vLibrary();
    const nb=document.querySelector(".srch");if(nb){nb.focus();nb.setSelectionRange(pos,pos);}},
  glossToCard(gid){
    const g=DATA.glossary.find(x=>x.id===gid);if(!g)return;
    if((DB.custom||[]).some(c=>!c.del&&c.src==="Glossary"&&c.q==="Define: "+g.term))return toast("Already in rotation");
    DB.custom.push({id:"c"+Date.now(),q:"Define: "+g.term,a:g.def,u:Date.now(),src:"Glossary",track:"gloss"});
    saveLocal();toast("Added to review rotation");},
  refreshInbox(silent){
    listInboxFiles().then(f=>{INBOXFILES=f;if(VIEW.name==="inbox")render();});
    if(!silent)toast("Refreshing…");},
  capLane(id){CAPLANE=id;render();},
  async saveCapture(){
    const b=$("#capB").value.trim(), instr=$("#capI").value.trim();
    if(!b)return toast("Nothing to capture");
    const name="capture-"+new Date().toISOString().replace(/[:T]/g,"-").slice(0,16)+".md";
    const content=`---\ncaptured: ${new Date().toISOString()}\nvia: meridian-app\nrequested_lane: ${CAPLANE}\ninstruction: ${instr||"(none)"}\n---\n\n${b}\n`;
    try{await captureToInbox(name,content);INBOXFILES=null;CAPLANE="auto";toast("Captured ✓");render();}
    catch(e){toast("Couldn't reach GitHub — try again");}
  },
  captureFile(inp){
    const f=inp.files[0];if(!f)return;
    if(f.size>3*1024*1024)return toast("Max 3 MB per file");
    const r=new FileReader();
    r.onload=async()=>{
      const b64=r.result.split(",")[1];
      const safe=f.name.replace(/[^a-zA-Z0-9._-]/g,"_");
      const name="capture-"+new Date().toISOString().replace(/[:T]/g,"-").slice(0,16)+"-"+safe;
      try{
        await gh(`/repos/${repo()}/contents/_inbox/${name}`,{method:"PUT",body:JSON.stringify({message:"capture from app",content:b64})});
        INBOXFILES=null;toast("Uploaded ✓");render();
      }catch(e){toast("Upload failed — try again");}
    };
    r.readAsDataURL(f);
  },
  async processNow(){
    try{
      await captureToInbox(".process-request","requested: "+new Date().toISOString()+"\n");
      toast("Requested — runs within the hour if your Mac has Claude open");
    }catch(e){toast("Couldn't reach GitHub");}
  },
  newsRead(id){DB.newsActions[id]={a:"read",at:Date.now()};saveLocal();render();},
  newsLib(id){DB.newsActions[id]={a:"lib",at:Date.now()};saveLocal();toast("Will be added to your Gist lane tonight");render();},
  suggest(id,i){
    const it=DATA.items.find(x=>x.id===id);const s=it&&(it.suggestions||[])[i];if(!s)return;
    DB.inboxDecisions[id]={lane:it.lane,suggestion:s.label,at:todayStr()};
    setItemState(id,{});
    toast("Noted — Claude will do this in the next run");render();},
  logExternal(){
    openSheet(`<h3>Log external learning</h3>
    <p class="muted" style="font-size:13.5px;margin-bottom:10px">NotebookLM audio, a course, practice drills — anything done outside the app. Counts toward today's ring.</p>
    <label class="f">Minutes</label><input type="text" id="exM" inputmode="numeric" placeholder="e.g. 25">
    <label class="f">What was it?</label><input type="text" id="exW" placeholder="e.g. NotebookLM audio — ML ranking topic">
    <div class="btnrow"><button class="btn solid" onclick="APP.saveExternal()">Log it</button>
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);},
  saveExternal(){
    const m=parseInt($("#exM").value,10),w=$("#exW").value.trim();
    if(!m||m<1)return toast("Enter minutes");
    logMin(Math.min(m,240));bumpStreak();
    DB.notes.push({id:"n"+Date.now(),title:"External learning — "+todayStr(),body:(w||"logged")+" ("+m+" min)",u:Date.now()});
    saveLocal();closeSheet();toast("+"+m+" min logged");render();},
  acceptLane(id){
    const it=DATA.items.find(x=>x.id===id);if(!it)return;
    DB.inboxDecisions[id]={lane:it.lane,at:todayStr()};
    setItemState(id,{lane:it.lane});
    toast("Filed to "+laneName(it.lane));render();},
  pickLane(id){
    const it=item(id);if(!it)return;
    openSheet(`<h3>Choose lane</h3>
    <p class="muted" style="font-size:13.5px;margin-bottom:12px">How deeply should this be processed? Prior artifacts are kept as history.</p>
    ${LANES.map(([lid,name,desc])=>`<button class="choice ${it.lane===lid?"correct":""}" onclick="APP.setLane('${id}','${lid}')">
      <strong>${esc(name)}</strong> — <span style="color:var(--ink2)">${esc(desc)}</span></button>`).join("")}`);},
  setLane(id,lane){
    const it=item(id);
    const st=DB.itemState[id]||{};
    const hist=(st.history||[]).concat([{lane:it.lane,at:todayStr()}]);
    DB.inboxDecisions[id]={lane,at:todayStr()};
    setItemState(id,{lane,history:hist});
    closeSheet();toast("Moved to "+laneName(lane)+" — new artifacts generate tonight");render();},
  editArtifact(id,key){
    const it=item(id);if(!it)return;
    const cur=artifact(it,key);
    let text="";
    if(key==="lesson"){const l=cur||{};text=l.body||"";}
    else text=typeof cur==="string"?cur:(cur?JSON.stringify(cur,null,1):"");
    openSheet(`<h3>Edit ${key}</h3>
    <p class="dim" style="font-size:12px;margin-bottom:8px">Your edit overlays the generated version — regeneration never overwrites it.</p>
    <textarea id="edB" style="min-height:220px">${esc(text)}</textarea>
    <div class="btnrow"><button class="btn solid" onclick="APP.saveArtifact('${id}','${key}')">Save</button>
    ${it.edits&&it.edits[key]?`<button class="btn ghost" onclick="APP.revertArtifact('${id}','${key}')">Revert to generated</button>`:""}
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);},
  saveArtifact(id,key){
    const v=$("#edB").value;
    const it=item(id);
    const st=DB.itemState[id]||{};st.edits=st.edits||{};
    if(key==="lesson"){const base=(it.artifacts&&it.artifacts.lesson)||{};st.edits.lesson=Object.assign({},base,{body:v});}
    else st.edits[key]=v;
    setItemState(id,{edits:st.edits});
    closeSheet();toast("Saved — synced to your repo");render();},
  revertArtifact(id,key){
    const st=DB.itemState[id]||{};if(st.edits)delete st.edits[key];
    setItemState(id,{edits:st.edits||{}});
    closeSheet();toast("Reverted");render();},
  editCard(id,idx){
    const it=item(id);const cards=(artifact(it,"cards")||[]).slice();
    const c=cards[idx];if(!c)return;
    openSheet(`<h3>Edit flashcard</h3>
    <label class="f">Question</label><input type="text" id="cq" value="${esc(c.q)}">
    <label class="f">Answer</label><textarea id="ca">${esc(c.a)}</textarea>
    <div class="btnrow"><button class="btn solid" onclick="APP.saveCardEdit('${id}',${idx})">Save</button>
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);},
  saveCardEdit(id,idx){
    const it=item(id);const cards=(artifact(it,"cards")||[]).map(c=>({q:c.q,a:c.a}));
    cards[idx]={q:$("#cq").value.trim(),a:$("#ca").value.trim()};
    const st=DB.itemState[id]||{};st.edits=st.edits||{};st.edits.cards=cards;
    setItemState(id,{edits:st.edits});
    closeSheet();toast("Card updated");render();},
  lessonDone(id){
    const it=item(id);const les=artifact(it,"lesson");
    DB.done[id]=Date.now();DB.meta.xp+=15;if(les)logMin(les.min);bumpStreak();saveLocal();
    toast("+15 XP — cards unlocked");
    if(FLOW)nav("today");else render();},
  challengeDone(){DB.done["challenge-"+todayStr()]=Date.now();DB.meta.xp+=20;logMin(5);bumpStreak();saveLocal();toast("+20 XP");render();},
  challengeNote(){const ch=DATA.challenges[doyIndex(DATA.challenges.length)];
    APP.editNote(null,"Challenge — "+todayStr(),(ch?ch.text:"")+"\n\n");},
  quotes(){
    const qs=DATA.quotes;
    openSheet(`<h3>Quotes &amp; maxims (${qs.length})</h3>
    ${qs.slice(0,400).map(q=>`<div class="quote" style="margin-bottom:12px"><div class="qt" style="font-size:14px">“${esc(q.text)}”</div><div class="qa">— ${esc(q.by)}</div></div>`).join("")}`);},
  reveal(){SESSION.shown=true;render();},
  checkTyped(){const el=$("#typedIn");SESSION.typed=el?el.value.trim():"";SESSION.shown=true;render();},
  pick(i){SESSION.picked=i;SESSION.shown=true;render();},
  setMode(m){localStorage.setItem("meridian.mode",m);render();},
  grade(g){
    const u=SESSION.q[SESSION.i];grade(u,g);SESSION.doneCount++;
    SESSION.missed=(g===0)?u:null;
    if(g===0)SESSION.q.push(u);
    SESSION.i++;SESSION.shown=false;SESSION.typed="";SESSION.picked=null;render();},
  note(id){nav("note",id);},
  project(id){nav("project",id);},
  editNote(id,title,body){
    const n=id?(DB.notes||[]).find(x=>x.id===id):null;
    openSheet(`<h3>${n?"Edit note":"New note"}</h3>
    <label class="f">Title</label><input type="text" id="nt" value="${esc(n?n.title:(title||""))}">
    <label class="f">Note</label><textarea id="nb">${esc(n?n.body:(body||""))}</textarea>
    <div class="btnrow"><button class="btn solid" onclick="APP.saveNote('${id||""}')">Save</button>
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);},
  saveNote(id){
    const t=$("#nt").value.trim(),b=$("#nb").value.trim();
    if(!t&&!b)return closeSheet();
    if(id){const n=DB.notes.find(x=>x.id===id);n.title=t;n.body=b;n.u=Date.now();}
    else DB.notes.push({id:"n"+Date.now(),title:t,body:b,u:Date.now()});
    saveLocal();closeSheet();libTab="desk";nav("library");toast("Saved");},
  delNote(id){const n=DB.notes.find(x=>x.id===id);if(n){n.del=true;n.u=Date.now();saveLocal();}libTab="desk";nav("library");},
  noteToCard(id){
    const n=DB.notes.find(x=>x.id===id);
    openSheet(`<h3>New flashcard</h3>
    <label class="f">Front — the question</label><input type="text" id="cq" value="${esc(n.title)}">
    <label class="f">Back — the answer</label><textarea id="ca">${esc(n.body.slice(0,300))}</textarea>
    <div class="btnrow"><button class="btn solid" onclick="APP.saveCard()">Add to rotation</button>
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);},
  saveCard(){
    const q=$("#cq").value.trim(),a=$("#ca").value.trim();
    if(!q||!a)return;
    DB.custom.push({id:"c"+Date.now(),q,a,u:Date.now(),src:"Your note"});
    saveLocal();closeSheet();toast("Card added to rotation");},
  editProject(id){
    const p=id?(DB.projects||[]).find(x=>x.id===id):null;
    const lines=a=>(a||[]).join("\n");
    openSheet(`<h3>${p?"Edit project":"New project"}</h3>
    <label class="f">Name</label><input type="text" id="pn" value="${esc(p?p.name:"")}">
    <label class="f">Status</label><select id="ps">${["active","planning","launched","paused"].map(s=>`<option ${p&&p.status===s?"selected":""}>${s}</option>`).join("")}</select>
    <label class="f">One-line summary</label><input type="text" id="psu" value="${esc(p?p.summary:"")}">
    <label class="f">Details — one per line</label><textarea id="pd">${esc(lines(p&&p.details))}</textarea>
    <label class="f">Decisions — one per line</label><textarea id="pde">${esc(lines(p&&p.decisions))}</textarea>
    <label class="f">Open questions — one per line</label><textarea id="pq">${esc(lines(p&&p.questions))}</textarea>
    <div class="btnrow"><button class="btn solid" onclick="APP.saveProject('${id||""}')">Save</button>
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);},
  saveProject(id){
    const split=v=>v.split("\n").map(x=>x.trim()).filter(Boolean);
    const data={name:$("#pn").value.trim(),status:$("#ps").value,summary:$("#psu").value.trim(),
      details:split($("#pd").value),decisions:split($("#pde").value),questions:split($("#pq").value),u:Date.now()};
    if(!data.name)return;
    if(id){Object.assign(DB.projects.find(x=>x.id===id),data);}
    else{data.id="p"+Date.now();DB.projects.push(data);}
    saveLocal();closeSheet();libTab="desk";deskTab="projects";nav("library");toast("Saved");},
  delProject(id){const p=DB.projects.find(x=>x.id===id);if(p){p.del=true;p.u=Date.now();saveLocal();}libTab="desk";deskTab="projects";nav("library");},
  closeSheet,
  settings(){
    openSheet(`<h3>Settings</h3>
    <div class="setsec">Guide</div>
    <button class="btn setbtn" onclick="APP.guide()">📖 How this system works — read me</button>
    <button class="btn setbtn" onclick="APP.logExternal()">➕ Log learning done outside the app</button>
    <div class="setsec">Appearance</div>
    <select id="sth">${["light","dark","auto"].map(s=>`<option ${themePref()===s?"selected":""}>${s}</option>`).join("")}</select>
    <div class="setsec">Connection — your private repo</div>
    <label class="f">GitHub token</label><input type="password" id="stok" value="${esc(token())}" autocomplete="off">
    <label class="f">Repository (owner/repo)</label><input type="text" id="srepo" value="${esc(repo())}">
    <button class="btn solid setbtn" style="text-align:center" onclick="APP.saveSettings()">Save connection &amp; sync now</button>
    <div class="setsec">Your data</div>
    <button class="btn ghost setbtn" onclick="APP.exportData()">⬇ Download a backup of my progress</button>
    <button class="btn danger setbtn" onclick="APP.reset()">Erase app data on this device only</button>
    <p class="dim" style="font-size:12px;margin-top:10px">Erasing this device never touches your repo — progress restores on next sign-in.</p>`);},
  saveSettings(){
    localStorage.setItem("meridian.theme",$("#sth").value);applyTheme();
    localStorage.setItem("meridian.token",$("#stok").value.trim());
    localStorage.setItem("meridian.repo",$("#srepo").value.trim());
    closeSheet();Promise.all([pull(),fetchData()]).then(()=>{render();toast("Synced");});},
  guide(){
    if(DATA.guide){openSheet(`<h3>How this system works</h3><div class="prose" style="font-size:14px">${md(DATA.guide)}</div>
      <p class="dim" style="font-size:12px;margin-top:10px">This guide auto-updates whenever the workflow changes (last: ${esc((DATA.guideUpdated||"").slice(0,10))}).</p>
      <div class="btnrow"><button class="btn ghost" onclick="APP.closeSheet()">Close</button></div>`);return;}
    openSheet(`<h3>How this system works</h3>
    <div style="font-size:14px;line-height:1.65;color:var(--ink2)">
    <p><strong style="color:var(--ink)">The system has four layers:</strong> capture → synthesis → learn → apply. You capture anything (here via <em>Inbox → Capture</em>, or by dropping files in the vault's <code>_inbox/</code>). Claude processes it overnight into one of five lanes. You learn daily in this app. You apply weekly via challenges.</p>
    <p><strong style="color:var(--ink)">The five lanes</strong> set processing depth — the minimum sufficient one:</p>
    <p>${LANES.map(([id,n,d])=>`${laneChip(id)} ${esc(d)}`).join("<br>")}</p>
    <p>Items can move lanes anytime (open item → Change lane). Prior artifacts are kept as history. Your edits always survive regeneration.</p>
    <p><strong style="color:var(--ink)">Daily ritual (~40 min):</strong> open the app, tap Continue session. Review (FSRS-scheduled recall: cards, quizzes, prompts, drills) → one lesson → one application drill. The streak and ring keep you honest.</p>
    <p><strong style="color:var(--ink)">What to say to Claude:</strong> "process my inbox" · "make lessons from X" · "hunt the latest on Y" · "pull meetings into my projects" · "prep a NotebookLM pack for topic" · "weekly review" · "add X to my glossary".</p>
    <p><strong style="color:var(--ink)">Feedback loop:</strong> when something isn't working, tell Claude what you observed (e.g. "reviews feel too easy", "gist items pile up") — the ops guides get updated so the system evolves with you.</p>
    <p class="dim" style="font-size:12px">Storage: everything lives in your private GitHub repo (${esc(repo())}). This public app holds no personal data. FSRS-4.5 at 90% target retention.</p>
    </div>
    <div class="btnrow"><button class="btn ghost" onclick="APP.closeSheet()">Close</button></div>`);},
  exportData(){
    const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="meridian-backup-"+todayStr()+".json";a.click();},
  reset(){if(confirm("Erase local data on this device? (Your repo is untouched.)")){localStorage.removeItem("meridian.db");localStorage.removeItem("meridian.data");location.reload();}},
  async connect(){
    const t=$("#tok").value.trim(), r=$("#repoIn").value.trim();
    if(!t)return toast("Paste your token first");
    localStorage.setItem("meridian.token",t);
    localStorage.setItem("meridian.repo",r);
    toast("Connecting…");
    try{
      await fetchData();
      if(!DATA.items.length)throw new Error("no data");
      await pull();
      localStorage.setItem("meridian.setup","1");nav("today");toast("Connected ✓");
    }catch(e){toast("Couldn't load your repo — check token & name");localStorage.removeItem("meridian.token");}
  }
};
window.APP=APP;

/* ---------- router ---------- */
function render(){
  const setup=!localStorage.getItem("meridian.setup");
  $("#nav").style.display=setup?"none":"";
  let html;
  if(setup)html=vSetup();
  else switch(VIEW.name){
    case "inbox":html=vInbox();break;
    case "news":html=vNews();break;
    case "library":html=vLibrary();break;
    case "item":html=vItem();break;
    case "review":html=vReview();break;
    case "note":html=vNote();break;
    case "project":html=vProject();break;
    case "progress":html=vProgress();break;
    default:html=vToday();
  }
  $("#app").innerHTML=html;
  document.querySelectorAll("nav button").forEach(b=>{
    b.classList.toggle("active",b.dataset.v===VIEW.name||(VIEW.name==="item"&&b.dataset.v==="library")||((VIEW.name==="note"||VIEW.name==="project")&&b.dataset.v==="library"));
    b.onclick=()=>APP.go(b.dataset.v);
  });
}

/* ---------- boot ---------- */
render();
if(token()){Promise.all([fetchData(),pull()]).then(render);}
if("serviceWorker" in navigator&&location.protocol.startsWith("http")){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
</body>
</html>
