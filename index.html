<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>QuantumLeap — AI PM Mastery</title>
<meta name="description" content="Your private system for becoming a world-class AI product manager.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="QuantumLeap">
<meta name="theme-color" content="#FAF9F5" id="themeColor">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
:root{
  --bg:#FAF9F5; --bg2:#F3F1EA; --card:#FFFFFF; --card2:#FFFFFF;
  --line:#E4E1D6; --line2:#ECEAE0;
  --accent:#5B4FE9; --accent2:#4A3FD4; --accent-soft:#EEEDFE; --accent-dim:#8B84EF;
  --gold:var(--accent); --gold2:var(--accent2); --gold-dim:var(--accent-dim);
  --ink:#1F1E24; --ink2:#6E6B78; --ink3:#8A8794;
  --green:#1D9E75; --green-soft:#E1F5EE;
  --amber:#B97815; --amber-soft:#FAEEDA;
  --red:#C94F28; --red-soft:#FAECE7;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",Segoe UI,Roboto,sans-serif;
  --serif:var(--sans);
  --radius:16px;
  --shadow:0 1px 2px rgba(31,30,36,.04),0 4px 14px rgba(31,30,36,.05);
}
[data-theme=dark]{
  --bg:#131217; --bg2:#1A1920; --card:#1D1C24; --card2:#1D1C24;
  --line:#2C2A36; --line2:#26242e;
  --accent:#8B80F5; --accent2:#7A6FF0; --accent-soft:#272348; --accent-dim:#6F66D9;
  --ink:#EDEBF4; --ink2:#A5A2B0; --ink3:#787580;
  --green:#3FC79E; --green-soft:#12362B;
  --amber:#F0B45C; --amber-soft:#3A2D12;
  --red:#F08A64; --red-soft:#3B2015;
  --shadow:none;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100%;
  font-size:16px;line-height:1.6;letter-spacing:.1px;min-height:100dvh}
#app{max-width:640px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 16px) 20px 110px;min-height:calc(100dvh - 40px)}
h1,h2,h3{font-weight:650;letter-spacing:-.2px}
.eyebrow{font-size:11px;letter-spacing:1.8px;text-transform:uppercase;color:var(--ink3);font-weight:600;margin-bottom:6px}
.hairline{height:1px;background:var(--line2);margin:22px 0}
.muted{color:var(--ink2)} .dim{color:var(--ink3)}
.gold{color:var(--accent);font-weight:600}

/* header */
.brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.brand h1{font-size:22px;letter-spacing:.2px}
.brand .mark{color:var(--accent);margin-right:2px}
.datebar{font-size:12.5px;color:var(--ink3);margin-bottom:18px}
.streakpill{display:inline-flex;align-items:center;gap:5px;background:var(--amber-soft);color:var(--amber);
  border-radius:999px;padding:4px 12px;font-size:13px;font-weight:600}

/* cards */
.card{background:var(--card);border:1px solid var(--line2);box-shadow:var(--shadow);
  border-radius:var(--radius);padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
.card.lux{border-color:var(--line)}
.card h3{font-size:17.5px;margin-bottom:5px}
.card .body{font-size:14.5px;color:var(--ink2)}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.tap{cursor:pointer;transition:transform .12s ease,border-color .2s}
.tap:active{transform:scale(.985)}

/* buttons */
.btn{display:inline-block;border:1px solid var(--line);background:var(--card);color:var(--accent);
  font-family:var(--sans);font-size:14.5px;font-weight:600;letter-spacing:.1px;
  padding:12px 22px;border-radius:14px;cursor:pointer;transition:all .2s}
.btn:active{transform:scale(.97)}
.btn.solid{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.small{padding:8px 16px;font-size:13px}
.btn.ghost{color:var(--ink2);border-color:var(--line2)}
.btn.danger{color:var(--red);border-color:var(--red-soft)}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}

/* nav */
nav{position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-top:1px solid var(--line2);padding:8px 8px calc(env(safe-area-inset-bottom) + 8px)}
nav .inner{max-width:640px;margin:0 auto;display:flex;justify-content:space-around}
nav button{background:none;border:none;color:var(--ink3);font-family:var(--sans);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10.5px;font-weight:600;
  letter-spacing:.4px;padding:4px 10px;transition:color .2s}
nav button .ico{font-size:18px;line-height:1.2;position:relative;display:inline-block}
nav button.active{color:var(--accent)}
.navbadge{position:absolute;top:-6px;right:-10px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;
  line-height:1;padding:2px 4px;border-radius:8px;min-width:14px;text-align:center}

/* stats strip */
.stats{display:flex;gap:10px;margin-bottom:14px}
.stat{flex:1;background:var(--card);border:1px solid var(--line2);border-radius:14px;padding:12px 8px;text-align:center}
.stat .n{font-size:22px;font-weight:650;color:var(--ink)}
.stat .l{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink3);margin-top:2px;font-weight:600}
.stat.hi .n{color:var(--accent)}

/* goal ring */
.ringwrap{display:flex;gap:16px;align-items:center}
.ringwrap svg{flex-shrink:0}
.ringlabel{font-size:14.5px;color:var(--ink2);line-height:1.5}

/* pills / badges */
.pill{display:inline-block;font-size:11px;letter-spacing:.6px;text-transform:uppercase;font-weight:600;
  background:var(--accent-soft);color:var(--accent);border-radius:999px;padding:4px 11px}
.pill.ok{background:var(--green-soft);color:var(--green)}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;
  border-radius:999px;background:var(--accent);color:#fff;font-size:12px;font-weight:700;padding:0 8px}
.check{color:var(--green);font-size:15px;font-weight:700}

/* library */
.track{display:flex;align-items:center;gap:14px}
.track .glyph{font-size:18px;color:var(--accent);width:42px;height:42px;background:var(--accent-soft);
  display:flex;align-items:center;justify-content:center;border-radius:12px;flex-shrink:0}
.track .meta{flex:1;min-width:0}
.track .meta h3{font-size:16px;margin-bottom:2px}
.track .meta p{font-size:12.5px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progress-ring{font-size:12px;color:var(--ink3);flex-shrink:0;text-align:right;font-weight:600}
.bar{height:5px;background:var(--bg2);border-radius:3px;margin-top:8px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--accent);border-radius:3px;transition:width .5s ease}
.bar.g i{background:var(--green)}

/* lesson reader */
.reader h2{font-size:24px;line-height:1.25;margin:10px 0 4px}
.reader .lede{color:var(--ink3);font-size:13px;margin-bottom:16px}
.reader .prose p{margin-bottom:14px;color:var(--ink);font-size:16px}
.reader .prose h4{color:var(--ink);font-size:17px;font-weight:650;margin:22px 0 8px}
.reader .prose strong{color:var(--accent2);font-weight:650}
[data-theme=dark] .reader .prose strong{color:var(--accent)}
.reader .prose ul{margin:4px 0 16px;padding-left:0;list-style:none}
.reader .prose ul li{position:relative;padding-left:22px;margin-bottom:9px;color:var(--ink);font-size:16px;line-height:1.55}
.reader .prose ul li::before{content:"";position:absolute;left:4px;top:9px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
.reader .prose blockquote{margin:16px 0;padding:12px 16px;border-left:3px solid var(--accent);background:var(--accent-soft);border-radius:0 10px 10px 0;color:var(--ink);font-size:15.5px;line-height:1.55}
.reader .prose blockquote strong{color:var(--accent2)}
.reader .dg-inline{padding:18px 14px 14px;margin:18px 0}
.reader .dg-inline .eyebrow{text-align:center}
.takeaways{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin:18px 0}
.takeaways li{margin:0 0 10px 18px;font-size:14.5px;color:var(--ink2)}
.takeaways li::marker{color:var(--accent)}

/* review card */
.flash{min-height:260px;display:flex;flex-direction:column;justify-content:center;text-align:center;
  padding:32px 24px;margin:8px 0 16px}
.flash .q{font-size:20px;line-height:1.45;font-weight:600}
.flash .a{margin-top:20px;padding-top:20px;border-top:1px solid var(--line);font-size:16px;color:var(--ink2);line-height:1.6;text-align:left}
.flash .yours{margin-top:16px;padding:12px;border-radius:12px;background:var(--bg2);font-size:14.5px;color:var(--ink2);text-align:left}
.grade{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.grade button{border:1px solid var(--line2);background:var(--card);color:var(--ink2);border-radius:12px;
  padding:12px 4px;font-size:13px;cursor:pointer;font-weight:600}
.grade button span{display:block;font-size:10.5px;color:var(--ink3);margin-top:3px;font-weight:400}
.grade .g-again{color:var(--red);background:var(--red-soft);border-color:var(--red-soft)}
.grade .g-good{color:var(--accent);background:var(--accent-soft);border-color:var(--accent-soft)}
.grade .g-easy{color:var(--green);background:var(--green-soft);border-color:var(--green-soft)}
.modetabs{display:flex;gap:8px;margin-bottom:12px}
.modetabs button{background:var(--card);border:1px solid var(--line2);color:var(--ink3);border-radius:999px;
  padding:7px 16px;font-size:12.5px;cursor:pointer;font-weight:600}
.modetabs button.active{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}

/* forms */
input[type=text],input[type=password],textarea,select{width:100%;background:var(--card);border:1px solid var(--line);
  color:var(--ink);border-radius:12px;padding:12px 14px;font-family:var(--sans);font-size:15px;outline:none;margin-bottom:10px}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{min-height:110px;resize:vertical;line-height:1.5}
label.f{display:block;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);margin:10px 0 6px;font-weight:600}

/* subtabs */
.subtabs{display:flex;gap:8px;margin-bottom:16px}
.subtabs button{flex:1;background:var(--card);border:1px solid var(--line2);color:var(--ink3);border-radius:999px;
  padding:9px 0;font-size:12.5px;cursor:pointer;font-weight:600}
.subtabs button.active{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}

/* misc */
.empty{text-align:center;padding:44px 20px;color:var(--ink3)}
.empty .glyph{font-size:32px;color:var(--accent-dim);margin-bottom:10px}
.back{color:var(--ink3);font-size:13px;cursor:pointer;display:inline-block;margin-bottom:14px;background:none;border:none;font-weight:600;font-family:var(--sans)}
.listitem{padding:14px 2px;border-bottom:1px solid var(--line2);cursor:pointer}
.listitem h4{font-size:15.5px;font-weight:600}
.listitem p{font-size:12.5px;color:var(--ink3);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tag{font-size:11px;color:var(--ink3)}
.fab{position:fixed;right:max(20px,calc((100vw - 640px)/2 + 20px));bottom:calc(env(safe-area-inset-bottom) + 86px);
  width:52px;height:52px;border-radius:50%;background:var(--accent);
  color:#fff;font-size:26px;border:none;cursor:pointer;z-index:40;box-shadow:0 8px 24px rgba(91,79,233,.3);
  display:flex;align-items:center;justify-content:center}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 92px);
  background:var(--ink);color:var(--bg);padding:11px 22px;border-radius:999px;
  font-size:13.5px;font-weight:600;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.modal{position:fixed;inset:0;background:rgba(20,19,26,.5);z-index:60;display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.sheet{background:var(--bg);border:1px solid var(--line2);border-bottom:none;border-radius:22px 22px 0 0;
  width:100%;max-width:640px;max-height:86vh;overflow-y:auto;padding:24px 22px calc(env(safe-area-inset-bottom) + 26px)}
.sheet h3{font-size:19px;margin-bottom:14px}
.syncdot{width:7px;height:7px;border-radius:50%;background:var(--ink3);display:inline-block;margin-right:6px}
.syncdot.ok{background:var(--green)} .syncdot.err{background:var(--red)} .syncdot.busy{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.4}}
.week{display:flex;gap:6px;align-items:flex-end;height:64px;margin-top:10px}
.week .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.week .colbar{width:100%;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px;opacity:.9}
.week .coll{font-size:10px;color:var(--ink3)}
.setup-logo{text-align:center;margin:56px 0 34px}
.setup-logo .ring{width:88px;height:88px;background:var(--accent-soft);border-radius:50%;margin:0 auto 18px;
  display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--accent)}
.setup-logo h1{font-size:28px;letter-spacing:3px}
.setup-logo p{color:var(--ink3);font-size:12.5px;letter-spacing:1.8px;text-transform:uppercase;margin-top:6px}
details.help{margin:12px 0;font-size:13.5px;color:var(--ink2)}
details.help summary{color:var(--ink3);cursor:pointer;font-size:12.5px;font-weight:600;margin-bottom:8px}
details.help ol{margin:8px 0 8px 18px} details.help li{margin-bottom:6px}
details.help a{color:var(--accent)}

/* 3.0 additions */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{border:1px solid var(--line);background:var(--card);color:var(--ink2);border-radius:999px;padding:6px 14px;font-size:12.5px;font-weight:600;cursor:pointer}
.chip.active{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
.lanechip{display:inline-block;font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;font-weight:700;border-radius:6px;padding:3px 8px}
.lane-filter{background:var(--amber-soft);color:var(--amber)}
.lane-master{background:var(--green-soft);color:var(--green)}
.lane-understand{background:#E6F1FB;color:#185FA5}
[data-theme=dark] .lane-understand{background:#12283b;color:#7db4e8}


.choice{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);color:var(--ink);
  border-radius:12px;padding:12px 14px;font-size:14.5px;margin-bottom:8px;cursor:pointer;font-family:var(--sans)}
.choice.correct{border-color:var(--green);background:var(--green-soft)}
.choice.wrong{border-color:var(--red);background:var(--red-soft)}
.quote{border-left:3px solid var(--accent);border-radius:0;padding:4px 0 4px 14px;margin:4px 0}
.quote .qt{font-size:15px;line-height:1.55;color:var(--ink);font-style:italic}
.quote .qa{font-size:12.5px;color:var(--ink3);font-style:normal;white-space:nowrap}
.srch{margin-bottom:12px}
/* glossary tab header: search inline with add button */
.gloss-head{display:flex;gap:10px;align-items:stretch;margin-bottom:10px}
.gloss-head .srch{flex:1;margin:0}
.addbtn{flex:0 0 auto;width:46px;border:1px solid var(--line);background:var(--card);color:var(--accent);
  border-radius:12px;font-size:24px;font-weight:400;line-height:1;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center}
.addbtn:active{transform:scale(.94)}
/* lighter section term list */
.glossitem{padding:15px 2px;border-bottom:1px solid var(--line2)}
.glossitem:last-child{border-bottom:none}
.glossitem h4{font-size:15px;font-weight:550;color:var(--ink);letter-spacing:-.1px}
.glossitem p{font-size:14px;color:var(--ink2);margin-top:7px;line-height:1.55}
.glossitem .gcat{display:block;font-size:11px;color:var(--ink3);margin-top:8px}
.gread{color:var(--green);font-weight:700;font-size:12.5px;margin-right:5px}
.gcaret{font-size:12px;color:var(--ink3);font-weight:400}
/* glossary discover carousel */
.gcar-wrap{position:relative;margin:2px -20px 20px}
.gcar{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
  padding:4px 20px 12px;scrollbar-width:none}
.gcar::-webkit-scrollbar{display:none}
.gcard{scroll-snap-align:center;flex:0 0 84%;background:var(--card);border:1px solid var(--line2);
  box-shadow:var(--shadow);border-radius:18px;padding:18px 18px 16px;display:flex;flex-direction:column;min-height:172px}
.gcard .gc-cat{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;font-weight:600;color:var(--accent)}
.gcard h4{font-size:18px;font-weight:650;margin:8px 0 8px;letter-spacing:-.2px;line-height:1.25}
.gcard p{font-size:13.5px;color:var(--ink2);line-height:1.5;flex:1;
  display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.gcard .gc-foot{display:flex;gap:8px;margin-top:12px;align-items:center;justify-content:space-between}
.gcard .gc-foot a{text-decoration:none;font-size:12.5px;font-weight:600;
  color:var(--accent);background:var(--accent-soft);border:none;border-radius:999px;padding:6px 13px;cursor:pointer}
.gcard .gc-more{background:none;border:none;color:var(--ink3);font-size:22px;line-height:1;font-weight:700;
  letter-spacing:1px;cursor:pointer;padding:2px 8px;margin-left:auto}
.gcar-next{position:absolute;top:calc(50% - 6px);right:6px;transform:translateY(-50%);
  width:32px;height:32px;border-radius:50%;border:1px solid var(--line2);background:var(--card);
  color:var(--ink2);font-size:19px;line-height:1;cursor:pointer;box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;z-index:2}
.gcar-eyebrow{display:flex;align-items:center;justify-content:space-between;margin:14px 0 2px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-left:6px;vertical-align:2px}
.inboxtile{display:inline-flex;align-items:center;justify-content:center;gap:5px;background:var(--accent-soft);color:var(--accent);border-radius:999px;min-width:40px;min-height:36px;padding:6px 13px;font-size:18px;font-weight:600;cursor:pointer}

.tmrbox{font-variant-numeric:tabular-nums;font-size:26px;font-weight:650;color:var(--ink)}
.heat{display:grid;grid-template-columns:repeat(26,1fr);gap:3px;margin-top:10px}
.heat i{aspect-ratio:1;border-radius:2.5px;background:var(--bg2)}
.heat i.h1{background:var(--accent-soft)}.heat i.h2{background:var(--accent-dim)}.heat i.h3{background:var(--accent)}
.donutrow{display:flex;gap:16px;align-items:center}
.legend{font-size:12.5px;color:var(--ink2);line-height:1.9}
.legend b{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:7px}
.stagenav{display:flex;gap:6px;margin:10px 0 14px}
.stagenav button{flex:1;border:1px solid var(--line2);background:var(--card);color:var(--ink3);border-radius:10px;padding:8px 4px;font-size:12px;font-weight:600;cursor:pointer}
.stagenav button.cur{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
.stagenav button.avail{color:var(--ink2)}
details.prev{border:1px solid var(--line2);border-radius:12px;padding:10px 14px;margin-top:10px}
details.prev summary{font-size:13px;font-weight:600;color:var(--ink3);cursor:pointer}
.filelist{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.filelist span{background:var(--bg2);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--ink2)}
.filelist span b{cursor:pointer;color:var(--red);margin-left:6px;font-weight:700}


.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.mtile{border:1px solid var(--line2);border-radius:16px;padding:15px 14px;cursor:pointer;background:var(--card);text-align:left}
.mtile-head{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.mtile .mg{font-size:16px;line-height:1;width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mtile-head h3{font-size:14.5px;margin:0;line-height:1.2}
.mtile p{font-size:12px;color:var(--ink3);margin-top:2px}
.phase{margin:18px 0 6px}
.phase .row{align-items:baseline}

<body>
<div id="app"></div>
<nav id="nav" style="display:none"><div class="inner">
  <button data-v="today"><span class="ico">◉<i class="navbadge" id="newBadge" style="display:none"></i></span>Plan</button>
  <button data-v="library"><span class="ico">▤</span>Learn</button>
  <button data-v="review"><span class="ico">💼</span>Work</button>
  <button data-v="news"><span class="ico">☰<i class="navbadge" id="newsBadge" style="display:none"></i></span>News</button>
</div></nav>
<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<script>
/* ===================== QUANTUMLEAP APP v5 (formerly Meridian) ===================== */
/* Repo-backed lanes architecture. Content + state live in a private GitHub repo. */
"use strict";
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const DAY=86400000;
const clamp=(x,lo,hi)=>Math.min(hi,Math.max(lo,x));
const todayStr=(d=new Date())=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const LANES=[["filter","Skim","Triage in \u226410 min"],["understand","Understand","Build the mental model"],["master","Master","Critique, connect, apply"]];
const LANE_LEGACY={retrieve:"filter",gist:"filter",learn:"master",evaluate:"master",filter:"filter",understand:"understand",master:"master"};
const laneRank=id=>LANES.findIndex(l=>l[0]===id);
const LANE_ARTS={filter:["summary","facts"],understand:["note"],master:["lesson","cards","quiz","prompts","drills","memo"]};
const laneName=id=>(LANES.find(l=>l[0]===id)||["","?"])[1];
const laneChip=id=>`<span class="lanechip lane-${esc(id)}">${esc(laneName(id))}</span>`;

/* ---------- content (from private repo) ---------- */
let DATA={v:3,categories:[],items:[],glossary:[],quotes:[],challenges:[]};
try{const c=localStorage.getItem("meridian.data");if(c)DATA=JSON.parse(c);}catch(e){}

/* ---------- state ---------- */
function defaultDB(){return {v:3,updatedAt:0,srs:{},done:{},notes:[],projects:[],custom:[],itemState:{},inboxDecisions:{},newsActions:{},glossRead:{},goals:[],planProg:{},planCustom:{},userColls:[],favs:{},lastSeen:0,caps:[],meetTasks:{},trackOrder:[],
  meta:{streak:0,lastDay:"",xp:0,revlog:{},intake:{},gradelog:{},minlog:{},catlog:{}}};}
let DB=defaultDB();
try{const raw=localStorage.getItem("meridian.db");if(raw)DB=Object.assign(defaultDB(),JSON.parse(raw));
  DB.meta=Object.assign(defaultDB().meta,DB.meta||{});}catch(e){}
let VIEW={name:"today",p:null}, syncState="off", syncTimer=null, FLOW=false, stateSha=null;

function saveLocal(){DB.updatedAt=Date.now();localStorage.setItem("meridian.db",JSON.stringify(DB));queueSync();}
function token(){return localStorage.getItem("meridian.token")||"";}
function repo(){return localStorage.getItem("meridian.repo")||"";}

/* ---------- theme ---------- */
function themePref(){return localStorage.getItem("meridian.theme")||"light";}
function applyTheme(){
  let t=themePref();
  if(t==="auto")t=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";
  document.documentElement.dataset.theme=t;
  const mc=$("#themeColor");if(mc)mc.content=t==="dark"?"#131217":"#FAF9F5";
}
applyTheme();
if(window.matchMedia)window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change",applyTheme);

/* ---------- effective items (data + user overlay) ---------- */
function itemState(id){return DB.itemState[id]||{};}
function items(){return DATA.items.map(it=>{
  const st=itemState(it.id);
  return Object.assign({},it,{lane:LANE_LEGACY[st.lane||it.lane]||"filter",cats:st.cats||it.cats,edits:st.edits||{},history:(it.history||[]).concat(st.history||[])});
});}
function item(id){return items().find(x=>x.id===id);}
function catOf(id){return DATA.categories.find(c=>c.id===id)||{id,name:id,glyph:"·"};}
function artifact(it,key){return (it.edits&&it.edits[key])||(it.artifacts&&it.artifacts[key]);}

/* ---------- review units ---------- */
/* Every reviewable artifact is a unit: card / mcq / prompt / drill — all scheduled by FSRS. */
function allUnits(){
  const out=[];
  for(const it of items()){
    if(it.lane!=="master")continue;
    const push=(arr,type,pref)=>((arr||[]).forEach((a,i)=>out.push({id:it.id+"#"+pref+i,type,a,item:it,cat:(it.cats||[])[0]||"misc"})));
    push(artifact(it,"cards"),"card","c");
    push(artifact(it,"quiz"),"mcq","q");
    push(artifact(it,"prompts"),"prompt","p");
    push(artifact(it,"drills"),"drill","d");
  }
  (DB.custom||[]).forEach(c=>{if(!c.del)out.push({id:c.id,type:"card",a:{q:c.q,a:c.a},item:null,cat:c.track||"note",src:c.src||"Your note"});});
  return out;
}
function unlockedUnits(){
  return allUnits().filter(u=>{
    if(!u.item)return true;
    if(artifact(u.item,"lesson"))return !!DB.done[u.item.id];
    return true;
  });
}
function dueUnits(){const now=Date.now();return unlockedUnits().filter(u=>DB.srs[u.id]&&!DB.srs[u.id].susp&&DB.srs[u.id].due<=now);}
function newUnits(){return unlockedUnits().filter(u=>!DB.srs[u.id]);}
function newAllowance(){const t=todayStr();const used=(DB.meta.intake&&DB.meta.intake[t])||0;return Math.max(0,8-used);}
function reviewBadgeCount(){return dueUnits().length+Math.min(newUnits().length,newAllowance());}
function interleave(arr){
  const by={};arr.forEach(u=>{(by[u.cat]=by[u.cat]||[]).push(u);});
  const keys=Object.keys(by);const out=[];let more=true;
  while(more){more=false;for(const k of keys){const u=by[k].shift();if(u){out.push(u);more=true;}}}
  return out;
}

/* ---------- FSRS-4.5 ---------- */
const FW=[0.4872,1.4003,3.7145,13.8206,5.1618,1.2298,0.8975,0.031,1.6474,0.1367,1.0461,2.1072,0.0793,0.3246,1.587,0.2272,2.8755];
const F_FACTOR=19/81, F_DECAY=-0.5;
function fsR(days,s){return Math.pow(1+F_FACTOR*Math.max(0,days)/s,F_DECAY);}
function fsS0(G){return Math.max(0.1,FW[G-1]);}
function fsD0(G){return clamp(FW[4]-Math.exp(FW[5]*(G-1))+1,1,10);}
function fsNext(e,G,elapsed){
  const r=fsR(elapsed,e.s);
  let d=e.d-FW[6]*(G-3);
  d=clamp(FW[7]*fsD0(4)+(1-FW[7])*d,1,10);
  let s;
  if(G===1){
    s=FW[11]*Math.pow(e.d,-FW[12])*(Math.pow(e.s+1,FW[13])-1)*Math.exp(FW[14]*(1-r));
    s=Math.min(s,e.s);
  }else{
    const hard=G===2?FW[15]:1, easy=G===4?FW[16]:1;
    s=e.s*(Math.exp(FW[8])*(11-e.d)*Math.pow(e.s,-FW[9])*(Math.exp(FW[10]*(1-r))-1)*hard*easy+1);
  }
  return {d:d,s:clamp(s,0.1,36500)};
}
function fsInterval(s){return clamp(Math.round(s),1,365);}
function migrateSRS(){
  let n=0;
  for(const k in DB.srs){const e=DB.srs[k];
    if(e&&e.s==null){
      e.s=Math.max(0.5,e.iv||0.5);
      e.d=clamp(6.4-((e.ease||2.5)-2.5)*3.2,1,10);
      e.lapses=e.lapses||0;e.last=e.u||Date.now();
      delete e.iv;delete e.ease;n++;
    }}
  return n;
}
migrateSRS();
function grade(unit,g){
  const now=Date.now(), G=g+1, id=unit.id;
  let e=DB.srs[id];
  if(!e){
    const t=todayStr();DB.meta.intake=DB.meta.intake||{};DB.meta.intake[t]=(DB.meta.intake[t]||0)+1;
    e={s:fsS0(G),d:fsD0(G),reps:0,lapses:0,last:now};
  }else{
    const nx=fsNext(e,G,Math.max(0,(now-(e.last||now))/DAY));
    e.s=nx.s;e.d=nx.d;
  }
  if(g===0){e.lapses=(e.lapses||0)+1;e.due=now+600000;}
  else{e.due=now+fsInterval(e.s)*DAY;}
  e.reps=(e.reps||0)+1;e.last=now;e.u=now;DB.srs[id]=e;
  const t=todayStr();
  DB.meta.revlog[t]=(DB.meta.revlog[t]||0)+1;
  const gl=DB.meta.gradelog[t]||{n:0,a:0};gl.n++;if(g===0)gl.a++;DB.meta.gradelog[t]=gl;
  const cat=unit.cat||"misc";
  const cl=DB.meta.catlog[cat]||{n:0,a:0};cl.n++;if(g===0)cl.a++;DB.meta.catlog[cat]=cl;
  DB.meta.xp+=2;bumpStreak();saveLocal();
}
function ivPreview(id,g){
  const G=g+1,e=DB.srs[id];
  if(!e)return fsInterval(fsS0(G))+" d";
  return fsInterval(fsNext(e,G,Math.max(0,(Date.now()-(e.last||Date.now()))/DAY)).s)+" d";
}
function bumpStreak(){
  const t=todayStr(),y=todayStr(new Date(Date.now()-DAY));
  if(DB.meta.lastDay===t)return;
  DB.meta.streak=(DB.meta.lastDay===y)?(DB.meta.streak||0)+1:1;
  DB.meta.lastDay=t;
}
function logMin(m){const t=todayStr();DB.meta.minlog[t]=Math.round(((DB.meta.minlog[t]||0)+m)*10)/10;}

/* ---------- GitHub repo sync ---------- */
async function gh(path,opt={},raw){
  opt.headers=Object.assign({Authorization:"Bearer "+token(),
    Accept:raw?"application/vnd.github.raw+json":"application/vnd.github+json"},opt.headers||{});
  const r=await fetch("https://api.github.com"+path,opt);
  if(!r.ok){const err=new Error("GitHub "+r.status);err.status=r.status;throw err;}
  return raw?r.text():r.json();
}
const REPO_STATE="app/app-state.json", REPO_DATA="app/app-data.json", REPO_MEET="app/meetings.json";
let MEET=[];try{MEET=JSON.parse(localStorage.getItem("meridian.meetings")||"[]");}catch(e){}
async function fetchMeetings(){
  if(!token())return;
  try{
    const txt=await gh(`/repos/${repo()}/contents/${REPO_MEET}`,{},true);
    const m=JSON.parse(txt);
    if(Array.isArray(m)){MEET=m;try{localStorage.setItem("meridian.meetings",txt);}catch(e){}if(VIEW.name==="review")render();}
  }catch(e){/* no briefs yet */}
}
async function fetchData(){
  if(!token())return;
  try{
    const txt=await gh(`/repos/${repo()}/contents/${REPO_DATA}`,{},true);
    const d=JSON.parse(txt);
    if(d&&d.v===3&&d.generated!==DATA.generated){
      if(DATA.generated)localStorage.setItem("meridian.prevGen",DATA.generated);
      DATA=d;try{localStorage.setItem("meridian.data",txt);}catch(e){/* quota: run without offline cache */}render();
    }
  }catch(e){console.warn("data fetch",e);}
}
function mergeItems(a,b){const m={};[...(a||[]),...(b||[])].forEach(x=>{if(!x||!x.id)return;if(!m[x.id]||(x.u||0)>(m[x.id].u||0))m[x.id]=x;});return Object.values(m);}
function mergeDB(rem){
  if(!rem||!rem.v)return;
  const out=defaultDB();
  out.srs=Object.assign({},rem.srs);
  for(const k in DB.srs){if(!out.srs[k]||(DB.srs[k].u||0)>(out.srs[k].u||0))out.srs[k]=DB.srs[k];}
  out.done=Object.assign({},rem.done,DB.done);
  out.notes=mergeItems(rem.notes,DB.notes);
  out.projects=mergeItems(rem.projects,DB.projects);

async function pull(){
  if(!token())return;
  setSync("busy");
  try{
    const f=await gh(`/repos/${repo()}/contents/${REPO_STATE}`);
    stateSha=f.sha;
    mergeDB(JSON.parse(decodeURIComponent(escape(atob(f.content.replace(/\n/g,""))))));
    setSync("ok");
  }catch(e){
    if(e.status===404){stateSha=null;setSync("ok");}
    else{console.warn(e);setSync("err");}
  }
}
async function push(attempt=0){
  if(!token())return;
  setSync("busy");
  try{
    const body={message:"app state "+new Date().toISOString(),
      content:btoa(unescape(encodeURIComponent(JSON.stringify(DB))))};
    if(stateSha)body.sha=stateSha;
    const r=await gh(`/repos/${repo()}/contents/${REPO_STATE}`,{method:"PUT",body:JSON.stringify(body)});
    stateSha=r.content.sha;
    setSync("ok");
  }catch(e){
    if((e.status===409||e.status===422)&&attempt<2){await pull();return push(attempt+1);}
    console.warn(e);setSync("err");
  }
}

function md(body,dgs){
  const fmt=s=>esc(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/!\[([^\]]*)\]\((https?:[^)\s]+|data:image\/[^)\s]+)\)/g,'<img src="$2" alt="$1" loading="lazy" style="max-width:100%;border-radius:12px;border:1px solid var(--line2);margin:6px 0">')
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2" target="_blank" style="color:var(--accent)">$1</a>');
  return String(body||"").trim().split(/\n\n+/).map(p=>{
    p=p.trim();
    const dm=p.match(/^\{\{DIAGRAM:(\d+)\}\}$/);
    if(dm){
      const dg=dgs&&dgs[+dm[1]];
      if(!dg)return "";
      return `<div class="card lux dg-inline"><div class="eyebrow">${esc(dg.cap||"How it flows")}</div>${dgSVG(dg)}</div>`;
    }
    if(p.startsWith("## ")){
      const lines=p.split("\n");const hd=lines.shift();
      let out="<h4>"+esc(hd.slice(3))+"</h4>";
      if(lines.length)out+="<p>"+fmt(lines.join(" "))+"</p>";
      return out;
    }
    if(p.startsWith("- ")){
      const its=p.split("\n").filter(l=>l.trim().startsWith("- ")).map(l=>l.trim().slice(2));
      return "<ul>"+its.map(x=>"<li>"+fmt(x)+"</li>").join("")+"</ul>";
    }
    if(p.startsWith("> ")){
      const lines=p.split("\n").map(l=>l.replace(/^>\s?/,""));
      return "<blockquote>"+fmt(lines.join(" "))+"</blockquote>";
    }
    return "<p>"+fmt(p.replace(/\n/g," "))+"</p>";
  }).join("");
}
function dgWrap(s,max){
  const words=String(s).split(" ");const lines=[];let cur="";
  words.forEach(w=>{if((cur+" "+w).trim().length>max){if(cur)lines.push(cur.trim());cur=w;}else cur+=" "+w;});
  if(cur.trim())lines.push(cur.trim());return lines.slice(0,3);
}
function dgBox(x,y,w,h,label,accent){
  const lines=dgWrap(label,Math.floor(w/7.2));
  const lh=15, ty=y+h/2-(lines.length-1)*lh/2;
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="10" style="fill:${accent?'var(--accent-soft)':'var(--card)'};stroke:${accent?'var(--accent)':'var(--line)'};stroke-width:1"/>`+
    lines.map((ln,i)=>`<text x="${x+w/2}" y="${ty+i*lh}" text-anchor="middle" dominant-baseline="middle" style="fill:var(--ink)" font-size="12" font-family="-apple-system,sans-serif">${esc(ln)}</text>`).join("");
}
function dgArrow(x1,y1,x2,y2){
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" style="stroke:var(--accent-dim)" stroke-width="1.2" marker-end="url(#dgA)"/>`;
}
function dgSVG(dg){
  const W=330, bh=48, gap=24;
  const defs=`<defs><marker id="dgA" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" style="fill:var(--accent-dim)"/></marker></defs>`;
  let inner="",H;
  if(dg.t==="cycle"){
    H=dg.s.length*(bh+gap)-gap+8;
    dg.s.forEach((s,i)=>{
      const y=4+i*(bh+gap);
      inner+=dgBox(46,y,W-92,bh,s,i===0);
      if(i<dg.s.length-1)inner+=dgArrow(W/2,y+bh,W/2,y+bh+gap-2);
    });
    const y0=4+bh/2, y1=4+(dg.s.length-1)*(bh+gap)+bh/2;
    inner+=`<path d="M ${W-46} ${y1} C ${W-8} ${y1}, ${W-8} ${y0}, ${W-44} ${y0}" fill="none" style="stroke:var(--accent-dim)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#dgA)"/>`;
  }else if(dg.t==="split"){
    const bar=dg.s.indexOf("|");
    const left=dg.s.slice(1,bar), right=dg.s.slice(bar+1);
    const rows=Math.max(left.length,right.length);
    H=(bh+gap)+rows*(bh+gap)-gap+8;
    inner+=dgBox(70,4,W-140,bh,dg.s[0],true);
    const bw=(W-40)/2-10;
    inner+=dgArrow(W/2-20,4+bh,20+bw/2,4+bh+gap-2);
    inner+=dgArrow(W/2+20,4+bh,W-20-bw/2,4+bh+gap-2);
    left.forEach((s,i)=>{const y=4+(bh+gap)*(i+1);inner+=dgBox(20,y,bw,bh,s,false);
      if(i<left.length-1)inner+=dgArrow(20+bw/2,y+bh,20+bw/2,y+bh+gap-2);});
    right.forEach((s,i)=>{const y=4+(bh+gap)*(i+1);inner+=dgBox(W-20-bw,y,bw,bh,s,false);
      if(i<right.length-1)inner+=dgArrow(W-20-bw/2,y+bh,W-20-bw/2,y+bh+gap-2);});
  }else{
    H=dg.s.length*(bh+gap)-gap+8;
    dg.s.forEach((s,i)=>{
      const y=4+i*(bh+gap);
      inner+=dgBox(30,y,W-60,bh,s,i===0||i===dg.s.length-1);
      if(i<dg.s.length-1)inner+=dgArrow(W/2,y+bh,W/2,y+bh+gap-2);
    });
  }
  return `<svg viewBox="0 0 ${W} ${H+4}" style="width:100%;height:auto;display:block;margin-top:10px" xmlns="http://www.w3.org/2000/svg">${defs}${inner}</svg>`;
}

function header(sub){
  const pend=DATA.items.filter(it=>it.proposed&&!DB.inboxDecisions[it.id]).length;
  return `<div class="brand"><h1 style="display:flex;align-items:center;gap:9px">${QL_LOGO} QLeap</h1>

}
function goalRing(){
  const goal=40, mins=Math.min(goal*2,activeMinToday());
  const pct=Math.min(1,mins/goal), r=30, C=2*Math.PI*r;
  return `<svg width="76" height="76" viewBox="0 0 76 76" role="img" aria-label="Daily goal">
    <circle cx="38" cy="38" r="${r}" fill="none" style="stroke:var(--accent-soft)" stroke-width="7"/>
    <circle cx="38" cy="38" r="${r}" fill="none" style="stroke:var(--accent)" stroke-width="7" stroke-linecap="round"
      stroke-dasharray="${(pct*C).toFixed(1)} ${C.toFixed(1)}" transform="rotate(-90 38 38)"/>
    <text x="38" y="36" text-anchor="middle" font-size="16" font-weight="650" style="fill:var(--ink)">${Math.round(mins)}</text>
    <text x="38" y="50" text-anchor="middle" font-size="10" style="fill:var(--ink3)">of ${goal} min</text></svg>`;
}
function pendingProposals(){return DATA.items.filter(it=>it.proposed&&!DB.inboxDecisions[it.id]);}
function weekKey(){const d=new Date();const on=new Date(d.getFullYear(),0,1);return d.getFullYear()+"-w"+Math.ceil(((d-on)/DAY+on.getDay()+1)/7);}
function coachPlan(){
  if(DATA.plan&&DATA.plan.week===weekKey())return DATA.plan;
  const cl=DB.meta.catlog||{};
  const weak=Object.keys(cl).filter(c=>cl[c].n>=5).sort((a,b)=>(1-cl[a].a/cl[a].n)-(1-cl[b].a/cl[b].n)).slice(0,2);
  const focus=[];
  if(weak.length)focus.push("Shore up your weakest area: "+weak.map(c=>catOf(c).name).join(", ")+" — expect extra new cards there");
  const g=(DB.goals||[]).filter(x=>!x.del).sort((a,b)=>(a.target||"").localeCompare(b.target||""))[0];
  if(g)focus.push("Goal “"+g.title+"”"+(g.target?" — due "+g.target:"")+": complete the next lesson in its category");
  const pl0=(DATA.studyPlans||[])[0];
  if(pl0){const nx=nextChips(effPlan(pl0),1);if(nx.length)focus.push("Study plan next up: "+nx[0].t+(nx[0].min?" ("+nx[0].min+" min)":""));}
  focus.push("Keep the streak: hit the 40-min ring at least 5 of 7 days");
  return {week:weekKey(),focus,rationale:"Fallback plan computed on-device from retention data — the weekly review generates a richer one."};
}
function vToday(){ /* the "Plan" tab: Study Planner & Tracker */

    <div class="btnrow" style="margin-top:6px"><button class="btn small ghost" onclick="APP.goalSheet()">🎯 Goals${goals.length?" ("+goals.length+")":""}</button></div>`;
  return header(null)+`
  ${q?`<div class="quote" onclick="APP.quotes()" style="cursor:pointer;margin:2px 0 12px;padding:10px 14px;border-left:3px solid var(--accent);background:var(--accent-soft);border-radius:0 12px 12px 0"><div class="qt" style="font-size:13.5px;font-style:italic">“${esc(q.text)}” <span class="qa">— ${esc(q.by)}</span></div></div>`:""}
  ${weekStrip()}
  ${(()=>{
    const tasks=todayTasks();

function ago(ts){const m=Math.round((Date.now()-ts)/60000);return m<1?"just now":m<60?m+"m ago":Math.round(m/60)+"h ago";}
function dayMet(k){
  const m=(DB.meta.minlog||{})[k]||0, r=(DB.meta.revlog||{})[k]||0;
  return m>=20||r>=10?2:(m||r?1:0);
}
function weekStrip(){
  const names=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let out=`<div class="wstrip" onclick="APP.go('planner')" title="Open planner">`;
  for(let i=6;i>=0;i--){
    const d=new Date(Date.now()-i*DAY), k=todayStr(d), met=dayMet(k);
    out+=`<div class="wday ${i===0?"today":met===2?"met":met===1?"part":""}">${d.getDate()}<span class="dn">${names[d.getDay()]}</span></div>`;
  }
  return out+`</div>`;
}
function todayTasks(){
  const due=dueUnits().length, fresh=Math.min(newUnits().length,newAllowance());
  const recallN=due+fresh;
  const reviewedToday=(DB.meta.revlog||{})[todayStr()]||0;
  const lesson=nextLessonItem();
  const ch=DATA.challenges.length?DATA.challenges[doyIndex(DATA.challenges.length)]:null;
  const chDone=!!DB.done["challenge-"+todayStr()];
  const t=[];
  t.push({id:"recall",label:recallN?`Recall ${recallN} card${recallN>1?"s":""}`:"Recall session",min:Math.max(2,Math.round(recallN*0.5)),done:recallN===0&&reviewedToday>0,act:"APP.startFlow()",actLabel:`▶ Start recall — ${recallN} card${recallN>1?"s":""} (~${Math.max(2,Math.round(recallN*0.5))} min)`});
  if(lesson){const lm=(artifact(lesson,"lesson")||{}).min||8;
    t.push({id:"lesson",label:"Lesson: "+lesson.title,min:lm,done:!!DB.done[lesson.id],act:`APP.item('${lesson.id}','today')`,actLabel:`▶ Start lesson (~${lm} min)`});}
  if(ch)t.push({id:"drill",label:"Daily challenge drill",min:5,done:chDone,act:"APP.drill()",actLabel:"▶ Answer the drill (~5 min)"});
  const pls=(DATA.studyPlans||[]).map(effPlan).map(pl=>({pl,st:planStats(pl),nx:nextChips(pl,1)[0]})).filter(x=>x.nx&&x.st.done>0).sort((a,b)=>b.st.pct-a.st.pct);
  if(pls[0])t.push({id:"chip",label:pls[0].nx.t,min:pls[0].nx.min||10,done:false,act:`APP.chip('${pls[0].pl.id}','${pls[0].nx.id}')`,actLabel:`▶ ${pls[0].nx.t.length>34?pls[0].nx.t.slice(0,32)+"…":pls[0].nx.t} (~${pls[0].nx.min||10} min)`});
  const recall0=t[0];
  if(recall0.done||recallN===0)t[0].done=recall0.done||reviewedToday>0;
  return t;
}
function newSince(){
  const seen=DB.lastSeen||0;
  const changed=items().filter(it=>!it.proposed&&it.updated&&Date.parse(it.updated)>seen);
  const isAns=it=>it.artifacts&&it.artifacts.qa&&it.artifacts.qa.some(q=>(Date.parse(q.at||"")||0)>Date.now()-3*DAY);
  const answered=changed.filter(isAns);
  const fresh=changed.filter(it=>!isAns(it)).slice(0,6);
  return {fresh,answered:answered.slice(0,4),count:fresh.length+answered.length};
}

let GCAR=null;
let GFULL=null, GSORT=localStorage.getItem("meridian.gsort")||"az";
function glossSorted(terms){
  const t=terms.slice();
  if(GSORT==="az")t.sort((a,b)=>a.term.localeCompare(b.term));
  else if(GSORT==="unread")t.sort((a,b)=>(!!(DB.glossRead||{})[a.id]-!!(DB.glossRead||{})[b.id])||a.term.localeCompare(b.term));
  else if(GSORT==="newest")t.sort((a,b)=>(b.verified||"").localeCompare(a.verified||""));
  else if(GSORT==="shuffle")return glossShuffle(t);
  return t;
}
const GSORTS=[["az","A–Z"],["unread","Unread first"],["newest","Newest"],["shuffle","Shuffle"]];
function currentGlossTerms(){
  const q=glossQuery.toLowerCase();

}

        ${g.link?`<a style="color:var(--accent);font-size:13px;margin-top:10px" href="${esc(g.link)}" target="_blank" onclick="event.stopPropagation()">🔗 learn more</a>`:""}`:

      <button class="btn solid" style="flex:1" onclick="APP.glossFullNav(1)">Next ›</button></div>

function glossShuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function defSnippet(def,max){
  def=(def||"").replace(/\s+/g," ").trim();
  if(def.length<=max)return def;
  const cut=def.slice(0,max);
  const stop=Math.max(cut.lastIndexOf(". "),cut.lastIndexOf("; "),cut.lastIndexOf("! "),cut.lastIndexOf("? "));
  if(stop>max*0.45)return def.slice(0,stop+1).trim();
  const sp=cut.lastIndexOf(" ");
  return (sp>0?def.slice(0,sp):cut).trim()+"…";
}
function glossCardHTML(g){
  if(!g)return "";
  return `<div class="gcard">
    <div class="gc-cat">${esc(g.cat||"Glossary")}</div>
    <h4>${esc(g.term)}</h4>
    <p>${esc(defSnippet(g.def,230))}</p>
    <div class="gc-foot">
      ${g.link?`<a href="${esc(g.link)}" target="_blank" rel="noopener">🔗 learn more</a>`:"<span></span>"}
      <button class="gc-more" onclick="APP.glossCardOpen('${g.id}')" aria-label="More" title="More">⋯</button>
    </div></div>`;
}
function glossCarousel(){
  if(!DATA.glossary||!DATA.glossary.length)return "";
  if(!GCAR)GCAR={order:glossShuffle(DATA.glossary.map(g=>g.id)),n:Math.min(20,DATA.glossary.length)};
  const cards=GCAR.order.slice(0,GCAR.n).map(id=>glossCardHTML(DATA.glossary.find(g=>g.id===id))).join("");
  return `<div class="gcar-wrap"><div class="gcar" id="gcar">${cards}</div>
    <button class="gcar-next" onclick="APP.gcarNext()" aria-label="Next card">›</button></div>`;
}
function bindGlossCarousel(){
  const el=document.getElementById("gcar");if(!el||!GCAR)return;
  el.onscroll=()=>{
    if(el.scrollLeft+el.clientWidth>=el.scrollWidth-el.clientWidth*1.5){
      // keep it going forever: extend, re-shuffling a fresh pass when we run out
      if(GCAR.n>=GCAR.order.length)GCAR.order=GCAR.order.concat(glossShuffle(DATA.glossary.map(g=>g.id)));
      const next=GCAR.order.slice(GCAR.n,GCAR.n+20).map(id=>glossCardHTML(DATA.glossary.find(g=>g.id===id))).join("");
      el.insertAdjacentHTML("beforeend",next);GCAR.n+=20;
    }
  };
}

let PLANFILTER="all", PLANEDIT=false, PLANOPEN={}, PHOPEN={};
function effPlan(pl){
  const cu=(DB.planCustom||{})[pl.id]||{};
  const removed=new Set(cu.removed||[]);
  const phases=pl.phases.map(ph=>{
    let chips=ph.chips.filter(c=>!removed.has(c.id))
      .concat((cu.added||[]).filter(a=>a.phase===ph.id&&!removed.has(a.id)));
    const ord=(cu.orders||{})[ph.id];
    if(ord&&ord.length){
      chips=chips.slice().sort((a,b)=>{
        const ia=ord.indexOf(a.id),ib=ord.indexOf(b.id);
        return (ia<0?999:ia)-(ib<0?999:ib);});
    }
    return Object.assign({},ph,{chips});
  });
  return Object.assign({},pl,{phases});
}
function masterCats(){
  if(DATA.masterCats&&DATA.masterCats.length)return DATA.masterCats;
  return [
   {id:"m-ai",name:"AI",glyph:"◆",bg:"var(--accent-soft)",fg:"var(--accent)",cats:["ai","aipd"]},
   {id:"m-sr",name:"Search & Ranking",glyph:"⌕",bg:"#E6F1FB",fg:"#185FA5",cats:["mlsr"]},
   {id:"m-pm",name:"Product Management",glyph:"▲",bg:"var(--green-soft)",fg:"var(--green)",cats:["strat","disc","data","exec","proto"]},
   {id:"m-lead",name:"Leadership",glyph:"✦",bg:"var(--amber-soft)",fg:"var(--amber)",cats:["comm"]},
   {id:"m-swe",name:"Software Engineering",glyph:"⌘",bg:"var(--bg2)",fg:"var(--ink2)",cats:["swe"]},
   {id:"m-case",name:"Case Studies",glyph:"❡",bg:"var(--red-soft)",fg:"var(--red)",cats:["case"]},
   {id:"m-intv",name:"Interview Prep",glyph:"◎",bg:"var(--accent-soft)",fg:"var(--accent2)",cats:["intv"]}];
}
function planCust(planId){
  DB.planCustom[planId]=DB.planCustom[planId]||{removed:[],added:[],orders:{}};
  return DB.planCustom[planId];
}
function chipDone(c){
  if(DB.planProg[c.id]&&DB.planProg[c.id].done)return true;
  if(c.itemId&&DB.done[c.itemId])return true;
  return false;
}
function planStats(pl){
  const chips=pl.phases.flatMap(p=>p.chips);
  const done=chips.filter(chipDone).length;
  return {done,total:chips.length,pct:chips.length?Math.round(done/chips.length*100):0};
}
function nextChips(pl,n){
  const out=[];
  for(const ph of pl.phases){for(const c of ph.chips){if(!chipDone(c)){out.push(c);if(out.length>=n)return out;}}}
  return out;
}
function orderedPlans(){
  const pls=(DATA.studyPlans||[]).slice();
  const ord=DB.trackOrder||[];
  if(ord.length)pls.sort((a,b)=>{const ia=ord.indexOf(a.id),ib=ord.indexOf(b.id);return (ia<0?999:ia)-(ib<0?999:ib);});
  return pls;
}

      <span><strong style="color:var(--green);font-size:15px">${st.done}</strong> done · <strong style="font-size:15px;color:var(--ink)">${st.total-st.done}</strong> left</span>

    const KIND={lesson:"◆",read:"📄",video:"▶",practice:"✎",note:"📓"};
    const nx0=nextChips(pl,1)[0];
    pl.phases.forEach((ph,pi)=>{
      const vis=ph.chips.filter(c=>PLANFILTER==="all"||c.k===PLANFILTER);
      if(!vis.length&&!PLANEDIT)return;
      const pd=ph.chips.filter(chipDone).length, tot=ph.chips.length;
      const key=pl.id+":"+ph.id;
      const open=PHOPEN[key]!==undefined?PHOPEN[key]:(PLANEDIT||(pd<tot&&(nx0?ph.chips.some(c=>c.id===nx0.id):pd>0)));
      html+=`<div class="tphase"><div class="tphead" onclick="APP.phToggle('${key}',${open?1:0})">

      if(open){
        html+=`<div class="tbody">`+vis.map(c=>{

          if(PLANEDIT)return `<div class="trow ${dn?"done":""}"><span class="tdot"></span><span class="tt">${esc(c.t)}</span>

            <b style="cursor:pointer;color:var(--red);padding:0 3px" onclick="APP.removeChip('${pl.id}','${c.id}')">✕</b></div>`;
          return `<div class="trow ${dn?"done":""} ${isNext?"next":""}" onclick="APP.chip('${pl.id}','${c.id}')">
            <span class="tdot"></span><span class="tt">${esc(c.t)}</span><span class="tk">${meta}</span></div>`;
        }).join("")+(PLANEDIT?`<div class="trow" onclick="APP.addChipSheet('${pl.id}','${ph.id}')"><span class="tdot" style="border-style:dashed;border-color:var(--accent)"></span><span class="tt" style="color:var(--accent)">＋ add step</span></div>`:"")+`</div>`;
      }
      html+=`</div>`;
    });
    html+=`</div>`;
  }
  return html;
}

function statsBody(){
  const units=unlockedUnits();const seen=units.filter(u=>DB.srs[u.id]).length;
  const mastered=units.filter(u=>DB.srs[u.id]&&(DB.srs[u.id].s||0)>=21).length;
  const doneLessons=Object.keys(DB.done).filter(k=>k.indexOf("challenge")<0).length;
  let gN=0,gA=0;const gl=DB.meta.gradelog||{};
  for(let i=0;i<30;i++){const k=todayStr(new Date(Date.now()-i*DAY));if(gl[k]){gN+=gl[k].n;gA+=gl[k].a;}}
  const retention=gN?Math.round((1-gA/gN)*100):null;
  /* heatmap: last 78 days */
  const cells=[...Array(78)].map((_,i)=>{
    const d=new Date(Date.now()-(77-i)*DAY);const k=todayStr(d);
    const v=(DB.meta.revlog[k]||0)+((DB.meta.minlog||{})[k]||0);
    return v===0?0:v<8?1:v<25?2:3;});
  const heat=`<div class="heat">${cells.map(c=>`<i class="${c?"h"+c:""}"></i>`).join("")}</div>`;
  /* lane donut */
  const all=items();
  const counts=LANES.map(([id])=>all.filter(it=>it.lane===id).length);
  const total=Math.max(1,counts.reduce((a,b)=>a+b,0));
  const cols=["var(--amber)","#378ADD","var(--green)"];
  let acc=0,segs="";
  const R=34,C=2*Math.PI*R;
  counts.forEach((n,i)=>{const frac=n/total;
    segs+=`<circle cx="45" cy="45" r="${R}" fill="none" stroke="${cols[i]}" stroke-width="12"
      stroke-dasharray="${(frac*C).toFixed(1)} ${C.toFixed(1)}" stroke-dashoffset="${(-acc*C).toFixed(1)}" transform="rotate(-90 45 45)"/>`;
    acc+=frac;});
  const donut=`<div class="donutrow"><svg width="90" height="90" viewBox="0 0 90 90">${segs}
    <text x="45" y="49" text-anchor="middle" font-size="15" font-weight="650" style="fill:var(--ink)">${total}</text></svg>
    <div class="legend">${LANES.map(([id,name],i)=>`<div><b style="background:${cols[i]}"></b>${name}: ${counts[i]}</div>`).join("")}</div></div>`;
  const fc=[...Array(7)].map((_,i)=>{
    const start=Date.now()+i*DAY, end=start+DAY;let n=0;
    for(const k in DB.srs){const e=DB.srs[k];if(e&&!e.susp&&e.due>=(i===0?0:start)&&e.due<end)n++;}
    return n;});
  const fmx=Math.max(1,...fc);
  const cl=DB.meta.catlog||{};
  const catRows=Object.keys(cl).filter(c=>cl[c].n>=5).map(c=>({c,r:Math.round((1-cl[c].a/cl[c].n)*100),n:cl[c].n})).sort((a,b)=>a.r-b.r);
  const catCol=r=>r>=85?"var(--green)":r>=70?"var(--amber)":"var(--red)";
  return `
  <div class="stats">
    <div class="stat hi"><div class="n">🔥 ${DB.meta.streak||0}</div><div class="l">Streak</div></div>
    <div class="stat"><div class="n" style="color:${retention==null?"var(--ink)":catCol(retention)}">${retention==null?"—":retention+"%"}</div><div class="l">Retention 30d</div></div>
    <div class="stat"><div class="n">${DB.meta.xp||0}</div><div class="l">XP</div></div>
    <div class="stat"><div class="n" style="color:var(--green)">${mastered}</div><div class="l">Mastered</div></div>
  </div>
  <div class="card"><div class="eyebrow">Last 78 days — reviews + minutes</div>${heat}
    <p class="dim" style="font-size:11.5px;margin-top:6px">darker = more activity · lessons done: ${doneLessons} · cards seen: ${seen}</p></div>
  <div class="card"><div class="eyebrow">Items by lane</div>${donut}</div>
  ${catRows.length?`<div class="card"><div class="eyebrow">Retention by category — weakest first</div>
    ${catRows.map(r=>`<div style="margin-top:12px"><div class="row" style="font-size:13.5px"><span>${esc(catOf(r.c).name)}</span><span style="font-weight:600;color:${catCol(r.r)}">${r.r}%</span></div>
    <div class="bar"><i style="width:${r.r}%;background:${catCol(r.r)}"></i></div></div>`).join("")}
    <p class="dim" style="font-size:12px;margin-top:10px">Weakest areas get priority in new material and the weekly plan.</p></div>`:""}
  <div class="card"><div class="eyebrow">Due forecast · next 7 days</div>
    <div class="week">${fc.map((v,i)=>{const d=new Date(Date.now()+i*DAY);
      return `<div class="col"><div class="colbar" style="height:${Math.round(v/fmx*46)+2}px;background:var(--green)"></div><div class="coll">${i===0?"now":"SMTWTFS"[d.getDay()]}</div></div>`;}).join("")}</div></div>`;
}

function vSetup(){

  <div class="body" style="margin-bottom:12px">This page is an empty shell on purpose — <strong>everything you learn lives in your own private GitHub repository</strong>, readable only with your token. Connect once per device; your streak, reviews, and edits sync everywhere.</div>
  <label class="f">GitHub token (fine-grained, repo access)</label>
  <input type="password" id="tok" placeholder="github_pat_…" autocomplete="off">

  <p class="dim" style="font-size:12px;margin-top:10px">I'll verify the token against your repo before saving. Nothing is sent anywhere except GitHub.</p></div>`;
}

<script>
"use strict";
/* ===================== ACTIONS v4 ===================== */
let CAPNOTE="",CAPINSTR="",GLOSSOPEN={},QZ=null;
function setItemState(id,patch){
  const st=DB.itemState[id]||{};
  DB.itemState[id]=Object.assign(st,patch,{u:Date.now()});
  saveLocal();
}
const APP={
  go(name,p){if(name==="review")SESSION=null;if(name==="today")FLOW=false;if(name==="library")libFilter=null;nav(name,p);},
  startFlow(){FLOW=true;SESSION=null;REVTAB="session";nav("review");},
  lib(t){libTab=t;libFilter=null;nav("library");},
  libFilter(id){libFilter=id;nav("library");},
  desk(t){deskTab=t;REVTAB=t;nav("review");},
  rev(t){REVTAB=t==="session"?"projects":t;SESSION=null;nav("review");},
  more(){nav("more");},
  item(id,from){VIEW={name:"item",p:id,from:from||null};render();window.scrollTo(0,0);},
  stageView(id,lane){STAGEVIEW[id]=lane;render();},
  graduateTo(id,lane){
    const it=item(id);if(!it)return;
    openSheet(`<h3>Graduate to ${esc(laneName(lane))}?</h3>
    <p class="muted" style="font-size:14px;margin-bottom:12px">${lane==="understand"?"Claude will build a structured note — the mental model in plain language, with open questions.":"Claude will build the full mastery kit — lesson, flashcards, quiz, and application prompts — and it enters your review rotation."}
    The ${esc(laneName(it.lane))} version stays available on the item.</p>
    <div class="btnrow"><button class="btn solid" onclick="APP.confirmGraduate('${id}','${lane}')">Graduate</button>
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);},
  confirmGraduate(id,lane){
    const it=item(id);
    const st=DB.itemState[id]||{};
    const hist=(st.history||[]).concat([{lane:it.lane,at:todayStr()}]);
    setItemState(id,{lane,history:hist});
    delete STAGEVIEW[id];
    closeSheet();toast("Graduated — run 🔬 Full process to generate "+laneName(lane)+" artifacts");render();},
  glossSec(id){GLOSSSEC=id;glossQuery="";nav("gloss");},
  glossBack(){GLOSSSEC=null;glossQuery="";nav("gloss");},
  gcarNext(){const el=document.getElementById("gcar");if(!el)return;
    const card=el.querySelector(".gcard");const step=card?card.offsetWidth+12:el.clientWidth*.86;
    el.scrollBy({left:step,behavior:"smooth"});},
  glossCardOpen(gid){const g=DATA.glossary.find(x=>x.id===gid);if(!g)return;
    const sec=glossSections().find(s=>s.cats.includes(g.cat));
    GLOSSSEC=sec?sec.id:null;glossQuery=sec?"":g.term;GLOSSOPEN[g.id]=true;
    if(!(DB.glossRead||{})[gid]){DB.glossRead[gid]=Date.now();saveLocal();}
    nav("gloss");
    setTimeout(()=>{const n=document.querySelector(".glossitem h4");if(n)n.scrollIntoView({block:"center"});},60);},
  async glossGraduate(gid){
    const g=DATA.glossary.find(x=>x.id===gid);if(!g)return;
    try{
      await captureToInbox("glossary-graduate-"+Date.now()+".md","---\ntype: glossary-graduate\nterm_id: "+gid+"\nterm: "+g.term+"\n---\n");
      toast("↑ Understand note will be built on the next 🔬 run");
    }catch(e){toast("Couldn't reach GitHub");}},
  chipSummary(planId,chipId){
    let pl=(DATA.studyPlans||[]).find(x=>x.id===planId);if(!pl)return;
    pl=effPlan(pl);
    let chip=null;for(const ph of pl.phases){const c=ph.chips.find(x=>x.id===chipId);if(c){chip=c;break;}}
    if(!chip)return;
    let sum=chip.sum||"";
    if(!sum&&chip.itemId){
      const it=item(chip.itemId);
      if(it){
        const les=artifact(it,"lesson"),note=artifact(it,"note"),summ=artifact(it,"summary");
        if(les){
          const heads=(les.body||"").split("\n").filter(l=>l.startsWith("## ")).map(h=>"- "+h.slice(3)).join("\n");
          sum="**What it covers:**\n\n"+heads+"\n\n**Keep these:**\n\n"+(les.takeaways||[]).map(x=>"- "+x).join("\n");
        }else sum=note||summ||"";
      }
    }
    if(!sum)sum=chip.desc||"No summary available yet — ask Claude to add one.";
    openSheet(`<h3>${esc(chip.t)} — summary</h3><div class="prose" style="font-size:14.5px">${md(sum)}</div>
    <div class="btnrow">${chip.itemId?`<button class="btn solid" onclick="APP.closeSheet();APP.item('${chip.itemId}','today')">Open the full lesson</button>`:""}
    <button class="btn ghost" onclick="APP.closeSheet()">Close</button></div>`);},
  newColl(){
    openSheet(`<h3>New collection</h3>
    <label class="f">Name</label><input type="text" id="ncN" placeholder="e.g. Launch prep">
    <label class="f">Emoji/glyph</label><input type="text" id="ncG" placeholder="★" maxlength="2">
    <div class="btnrow"><button class="btn solid" onclick="APP.saveColl()">Create</button>
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);},
  saveColl(){
    const n=$("#ncN").value.trim();if(!n)return toast("Name it");
    DB.userColls.push({id:"col"+Date.now(),name:n,glyph:($("#ncG").value.trim()||"★"),itemIds:[],u:Date.now()});
    saveLocal();closeSheet();render();toast("Collection created");},
  delColl(id){const c=DB.userColls.find(x=>x.id===id);if(c){c.del=true;c.u=Date.now();saveLocal();}libFilter=null;render();},
  collAdd(id){
    const all=items();
    openSheet(`<h3>Add element</h3>
    <select id="caI">${all.map(it=>`<option value="${it.id}">${esc(it.title)}</option>`).join("")}</select>
    <div class="btnrow"><button class="btn solid" onclick="APP.collAddDo('${id}')">Add</button>
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);},
  collAddDo(id){
    const c=DB.userColls.find(x=>x.id===id);const iid=$("#caI").value;
    if(c&&iid&&!(c.itemIds||[]).includes(iid)){c.itemIds=(c.itemIds||[]).concat([iid]);c.u=Date.now();saveLocal();}
    closeSheet();render();},
  collRemove(id,iid){
    const c=DB.userColls.find(x=>x.id===id);
    if(c){c.itemIds=(c.itemIds||[]).filter(x=>x!==iid);c.u=Date.now();saveLocal();render();}},
  glossSearch(v){glossQuery=v;
    const box=document.querySelector(".srch");
    const pos=box?box.selectionStart:0;
    $("#app").innerHTML=(VIEW.name==="gloss")?vGlossTab():vLibrary();
    const nb=document.querySelector(".srch");if(nb){nb.focus();nb.setSelectionRange(pos,pos);}},
  glossOpen(id){
    GLOSSOPEN[id]=!GLOSSOPEN[id];
    if(GLOSSOPEN[id]&&!(DB.glossRead||{})[id]){
      DB.glossRead[id]=Date.now();saveLocal();
      const n=Object.keys(DB.glossRead).length;
      if(n%5===0){render();return APP.glossQuiz();}
    }
    render();},
  glossQuiz(){
    /* eligible = a clean, self-contained term worth quizzing on */
    const ok=g=>{if(!g)return false;const t=g.term||"",d=(g.def||"").trim();
      if(t.length>46||t.split(" ").length>7)return false;
      if(d.length<24)return false;
      if(/^(Source:|Recommended reading|Based on|Case study|Opinion:|Point \d)/i.test(d))return false;
      return true;};
    /* prefer the most-recently read, but only clean terms; top up from all read if needed */
    const readSorted=Object.entries(DB.glossRead||{}).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
    const seen=new Set();const terms=[];
    for(const id of readSorted){const g=DATA.glossary.find(x=>x.id===id);if(ok(g)&&!seen.has(id)){seen.add(id);terms.push(g);}if(terms.length>=5)break;}
    if(terms.length<3)return;
    const readIds=terms.map(g=>g.id);
    const others=DATA.glossary.filter(g=>ok(g)&&!readIds.includes(g.id));
    if(others.length<3)return;
    const qs=terms.map((g,i)=>{
      const kind=i%3;
      if(kind===0){ /* MCQ: def -> term */
        const wrong=glossShuffle(others).slice(0,3).map(o=>o.term);
        const choices=glossShuffle([g.term,...wrong]);
        return {kind:"mcq",q:"Which term matches this definition?\n“"+defSnippet(g.def,190)+"”",choices,correct:choices.indexOf(g.term),term:g.term};
      }
      if(kind===1){ /* T/F */
        const flip=Math.random()<.5;
        const shown=flip?(others[Math.floor(Math.random()*others.length)]||g):g;
        return {kind:"tf",q:"True or false — does this describe “"+g.term+"”?\n“"+defSnippet(shown.def,190)+"”",answer:shown===g,term:g.term};
      }
      /* fill in the blank */
      const words=g.term.split(" ");
      const blankTerm=words.length>1?words.map((w,j)=>j===0?w:"____").join(" "):"____";
      return {kind:"fill",q:"Fill the blank: "+blankTerm+"\n“"+defSnippet(g.def,190)+"”",answer:g.term,term:g.term};
    });
    QZ={qs,i:0,score:0,done:false};
    APP.renderQuiz();},
  renderQuiz(ans){
    const z=QZ;if(!z)return;
    const qq=z.qs[z.i];
    let body="";
    if(z.done){
      body=`<h3>Glossary check: ${z.score}/${z.qs.length}</h3>
      <p class="muted" style="font-size:14px;margin:10px 0">${z.score===z.qs.length?"Clean sweep — these are sticking.":"Misses are normal — the terms stay in the glossary; add tough ones to review."}</p>
      <div class="btnrow"><button class="btn solid" onclick="APP.closeQuiz()">Done</button></div>`;
    }else{
      body=`<h3>Quick check ${z.i+1}/${z.qs.length}</h3>
      <p style="font-size:15px;margin:12px 0;line-height:1.55;white-space:pre-line">${esc(qq.q)}</p>`;
      if(ans!==undefined){
        const good=qq.kind==="mcq"?ans===qq.correct:qq.kind==="tf"?ans===qq.answer:String(ans).trim().toLowerCase()===qq.answer.toLowerCase();
        if(good)z.score++;
        body+=`<p style="font-weight:600;color:${good?"var(--green)":"var(--red)"}">${good?"Correct ✓":"Not quite — it's “"+esc(qq.term)+"”"}</p>
        <div class="btnrow"><button class="btn solid" onclick="APP.quizNext()">Next</button></div>`;
      }else if(qq.kind==="mcq"){
        body+=qq.choices.map((c,i)=>`<button class="quizopt" onclick="APP.quizAns(${i})">${esc(c)}</button>`).join("");
      }else if(qq.kind==="tf"){
        body+=`<div class="btnrow"><button class="btn" style="flex:1" onclick="APP.quizAns(true)">True</button>
        <button class="btn" style="flex:1" onclick="APP.quizAns(false)">False</button></div>`;
      }else{
        body+=`<input type="text" id="qzIn" placeholder="Type the term"><div class="btnrow"><button class="btn solid" onclick="APP.quizAns(document.getElementById('qzIn').value)">Check</button></div>`;
      }
    }
    openSheet(body);},
  quizAns(a){APP.renderQuiz(a);},
  quizNext(){QZ.i++;if(QZ.i>=QZ.qs.length)QZ.done=true;APP.renderQuiz();},
  closeQuiz(){QZ=null;closeSheet();},
  glossToCard(gid){
    const g=DATA.glossary.find(x=>x.id===gid);if(!g)return;
    if((DB.custom||[]).some(c=>!c.del&&c.src==="Glossary"&&c.q==="Define: "+g.term))return toast("Already in rotation");
    DB.custom.push({id:"c"+Date.now(),q:"Define: "+g.term,a:g.def,u:Date.now(),src:"Glossary",track:"gloss"});
    saveLocal();toast("Added to review rotation");},
  addTermReq(){
    openSheet(`<h3>Add glossary term</h3>
    <label class="f">Term</label><input type="text" id="gt">
    <label class="f">Definition (optional — Claude researches and dedupes if blank)</label><textarea id="gd" style="min-height:70px"></textarea>
    <div class="btnrow"><button class="btn solid" onclick="APP.sendTermReq()">Request</button>
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);},
  async sendTermReq(){
    const term=$("#gt").value.trim(),def=$("#gd").value.trim();
    if(!term)return toast("Enter a term");

      await captureToInbox("glossary-request-"+Date.now()+".md","---\ntype: glossary-add\nterm: "+term+"\n---\n\n"+def);
      closeSheet();toast("Requested — added after dedupe check");
    }catch(e){toast("Couldn't reach GitHub");}},
  refreshInbox(silent){
    listInboxFiles().then(f=>{INBOXFILES=f;
      const names=new Set(f.map(x=>x.replace(/\/$/,"")));
      let chg=false;
      for(const c of (DB.caps||[])){if(!c.filed&&!names.has(c.dir)){c.filed=Date.now();chg=true;}}
      if(chg)saveLocal();
      if(VIEW.name==="inbox")render();});
    if(!silent)toast("Refreshing…");},
  capMode(m){APP.snapshotCap();CAPMODE=m;render();},
  meetTask(id,done){DB.meetTasks=DB.meetTasks||{};if(done)DB.meetTasks[id]={done:1,at:Date.now()};else delete DB.meetTasks[id];saveLocal();render();},
  search(){
    let rec=[];try{rec=JSON.parse(localStorage.getItem("meridian.recentq")||"[]");}catch(e){}
    openSheet(`<h3>Search everything</h3>
    <input type="text" id="gq" placeholder="Lessons, glossary, tracks, projects, news…" autocomplete="off" oninput="APP.gsearchD(this.value)" style="margin-bottom:6px">
    <div id="gres" class="dim" style="font-size:13px">${rec.length?`Recent: `+rec.map(r=>`<span class="chip" style="margin-right:6px;cursor:pointer" onclick="$('#gq').value='${esc(r)}';APP.gsearch('${esc(r)}')">${esc(r)}</span>`).join(""):`Across ${items().length} lessons, ${(DATA.glossary||[]).length} terms, ${(DATA.studyPlans||[]).length} tracks, projects, and briefings.`}</div>`);
    setTimeout(()=>{const e=$("#gq");if(e)e.focus();},50);},
  gsearchD(q){clearTimeout(APP._st);APP._st=setTimeout(()=>APP.gsearch(q),150);},
  gsearch(q){
    const box=$("#gres");if(!box)return;
    q=(q||"").trim().toLowerCase();
    if(q.length<2){box.innerHTML="";return;}
    try{let rec=JSON.parse(localStorage.getItem("meridian.recentq")||"[]");rec=[q].concat(rec.filter(x=>x!==q)).slice(0,5);localStorage.setItem("meridian.recentq",JSON.stringify(rec));}catch(e){}
    const hit=(t)=>String(t||"").toLowerCase().includes(q);
    const out=[];
    const its=items().filter(it=>hit(it.title)||hit(it.summary)||hit((artifact(it,"lesson")||{}).body)).slice(0,5);
    if(its.length)out.push(`<div class="eyebrow" style="margin-top:8px">Lessons & items</div>`+its.map(it=>
      `<div class="srchhit" onclick="APP.closeSheet();APP.item('${it.id}')"><h4>${esc(it.title)}</h4><p>${esc(laneName(LANE_LEGACY[it.lane]||it.lane))} · ${(it.cats||[]).map(c=>esc(catOf(c).name)).join(", ")}</p></div>`).join(""));
    const gs=(DATA.glossary||[]).filter(t=>hit(t.term)||hit(t.def)).slice(0,5);
    if(gs.length)out.push(`<div class="eyebrow" style="margin-top:8px">Glossary</div>`+gs.map(t=>
      `<div class="srchhit" onclick="APP.glossTermSheet('${t.id}')"><h4>${esc(t.term)}</h4><p>${esc(t.def.slice(0,90))}</p></div>`).join(""));
    const pls=(DATA.studyPlans||[]).filter(pl=>hit(pl.title)||pl.phases.some(ph=>ph.chips.some(c=>hit(c.t)))).slice(0,4);
    if(pls.length)out.push(`<div class="eyebrow" style="margin-top:8px">Tracks</div>`+pls.map(pl=>
      `<div class="srchhit" onclick="APP.closeSheet();PLANOPEN['${pl.id}']=1;APP.lib('tracks')"><h4>📚 ${esc(pl.title)}</h4><p>${planStats(effPlan(pl)).pct}% complete</p></div>`).join(""));
    const ps=(DB.projects||[]).filter(p=>!p.del&&(hit(p.name)||hit(p.summary))).slice(0,4);
    if(ps.length)out.push(`<div class="eyebrow" style="margin-top:8px">Projects</div>`+ps.map(p=>
      `<div class="srchhit" onclick="APP.closeSheet();APP.go('project','${p.id}')"><h4>💼 ${esc(p.name)}</h4><p>${esc(p.summary||"")}</p></div>`).join(""));
    const nws=(DATA.news||[]).filter(n=>hit(n.title)||hit(n.body)).slice(0,3);
    if(nws.length)out.push(`<div class="eyebrow" style="margin-top:8px">News</div>`+nws.map(n=>
      `<div class="srchhit" onclick="APP.closeSheet();APP.go('news')"><h4>${esc(n.title)}</h4><p>${esc(n.date||"")}</p></div>`).join(""));
    box.innerHTML=out.join("")||`<p class="dim" style="margin-top:8px">No matches for “${esc(q)}”.</p>`;},
  glossSort(m){GSORT=m;localStorage.setItem("meridian.gsort",m);if(GFULL)GFULL.terms=currentGlossTerms();render();},
  glossSortCycle(){const ids=GSORTS.map(x=>x[0]);const nx=ids[(ids.indexOf(GSORT)+1)%ids.length];GSORT=nx;localStorage.setItem("meridian.gsort",nx);if(GFULL){GFULL.terms=currentGlossTerms();GFULL.i=0;GFULL.flip=false;}toast("Sort: "+GSORTS.find(x=>x[0]===nx)[1]);render();},
  glossFull(i){GFULL={terms:currentGlossTerms(),i:i||0,flip:false};if(!GFULL.terms.length){GFULL=null;return toast("No terms here");}render();window.scrollTo(0,0);},
  glossFullClose(){GFULL=null;render();},
  glossFullFlip(){if(GFULL){GFULL.flip=!GFULL.flip;render();}},
  glossFullNav(d){if(!GFULL)return;GFULL.i=Math.min(GFULL.terms.length-1,Math.max(0,GFULL.i+d));GFULL.flip=false;render();window.scrollTo(0,0);},
  glossFullRead(){if(!GFULL)return;const g=GFULL.terms[GFULL.i];DB.glossRead=DB.glossRead||{};DB.glossRead[g.id]=Date.now();saveLocal();render();},
  glossTermSheet(id){
    const t=(DATA.glossary||[]).find(x=>x.id===id);if(!t)return;
    DB.glossRead=DB.glossRead||{};const wasRead=!!DB.glossRead[t.id];
    openSheet(`<h3>${esc(t.term)}</h3>
    <p class="dim" style="font-size:12px;margin-bottom:8px">${esc(t.cat||"")}</p>
    <div class="prose" style="font-size:14.5px">${md(t.def)}</div>
    <div class="btnrow" style="margin-top:14px">
      ${wasRead?`<span class="pill ok">Read ✓</span>`:`<button class="btn small solid" onclick="DB.glossRead['${t.id}']=Date.now();saveLocal();APP.closeSheet();toast('Marked read ✓')">✓ Mark read</button>`}
      <button class="btn small ghost" onclick="APP.closeSheet();glossQuery='';GLOSSSEC=null;APP.go('gloss')">Open glossary</button></div>`);},
  dataMap(){openSheet(`<h3>🔒 Where your data lives</h3>
    <div class="prose" style="font-size:14px">
    <p><strong>This app (public)</strong> — an empty shell on GitHub Pages. Zero content, zero personal data. Anyone can see the code; nobody can see your stuff.</p>
    <p><strong>Your private vault (GitHub)</strong> — all lessons, glossary, news, and your learning state. Only your token can read it. Syncs across your devices.</p>
    <p><strong>Local work area (Mac only)</strong> — confidential work material never leaves your computer; the app only ever gets keyword stubs.</p>
    <p><strong>This device</strong> — a local cache + your token. “Erase app data” in Settings clears only this device; the vault restores everything.</p></div>`);},

  trackDrag(e,id){
    e.preventDefault();
    const row=e.target.closest(".trackrow");if(!row)return;
    row.classList.add("dragging");
    row.setPointerCapture&&row.setPointerCapture(e.pointerId);
    const move=ev=>{
      const el=document.elementFromPoint(ev.clientX,ev.clientY);
      const over=el&&el.closest?el.closest(".trackrow"):null;
      if(over&&over!==row&&over.parentNode===row.parentNode){
        const r=over.getBoundingClientRect();
        if(ev.clientY<r.top+r.height/2)over.parentNode.insertBefore(row,over);
        else over.parentNode.insertBefore(row,over.nextSibling);
      }};
    const up=()=>{
      document.removeEventListener("pointermove",move);
      document.removeEventListener("pointerup",up);
      row.classList.remove("dragging");
      const order=[...row.parentNode.querySelectorAll(".trackrow")].map(x=>x.dataset.track).filter(Boolean);
      if(order.length){DB.trackOrder=order;saveLocal();toast("Order saved");}
    };
    document.addEventListener("pointermove",move);
    document.addEventListener("pointerup",up);},
