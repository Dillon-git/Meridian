{id:"intv-16",track:"intv",title:"Job Search Plan: Career-as-Portfolio, Career Arcs, and Networking",min:11,
body:`A job search plan is treated as a structured planning exercise, not an activity list. This covers three linked frameworks worked through end-to-end using the author's own 20+ year career as the example: treating your career like an investment portfolio, mapping your work history into "career arcs" you can pitch differently to different companies, and the concrete mechanics of inbound and outbound job search — LinkedIn positioning, networking math, and strategy docs for target companies.

## Framework 1: career as a portfolio of bets

The investing analogy applies directly. **High risk, high reward** is like individual stocks or startups — early-stage or founding roles. **Medium risk, medium reward** is like index funds of different profiles — established but not "safe" companies. **Low risk, low reward** is like bonds or T-bills — large stable companies.

You hold a mix of these three types in your career portfolio, and the mix should shift as you age:

- **Younger:** roughly 40% high-risk, 40% medium-risk, 20% low-risk.
- **Middle-aged:** roughly 30% high, 50% medium, 20% low.
- **Closer to retirement:** roughly 10% high, 50% medium, 40% low.

Each role you take has its own risk-reward profile; based on your life stage, choose a role with a profile that matches, and based on how your last bet played out plus your new life stage, choose the risk-reward profile you want for your next job.

{{DIAGRAM:0}}

A worked example walks the author's own portfolio decade by decade: from 2002 to 2010, high risk, high reward that did not pan out — he ended the period with $50K in savings over 8 years as an AI researcher and engineering leader at a startup. From 2011 to 2017, medium risk, medium reward, which set him up for better jobs. From 2017 to 2023, medium risk, high reward, ending with enough savings to buy a few years of high-risk-taking room. From 2024 to 2025, high risk, high reward, betting on himself directly. At the 2026 decision point, the path depends on how 2024–2025 plays out — if successful, double down; if unsuccessful, go back to medium-risk, medium-reward jobs.

A second, orthogonal lens is **learning versus earning**: if you're learning a lot, you may not be earning a lot, and that's okay. If you're earning a lot, you may not be learning a lot, and that's also okay. The question to ask explicitly at each career stage is what your target ratio of learning to earning is right now. Applied to the same timeline: 2002–2010 was learned a lot, didn't earn a lot; 2011–2017 was earned a bit, learned a lot; 2017–2023 was earned a lot, learned a lot; 2024–2025 is high learning, earning uncertain.

Both frameworks are credited by name: **"view your career as a portfolio of bets"** is credited to **Marc Andreessen**; **"are you learning or are you earning?"** is credited to **Mark Suster**.

> View your career as a portfolio of bets, and separately ask at every stage: right now, am I learning or am I earning — and which do I actually need more of?

## Framework 2: where you've been, where you are, where you're going

The scenario used as the worked example throughout: leaving a Meta IC7 job, having a subsequent startup not pan out within two years, and now returning to do a job search. A career narrated in five stages, answering "where was I?":

- **2002–2010:** AI researcher and engineering leader at a startup for 8 years, failed to build successful products, wanted to learn to build great products.
- **2010–2011:** studied to transition into consumer PM and landed a consumer PM job.
- **2011–2014:** learned to build internet-scale systems and consumer products, specialized in personalization, got exposure to consumer-facing products.
- **2014–2017:** scaled consumer, business, and advertiser products, learned to build businesses from 0 to 1.
- **2017–2023:** learned to build global products, learned to switch seamlessly between consumer, advertiser, integrity, ranking/recommendations, platform, and AI problems at societal scale, managed PMs as well as working as a senior IC.

Where you are currently is a template to fill in for yourself — for example, "strong senior IC who can support a VP of Product at a top company on key initiatives, or a CPO at a non-top-tier or late-stage startup," and/or "strong manager who can run a product pillar at a top company, or a product group at a late-stage startup."

## What matters to you in a new job — tracked as it evolves

Six criteria that are tracked as they evolve over time, shown across three career moments before landing on a final form:

- **Industry Growth** evolved from not being a factor early on, to "a real PM job" being enough, to wanting a top-tier company, to finally asking: will this area grow in the next 5 years, creating opportunities I can capitalize on?
- **Product–PM Fit** evolved from any job with a PM title, to wanting to work at a top consumer tech company, to being in a consumer-facing product, to finally asking: do I care about the product, do I have an unfair advantage here, can I be top 5% in this space?
- **Quality of People** evolved from not being tracked, to working on consumer or business products, to fair market compensation, to finally wanting top industry talent or high-agency, high-growth-mindset early-career people.
- **My Role** evolved from not being tracked, to making fair market compensation, to being in the peninsula geographically, to finally wanting to be an IC on key initiatives or supporting a large org, or a manager supporting a product group.
- **Fair Compensation** evolved from not tracked, to not tracked, to being in San Francisco, to finally recognizing the next 5–10 years are peak earning years and wanting liquidity unless it's a breakout startup.
- **Location** wasn't tracked until the final form, which is to revisit in 2 years and live within a set distance of the job.

Note the explicit exclusion: "I don't have manager as a criteria here — at my level I need to be able to operate well irrespective of who my manager is and who my leadership is." That's a deliberate, stated choice, not an oversight.

An alternate framing, credited to the **"Never Search Alone"** methodology, is self-reflection across four buckets: what you don't like in a company or don't like doing, what you love in a company or love doing, what must-not be true of your next job, and your must-haves — plus separately articulated career goals split into long-term and short-term.

## Framework 3: career arcs — where do I want to go?

"Where do I want to go?" maps a role ladder across three time horizons, each with four company-tier options labeled A through D:

- **Five to seven years out (the next-next-next job):** Option A is VP at a top-tier company; Option B is CPO at a top-10 late-stage startup; Option C is IC10 reporting to the CEO, CPO, or GM of a Product Group at a top-10 late-stage startup; Option D is IC10 reporting to a GM of a Product Group at a top-tier company.
- **Three to four years out (the next-next job):** Option A is Sr. Director at a top-tier company; Option B is VP Product at a top-10 late-stage startup; Option C is IC9 reporting to VP of Product at a top-10 late-stage startup; Option D is IC9 reporting to VP of Product Group at a top-tier company.
- **Now (the next job):** Option A is Director at a top-tier company; Option B is Sr. Director Product at a top-10 or top-30 late-stage startup; Option C is IC8 reporting to VP of Product Group at a top-10 late-stage startup; Option D is IC8 reporting to VP of Product Group at a top-tier company.

"What was I capturing?" is answered by three dimensions any target-role description needs: **type of company, role in the company, and level in the company.**

{{DIAGRAM:1}}

## Mapping past work into named career arcs

Career arcs, or vectors, are a distinct way of describing the same work history. **Eight possible arcs** a PM career can be told through: Content Personalization, Social/Community Consumer Products, Local Business Products, Advertising Products, Integrity Products, AI Products, 0-to-1 Products, Scaling Products.

Past product experience, organized by company, becomes the raw material for the arcs above. At one media company: video platform, publishing platform, personalization, photo sharing. At a local-services marketplace: SMB business tools, self-serve advertising, sales rep tools, food ordering growth, services verticals. At a large social platform: app navigation, community messaging, discovery feeds, teen well-being, elections integrity work, youth strategy, intent-aware ads, embodied AI research, and large language model and AI assistant work. At an early-stage computer vision startup: AI researcher on computer vision and shopper analytics products.

Mapping projects to arcs is a table exercise:

- **Content Personalization** pulls together discovery feed personalization, intent-aware ads, business recommendation tools, sales tools, and feed personalization across companies.
- **Social/Community Consumer Products** pulls together discovery feeds, community messaging, AI agents, consumer-facing marketplace tools, and personalized photo and feed experiences.
- **AI Products** pulls together consumer AI agents, large language models, embodied AI models, recommendations, intent-aware ads, business recommendation tools, feed personalization, and computer vision for shopper analytics.

{{DIAGRAM:2}}

**Turning arcs into a one-line pitch** adds a third column to the same table — for example, Content Personalization becomes "Personalization for content, business, and ads across startups to global companies," and Social/Community Consumer Products becomes "Launched successful consumer products in different industries at startups to global companies." This one-line-pitch discipline is the resume or LinkedIn-headline version of the same arc.

**Turning arcs into role targets** adds a "Roles" column: Content Personalization becomes "PM - Recommendations / Ranking / Personalization / Ads Relevance"; Social/Community Consumer Products becomes "PM - Consumer"; Business Products becomes "PM - Biz Products"; Advertising Products becomes "PM - Ads, PM Ads Relevance, etc."; Integrity Products becomes "PM - Integrity"; AI Products becomes "PM - AI Products"; 0-to-1 Products becomes "PM - New Verticals etc."; Scaling Products becomes "PM - Growth."

**Turning arcs into company targets** uses a three-tier company mapping specific to each arc. For Content Personalization: Dream-tier companies include the largest consumer tech and platform companies; Stepping-Stone-tier companies include mid-size consumer and content platforms and ecommerce startups; Need-a-paycheck-tier companies include traditional media and retail companies.

**Turning arcs into resume variants** adds a final "Impact stories" column — for each arc, take the mapped projects and write them as concrete impact stories, ready to drop into an arc-specific resume version. The explicit output of this whole exercise is producing **multiple resume variants, one per prioritized arc**, rather than a single generic resume.

## Framework 4: search mechanics — inbound, outbound, networking

**Inbound through LinkedIn:** a strong LinkedIn profile drives inbound interest. The mechanics: pick a few arcs to prioritize, build a profile headline that blends those arcs, and keep it noise-free, since "people have filters on and will only read what they're looking for if you don't have too much noise and too many vectors." A worked example headline: "VP, Product & Design | Growth | Scaleups | Machine Learning | Fintech | Design | B2B and B2C | Strategy."

**Outbound**, or how networking actually works from the hiring side in: hiring managers and recruiters see few roles, a lot of people applying, and a lot of people doing cold outreach. How they filter through it: they evaluate **competence and fit** for the role, where competence signals split into brand and outcomes visible via the resume, and vouching for competence via referral. A real referral looks like "I worked with this person and I believe they'll be a top-30% PM at this company based on my experience working with them. They did X, Y, Z at the previous company and demonstrated A, B, C behaviors. I'm writing interview feedback for them based on my past experience" — plus **proof of work**, meaning doing the job before you get the job, or literally answering "what would you do if I gave you this job — show that now."

**Lightweight strategy or idea docs** for key companies are a specific outbound artifact: what would you want to build if you joined that company, with a solid rationale for it — treat it like a high-quality product-thinking response, spend 4–8+ hours on it, expand it, edit it, and write a high-level summary at the top.

A **portfolio or personal website** should demonstrate your product thinking — how you think about markets, what different companies should build, what products you think should exist in the world. It's explicitly not worth your time to write generic product-management-process thought leadership, since "everyone is an expert on the process of PM."

## The networking playbook, with real numbers

Networking has a concrete, numbers-driven playbook:

- **First**, build a list of people who will vouch for your competence — "we should hire this person now" — targeting around **10 people**, and a broader list of people who know your work and will say "this person is good," targeting around **100 people**; from these, build a list of companies where you can get a warm referral that actually means something.
- **Second**, for companies you want to get into, ask whether you have a warm referral, and if not, what your plan is.
- **Third**, build a ranked list of companies to write quick product strategy docs for.
- **Fourth**, use InMail with two distinct message types: a message asking someone to vouch for you or invite you to interview, or a message that pairs your outreach with a strategy doc plus a specific open role, sent to a hiring manager.`,
takeaways:["Treat your career as a portfolio with an explicit risk-reward mix that should shift with age (roughly 40/40/20 high/medium/low-risk when younger, shifting to 10/50/40 near retirement) — and separately track a learning-vs-earning ratio, since a role can be a good bet on one axis and a bad one on the other.","What you look for in a job changes over time in specific, nameable ways — track your own criteria evolution (industry growth, product-PM fit, quality of people, role, compensation, location) explicitly rather than assuming your target job description is static.","Map your work history into a small number of named 'career arcs' (e.g., Content Personalization, AI Products, 0-to-1 Products), then build a distinct one-line pitch, target role, target company tier (dream/stepping-stone/need-a-paycheck), and resume variant for each arc — one resume for all arcs undersells your range.","Referrals only work as intended when they're substantive ('I worked with them, they did X/Y/Z, demonstrated A/B/C') — a name-drop referral without specifics doesn't actually move you past standard filters.","Networking has real numbers behind it: build a ~10-person list who will actively vouch for you and a ~100-person list who know your work is good, then work backward from that list to warm referrals at target companies rather than starting from cold outreach."],

h to say so — both feed into building a list of companies where you could get a warm, substantive referral."}]},
{id:"intv-17",track:"intv",title:"Strategy & Physical Product: Random Practice Questions",min:8,
body:`This is a worked-example worksheet rather than a lecture: it walks two categories of "random" product-thinking prompts end-to-end — company-strategy questions like "what would you do if you were CEO of X?" and physical or abstract product-design questions like alarm clocks, theme parks, and airport boarding — showing the actual scaffolding used to answer each, filled in with real company detail.

## The CEO-strategy scaffold: four steps

The high-level approach for any large company with a portfolio of businesses runs the same **four-step scaffold**, applied to every company below:

- **Markets we currently play in**
- **Trends** that create value-creation opportunities and value-destruction risks
- **Value-destruction risks** and bets to mitigate them
- **Value-creation opportunities** and bets to capitalize on them

{{DIAGRAM:1}}

## Worked example: a large search and technology company

A worked example on a large search and technology company runs through all four steps. **Markets currently in**: Knowledge (Search); Monetization (Advertising); Content (Video, Social, Studio); Personal Computing (Mobile & Desktop OS, Browser); Cloud Infrastructure; mobile, desktop, and datacenter hardware; AI-powered hardware such as self-driving cars, VTOL aircraft, and robotics; and AI-powered software.

**Trends creating opportunity and risk**: LLMs for answer engines; generative AI tools for ads, content creation, and coding tools; models; AI infrastructure; AI hardware.

**Value-destruction risks and mitigating bets**: under Knowledge, will search-replacement answer engines erode the core business? The key questions to ask are **Time to Market** (will we be fast enough?), **Total Cost** (how much will it cost to build and operate?), and **Distribution** (can we acquire customers faster than competitors in this new market?).

**Value-creation opportunities**, mapped market-by-market:

- Knowledge moves from Search to Answer/Research Engines
- Monetization moves from Search Ads to Answer Engine Ads, and from Ads to generative AI content creation and influencer ads
- Content & Creativity moves from a video platform to AI-supercharged video creation
- "Everyone is a developer" opens coding tools through buy, build, or partner strategies with tools like V0, Replit, Lovable, and Anthropic, plus AI agent and automation platforms in the workplace
- Reinventing personal computing means an AI-first mobile OS and phone, an AI-first desktop OS, and an AI-first browser
- Mobility means accelerating a self-driving car launch and self-driven VTOL for new use cases
- Infrastructure means AI-first datacenters and quantum computing
- Robotics means humanoid and industrial robotics

## Worked example: a large social media and AI company

A parallel worked example on a large social media and AI company uses the same four-step structure. **Markets currently in**: social and creator media; messaging and communities; commerce; advertising; personal computing through glasses and AR/VR; gaming and the metaverse; AI technology. The same trend context applies: LLMs for answer engines, generative AI tools for ads and content creation and coding tools, models, AI infrastructure, AI hardware.

**Value-creation opportunities**, mapped by market:

- Social & Creator Media moves toward AI-powered content creation and AI creator accounts
- Messaging & Communities moves toward AI-enhanced messaging, 1:1 AI characters, and AI character communities
- Monetization moves toward generative AI content creation, AI brand ambassadors, and influencer ads
- Knowledge is flagged as a **"high-conviction bet"** — reinvent visual search, build an answer engine
- AR/VR is flagged as **"the tech is coming together to pour gas"** — accelerate AR, accelerate the metaverse and VR push on mobile and desktop, push immersive VR experiences specifically for sports
- "Everyone is a developer" follows the same coding-tools and AI-agent logic as the search company
- Reinventing personal computing is flagged as **"this is the next computing platform"** and centers on an AI-first mobile OS and phone
- Robotics is flagged as **"nice to have,"** a lower priority than the search company's framing, covering humanoid and industrial robotics

## Worked example: a smaller, focused AI answer-engine company

A third worked example, on a smaller and more focused AI answer-engine company, illustrates a different company shape via a decision framework instead of a full four-step map. The question "Would you buy company X?" breaks into two decisions:

- **Decision one — should we enter this market?** Assessed via **Market Size** (what's the revenue potential of this market or product space) and **Market Position** (will we be able to compete, and do we get any extra leverage or protection from it).
- **Decision two — should we buy, build, or partner?** Assessed via **Competence** (can we build this technology or product ourselves).

{{DIAGRAM:2}}

> The two-decision compression — "should we enter this market?" then "should we buy, build, or partner?" — is the fastest way to answer any "would you buy company X?" prompt without building a full four-step map.

## The physical-product scaffold

Two worked examples are covered in full for physical or abstract product-design questions, plus a list of prompt variations to practice against the same scaffolding.

{{DIAGRAM:0}}

## Worked example: building a better alarm clock

The first worked example is "How would you build a better alarm clock?" The **real problem being solved for**: how do we wake people up by the time they want, in a way that makes them energized instead of groggy? **Removing constraints of the current version**: the alarm doesn't need to be sound; it doesn't need to be a separate physical thing you put next to the bed.

**Digging into the details of the problem**: current alarm clocks know the time but don't know what sleep stage you're in; they wake you up when you're in deep sleep, which is jarring; loud sounds startle you awake; dark surroundings make it hard to wake up fully, so you lie in bed for a while afterward.

The solution space has three concrete directions, each with a one-line mechanism:

- A **smartwatch integrated with home systems**, where the watch knows your sleep cycle and nudges you awake at the end of the closest light-sleep cycle while turning on lights slowly over time
- A **smart bedsheet or pillow integrated with home systems**, where the bedding knows your sleep cycle and nudges you awake the same way
- A **smart home system** that slowly changes lights, playing light music around your wake-up time and letting your body wake up naturally at the end of the light-sleep cycle without a wearable

## Scoring and deepening the alarm-clock solution

The three solutions get scored on three criteria: **addresses the problem**, **probability of success**, and **adoption risk**.

{{DIAGRAM:3}}

Deepening the winning solution — the smartwatch plus home systems — into implementation detail covers:

- **Home-system integration** for lights and music from the phone, with a fallback if the user doesn't have those devices
- **Set-an-alarm mechanics** for time and buffers, using "windows" rather than a single instant
- **Set wake-up preferences** for vibration, sounds, music, and lights, including an "experiment mode" to let users personalize
- **Adjusting the sleep-cycle reading** based on how the user actually feels and self-reports
- **Wake-up routines** that start with the lowest-impact modality and slowly escalate the intensity until the person actually wakes up

An **accessibility variant** is explicitly called out: for a blind user, the interaction mode shifts to voice-based alarm setup. Adjacent prompt variations to practice against the same scaffold include how you would build a **children's book** — how do you teach, entertain, and co-create with kids, and what constraints are you removing — with candidate solution directions like a smart tablet for kids, educational apps for kids and parents, an Android TV dongle for kids, games for kids, educational toys for kids, and personalized printed books.

## Worked example: improving airplane boarding

The second worked example is "How would you improve airplane boarding?" **Context to establish first**: growth in domestic and international air travel; more planes per day per airport; significantly larger planes on some routes; smaller planes on other routes with high-frequency trips each day.

**Segments to consider**: International-Economy, International-Business/First, Domestic, Families with kids, Elders & disabled, and TSA Pre/Clear passengers. The **problem funnel** is stated as a sequence: check-in, luggage, security, boarding the plane. From that funnel, three specific pain points get flagged as the priority: check-in and luggage for international economy passengers, boarding for international economy, and the end-to-end experience for elders and disabled passengers.

Candidate solutions map loosely to those pain points: time blocks for check-in; **people with scanners**, which the deck explicitly analogizes to a fast-food drive-through ordering system where staff walk the line with handheld scanners instead of a single fixed line; and pre-check for passport verification.

## Worked example: building a better theme park

An additional worked example, "How would you build a better theme park?", establishes context first — types of parks, and tech changes, value-creation opportunities, and value-destruction risks specific to this space, including generative AI avatars and characters with voice, generative AI-generated scenes, advances in robotics and intelligence, and multimodal input/output interfaces.

**Segments**: children, teens, young adults, adults with kids, grandparents with grandchildren. The structure for working the problem is left as a template to fill in, showing the reusable shape rather than the filled answer: a Segment × Problems table, one row per segment with a blank problem column to fill in live, feeding into a Segment × Problems × Solutions table with the same segments now paired with a solutions column — the standard segmentation-then-problems-then-solutions product-thinking sequence, applied here to a physical or experiential product rather than a software one.

## The "why now" checklist and open-ended prompts

A standalone reusable checklist, independent of any single worked example, is the **"why now" check** to run on any opportunity:

- **User** — why is this the right moment for users?
- **Tech** — why is this the right moment technologically?
- **Market size** — why is this the right moment given the size and timing of the market?

Personal and open-ended product prompts are their own category, each meant to be answered from a completely blank slate rather than against a given company's portfolio: "What would you build if you could build anything?" — you can start a company to build anything, what would you build; and "What would you build if you could build anything at Google?" — you are a PM at Google, what would you build. A worked partial answer given as an example is a "**well-being coach**" product, with "what is the market" flagged as the next thing to work out.`,
takeaways:["Big-company CEO-strategy questions have a reusable four-step scaffold: map current markets → identify trends creating value-creation/destruction → name specific risks and mitigating bets → name specific opportunities and capitalizing bets, mapped market-by-market, not as one generic answer.","For smaller or narrower companies, the same strategic question compresses into two decisions: should we enter this market (market size + market position/leverage) and should we buy/build/partner (do we have the competence to build it ourselves)?","Physical and abstract product questions ('build a better alarm clock,' 'improve airport boarding,' 'build a better theme park') use the same core sequence as software product questions: define the real problem tightly, explicitly remove assumed constraints of the current solution, generate a solution space, evaluate options on explicit criteria (problem fit / success probability / adoption risk), then deepen the winning option into implementation detail — plus check an accessibility variant.","The 'why now' check (User / Tech / Market size) is a fast, reusable filter to run on any opportunity before investing more time in it.","Personal/open-ended 'what would you build' prompts are a different genre from company-strategy or physical-product prompts — they intentionally start from a blank slate and reward a concrete, specific answer over a safe, generic one."],
cards:[{q:"What are the four steps of the reusable CEO-strategy scaffold?",a:"(1) Markets we currently play in, (2) trends creating value-creation opportunities and value-destruction risks, (3) value-destruction risks & bets to mitigate them, (4) value-creation opportunities & bets to capitalize on them."},{q:"What three questions does the deck use to assess a value-destruction risk, using the search company's answer-engine example?",a:"Time to Market (will we be fast enough?), Total Cost (how much will it cost to build and operate?), Distribution (can we acquire customers faster than competitors in the new market?)."},{q:"How does the smaller-company example compress the four-step CEO scaffold into a simpler two-decision framework?",a:"Decision 1 — should we enter this market (assessed by market size and market position/leverage)? Decision 2 — should we buy, build, or partner (assessed by whether we have the competence to build the technology/product ourselves)?"},{q:"What are the three evaluation criteria used to score alarm-clock solution candidates, and which solution scored best?",a:"Addresses the problem, probability of success, adoption risk. The smartwatch-integrated-with-home-systems solution scored High/High/Low — the best combination — versus Medium/Medium/High for the smart bedsheet and Low-Medium/Low-Medium/Low for the ambient smart-home-lighting option."},{q:"What three factors make up the 'why now' check for any product opportunity?",a:"User (why now for users?), Tech (why now technologically?), Market size (why now given market timing/size?)."},{q:"In the airplane-boarding example, what real-world system is explicitly cited as the analogy for a proposed check-in solution?",a:"A fast-food drive-through ordering system — staff walking the line with handheld scanners instead of a single fixed check-in queue."}]},
{id:"intv-18",track:"intv",title:"Bootcamp Overview: Curriculum Map and Interview Format",min:4,
body:`This is logistics and curriculum structure, not standalone teachable content — the actual frameworks it points to (CTUC, analytical thinking, leadership interviews, verbal skills, mindset) already have their own deep notes in the vault. It exists purely as a browsing map: what the course covers, how it's structured, and how PM interviews are evaluated, so it's easy to place any other note in context.

## Course structure (3 parts)

- **Part one, Product Thinking Core Material**, runs over 2 weekends and covers frameworks and skill development for rigorous product thinking — Context & Motivation, Target Audience, User Problems, and Creative Solutions, which together form the **CTUC framework** — plus deep dives into 10 product themes that encapsulate 50 markets: Media, Marketplaces, Ecommerce, Messaging, Productivity, Gen AI, AR/VR, Portal to Internet, Advertising, and Business Products.
- **Part two, Analytical Thinking, Leadership, and Verbal Skills Core Material**, runs over 1 weekend and covers Analytical Thinking, Leadership, Working with XFN, Verbal Skills, Mindset, and Job search planning.
- **Part three, Deliberate Practice Sessions**, runs 8 weeks, Monday through Thursday, with 30+ practice and feedback sessions: 14 Product Thinking, 9 Analytical Thinking, 7 Leadership & XFN Relationships, and 10 Verbal Skills sessions counted within the above, plus optional sessions and a close-out with a next-60-day plan.

{{DIAGRAM:0}}

## The three PM roles and where they sit on the competitiveness ladder

The **Product Manager** role is to orchestrate building successful products that are aligned with org and company mission, solve impactful customer and business problems, by leveraging the strengths of the entire team and org. PM work each half splits into **Strategy** (identify and get alignment for new product opportunities), **Execution** (build, test, launch, grow, and shut down product opportunities), and **Leadership** (set up the team to operate collaboratively and independently for long-term success).

Three PM archetypes are ranked by competitiveness:

- **Generalist PMs** are highly competitive, working on consumer experience — Growth, Business, Ads, and Search & Recommendations roles land here.
- **Mostly Generalist PMs** are less competitive, with some Trust & Safety or Privacy experience.
- **Specialist PMs** require more technical and domain knowledge — Developer Tools, Internal Tools, Infrastructure, and Hardware roles land here.

## Two interview styles

The **Prospective style**, started by Google and used by most top-tier product companies, asks questions about the company's products for product thinking and analytical thinking, and reserves questions about past experience for leadership only. Its advantage is consistency in evaluating and comparing candidates, and consistency among interviewer evaluations.

The **Retrospective, or Behavioral, style** is still used by a lot of companies and evaluates all skills based on past experience; the questions look similar and behavioral, but interviewers may be assessing different skills without saying so, and candidates are evaluated purely on past performance stories — harder to evaluate and compare candidates against each other.

> Top-tier product companies increasingly favor the Prospective style precisely because it's the one that lets interviewers compare candidates against each other consistently, not just judge each one in isolation.

## The five interview types and what each evaluates

- **Product Thinking** asks whether the candidate can develop an effective product strategy for a problem area — transforming an ambiguous problem affecting users into a viable product solution — and applies to all roles and companies.
- **Analytical Thinking** asks whether the candidate can set clear goals, track progress, and make the right decisions, and also applies to all roles and companies.
- **Leadership** asks whether the candidate can lead a group of people to take on challenges and win consistently — identifying, solving, and learning from important and ambiguous product, people, and process problems — and applies to all roles and companies as well.
- **Technical Understanding** asks whether the candidate has strategic influence on deep tech products, and applies to specialist roles plus some companies.
- **Domain Knowledge** asks whether the candidate has strategic influence on complex products, and applies to specialist roles only.

A Product Thinking interview format example prompt: "As a PM on a social app, you've been put in charge of a brand new area to invest in: Dating. What would you build and why?" — given 30 minutes, from prompt to description or wireframe. Other sample prompts include designing a children's book, increasing an AI answer engine's revenue 50X in 3 years, reinventing shopping ads, increasing rider tipping percentage, and "if you were the CEO of a large social company, would you buy a leading AI lab?" Rigorous thinking is evaluated on framing product motivation and context, determining target audience via segmentation, identifying and prioritizing problems, and designing solutions thoughtfully — this is the **CTUC framework**, covered in its own dedicated note.

A Leadership interview uses 6–10 behavioral questions mapped to specific traits — for example, "Tell me about a time when you got buy-in for an idea when no one believed in it" maps to Proactive and Resourceful & Resilient; "Tell me about a time your project failed and what you learned" maps to Ownership & Accountability; "Your team is pushing aggressive goals and needs a component built by another team not on their roadmap — what do you do?" maps to Resolve Conflict. It's evaluated on proactive, ownership & accountability, resourceful & resilient, resolve conflict, and grow self & team continuously.

{{DIAGRAM:1}}

## The 6-step deliberate-practice loop for building a story portfolio

- **Step one, Build Story Portfolio**: embody leadership principles now; identify stories that map to different leadership skills; lean in at work to collect stories when gaps appear.
- **Step two, Identify Story Portfolio**: for each leadership skill, XFN relationship, or behavioral area, score past experiences along Impact, Your Role, Memorable, and Risk dimensions; shortlist for story writing.
- **Step three, Story Writing**: write each story in interview-feedback-note format — Question, Signal Needed, Summary, Details covering Context, Actions, Impact — and edit multiple times to get to the succinct core essence.
- **Step four, Speed Story Writing**: write bulleted story arcs fast — Role, Opportunity/Insight/Challenge, Actions, Impact.
- **Step five, Verbal Storytelling**: compress the writing-to-speaking ratio over practice reps, going from 4 minutes writing plus 4 minutes speaking, to 2 minutes plus 4 minutes, to 1 minute writing plus 4 minutes speaking, then record and self-evaluate.
- **Step six, Putting it together**: run full self-interviews — 6 to 8 questions back to back, 1 minute writing plus 4 minutes speaking each — recorded and evaluated against a rubric, then run mock interviews with partners for structured feedback.

The course separately frames this same loop as "**Reduce Interview Day Variance**": Thinking on Feet, Depth of Thinking, Interview Style, Refresh Key Context, Reduce Uncertainty, Contingency Plans.`,
takeaways:["The course is 3 parts: Product Thinking core material (CTUC framework + 10 product themes covering 50 markets), Analytical/Leadership/Verbal core material, and 8 weeks of 30+ deliberate practice sessions.","PM work splits into Strategy, Execution, and Leadership; PM archetypes range from Generalist (most competitive, consumer-facing) to Specialist (more technical/domain-knowledge-heavy, less competitive).","Two interview styles exist — Prospective (product-question-based, more consistent to evaluate) and Retrospective/Behavioral (story-based, harder to compare candidates) — and top-tier companies increasingly favor the Prospective style.","Five interview types map to five skills: Product Thinking, Analytical Thinking, and Leadership apply to all roles/companies; Technical Understanding and Domain Knowledge apply only to specialist roles.","The leadership story portfolio is built via a 6-step deliberate-practice loop: build → identify/score → write → speed-write → verbalize with shrinking prep time → full mock interviews with recorded self-evaluation."],
cards:[{q:"What are the three parts of the bootcamp's course structure, and roughly how long is each?",a:"(1) Product Thinking Core Material — 2 weekends, covers CTUC framework plus 10 product themes spanning 50 markets. (2) Analytical Thinking/Leadership/Verbal Skills Core Material — 1 weekend. (3) Deliberate Practice Sessions — 8 weeks, 30+ sessions across product thinking, analytical thinking, leadership/XFN, and verbal skills."},{q:"What's the difference between the Prospective and Retrospective/Behavioral interview styles, and which do top-tier companies favor?",a:"Prospective (started by Google): questions about the company's products, used for product & analytical thinking, past-experience questions reserved for leadership only — more consistent to evaluate and compare candidates. Retrospective/Behavioral: evaluates everything via past-experience stories — harder to compare candidates since interviewers may assess different skills through similar-looking questions. Most top-tier product companies now use the Prospective style."},{q:"Which of the five PM interview types apply to all roles/companies, and which are specialist-only?",a:"Product Thinking, Analytical Thinking, and Leadership apply to all roles and all companies. Technical Understanding (specialist roles + some companies) and Domain Knowledge (specialist roles only) are narrower."},{q:"What four dimensions does the course use to score past experiences when building a leadership story portfolio?",a:"Impact, Your Role, Memorable, and Risk."},{q:"What's the ratio progression used in the 'Verbal Storytelling' practice step, and why?",a:"Practice reps compress the writing-to-speaking ratio over time — 4 min write + 4 min speak, then 2 min + 4 min, then 1 min write + 4 min speak — training the candidate to reach full clarity with less and less prep time, closer to real interview conditions."}]},
{id:"intv-19",track:"intv",title:"Theme 1: Media — Entertain, Educate and Connect People",min:20,
body:`Satish Mummareddy frames Theme 1 as "Entertain, Educate and Connect people!" Media splits into six product types by who produces the content, and every media product — regardless of type — runs the same two-sided, often three-sided, **value-creation exchange**. The material then works through common creator, consumer, and advertiser problems and solutions, and closes with three full case studies — Traditional Publishers, Reddit and Communities, and Short-Form Video — that show the segmentation-to-problems-to-solutions method applied end to end.

{{DIAGRAM:0}}

## The six media types, by producer

Media divides into six types based on who produces the content:

- **Studios** — Netflix, Disney, HBO, CBS, Peacock, YouTube TV
- **Traditional publishers** — the New York Times, the Economist, the Wall Street Journal, Yahoo
- **Music, podcasts, and audiobooks** — Spotify, iTunes, Podcast apps, Audible, YouTube Music
- **Individual creators** — Instagram Reels, TikTok, YouTube, X (formerly Twitter), Threads, Snap, Instagram and WhatsApp, Substack, Medium
- **Communities** — Reddit, Facebook Public Groups, LinkedIn
- **Friends and family** — the Facebook Feed and Stories, Instagram Stories, WhatsApp Status

## Value creation processes (the shape every media product shares)

Two parallel exchange loops run through any media product. In the first, the **provider** — the platform plus its creators — sends media, content, or other value to the **consumer**; the consumer pays back with money, time, signals, or contact information, since attention and data are payment too, not just cash. In the second, the provider, the platform itself, sends **advertising** — defined by an ad unit made up of the user, the ad slot, the creative type, and the action — to the **advertiser**, who pays back with money.

{{DIAGRAM:1}}

> This two-loop structure is the reason almost every media product ends up designing for three constituencies — creators, consumers, and advertisers — even when only one of them is paying cash.

## Background: media produced by communities

**By Community**: creators are admins and moderators who create a group or subreddit and bring a community together to contribute content valuable to a much larger community. Admins don't create all the content themselves; they bootstrap it and inspire others to create and moderate it. Communities are organized around topics or interests with policies on allowed content enforced by moderators, and formats range from blog posts and links to text, images, and video. Interactions happen in common threads, and the thread itself is often as valuable to the community as the primary post — Q&A-type posts become an invaluable knowledge base over time. Consumers discover communities through home feed content or recommendations, typically subscribe or join, and then get content from the subscribed community in both the home feed and the community page directly. **Engagement runs along a spectrum**: passive consumer → engaging with others' content → creating content → earning status within the group.

## Background: traditional publishers and creators

**By Traditional Publishers**: creators are the traditional newspapers that came online, such as the New York Times and the Economist, plus other papers and magazines. These companies have journalist and writer teams producing real-time content daily, mostly text with some image or video, bundled up; some sell subscriptions while others monetize via advertising in the form of display, video, or sponsored content. Blogs and newsletters can be run by one person or a small team, typically monetized by subscription. Consumers visit sites regularly or subscribe to have content hit their inbox — a **pull versus push** model. People have strong biases toward specific publishers, bookmark them, and revisit multiple times a day. Advertising is primarily display ads, and the smaller the publication, the more likely it relies on an ad network. Newsletters use both subscription and advertising models, and top newsletter ad slots sell out far in advance. **Freemium** is common, with some content free and the rest paywalled.

**By Creators**: individuals share content around their **unique personal monopoly**, the intersection of passion, skill, and need, spanning wide topics like beauty or fitness down to niche ones like "how to be a ghost writer." They want to build an audience both for distribution of individual pieces and for stickiness through followers, and they choose platforms by media-type fit — LinkedIn or X for text, Instagram for photos, TikTok or YouTube for video. Most creators focus on one or two platforms that feel native to their content and the minor personal monopolies they want to establish, and ultimately they want a career and monetization opportunities that let them make a living. Consumers want to consume interesting content either by following specific creators and consuming all their content, or by discovering interesting content through recommendations. Instagram and Twitter created the **follow model**, while TikTok popularized the pure **recommendations model**. Consumption happens through an infinite scrolling feed of following-plus-recommended content, intentional discovery happens via surfaces like explore, trending, and search, and deep dives happen through creator profiles.

## Background: studios and the four entities competing for the living room

**By Studios**: content is produced by studios with large teams and bundled into channels or services. Channels have a target audience, a content strategy, and a cohesive personality. Content takes the form of series such as drama, comedy, action, kids, and family, personality shows such as standup and opinion programming, and live sports and movies. Shows start with a pilot and, if they perform, get long-term season contracts. Successful series have high lifetime value since they're binge-watched for a decade after the show ends, and live sports plus new mega-hit series drive paid subscribers who then stay for the back catalog. Studios have huge back catalogs and invest heavily in new content, and channels distribute through cable and dish bundles, standalone streaming services, and streaming bundles. Consumers primarily consume studio content on large screens — TVs, laptops, and monitors — for a lot of time per day, with strong affinity to specific shows. Consumption is primarily on-demand instead of scheduled programming, binge-watching series instead of staggered weekly episodes, and switching channels after each series rather than every hour. Purchase decisions are tied to a specific show, and churn is tied to lack of interesting series to continue binging; there is lots of content but it's harder to decide what to watch, and consumers are tired of too many subscriptions, since fragmentation of content across streaming services is a real pain point.

Four distinct entity types compete for the same living room:

- **Traditional TV Studios** — HBO, Disney, CBS, Peacock, Fox, Paramount+ — run the machine that produces new content, with huge back catalogs and live sports contracts already in place.
- **Tech Companies** — Apple TV+, Netflix, Amazon, YouTube TV, Hulu — started by licensing back catalog and now pay for original content, leaning on technology and distribution advantages.
- **Cable and Dish players** — AT&T, Verizon, Warner Media, Xfinity, Dish Network — started as a pure distribution play and are now buying up studios and content as a hedge, while owning the physical connections into people's homes.
- **Streaming Bundles** — FuboTV, DirecTV Stream, YouTube TV — are streaming-distribution services layered on the internet that bundle TV studio content and undercut cable and dish on price.

## Common problems and solutions, by constituency

**Creator problems** cluster into four buckets:

- **Creation** — what will work on this platform and audience, how to create great content, how to scale creation — solved through formats such as articles, text posts, images, reels, and infographics; inspiration such as trending topics, templates, and remix tools (Facebook's Post Composer prompts by inspiration type, background, feelings, GIFs, and life events; Instagram Reels' composer templates for Recommended, Rediscover, and Trending); tools such as composers, templates, AI editing tools, and insights (Instagram Reels' "Made For You" auto-creates reels from your camera roll; LinkedIn Analytics gives a content summary, post performance, post details, and community demographics); and workflows such as scheduling and planning, drafts, collaboration, and cross-platform editing and sharing, as seen in Substack and Buffer's scheduling tools.
- **Distribution** — how to get more reach and more followers — solved through account, channel, group, or subreddit recommendations; content, related-content, and chaining recommendations; on- and off-platform sharing; recommendation signals and SEO via tags and topics; partnerships and collaborations with other creators; ads such as boosting or promoting posts; and profile or account promotion, as seen in Substack's account and publication recommendations, LinkedIn's people and group recommendations, Reddit's recommendations with explanations, and cross-platform share sheets on Substack, LinkedIn, and Facebook or Instagram.
- **Monetization** — how the creator and their team make a profitable living — solved through ad revenue share (YouTube and X/Twitter revenue-sharing payouts); subscriptions such as newsletters and gated content (Substack paid newsletters, X paid subscriptions); digital products such as courses, guides, and ebooks (LinkedIn on- and off-platform courses); crowdfunding, gifts, and tipping (Instagram gifts); sponsorships such as brand deals, product placement, and affiliate links (Instagram's brand-partnerships flow of creator marketplace, partnership messages, and tagging brand partners); consulting and coaching (LinkedIn Topmate, X intro calls); paid events; and licensing.
- **Community** — how to connect with followers more deeply and how to avoid getting harassed on the platform — solved through AMAs, live sessions, DMs, channels, comments, and events; algorithmic systems; account safety features like reporting, blocking, and removing followers; comment moderation such as deleting, reporting, and keyword filters; and security features like two-factor authentication and recovery flows.

**Consumer problems** cluster into four buckets:

- **Discover Content & Creators** — how to automatically get content that only matches interest, find content and creators that match interest, and not miss great content from people the user cares about — solved through onboarding flows; content discovery via explore, trending, feed recommendations, related content and chaining, and topics or hashtags; account discovery via feed recommendations, profile recommendations, and search; and account or channel following, profiles, collections, and notification subscriptions.
- **Consumption Experience** — how to consume intuitively, share, engage, give feedback, consume from any device seamlessly, not lose one's place in content, find related content, and go back to content liked before — solved through app navigation; feed structure (formats and bundles); feed navigation (scroll, refresh, navigate back); related content and chaining; consistent on- and off-platform sharing; consistent feedback and popularity experiences; engaging comments experiences; cross-device sync; and saves, lists, collections, and auto history.
- **Community & Connection** — how to connect with creators, share favorite content with friends and family, and avoid harassment — solved through following; comments; Ask Me Anything, Q&A, and live sessions; subscriptions and paid events; public-versus-private share flows; algorithmic systems; account safety (report, block, remove followers); comment moderation; and security (two-factor authentication, recovery flows).
- **Identity & Preferences** — how to represent oneself authentically and shape the experience to feel personalized — solved through profile bio, photos, highlights, and interests; a profile feed; content-format and interest-profile frames; implicit inline feedback from "See More/Less"; explicit content curation via following, blocking, and muting; and app-wide experience settings.

**Advertiser problems** cluster into two buckets. **Reach and Performance** asks how to reach more potential customers and how to increase return on ad spend — solved through targeting by audience (affinity, habits, interests, life events, demographics, purchase intent, and data segments such as website or app visitors, customers, and lookalikes) and by content (topics, keywords, placements), plus budgets, bidding and pricing, goals, and creatives (formats, ads, assets). **Workload** asks how to create and manage ad campaigns easily across media formats, products, and catalogs — solved through creatives (ads, assets, landing pages), campaign management, catalog management, analytics, billing, and account management.

{{DIAGRAM:2}}

## Case study 1: Traditional Publishers — segmentation, problems, solutions

The deck segments Traditional Publisher readers on five factors — education, interests, income, age (as a proxy for media format and life stage), and commute — rolling up into six named segments:

- **Catch Up With Current Affairs**: not easy to catch up fast, content looks stale through the day → "everything you need to know today" modules, "since you last checked" modules, topic summary modules.
- **High Income Deep Thinkers**: wants deeper understanding, opposite sides of an issue, low signal-to-noise in long-form content → opinion modules with two writers covering opposite perspectives, op-ed summary views, table-of-contents navigation for long-form content.
- **Young, Curious and Impatient**: content too long and dry, no easy way to explore breadth → video and audio short-form previews, content regenerated in a lighter "younger voice," AI characters or authors, lightweight daily knowledge, fun interactive topic exploration.
- **Deep Interest in Specific Topics**: no easy way to dive deeper, no way to tie concepts to latest examples, no different perspectives → automatically generated topic pages with subtopic navigation, curation by topic, summaries, opinion modules with multiple perspectives, historical-to-current topic views.
- **Commuters Who Drive**: no great audio format for news, hard to control consumption while driving → articles converted to audio, audio summary previews, speech-based controls (topics, preview, skip, repeat, save/note).
- **Parents Who Teach Kids Broader Knowledge**: content not adapted to age groups, no parent curation or co-reading tools → curated topics/posts by age, age-appropriate rewrites, visualization with images and graphics, parental controls, note-sharing between parents and kids.

## Case study 2: Media by Communities / Reddit

On the consumer side, the desire to have a voice, connect with shared-interest communities, learn from others' best practices, hear about others' experiences, and get help with purchase decisions is static across humanity — but the channel is changing. Communities have shifted online and are growing exponentially; people are more comfortable sharing expertise, experiences, and opinions online, publicly and anonymously; online reputation now carries over to offline reputation; open-source and crowdsourced content generation, as with Linux, Wikipedia, Reddit, and Meta, has become a normal playbook; introverts are more comfortable participating online; community-powered marketplaces such as Facebook Marketplace exist; and people increasingly think search takes too much effort and want direct answers. Media format is shifting toward images and video over text, and there's a growing concern over what information can actually be trusted.

Reddit's own numbers illustrate the strategic bind: **daily active users of 75 million** and **monthly active users of 500 million**, split into US DAU of 37 million and non-US DAU of 37 million — meaning roughly half of DAU is US, but the MAU-to-DAU ratio is low, so users stumble onto the platform but don't come back frequently, with low daily penetration even in the US. Fifty percent of MAU is non-US, and the company is still losing money, roughly **-$100M** in the period discussed and roughly **-$800M cumulative**. Reddit's core use-case buckets are Seeking Information (competes with Google, Amazon, YouTube, Wikipedia, X, news sites, and LLMs like ChatGPT, Gemini, and Anthropic's models), Entertainment (competes with Meta properties, YouTube, Snap, Twitch), Passions & Hobbies (competes with Facebook Groups, Discord, X, Pinterest), and Peer-to-Peer Commerce & User Economy (competes with Facebook Marketplace, Nextdoor, Craigslist, Poshmark, Etsy, Roblox).

Reddit should care about innovating because consumer retention is low — there isn't a base of people intentionally visiting on a regular basis, and the company is effectively burning through a worldwide user base. Admin and power-user ROI and monetization aren't as high as they should be. There's traffic risk, since a large share of traffic comes from search and that traffic could disappear if AI answer engines cannibalize it. There's use-case risk, since info-seeking specifically may get cannibalized by answer engines, meaning Reddit needs to invest in other use cases or shore up strategy for this one. And there's media-format risk and opportunity, since text is falling behind as a media format. Reddit's stated product mission is "**Bringing community and belonging by leveraging new media formats and cutting-edge technology.**" User types on Reddit are Consumers; Creators (Admins, Power users, Businesses); and Advertisers.

Segmentation runs on use case (Entertainment, Education, Interest-based connection, Commerce), interests (Casual/Broad versus Frequent/Loyal Specific Topics), age as a proxy for media type and tone, and geography/language, explicitly flagged as "a go-to-market issue vs. a pure product issue." These roll into five segments:

- **Young Entertainment Users**: too text-heavy, no easy image/video browsing, cold start and discovery problems → video and image tab, audio version of top threads, topic pages by entertainment category, image/video generation from text, better chaining.
- **Hobbyist Education Users**: hard to identify the right communities, no structured browsing, no newbie/expert differentiation, hard to find mentors → communities rated by expertise, community-finder flows, wiki pages, thread/topic rankings, onboarding improvements, AI Q&A bots, weekly highlights, karma scores, admin tools for short-course packages.
- **Passby Education Users**: long threads without summaries, uncertainty over who to trust, language barriers — the deck leaves this cell open, implying the same solution family as Hobbyist and Community: summarization, trust signals, multi-source views.
- **Community Connection Users**: breaking into a new community is intimidating, hard to discover similar interests, trust and status barriers, toxic members → daily/weekly video mixers, mentorship chat groups, direct mentorship programs, connection recommendations.
- **Commerce Users**: hard to find high-quality providers, need trust/reputation scores, want to compare pricing, need payments and guarantees → a marketplace with search and shopping experiences.

## Case study 3: Short-Form Video — context and creator segmentation

On the context side: user-generated video consumption exploded over the last ten years, primarily horizontal historically, but **short-form video adoption has been exponential since 2019**. The long-form video creator ecosystem is well established on YouTube with monetization machines already built, while a new generation of creators is taking over short-form video specifically on TikTok and Instagram Reels. Generative AI will accelerate both the quality and quantity of short-form video content, mobile-first internet adoption opens new audiences, and digital payment rails open creator-monetization opportunities worldwide. On competition, YouTube is synonymous with user-generated video for both entertainment and education and is also used as a search engine, while TikTok and Instagram Reels clearly lead the pure short-form-video space, with Instagram having started later but caught up in key markets. On monetization, long-form video has a well-established, skippable-ads model on YouTube, while short-form video monetization is still in flux, with Instagram Ads and TikTok Shops as the current experiments.

Creator segmentation runs on four questions: do they create long-form video, short-form video, or both; do they have existing large or small audiences; do they have established monetization models; and are they primarily on YouTube or other platforms. Combining these produces a compound segment structure:

- **LFV-Established**: long-form creators with large YouTube audiences (MrBeast, Ali Abdaal, Codie Sanchez) — long-standing monetization, great YouTube distribution, teams to pay against revenue goals.
- **LFV-Emerging**: long-form creators with medium YouTube audiences.
- **SFV-Established**: short-form-native creators with large audiences across platforms.
- **SFV-Emerging**: short-form-native creators with medium audiences across platforms.
- **SFV-Experimenting**: short-form-native creators experimenting on YouTube.

The segmentation prioritization matrix scores each segment on incentive to invest in Shorts now, ability to grow a high-quality Shorts corpus fast, and ability to help with Shorts consumer adoption now. **LFV-Established scores High/High/High** — a huge back catalog convertible to Shorts and a large existing YouTube-familiar audience — making it the clear top-priority segment, ahead of LFV-Emerging (Medium/High/Medium), SFV-Established (High/High/Medium), SFV-Emerging (High/Medium/Medium), and SFV-Experimenting (Medium/Low/Low).

## Case study 3 continued: prioritizing the top segment's problem

The deep dive on LFV-Established identifies the higher-order jobs this group is trying to do: create content in the platform's format, ensure content resonates, get distribution for viewers and for followers, build deeper connection, and earn a living through monetization. The named problems are Content Creation Effort (too much effort to create additional short-form content), Content Performance (short-form content doesn't perform as well as long-form), Distribution-Viewer (less reach than long-form), and Monetization (short-form doesn't monetize as well). Prioritizing against Reach/Creators, Intensity, and Blocker/Keystone puts **Content Creation Effort at High/High/High**, "important and urgent" — the clear top pick, ahead of Content Performance (High/High/Medium) and well ahead of Distribution-Viewer (Medium/Medium/Low) and Monetization (Low/Low/Low, "important but not urgent").

The problem expansion on Content Creation Effort surfaces four sub-problems: creators have a lot of long-form content that could be edited into short-form but it requires manual work; they need to identify portions that could stand alone as short-form; they need to identify portions that could be stitched together; and they need to figure out what music, speed, visual, and caption changes to make. The chosen solution direction is "**Tools to Convert LFV to High-Performing SFV**," ahead of two lower-priority alternatives: Tools to Create Native SFV, and Tools to Debug SFV Performance.

{{DIAGRAM:3}}

The concrete solution pipeline for the chosen direction runs five steps: **Chopping** (a tool to process long-form video and generate a list of short-form clip candidates), **Curating** (a human review tool to curate the most promising clips), **Human Input to Visual Effects** (a human editing tool to mark up input for the generative AI tools), **Auto Visual Effects** (generative AI tools that add music, imagery, captions, and speed effects per short-form best practices), and **Human edits and approvals** (final editing tools for humans before publishing).

## Summary — products by theme/segment

The deck's own closing table pairs each theme and segment with a chosen product direction. For **Creators**, LFV-Established creators on YouTube get automated AI tools to convert long-form video into high-performance short-form clips, while SFV-Established creators on other platforms get contests, leaderboards, and trending experiences. For **Consumers**, users with high YouTube engagement but low Shorts engagement get better recommendation systems, while users with low engagement on both — the "TikTok Generation" — get an entirely new app for shorts. For **Advertisers**, large brand advertisers get AI tools that convert standard-format creative to short-form-video creative, while large direct-response advertisers get new ad formats to improve ad performance.`,
takeaways:["Media splits into six producer-defined types (Studios, Traditional Publishers, Music/Podcasts, Creators, Community, Friends & Family), but every type runs the same two-loop value exchange: Provider↔Consumer (content for money, time, signals, data) and Provider↔Advertiser (ad inventory for money) — which is why almost every media product needs to design for three constituencies even when only one pays cash.","Creator problems cluster into Creation, Distribution, Monetization, Community; Consumer problems cluster into Discover, Consumption Experience, Community & Connection, Identity & Preferences; Advertiser problems cluster into Reach & Performance and Workload — this three-constituency, problem-cluster grid is a reusable scaffold for any media product-thinking prompt.","The method, demonstrated three times across Traditional Publishers, Reddit/Communities, and Short-Form Video: pick a small number of segmentation factors, derive named segments, map segment-specific problems, design segment-specific solutions, and — for SFV — further prioritize which problem to solve first using a Reach/Intensity/Blocker matrix.","Reddit's own numbers illustrate a real strategic bind: DAU 75M/MAU 500M with 50% non-US MAU and still losing roughly $100M a year, facing real risk that AI answer engines cannibalize its core seeking-information use case — a concrete example of why media-format risk and traffic risk matter as first-class product-strategy inputs, not afterthoughts.","The SFV case study's solution pipeline — Chopping, Curating, Human Input to Visual Effects, Auto Visual Effects, Human edits and approvals — is a template for any 'convert format A to format B at scale' product: split the pipeline into an automatable core wrapped in human curation and QA at both ends."],
cards:[{q:"What are the two value-creation loops that run through every media product, and what does each side exchange?",a:"Provider (Platform + Creators) ↔ Consumer: content in exchange for money, time, signals, and contact information. Provider (Platform) ↔ Advertiser: advertising inventory in exchange for money. Together they explain why media products almost always need to design for three constituencies — creators, consumers, advertisers."},{q:"What are the four problem buckets for Creators, and the four for Consumers, in a media product?",a:"Creators: Creation, Distribution, Monetization, Community. Consumers: Discover Content & Creators, Consumption Experience, Community & Connection, Identity & Preferences."},{q:"In the Traditional Publishers case study, what solution does the deck propose for the 'Commuters who drive' segment, and what two problems does it solve?",a:"Convert articles into audio-format content with an audio summary as a preview, plus speech-based controls for navigating content (topics, preview, skip, repeat, save/note) — solving both 'no great audio format for news' and 'hard to control the consumption experience while driving.'"},{q:"Why does the deck say Reddit specifically needs to innovate, beyond generic growth pressure?",a:"Four named risks: low consumer retention (users stumble onto the platform but don't return regularly), low admin/power-user ROI on monetization, traffic risk (heavy reliance on search traffic that AI answer engines could cannibalize), and media-format risk (text is falling behind as a format) — on top of Reddit's own numbers showing it's still losing roughly $100M a year despite 500M MAU."},{q:"In the Short-Form Video case study, which creator segment did the prioritization matrix rank highest, and what was the chosen top-priority problem and solution direction for that segment?",a:"LFV-Established creators (large YouTube audiences, e.g., MrBeast/Ali Abdaal/Codie Sanchez) ranked highest on Incentive/Speed-to-Corpus/Consumer-Adoption. Within that segment, 'Content Creation Effort' (too much manual work to create additional SFV) was prioritized as the top problem, with 'Tools to Convert LFV to High-Performing SFV' chosen as the solution direction over native-SFV-creation tools or SFV-performance-debugging tools."},{q:"What five-step pipeline does the deck propose for converting long-form video into short-form video at scale?",a:"Chopping (auto-generate a list of candidate SFV clips from LFV) → Curating (human review to pick the promising clips) → Human Input to Visual Effects (human editors mark up input) → Auto Visual Effects (Gen AI adds music, imagery, captions, speed effects) → Human edits/approvals (final human pass before publishing)."}]},
{id:"intv-20",track:"intv",title:"Theme 2: Marketplaces — The Middlemen Making Connections",min:17,
body:`Satish Mummareddy frames Theme 2 as "the middlemen making connections." A marketplace's job is narrower and cleaner than media's: **connect people willing to pay for a product or service (Demand) with people or businesses that can provide it (Supply), without holding any inventory**. A variant exists where the marketplace itself combines multiple suppliers' services into one bundle — food delivery, grocery delivery, travel bundles, and fulfillment-by-Amazon all bring two or more supplier types together and combine their services rather than just connecting two parties directly.

{{DIAGRAM:0}}

## The eight marketplace types

- **Local** — Yelp, ZocDoc, Thumbtack, OpenTable, Tripadvisor
- **Ecommerce** — eBay, Facebook Marketplace, Etsy
- **Real Estate** — Redfin, Zillow, Realtor.com
- **Short Term Rentals** — Airbnb, VRBO
- **Transportation** — Uber, Uber Freight, Lyft
- **Travel** — Kayak, Expedia, Hotels.com
- **Jobs** — Upwork, LinkedIn, Indeed
- **Dating** — Tinder, Match, Bumble

## Value creation process and core value proposition

The value creation loop runs: the **provider** — platforms plus businesses, sellers, drivers, or restaurants-and-drivers — sends a service or goods to the **customer**, who may be a consumer, business, or advertiser; the customer pays back with money, time, signals, or contact information. The deck explicitly notes that "**non-money can be leveraged into money**," meaning time, attention, and data payment convert to revenue indirectly.

Six core value-proposition levers recur across every marketplace, in some combination:

- **Selection** — increasing selection by aggregating fragmented supply, and creating or curating differentiated supply previously unavailable
- **Improving trust** — via standardized signals, incentive design, and support
- **Connecting and transacting** — with service providers via integrations and tools
- **Lowering price** — through transparency, economies of scale, and new services
- **Delivering faster** — via process innovation and economies of scale
- **Reducing friction** — by bundling services from multiple suppliers

{{DIAGRAM:1}}

Each of the eight marketplace types leans on a different mix of levers. Local marketplaces connect people with local businesses, driving lead generation through Selection, Trust, Connection, and Transaction. Ecommerce marketplaces connect people with online sellers, driving lead generation and transactions through Selection, Trust, and Transaction. Real Estate marketplaces connect home buyers with sellers, driving lead generation through Selection, Trust, and Connection. Short Term Rentals connect travelers with home renters, driving transactions through Differentiated Selection, Trust, and Transaction. Transportation marketplaces connect riders with drivers, driving transactions through Speed & Transparency, Transaction, Differentiated Supply, and Trust. Travel marketplaces connect travelers with airlines, hotels, and car rental companies, driving lead generation and transactions through Selection and Transaction. Jobs marketplaces connect employers with job seekers, driving lead generation through Selection and Connection. Dating marketplaces connect two people looking for a relationship, driving lead generation through Selection, Trust, and Connection.

> Trust appears in nearly every marketplace type's value proposition, making it the one lever almost no marketplace can skip — while Speed & Transparency is uniquely emphasized for Transportation and Differentiated Selection/Supply is unique to Short Term Rentals and Transportation, a useful diagnostic for "which lever matters most here" in an interview prompt.

## Demand-side problems and solutions (four buckets, in funnel order)

- **Selection**: does the platform have what the demand-side user wants — and things they didn't even know about but would love? Solved through sales enablement, piggybacking, referrals, affiliates, subsidies, direct supplier value, SEO, community, and self-serve or white-glove supplier onboarding.
- **Finding**: can the user find things easily, discover options, confirm availability and service area? Solved through onboarding flows; search with suggested searches, filters, and contextual filters; explore and discovery; influencers for discovery (e.g. "Yelp Elites"); menus; service areas; availability.
- **Trust**: how does the user know quality, whether the product matches the listing, and whether they can trust this person or business? Solved through ratings and reviews, badges, background checks, verification, ranking signals, return/refund policies, insurance, and real-time tracking and support.
- **Purchase**: can the user shortlist, learn more, transact, track, handle a bad experience, and share their experience? Solved through saves and shortlists, messaging and call scheduling, project-detail flows, menus and pricing, transaction integrations, order tracking, returns/refunds, reviews, tips, and virtual try-ons.

## Supply-side problems and solutions (five buckets)

- **Profile, Business Page, or Storefront**: how does the supplier represent themselves authentically, share products/services, set expectations, stay reachable, and share reputation? Solved through business details, menu/catalog management, product details, hours, service areas, business rules, contact mechanisms, ratings, verifications, personal interests.
- **Traffic**: how does the supplier get enough potential customers and move them toward conversion? Solved through supply-driven growth, performance marketing, viral loops, referrals, SEO, search rankings, related recommendations, profile/search-page optimizations, and lead-qualification forms.
- **Connection/Transaction**: how does the supplier connect with customers, get purchases directly, and allow booking? Solved through messaging-app, email, CRM, and calendar integrations, plus transaction systems.
- **Fulfillment**: how does the supplier manage inbound requests, fulfill orders, handle returns, and get paid on time? Solved through order management, packing, shipping, tracking, delivery, returns, payments receivable, taxes, and order support.
- **Trust & Reputation**: how does the supplier keep their reputation accurate, trust their customers, and deal with bad customer behavior? Solved through demand/customer ratings, insurance, support, and appeals.

{{DIAGRAM:2}}

## Advertiser problems and solutions

Marketplaces follow the same two-bucket pattern as the Media theme: **Reach & Performance**, solved through targeting by audience — affinity and habits, interests, life events, demographics, purchase intent, and data segments like website or app visitors, customers, and lookalikes — and by content — topics, keywords, placements — plus budgets, bidding, pricing, goals, and creatives; and **Workload**, solved through creatives (ads, assets, landing pages), campaign management, catalog management, analytics, billing, and account management.

## Case study: Real Estate / Redfin — context and motivation

On consumer trends: finding a house that fits your budget and taste is "a soul-sucking experience"; high interest rates have cooled the housing market; private-equity firms are buying up single-family homes and apartment complexes; return-to-office is pushing renewed house-buying; and the standard 6% realtor commission has been voided and is now negotiable, raising an open question of whether this changes realtor usage patterns. On technology trends: AR/VR headsets are getting better and cheaper, and AI is taking off for image and scene matching and generation. On competition: direct real-estate competitors include Redfin, Zillow/Trulia, Realtor.com, and Opendoor, plus a newer threat class of private-equity firms buying up single-family-home inventory directly.

**Redfin's motivation to innovate**: realtor commissions are now negotiable and cut into Redfin's own value proposition; the housing market risks fragmenting further as private-equity purchases continue; and AI will redefine the buying and selling user experience, so Redfin needs to get ahead of these shifts rather than react to them. Redfin's product mission is "**Make real estate buying and selling consumer friendly.**"

## Redfin — demand-side segmentation

Demand-side (home buyer) segmentation runs on primary home versus investment, first-time buyer versus repeat buyer, and life stage — expanding or contracting household — producing four named segments:

- **First Time Home Buyers**: younger, looking to stop renting, lower budgets and down payments; don't know what their real needs are and don't understand the buying process.
- **Families Upsizing**: more affluent, may have kids, more budget and down-payment ability; clearer mental model of housing needs and the buying process, know exactly what help they need.
- **Casual Real Estate Investors**: extra savings to invest, open to locations across the country; may not be as knowledgeable about the investment market, potentially need portfolio help.
- **Seniors Downsizing**: kids out of the house, don't need a large home; want to reinvest real estate money into other liquid assets, may stay or relocate somewhere cheaper.

## Redfin — deep dive: Casual Real Estate Investors
