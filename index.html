{id:"intv-25",track:"intv",title:"AR/VR: Two Hardware Races, Two Value Ladders",min:9,
body:`Satish Mummareddy frames this theme as "**enhancing the world and how we interact with it**." Unlike verticals with one clean customer-jobs list, AR and VR are **two separate hardware races** — VR headsets versus AR glasses/wearables — each racing toward its own **ladder of value propositions**, and the deck's own structure mirrors that split: hardware evolution tables for each, followed by a value-proposition list for each. Example product types the deck calls out: for AR, assistants and spatial computing; for VR, games, experiences, and communication & community.

## Two definitions of the same terms — technical and customer-centric

The deck deliberately gives two framings, because interview answers should be able to speak in both registers.

- **Virtual Reality (VR), technical:** immersive experiences that isolate the user from the real world, usually via a headset device and headphones designed for such activities.
- **Augmented Reality (AR), technical:** designed to add digital elements over real-world views, with limited interaction.
- **Mixed Reality (MR), technical:** combines AR and VR elements so digital objects can interact with the real world; businesses can design elements anchored within a real environment.
- **Virtual Reality, customer-centric:** experiencing an alternate reality than you physically are in.
- **Augmented Reality, customer-centric:** experiencing the current world in a richer manner.

## VR hardware evolution — four dimensions tracked across the same seven headsets

The deck tracks the same lineup of headsets — Oculus Rift, Oculus Rift S, Oculus Go, Oculus Quest, Oculus Quest 2, MetaQuest 3, and Meta Quest Pro — across **four generational improvement axes**. This "same products, evolving spec sheet" structure is itself an interview-answer pattern: hardware category maturity shows up as steady improvement along a fixed set of axes.

{{DIAGRAM:0}}

On the **tethered-to-standalone** axis (device type, weight, storage, RAM):

- **Oculus Rift**, released March 27, 2016 — PC-powered, weighed 470g, with external PC storage and RAM.
- **Rift S**, May 20, 2019 — also PC-powered, weighed 590g, with external PC storage and RAM.
- **Oculus Go**, April 30, 2018 — standalone, weighed 468g, with 32/64 GB storage and 3 GB RAM.
- **Oculus Quest**, May 20, 2019 — standalone, weighed 571g, with 32/64/128 GB storage and 4 GB RAM.
- **Quest 2**, October 12, 2020 — standalone, weighed 503g, with 128/256 GB storage and 6 GB RAM.
- **MetaQuest 3**, October 9, 2023 — standalone, weighed 515g, with 128/512 GB storage and 8 GB RAM.
- **Meta Quest Pro**, October 24, 2022 — standalone, weighed 722g, with 256 GB storage and 12 GB RAM.

**Displays** get better across the lineup: the Rift used two AMOLED displays at 1080×1200 at 90Hz; by Quest 2 it's two LCD panels at 1832×1920 at 120Hz; MetaQuest 3 pushes to 2064×2208 at 120Hz; and Meta Quest Pro uses two QLED panels at 1800×1920 at 90Hz.

**Passthrough technology** gets better: the Rift had none. By Quest and Quest 2 it's grayscale via tracking cameras. MetaQuest 3 and Meta Quest Pro moved to dual 18 PPD color passthrough cameras and color passthrough.

**Controllers and tracking** get better: controller weight fell from 168g on the Rift to 103g on the MetaQuest 3. Hand tracking went from "No" on the Rift, Rift S, and Go, to "Yes (via update)" on Quest, "Yes (Native)" on Quest 2 and MetaQuest 3, and "Yes (Advanced)" on Meta Quest Pro. Eye tracking stayed "No" until Meta Quest Pro, which added "Yes (Advanced)."

**Vision Pro** gets a standalone callout as "the most advanced headset but expensive" — the deck's shorthand for the current ceiling of what VR/MR hardware can do, at a price point outside the mainstream consumer race.

## VR value proposition — seven use cases, with named examples

The deck names **seven VR value propositions**, each anchored by concrete product examples:

- **Immersive Games** — Beat Saber, Population: One, The Walking Dead: Saints & Sinners, Vader Immortal, Pistol Whip, Myst, Onward, Moss, and Eleven Table Tennis. The deck's "Top 10 Apps for Each Headset" table also lists platform-specific hits like Robo Recall, Lone Echo, Superhot VR, and Job Simulator on Rift/Rift S, and Netflix, YouTube VR, VRChat, Wander, and Skybox VR Player on the Go.
- **Virtual Social Worlds** — TWICE Square, a K-pop fandom destination with mini games and voice chat; Fashion Klossette, a virtual fashion-icon world; and Theme Park Tycoon 2, for building and designing theme parks with friends.
- **Fitness Experiences** — workouts and movement apps built for headset tracking.
- **Movie Theater & Live Arena Experience** — shared virtual venues for watching sports or movies together.
- **Virtual Meetings** — avatar-based collaboration spaces.
- **Immersive Training** — exemplified by a worker in a headset practicing on physical equipment, shown in the deck as aircraft engine maintenance.
- **Immersive Prototyping** — teams reviewing 3D spatial mockups together inside VR.

> The deck's own structure is the answer template: for any "design an AR or VR product" prompt, first place the idea on a hardware race, then place it on that race's value ladder.

## AR hardware evolution — cameras, storage, battery, and now AI

The deck runs the same comparison-table pattern for AR wearables, comparing **Ray-Ban Stories**, released September 9, 2021, against **Meta Smart Glasses / Ray-Ban Meta**, released October 10, 2023.

- **Ray-Ban Stories:** dual 5MP cameras, 2592×1944 px photo resolution, 1184×1184 at 30fps video resolution, 4 GB internal storage, up to 6h standby / 3h active battery life, weighed about 50g, and used the **Facebook Assistant**, focused on social-media/FB tasks.
- **Meta Smart Glasses:** upgraded to a 12MP camera, 4032×3024 px photo resolution, 1080p at 30fps video resolution, 32 GB internal storage, up to 8h standby / 4h active battery life, weighed about 45g, and use the **Meta Assistant**, powered by **Meta AI**.

{{DIAGRAM:1}}

The addition of a real, general-purpose **AI voice assistant** between the two generations is the pivot point the deck flags — AR glasses moved from "camera + audio accessory" to "**AI assistant with eyes**." Other devices noted in the same category: the Limitless-style **AI pendant**, described as "the world's most wearable AI," and **AirPods with Personalized Spatial Audio** — both examples of the wearable-form-factor race extending beyond glasses.

## AR value proposition — seven use cases, anchored on "an assistant that can see and hear everything you can"

The deck names **seven AR value propositions**:

- **An assistant that can see and hear everything you can** — multimodal AI use cases shown in the deck: "How do I make this sauce?" (step-by-step instructions from what the camera sees), "Look and write a caption for this photo" (creative recommendations), and "Look and tell me the history of this building" (ambient learning about surroundings).
- **Infinite Memory and Recall** — capturing what you saw or did for later retrieval.
- **Capturing moments while living them** — hands-free photo/video capture without pulling out a phone.
- **Sharing what you are seeing in real time** — live point-of-view sharing.
- **Open ear audio that lets you be present** — audio that doesn't block ambient sound, unlike earbuds.
- **Communicating with people while being present** — calls and messaging without looking down at a screen.
- **Accessing and controlling your phone** — the glasses acting as a remote control/notification surface for the phone in your pocket.

{{DIAGRAM:2}}

## Two ladders, not one — why the split matters for scoping

Because VR and AR are separate hardware races with separate value ladders, an interview answer that treats "AR/VR" as one undifferentiated category will read as unstructured. VR's seven value props (games, social worlds, fitness, theater/arena, meetings, training, prototyping) sell **immersion into an alternate reality**; AR's seven value props (assistant, memory/recall, capture, real-time share, open-ear audio, presence-communication, phone control) sell **enrichment of the reality you're already in**. A useful scoping question for any new idea is which hardware race it belongs to, and then which rung of that race's ladder it climbs.

{{DIAGRAM:3}}

## The honest auto-finance connection — thin, and worth saying so

This theme's tie to auto-finance is genuinely the weakest of the batch, and forcing one would misrepresent the material, so it's worth staying honest rather than stretching it. The clearest existing touchpoints sit in **adjacent categories, not lending itself**: dealership showroom AR configurators that let a shopper see trim and color options on a physical vehicle, or AR damage-assessment tools some insurers use for claims. Those are retail and insurance use cases.

Within lending specifically, the more plausible near-term link is the AR value proposition of "**an assistant that can see and hear everything you can**" applied to a paperwork moment rather than a virtual-world moment — for example, a borrower photographing a loan document or window sticker through AR glasses and getting an instant explanation of financing terms, the same "look and understand" pattern as the sauce-recipe example above. That's a plausible **five-years-out UX pattern**, not something with product-market fit today, and it should be named as speculative rather than presented as an existing use case.`,
takeaways:["AR/VR splits into two separate hardware races (VR headsets, AR wearables) each racing toward a distinct value-proposition ladder — the deck's own structure (hardware tables, then value-prop lists, for each) is the answer template for an \"AR or VR product\" interview prompt.","VR hardware improves along four tracked axes across the same headset lineup: tethered→standalone, better displays, better passthrough, better controllers/tracking — use \"which axis does this idea push?\" as a scoping question.","AR hardware crossed a real inflection point between Ray-Ban Stories (2021, camera+audio accessory) and Meta Smart Glasses (2023, camera+audio+genuine AI assistant) — the value unlock is multimodal AI, not just better optics.","VR's seven value props (games, social worlds, fitness, theater/arena, meetings, training, prototyping) and AR's seven value props (assistant, memory/recall, capture, real-time share, open-ear audio, presence-communication, phone control) are two different customer-need ladders — don't conflate them when scoping a product idea.","This theme's tie to auto-finance is genuinely thin; the honest connection is AR-glasses-as-document-explainer, an interesting five-years-out UX pattern rather than a current product opportunity."],
cards:[
 {q:"What are the technical and customer-centric definitions of VR vs. AR, and how do they differ in emphasis?",a:"Technical: VR = immersive experience isolating the user via headset/headphones; AR = adds digital elements over real-world views with limited interaction; MR = combines both, anchored in the real environment. Customer-centric: VR = experiencing an alternate reality than you're physically in; AR = experiencing the current world in a richer manner. The technical definitions describe the mechanism; the customer-centric ones describe the felt experience."},
 {q:"Name the four axes the deck tracks across VR headset generations (Rift → Meta Quest Pro).",a:"(1) Tethered-to-standalone (device type/weight/storage/RAM), (2) displays get better (resolution/refresh rate), (3) passthrough technology gets better (none → grayscale → color), (4) controllers and tracking get better (weight down, hand/eye tracking added)."},
 {q:"What changed between Ray-Ban Stories (2021) and Meta Smart Glasses / Ray-Ban Meta (2023) that the deck treats as the key inflection point?",a:"Camera/photo/video specs and battery life improved incrementally, but the real shift was the voice assistant: Facebook Assistant (social-media-focused) became Meta Assistant, powered by genuine Meta AI — turning the glasses from a camera+audio accessory into an AI assistant with eyes."},
 {q:"List the seven AR value propositions the deck names.",a:"Assistant that can see/hear everything you can, infinite memory and recall, capture moments while living them, share what you're seeing in real time, open-ear audio that lets you be present, communicate with people while being present, access & control your phone."},
 {q:"List the seven VR value propositions the deck names, with one named example product for each where given.",a:"Immersive games (Beat Saber, Population: One), virtual social worlds (TWICE Square, Fashion Klossette), fitness experiences, movie theater & live arena experience, virtual meetings, immersive training (equipment maintenance practice), immersive prototyping (shared 3D spatial mockup review)."},
 {q:"Why is the auto-finance tie-in for this theme deliberately kept short rather than stretched?",a:"Because the genuine touchpoints are in adjacent categories (dealership AR configurators, insurance AR claims tools) rather than lending itself; the one plausible lending-specific pattern — AR glasses explaining loan paperwork the way they explain a recipe — is a five-years-out UX idea, not a current product opportunity, and should be labeled as speculative rather than presented as an existing use case."},
 {q:"What specific weight, storage, and RAM changes mark the jump from the Oculus Rift to the MetaQuest 3?",a:"Weight went from 470g (Rift) to 515g (MetaQuest 3); storage went from external PC storage to 128/512 GB internal; RAM went from external PC RAM to 8 GB internal — the whole device moved from tethered/PC-powered to standalone."},
 {q:"How does passthrough technology evolve across the VR headset lineup?",a:"The Oculus Rift had no passthrough (N/A). Quest and Quest 2 added grayscale passthrough via tracking cameras. MetaQuest 3 and Meta Quest Pro moved to dual 18 PPD color passthrough cameras with full color passthrough."},
 {q:"What is Vision Pro's role in the deck's VR hardware narrative?",a:"It gets a standalone callout as \"the most advanced headset but expensive\" — the deck's shorthand for the current ceiling of what VR/MR hardware can do, positioned outside the mainstream consumer price race."}

{id:"intv-26",track:"intv",title:"Portal to the Internet: The Four-Layer Stack",min:10,
body:`Satish Mummareddy frames this theme as "**H/W, OS, Browser, Search**" — the stack of products that sit between a person and everything else on the internet. Example product types: **Consumer Hardware** (laptops, phone, watch, glasses, health trackers, AR/VR), **Consumer Platforms – Operating Systems** (Windows, Mac, iOS, Android), **Consumer Platforms – Browsers** (Chrome, Safari, Firefox, Arc), and **Search** (Google, Microsoft, Perplexity, YouTube, TikTok). The deck's central question, asked explicitly, is: "**What value was captured and by whom in the last 30 years?**" — and it answers it with a four-layer stack diagram, layer-by-layer economics, then a historical walk through market-share wars at each layer.

## The stack

The stack, from top to bottom: **Native Apps, Search, and Web Apps** sit at the top layer; below that is the **Browser**, which provides access to web apps; below that are **Operating Systems**, providing I/O and a platform for native apps; and at the base is **Hardware**, the physical interface for computing power and apps. Each layer sits on top of the one below it and has captured a different proportion of internet-economy value over the last 30 years — that's the deck's organizing thesis, and each subsequent slide walks one layer's "what value was created / who captured it" pair.

{{DIAGRAM:1}}

## What was created and who captured it, layer by layer

At the **Consumer Hardware** layer, value was created across desktops, laptops, phones, tablets, watches, games & AR/VR, eReaders, and home devices:

- **Desktops and laptops**: captured by Dell, Lenovo, and Apple
- **Phones**: Samsung, Huawei, and Apple
- **Tablets**: Apple and Samsung
- **Watches**: Apple, plus some other hardware makers
- **Games & AR/VR**: Microsoft, Sony, Nintendo, and Meta
- **eReaders**: Amazon
- **Home devices**: Google, Amazon, Apple, and Roku

At the **Operating Systems** layer, value was created across Desktop OS, Mobile OS, the application ecosystem, search ads revenue, and ads revenue:

- **Desktop OS**: captured by Microsoft, Apple, Redhat, and Ubuntu
- **Mobile OS**: Apple and Google
- **App ecosystem**: Apple and Google
- **Search revenue**: Google, Microsoft, and Apple
- **Ads revenue**: Apple and Google

At the **Browsers** layer, value was created via browsers themselves, search & nav merging, and internet traffic distribution:

- **Browsers**: captured by Google, Apple, and Microsoft
- **Search**: Google and Microsoft
- **Traffic distribution**: Google and Microsoft

At the **Search** layer, value was created via information/research, medical search, visual shopping, digital products, local services, personal assistant, and news/entertainment/exploration, with ads monetizing all of the above:

- **Info-seeking and research**: captured by Google
- **Commerce**: Amazon and Google
- **Local**: Google and Yelp
- **News/entertainment**: Google and media companies
- **Vertical search**: Yelp and others

## 30 years of high-level trends

**Internet user growth**: penetration is now high, roughly 5B people worldwide, up from about 1.0B users in 2005 to about 5.4B in 2023, per the deck's chart of internet users worldwide 2005–2023. **Smartphone penetration** reached about 72% of the US population as of the deck's 2021 data point, up from about 20% in 2010. The **browser wars** had four inflection points, each with a named cause. **Desktop OS** settled into a Windows/macOS/Linux duopoly — Windows dominant with slow long-run decline, macOS on a steady multi-decade rise, and Linux/Others flat. **Mobile OS** followed a "**blitzscaling**" pattern — Symbian dominant early, replaced by a rapid iOS/Android takeover, with BlackBerry and Windows Mobile as also-rans. **Search** was a "**bloodbath**" — Yahoo and early players lose share continuously to Google from around 2000 onward.

## Browser wars — four inflections, with named causes

- **1995**: Netscape at 82.77% share loses to Internet Explorer at 93.94%, caused by **Microsoft's distribution strength** (bundled with Windows), Netscape's small feature set, fast IE catch-up, and a costly Netscape rewrite-from-scratch.
- **2002**: IE at its peak of about 93.94% gives way to Firefox rising to 32.90%, caused by acceleration of **web standards** and capabilities, IE diverging from web standards, websites pushing users toward Firefox for a better experience, and **antitrust handcuffs** on Microsoft.
- **2008**: IE and Firefox lose share to Chrome, which rises to 58.4%, caused by the "**appification of the web**," accelerated AJAX adoption, Chrome's faster JS engine and rendering, a threaded browser architecture where tabs could be killed independently, and Google's own distribution.
- **2011**: the rebirth of Safari, rising to 18.10%, caused by mobile growth and iPhone market share, iOS/iPad growth pulling Mac growth with it, Safari being the default browser on iOS/macOS, and no antitrust pressure on Apple/Google for bundling their browsers.

{{DIAGRAM:2}}

By the deck's most recent data point: **Chrome sits at 71.20%**, Safari at 18.10%, Firefox down from its peak, and IE/Edge marginal. The deck's five-bullet summary of "what caused the huge shifts": **distribution advantages, technology shifts, consumer expectations from web apps, antitrust implementation, and strategic blunders**.

## Mobile OS blitzscaling — three inflections

- **2002–2004**: Symbian dominant with Blackberry entering, driven by mobile data plans getting cheaper, Blackberry launching consumer phones, and texting becoming the killer application.
- **2008**: Blackberry gives way to iOS/Android, driven by **touchscreen devices**, mobile apps and app stores, faster and cheaper data plans, and **Android as an open-source OS** letting hardware manufacturers build on it immediately.
- **2008 onward**: consolidation into the **iOS/Android duopoly**, driven by the Google-Apple search deal locking in the iOS search market, and Android OS locking in the rest of the search market via distribution.

## Search engine bloodbath — three inflections

- **2000**: the **Yahoo-Google search deal**, which drove data and traffic to Google and built Google's brand.
- **2004**: the **Google-Firefox search deal** — Firefox stole share from IE/Microsoft, and Google converted that into search share growth.
- **2008**: **Chrome growth**, which stole share from Firefox, reducing reliance on partners, and from IE, further consolidating Google's moat.

The deck's overall diagnosis for what caused the huge shifts in search market share: **strategic blunders by media companies**, browser market-share realignment (IE→Firefox→Chrome), and mobile ecosystem partnerships/realignment.

## Cross-layer causality

The deck draws a direct causal chain across layers: **iPod adoption led to iPhone adoption, which led to iPad adoption, which led to Macbook adoption.** The point is that shifts in one layer of the stack aren't independent — winning a foothold in hardware (iPod) created the installed base and brand trust that let Apple win adjacent hardware categories (iPhone, iPad), which then pulled share into the OS/software layer (Macbook, macOS growth) and ultimately into browsers (Safari's 2011 rebirth, driven by iOS/iPad growth). A **hardware win compounds upward** through the whole stack over enough years.

> Value migrates up the stack toward whoever owns the moment of intent.

{{DIAGRAM:0}}

## Where value is (re)consolidating now, layer by layer

- **Hardware layer**: the phone gets reinvented, earphones become an interface, **AR** — Ray-Ban-style glasses "getting good now" — is a growth area, mixed reality/VR is getting more usable, and wearable devices act as an interface to mobile phones.
- **Browsers layer**: ChromeOS can replace the desktop OS, browsers can replace search, and there's an opportunity for deeper browser+desktop integration.
- **OS layer**: the OS can bypass browsers, the OS can bypass search, and **OS co-pilots** can do more of the work for people.
- **Search layer**, both a risk and an opportunity: reinventing how people experience the internet, assistants and copilots becoming the new interface, and 3rd-party content distribution risk.

{{DIAGRAM:3}}

The deck also lists core technology trends feeding this next wave, not exhaustive:

- **AI**: LLMs, RAG, tool use for LLMs, image/video generation and understanding, audio-to-text and text-to-audio synthesis, avatars with lip sync, translation, embeddings for personalization, LLMs for medical knowledge like MedPaLM
- **Connectivity & infrastructure**: 5G connectivity, IoT, mobile payments infrastructure, low-code/no-code platforms, blockchain, privacy-enhancing computing, edge/distributed computing
- **Emerging interfaces**: robotics, self-driving cars, video conferencing, brain-computer interfaces, spatial computing, AR/VR devices & platforms, and smart contracts`,
takeaways:["The internet stack has four layers (Hardware → OS → Browser → Search/Web Apps), and the deck's central 30-year question — \"what value was created and captured, and by whom, at each layer\" — is a reusable lens for any \"how has this industry evolved\" interview prompt.","Each layer has been won and re-won through repeated market-share wars with identifiable causes: distribution advantage, technology shift, changing consumer expectations, antitrust action, and strategic blunders recur as causes across the browser, mobile OS, and search wars alike.","Cross-layer causality compounds: Apple's iPod→iPhone→iPad→Macbook chain shows a hardware win at one layer can pull share into adjacent layers over a long enough time horizon.","The next wave of value (re)consolidation is about layers absorbing the layer above them — hardware becoming the interface (AR glasses, wearables), browsers/OS trying to bypass search, and AI co-pilots threatening to become the new default interface to \"the internet\" itself.","For auto-finance specifically, the same \"value migrates toward whoever owns the moment of intent\" pattern is repeating one layer up — from general search into vertical car-shopping/financing platforms — which should inform where a lender invests acquisition dollars."],
cards:[
 {q:"What are the four layers of the \"portal to the internet\" stack, from bottom to top?",a:"Hardware (physical interface for computing power) → Operating Systems (I/O and platform for native apps) → Browser (access to web apps) → Native Apps / Search / Web Apps (the top layer, split three ways)."},
 {q:"Name the four browser-war inflection points and their approximate winners.",a:"1995: Netscape → Internet Explorer (Microsoft distribution). 2002: IE → Firefox rising (web standards, antitrust pressure on Microsoft). 2008: IE/Firefox → Chrome (faster engine, threaded tabs, Google distribution). 2011: Rebirth of Safari (driven by iPhone/iPad growth and default-browser status, with no antitrust pressure on Apple)."},
 {q:"What is the deck's explicit cross-layer causality example, and what's the lesson?",a:"iPod adoption → iPhone adoption → iPad adoption → Macbook adoption. Lesson: a hardware win at one layer of the stack can compound upward into adjacent hardware categories and eventually into the OS/software layers above it."},
 {q:"What three drivers explain search market-share consolidation into Google, per the deck's three inflection points?",a:"2000: Yahoo-Google search deal (drove data/traffic, built the Google brand). 2004: Google-Firefox search deal (converted Firefox's IE-share-steal into Google search share). 2008: Chrome growth (stole share from Firefox and IE, reducing reliance on partner distribution and consolidating Google's moat)."},
 {q:"What's the core \"next wave\" risk to the search layer that the deck identifies, and what's the parallel opportunity for OS and browsers?",a:"Risk: assistants/co-pilots and AI reinventing how people experience the internet could bypass search entirely as the default interface. Parallel opportunity: OS can bypass browsers, OS can bypass search, and OS co-pilots can do more of the work for people directly — each lower layer trying to absorb the value currently captured by the layer above it."},
 {q:"What three named market patterns describe the OS, mobile OS, and search layer wars respectively?",a:"Desktop OS settled into a Windows/macOS/Linux duopoly with slow gradual share shifts. Mobile OS followed a \"blitzscaling\" pattern — dominant incumbent replaced by rapid iOS/Android takeover. Search was a \"bloodbath\" — continuous, one-directional share loss from Yahoo and early players to Google."},
 {q:"What five-bullet summary does the deck give for what caused the huge browser-war share shifts?",a:"Distribution advantages, technology shifts, consumer expectations from web apps, antitrust implementation, and strategic blunders."}
]},
{id:"intv-27",track:"intv",title:"Theme 9: Ad Products — Pays the Bills for the Free Stuff",min:12,
body:`Satish Mummareddy frames **Theme 9** with a blunt one-liner: ads "**pay the bills for the free stuff**." Example product types include **general advertising** (Google, Meta, Amazon, Apple, YouTube, TikTok, Snap) and **vertical advertising** (Yelp, Uber, Instacart, DoorDash, Expedia, Kayak, LinkedIn). The deck's organizing thesis is that "**platforms help advertisers connect with potential customers wherever they are**," and it builds the entire theme as a supply chain: what an ad is, how a campaign is built, how ads get delivered (the supply/demand/auction engine), and how advertiser workload gets solved.

## Value creation process

This is a **two-sided marketplace**, the same shape as other theme notes in this vault: the **Provider** (Ads Platform, or Ads Platform plus Publishers) sends a **Service or Goods** (Ads) to the **Customer** (Advertisers), who sends **Payment** (Money) back.

## What ads do for the funnel

Ads help at four distinct stages of the sales funnel:

- **Awareness**
- **Leads**
- **Retargeting**
- **Conversion**

Which stage a campaign targets should be an **explicit, upfront decision** — it changes everything downstream: objective, targeting, creative, and success metric.

## What is an ad? Four components, multiplied together

**Person** plus **Placement** plus **Format** plus **Creative** equals an ad. Each is a separate, independently tunable lever.

- **Person** — who the ad is shown to, defined two ways: **audience-based** (affinity/habits/interests, life events, demographics, purchase intent, data segments like website/app visitors, customers, lookalikes) or **content-based** (topics, keywords, placements they're consuming).
- **Placement** — the surface within the app where the sponsored content appears, for example Facebook Feed, Facebook In-Stream Video, Facebook Marketplace, Facebook Stories, Ads on Facebook Reels, Facebook Search Results, Instagram Feed/Stories/Reels/Explore, Audience Network, or Messenger Stories.
- **Format** — the media format of the sponsored content: **Image Ads** drive people to destination sites/apps via high-quality visuals; **Video Ads** show off product features with sound and motion; **Carousel Ads** hold up to ten images/videos in a single ad, each with its own link; **Collection Ads** are shoppable, customized per-individual product catalog displays.
- **Creative** — the images, video, text, and call-to-action that advertisers add to a chosen format: primary text, headline, description, CTA.

{{DIAGRAM:1}}

## What is an ad campaign? Seven components

**Objective** plus **Placement** plus **Format** plus **Creative** plus **Budget** plus **Bid** plus **Target Audience** — campaign-building extends the four ad components above with three more decisions: how much you'll spend, how you'll bid for the slot, and precisely who you're targeting.

> An ad = Person + Placement + Format + Creative. A campaign = Ad + Objective + Budget + Bid + Target Audience.

## Building a campaign: the Google Ads flow

The **Google Ads setup flow**, walked step by step for an SMB example, runs through nine steps:

- **Goal/Objective** — measurable outcomes such as get more calls, get more website sales/leads, get more visits to a physical location, or get more views/engagement on YouTube.
- **Details of the goal/outcome** — the specific customer action the campaign optimizes for: add items to cart (recommended by **Google Ads Smart Bidding**), schedule an appointment, fill out an information form, request a quote, sign up for a product/service, request contact, complete a purchase, begin checkout, or complete a subscription.
- **Tracking** — Google Analytics or other pixel-based tracking to measure outcomes.
- **Keyword-based Targeting** — choosing the terms customers are searching for on Google, plus Google-suggested additional terms, with the ad also matching previous-search and similar-terms traffic across Google properties.
- **Location Targeting** — advertising near an address, or in specific zip codes/cities/regions.
- **Creative** — headline, description, images added to the ad.
- **Budget** — recommended options such as $4.60/day, $12.60/day (recommended), or $29.90/day, or a self-set budget.
- **Review** — confirming campaign name, goal, website, business name, ad text, headlines, descriptions, images, locations, keyword themes, and budget.
- **Payment** — entering payment details and completing the purchase.

{{DIAGRAM:2}}

## Building a campaign: the Meta Ads flow

The **Meta Ads setup flow**, also walked step by step for an SMB example, runs through thirteen steps. A genuinely distinct step versus Google's flow comes first: a **Campaign Automation Choice** — choose between a "**streamlined / recommended**" auto-optimized setup (preset campaign optimizations, **Advantage+** audience/placements/creative) or a "**manual setup**" campaign built from scratch.

- **Goal/Objective** — Awareness, Traffic, Engagement, Leads, App promotion, or Sales (buying type: Auction).
- **Lead Tool** — how leads get collected, for example Instant Forms.
- **Bid** — how much you're willing to pay per lead, with Meta aiming to spend the entire budget getting the most leads at or near a target cost-per-result.
- **Budget & Schedule** — daily or lifetime budget, start/end date, and budget scheduling for anticipated demand spikes such as scheduled increases during peak periods.
- **Target Audience Automation** via **Advantage+ audience**, where Meta's ad tech automatically finds the audience for the campaign — a potential outcome cited in the deck is **up to 33% lower cost per result**, based on Meta's own experiment data; the manual alternative is setting your own audience controls (locations, age 18–65+, gender, languages, custom audiences).
- **Custom Audiences** built from online and offline activity sources including Website, App activity, Catalog, Customer list, Offline activity, Instagram account, Lead form, Events, Facebook page, Instant Experience, and On Facebook listings.
- **Audience Expansion** via **Lookalike Audiences** — selecting a lookalike source (for example, "opened CCC FB Page"), a location, and an audience-size slider from 1% to 10% of the population, where 1% is the tightest match to the source and higher percentages create a broader but less-precise audience.
- **Detailed Targeting** across three sub-categories: **Demographics** (education, financial/income bands like "top 10% of ZIP codes," life events, parents, relationship, work), **Interests** (business/industry, fitness & wellness, food & drink, hobbies, shopping & fashion), and **Behaviors** (anniversary, mobile device user, consumer classification, digital activities).
- **Placement** — **Advantage+ placements**, where Meta's delivery system allocates budget across placements based on likely performance, versus **Manual placements**, where you choose specific surfaces yourself.
- **Creative Automation & Optimization** via **Advantage+ creative**, which automatically tailors the ad per-viewer — the deck lists concrete mechanics including image template on/off, visual touch-ups, music, 3D animation, text improvements, image filter, and relevant-comments surfacing.
- **Tracking & Measurement** across CRM events, website events, offline events, and URL parameters for campaign source/medium/name/content tagging.
- **Campaign Performance** — a dashboard tracking spend and performance across active campaigns.

{{DIAGRAM:3}}

## Ads delivery: the supply/demand engine

The deck reframes "how do ads actually get shown" as an explicit **optimization problem**: which ads do we show to each individual person at what time, balanced across three simultaneous goals — ensuring relevant ads to the person, maximizing the value of the ad slot, and meeting campaign goals for advertisers.

The business model equation starts simple: **Revenue = Ad Slots × Revenue/Ad Slot** (CPM, cost per thousand impressions). The deck rewrites this in a more mechanistic form: **Revenue = Ad Slots × Ads Performance × Bid for Slot** (willingness to pay). This reformulation is the key interview insight: ad revenue isn't just "more impressions times price" — it's **supply** (slots) times how well the ad **performs** (engagement/relevance) times what the winning advertiser is willing to **bid** for that slot. Growing revenue means pulling one or more of these three levers, and each lever has its own tradeoffs.

{{DIAGRAM:0}}

## Lever 1: Ad Slots / Ads Supply

Three growth sub-levers drive supply:

- **Where** you show ads within an app — surfaces and placements, illustrated with concrete examples like Instagram Home Feed, Stories, Reels, Explore & Search (each shown as a literal grid with an "Ad" tile inserted at a specific position), and a YouTube example across Home Feed, Instream, Watch Next, and Shorts.
- **When** you start showing ads to a person — for example in a Feed, at Position 1/2/3 down the scroll; in Stories, at slide Position 1/2/3; in-stream video, at start-of-video versus X seconds in versus 2X seconds in.
- **What the gap** is between ads — in a Feed, Gap 1 through Gap 4 (how many organic pieces of content separate two ads); in Stories, Gap 2 or "back to back ads"; in Reels, gap-based insertion (a fixed number of organic reels between ads) versus time-based insertion (a fixed time elapsed between ads), both tuned against how long a person actually spends per reel.

The stated design principle for increasing supply is to **personalize** the different dimensions of ad slots on a per-user basis, based on each user's affinity and need for commercial content, on a per-session/organic-content-load basis — supply isn't a single global dial, it's set per person per session.

**Ad Load** is the specific supply metric: the ratio of ads to organic content, measured in a manner native to the specific product surface, since a feed's ad load isn't measured the same way a Stories tray's is. The core tradeoff is **Ad Load / Ad Supply increase versus organic engagement** (time spent / daily active people), with the goal stated at two levels of ambition: **ideal** — increase ad load without hurting organic engagement at all; **realistic** — budget for a tradeoff between ad load increase and organic engagement loss, especially around high-impact launches such as a new placement launch that's allowed to cost some organic engagement in exchange for meaningful new ad supply.

## Lever 2: Ads Performance

Ads Performance is reframed as three questions: which ads do we show to a person at each opportunity, what is the format of the ad, and what is the user experience of the ad?

Signals come from three sources — **on-platform signals**, **off-platform signals**, and **custom advertiser signals** — and three types: **user attribute signals**, **intent signals**, and **conversion signals**.

**Retrieval & Ranking** is a two-part problem:

- **Eligibility** — what ads are allowed to be shown to this person, based on advertiser targeting rules and user signals.
- **Ranking** — what order eligible ads should be shown in, with highest-value ads to the person shown first, where value equals likelihood of engaging with the ad times the value the advertiser is placing on that person.

**Automations** operate across three dimensions — audience, placement, creative — the same **Advantage+** mechanics described in the Meta setup flow, generalized as a category. **Format** uses the same four formats as above (Image, Video, Carousel, Collection), each with its own spec sheet (dimensions, file types, learn-more links) that a real ad platform surfaces to advertisers. The user experience of the ad varies per surface — the deck shows five near-identical creative variants across Instagram Stories/Reels and Facebook Stories/Reels/Messenger Stories, each with placement-appropriate CTA styling.

## Lever 3: Bid for Slot / Ads Bids & Competition

Levers that move the effective bid/competition for a slot include **targeting relaxation**, **placement relaxation**, **format relaxation**, **budget pacing relaxation**, **advertiser volume**, and **advertiser budgets**. "**Relaxation**" here means loosening an advertiser's own constraints — for example allowing the algorithm to show the ad in more placements or to a broader audience — which increases the pool of eligible ads competing for a slot and, mechanically, tends to improve **auction efficiency** and delivery pacing.

## Advertisers' problems and solutions — the platform's job as tooling vendor

The deck names one central advertiser problem: work to manage ad campaigns — how can I create and manage campaigns easily across media formats, products, catalogs, etc. The platform's answer is a bundle of tooling:

- **Creative tools** (ads, assets, landing pages)
- **Campaign management**
- **Catalog management**
- **Analytics**
- **Billing**
- **Account management**

## Where generative AI shows up

The deck's closing "creative" section names the actual **generative-AI tooling** that's replacing manual creative work: **image expansion** (extending an image to fit a new aspect ratio/placement), **background generation** (AI-generated backgrounds for product shots), and **text variations** (auto-generated ad copy variants) — all shown as concrete **Meta Advantage+ creative** features, not hypothetical.`,
takeaways:["Ads exist to fund free products, and the platform's core promise to advertisers is \"connect with potential customers wherever they are\" — everything else in the theme (campaign structure, delivery, tooling) serves that promise","An ad = Person + Placement + Format + Creative; a full campaign adds Objective + Budget + Bid + Target Audience on top — treat each as an independently tunable lever, not one bundled decision","The platform's revenue model reframes cleanly as Ad Slots × Ads Performance × Bid for Slot, and each of the three factors has its own growth levers and tradeoffs — supply growth trades off against organic engagement (ad load), performance growth is a retrieval/ranking/signals problem, and bid/competition growth comes from relaxing advertiser constraints (targeting, placement, format, budget pacing)","\"Ad Load\" — the ratio of ads to organic content, measured natively per surface — is the single metric that makes the supply-vs-engagement tradeoff concrete; the deck's stated goal ladder is \"ideal: grow load without hurting engagement\" then \"realistic: budget for some engagement loss during high-impact launches\"","Meta's Advantage+ automation (audience, placement, creative) versus manual control is the same \"automate vs. control\" tension that shows up across ad platforms — and the deck's own experiment data cites up to 33% lower cost-per-result from letting the algorithm find the audience automatically","For an auto lender, the same three levers apply from the buy side: acquisition cost per funded loan is a function of inventory bought, creative/targeting performance, and bid competitiveness against other lenders in the same auction"],
cards:[
 {q:"What are the four components of a single ad, and the three additional components that turn it into a full campaign?",a:"An ad = Person + Placement + Format + Creative. A campaign adds Objective + Budget + Bid + Target Audience."},
 {q:"State the platform's ad-revenue equation in both its simple and mechanistic forms.",a:"Simple: Revenue = Ad Slots × Revenue/Ad Slot (CPM). Mechanistic: Revenue = Ad Slots × Ads Performance × Bid for Slot (willingness to pay) — three independently levered factors: supply, performance, and competition/bid."},
 {q:"What is \"Ad Load\" and what's the core tradeoff the deck attaches to increasing it?",a:"Ad Load = the ratio of ads to organic content, measured in a manner native to the specific product surface. Core tradeoff: increasing ad load vs. organic engagement (time spent, DAP) — the ideal is growing load without hurting engagement; the realistic goal is budgeting for some engagement loss around high-impact launches."},
 {q:"What two questions does \"Retrieval & Ranking\" answer in the ads-delivery pipeline?",a:"(1) Eligibility — what ads are allowed to be shown to this person, based on advertiser targeting rules and user signals. (2) Ranking — what order should eligible ads be shown in, based on the highest value to show the person first (likelihood of engagement × value the advertiser places on that person)."},
 {q:"What potential performance outcome does the deck cite for Meta's Advantage+ audience automation vs. manual audience targeting?",a:"Up to 33% lower cost per result, based on Meta's own experiment data — the stated rationale for letting the algorithm automatically find and prioritize the best-matching audience rather than manually constraining it."},
 {q:"How does the ad-platform revenue framework (Slots × Performance × Bid) translate to an auto lender's own acquisition economics?",a:"From the buy side, cost-per-funded-loan is a function of the same three factors: how much inventory/impressions you buy (slots), how well your creative and targeting convert into qualified applicants (performance), and what you're willing to bid per lead relative to competing lenders in the same auction (bid/competition) — the lender is optimizing the mirror image of what the platform optimizes."},
 {q:"What is \"relaxation\" in the context of Lever 3 (Bid for Slot / Ads Bids & Competition), and what does it mechanically improve?",a:"Relaxation means loosening an advertiser's own constraints — targeting, placement, format, or budget pacing — which increases the pool of eligible ads competing for a slot and tends to improve auction efficiency and delivery pacing."},
 {q:"What are the six categories of platform tooling that solve the advertiser's core problem of managing campaigns?",a:"Creative tools (ads, assets, landing pages), campaign management, catalog management, analytics, billing, and account management."}
]},
{id:"intv-28",track:"intv",title:"Theme 10: Business Products — Makes It Easy(ier) to Make Money",min:11,
body:`Satish Mummareddy's tagline for **Theme 10** is that business products "make it easy(ier) to make money." Example product types include **Productivity – Personal** (Notion, Coda, DropBox, TaskList apps, Grammarly), **Productivity – Enterprise** (DropBox, Box, Google bundle, Microsoft 365, Atlassian, Okta/OneLogin), and **Productivity – No/Low-Code Tools** (Zapier, Airtable). The core definition: **business products give businesses tools to make or save money by optimizing different components of the business.** Value creation follows the same two-sided shape as other theme notes: Provider (Business, or Business + Business) sends Service or Goods to the Customer (Business); Customer sends Payment (Money) back to Provider.

## The three-stage map of running a business

The deck organizes every business-product category under three life-stages of running a business, and this map is the **answer template for "design a business product" prompts**:

- **Get Started** — Incorporation, Legal Protection, Business Banking, Fundraising
- **Get & Serve Customers** — Website/Storefront, Accept Payments, Digital Product Delivery, Physical Product Fulfillment, Marketing, Sales, Customer Support
- **Manage Business** — Partner Payouts, Financial Management, Human Resources, Analytics & Business Intelligence, Communication & Collaboration

{{DIAGRAM:0}}

For every category, the deck explicitly tags the underlying **Goal** (Save Money and/or Make Money) and the **How** — a discipline worth carrying into any business-product interview answer: don't just list features, state which of the two goals each feature actually serves and by what mechanism.

## Category breakdown, stage one and two: getting started, getting & serving customers

- **Incorporation & Legal Protections** (Stripe Atlas, LegalZoom, Swyftfiling) — registering (LLC, S-Corp, C-corp, Non-Profit, DBA), running (EIN/Tax ID, Sales Tax ID, Certificate of Good Standing), and protecting (Trademarks, Copyright, Patents). Serves both **Save Money** and **Make Money**, through saving time, saving fines via compliance, protecting IP, and protecting brand.
- **Website / Storefront** (WIX, SquareSpace, WordPress, Webflow, Weebly, GoDaddy, Shopify, FB Pages, Carrd) — domain purchasing & DNS, website building/hosting, digital listings & reputation management (Yext, birdEye), menus/product catalogs, appointments, and purchases. Serves **Make Money**, through awareness of your products/services, selling people on their value, lead generation, and closing self-serve sales.
- **Accept Payments** (Stripe, Shopify, PayPal, Adyen, Square, Lemon Squeezy) — payment links, online embedded checkout, installment payments/BNPL, subscription/recurring payments, invoicing, POS systems, and fraud/risk/compliance — pure revenue enablement.
- **Business Banking** (Mercury, Brex, Stripe Capital/Treasury, Square, regular banks/credit companies) — bank accounts, debit & credit cards, and credit lines & loans. Serves both **Save Money** and **Make Money**, through tracking money in and out, managing banking/wire fees, and leveraging money via cash flow and investments.
- **Digital Product Delivery** (Kajabi, Teachable, Udemy, Udacity, Coursera, YouTube, Gumroad, Kindle Publishing, iStockPhoto, Substack, BeeHiiv, ConvertKit, app stores) — video courses, eBooks, photography, music, research reports, software, and apps — revenue enablement.
- **Physical Product Fulfillment** (SAP, Amazon, Flexport) — supply chain management software, logistics (store, ship, customer support, returns), and worldwide shipping & global freight — revenue enablement.
- **Marketing** (Hubspot, Salesforce, ZohoCRM, Constant Contact, MailChimp, ConvertKit, SAP, ERP systems) — content marketing/blogs, social media marketing, SEO, lead gen (landing pages/forms/tutorials), email marketing, ads, automation, reporting & performance, and contact management. Serves **Make Money**, through awareness of your products, selling people on their value, and lead generation.
- **Sales** (Hubspot, Salesforce, SAP, ERP systems) — Sales Rep tools (lead management/prospecting, email templates & tracking, call tracking, meeting scheduler, quotes, payments) and Sales Management tools (contact management, deal pipeline, analytics & reporting, forecasting, insights & coaching, sales training/playbooks) — revenue enablement.
- **Customer Support** (Hubspot, Salesforce, Zendesk, Intercom, Zoho Desk, ServiceNow) — self-serve knowledge base, help desk & ticketing, omni-channel messaging, call tracking, AI agents, automation & workflows, SLA management, feedback tools, customer portal, reporting & coaching, and team management. Serves both **Save Money** and **Make Money**, through reducing churn, keeping customers happy for higher LTV, and optimizing support-team time.

## Category breakdown, stage three: managing the business

- **Partner Payouts** (Stripe Connect, Adyen for Platforms) — collecting money from customers and paying out to partners in marketplaces, linked accounts for joint management, and reporting — revenue enablement critical for marketplace businesses.
- **Financial Management** (Stripe, Intuit, SAP, Oracle, Zoho, ERP software) — sales tax & VAT collection, billing & subscription management, bookkeeping/accounting, spend management, financial analytics, financial planning, tax, and treasury. Serves both **Save Money** and **Make Money**, through insights into low-ROI spend to cut costs, better loan/purchasing/receivables terms, and planning that puts money in the right places.
- **Human Resources** (Workday, Success Factors, ADP, Zenefits, Rippling) — Employee Experience (onboarding, education, time tracking, compensation/payroll, benefits, support) and Employer Tools (recruiting, performance evaluation, planning tools, feedback management, contractor management, analytics & reporting). Serves both **Make More Money** and **Save Money**, through hiring people who add value, helping people be more productive, helping people ramp faster, improving team collaboration, improving retention by keeping employees happy, managing out underperforming talent, and upskilling folks to improve productivity.
- **Analytics & Business Intelligence** (Microsoft, SAP, SAS, Oracle, Salesforce/Tableau, Microstrategy, Zoho, IBM, Amplitude, Looker, Mixpanel, Heap, Pendo, Google Analytics, Segment, HotJar) — product analytics, marketing analytics, sales analytics, operations analytics, and finance analytics — cross-cutting decision support.
- **Communication & Collaboration** (Microsoft, Google, Zoho, Slack, Zoom, Confluence, Coda, Notion, Apple) — Docs/Slides/Sheets/Forms, email, chat, video calls, forums, and wikis — cross-cutting productivity enablement.

## Goal of business products, restated simply

Every product does one of two things, attacking different vectors of the business: **help you make more money**, or **help you save more money**. That's the two-item taxonomy to hold every feature/category against.

{{DIAGRAM:1}}

## Five macro levers of differentiation

Every business leans into one or more of five differentiators, and companies shift which one(s) they lean on over their lifetime: the deck's explicit example is that **Salesforce** started as "cheaper than buying software," and is now in the "comprehensive" bucket. The five levers are:

- **Better**
- **Cheaper**
- **Faster**
- **Simpler**
- **Comprehensive**

> "You are selling to a business, but you are building a product for people."

## Three entry strategies — and the platform end-state

The deck names three starting points that most companies expand from, plus a fourth end-state they tend to drift toward:

- **Quick Start in Niches** — simplify a specific job to get started quickly. Examples: Carrd (single-page websites), Lemon Squeezy (checkout pages), BeeHiiv (newsletters), ConvertKit (email marketing), Typefully (Twitter thread maker & analytics), Pigeonhole (live webinar interactivity tools), Typeform (online forms for lead gen).
- **Industry Vertical Experts** — native, comprehensive, and simple for one industry. Examples: Retail Next (in-store retail analytics), Epic (CRM for healthcare), Tripwhale (ecommerce analytics).
- **Horizontal Functional Leader** — dominant in one function across all industries. Examples: Workday, Success Factors (HR), Stripe (payments), Hubspot (marketing/sales), Mercury (banking), LegalZoom (legal), WIX/Squarespace/GoDaddy (websites).
- **Single Platform to run your companies** — the fourth end-state, where the biggest horizontal players eventually consolidate: SAP, Microsoft Dynamics, Oracle NetSuite, Salesforce, Zoho, ERPNext.

{{DIAGRAM:2}}

The deck states explicitly that most companies start with one of the first three strategies and then expand — vertical/niche/horizontal starting points are a **beachhead, not a permanent ceiling**, and the expansion path runs toward comprehensive, all-in-one platforms.

## Product thinking for business products: the five-question empathy method

The deck's core methodological point: **you are selling to a business, but you are building a product for people.** Every buying decision routes through individual humans with jobs, goals, and daily workflows — so the product-discovery method is explicit **empathy-building**, broken into five questions to ask about any target user:

- Understand what their **job** is and the goals they have
- Understand **how they do their job today**
- Understand the **challenges** they face
- Understand what would **make their life better**
- Understand what **problems they would pay to have go away**

{{DIAGRAM:3}}

Concrete techniques for building this empathy: **talk to them**, **watch them do their job**, **role-play/visualize** doing their job, or **actually do their job yourself**.

A worked example, the deck's practiced case study, segments the professional-education small-business market into four maturity tiers:

- Building over nights & weekends to build conviction
- Founder(s) doing everything to get to **ramen profitability** (the tier worked through in detail)
- Small business setting sights on something bigger
- Scaled business seeking growth & efficiency

For tier two, ramen-profitability founders, the top problems identified via the five-question empathy method are **Organic Marketing**, **Managing Business Operations**, **Managing Course Operations**, and **Building a Team** — each run through the same five-question lens (job/goals, current process, challenges, what would help, what they'd pay to remove). The deck runs the identical five-question method against two more practice personas to show it's **domain-agnostic**: a recruiter sourcing PM candidates (job/who they work with/goals, how they source today, what makes sourcing hard, what would help, what they'd pay to remove) and a restaurant owner (same five-question sequence).

## Go deeper on context: the fuller research checklist

For a real (not interview-timeboxed) business-product research effort, the deck lays out a fuller context-gathering checklist with suggested time allocations. Context covers:

- A **market map** (companies building products in the space, grouped by product type)
- **Competitive landscape** (top companies, their positioning, their powers)
- **Customer landscape** (types of businesses served, differences in their needs, which companies target them)
- **Product/consumer trend shifts** (changes in marketing, HR, customer-support expectations from end users)
- **Technology trends** (what's coming and its implications)
- **Product details** (what the products do, how they work, where the gaps might be — better/cheaper/faster)

The four working phases and their time-boxes:

- **Segmentation** — about 1 day: segmentation factors, segments, prioritization, expanding the segment details
- **Problems** — about 2 days: brainstorm problems, rough validation, flesh out problems, prioritize problems
- **Solutions** — about 2 days: solution vectors, solution details, iterate
- **Narrative** — about 1 day: context & motivation, segmentation, problems, solutions`,
takeaways:["Business products serve three stages of running a business — Get Started, Get & Serve Customers, Manage Business — and every category within those stages should be tagged with which of two goals it serves: make more money, or save more money, and by what specific mechanism","Five macro differentiators exist for business products (Better, Cheaper, Faster, Simpler, Comprehensive), and companies shift emphasis over their lifecycle — Salesforce's \"cheaper than software\" → \"comprehensive platform\" arc is the deck's explicit proof point","Three entry strategies (Quick Start in Niches, Industry Vertical Expert, Horizontal Functional Leader) each have named real-world examples, and most successful companies start in one lane and expand toward a fourth end-state: single all-in-one platform (SAP, Salesforce, NetSuite, etc.)","The core methodological insight — \"you're selling to a business, but you're building a product for people\" — resolves into a five-question empathy method (job/goals, current process, challenges, what would help, what they'd pay to remove) that the deck proves is domain-agnostic by running it against three unrelated personas (course-creator founder, PM recruiter, restaurant owner)","For an auto lender, this theme's direct application is dealer-facing B2B tooling (dealer portals, credit decisioning, funding systems) — evaluate it with the same make-money/save-money discipline and the same five-question empathy method rather than building from an internal-only view of dealer needs"],
