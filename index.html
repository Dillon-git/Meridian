{id:"intv-3",track:"intv",title:"B. Target Audience & Segmentation — CTUC Deep Dive",min:13,
body:`The CTUC framework introduces **Target Audience** as the box that answers "which customers are most valuable, and which can we win." This lesson goes deeper into the actual segmentation mechanics: which entity to segment first, the "**native segmentation**" concept, a library of segmentation dimensions by entity type, a dimension-selection matrix mapping Needs/Desires/Vices to which demographic factors actually matter for each, and the core technique — two worked, slide-by-slide methods for building a compound segmentation, using RedFin home buyers and Instacart grocery shoppers as the worked examples.

## The three Target Audience outcome questions

Which customer segments are the most valuable to focus on in this market? Which high-value customers is the company well-positioned to serve and win? What partners does the company need to serve the target customers well? That third question, partners, is easy to skip past, but it's coequal: segmentation isn't just about picking a customer, it's about recognizing you may need a supply-side or partner segment to actually serve the demand-side segment you picked.

## Step 1: which entity do you segment first?

Every product has, at minimum, a **Provider** and a **Customer** in the value-chain sense. The explicit guidance: **start by segmenting the Customer, not the Provider** — because the goal is to identify the most important opportunities that customers are willing to pay for, and then figure out how and who to partner with to deliver on the biggest of those opportunities. Demand drives product opportunities; you find supply or partner segments afterward to serve the demand segments you've already prioritized.

Uber illustrates the entity split: Provider equals Uber the platform plus Drivers as partner businesses; Customer equals Riders, both consumer and business. A "Menlo Park to San Jose Airport" trip surfaces a Customer Needs Spectrum — Cheap Ride (OK to share), Cheap Ride (no sharing), Clean Car (willing to pay slightly more), Lot of luggage (willing to pay more), Higher-end Car (willing to pay even more), plus edge needs like Dogs allowed and Handicapped assistance — against a stated **willingness-to-pay spread of $35 to $100** for the same origin/destination trip.

{{DIAGRAM:0}}

Once you know that demand-side spread exists, the supply side has to be segmented to match it: old low-end cars for X and XShare, new low-end cars for Comfort, regular SUVs for XL, black cars and SUVs for Black and Black SUV tiers, handicapped-fitted vans for Assist, and pet-friendly cars for Pet. This is "find supply segments to serve customer opportunities" — the demand segmentation from the Needs Spectrum directly determined the supply segmentation that had to be built to serve it.

## Native segmentation — the core definition

**Native segmentation** is grouping people with similar problems, incentives, and connections for that market or product type. Three supporting principles:

- **Focused problems lead to better solutions**, since a segment that's too broad produces a mediocre generic solution
- **Incentives determine willingness to pay**, where "incentives" explicitly means the Needs, Desires, or Vices vocabulary — the same N/D/V lens reused as the segmentation lens
- **Connectedness enables cheaper and faster acquisition**, since segments that know each other or share channels are cheaper to reach — this is why "shared interests" segments matter for viral or community-driven acquisition, not just for product-market fit

> Native segmentation is grouping people with similar problems, incentives, and connections — not just similar demographics.

## The segmentation dimension library, by entity type

Five distinct entity types each have their own checklist of common segmentation dimensions, worth having memorized as a menu since which dimensions matter shifts by who you're segmenting.

- **Consumer**: Geography; Demographics (Age, Ethnicity, Gender, Sexual Orientation, Religion); Life Stage/Life Events (Marital Status, Kids, Pets, Own/Rent); Tech Familiarity; Income; Education & Career (Career Stage, Industry, Company/University, Occupation/Function); Use Cases; Interests/Hobbies
- **Business**: Company Stage, Role/Department, Industry, Use Cases
- **Advertiser**: Company Stage, Industry, Objectives/Use Cases
- **Developer**: Company Stage, Role, Technology Stack, Use Cases, Industry
- **Creator**: Stage (Experimenting, Emerging, Established, Stars), Size of Business (Solo/Indie, Small Team, Large Production Company), Content Inventory (Low, Medium, High), Topics (taxonomy varies by media type), Media Format (Text, Images, Short-Form Video, Long-Form Video)

## Which dimensions actually matter — the N/D/V-to-dimension matrix

Rather than treating "pick your segmentation dimensions" as a guessing exercise, each Need/Desire/Vice from the Context & Motivation table ties directly to the specific demographic dimensions that predict it:

- Power/Social Influence (Instagram, FB Groups) → Age, Interests/Hobbies
- Power/Professional Influence (LinkedIn) → Occupation/Function, Career Stage, Industry, Gender, Ethnicity
- Super Powers/Amplifying human capabilities (Google Slides, Asana/Coda, Superhuman) → Occupation/Function, Industry, Education, Tech Familiarity
- Virtue/Idealism, Honor → Interests/Passion
- Virtue/Generosity → Interests/Passion, Income, University, Career Stage
- Pride/Vanity, Celebration, Self Respect → Age
- Pride/Competition, Comparison → Age, Interests, Occupation/Function, Industry
- Knowledge/Professional Learning → Occupation/Function, Industry, Education, Use Cases
- Knowledge/General Knowledge, Current Affairs → Education, Interests, Life Stage/Events, Age
- Knowledge/Hobbies, Curiosities → Interests, Life Stage/Events
- Wealth/Make Money → Education, Occupation/Function, Industry
- Wealth/Save Money → Income, Life Stage/Events
- Wealth/Grow Money → Income, Life Stage/Events, Own/Rent
- Relaxation/Boredom, Passive Entertainment → Interests, Income, Life Stage, Use Cases
- Relaxation/Boredom, Active Entertainment → Age, Life Stage/Events, Interests
- Relaxation/Boredom, Mindfulness/Mental Fitness → Age, Life Stage/Events, Career Stage
- Connection/Friends & Family (Facebook, Messaging) → Age, Geography
- Connection/People with shared interests (Reddit, Discord) → Interests
- Connection/Peers, Mentors (LinkedIn) → Occupation/Function, Career Stage, Industry
- Romance/Intimate Relationship → Geography, Age, Ethnicity, Gender, Sexual Orientation, Religion, Marital Status, Kids
- Appearance/Exercise, Training, Yoga → Age, Gender, Life Stage
- Appearance/Fashion, Makeup → Age, Gender, Ethnicity, Occupation, Geography
- Convenience/Save Personal Time → Occupation, Income, Life Stage, Career Stage
- Convenience/Delivery Speed → Income, Life Stage, Kids
- Convenience/Reduced Effort → Income, Life Stage, Kids
- Convenience/Reduced Friction → Income, Life Stage, Kids

Several rows carry named-app anchors as quick recall pegs: Instagram/FB Groups for Social Influence, LinkedIn for Professional Influence and Peers/Mentors, Google Slides/Asana/Coda/Superhuman for Amplifying Human Capabilities, and Reddit/Discord for shared-interest Connection. If you're stuck deciding what dimension matters for a given N/D/V, ask "which real product already nails this, and what does its own user base look like."

## The core technique: compound segmentation, two methods

The central segmentation exercise is building a **compound segment** — combining multiple single-factor splits into named, addressable customer segments — via one of two explicit methods.

## Method 1: expand all options, then clean up (RedFin)

Worked on RedFin's consumer base of home buyers. Stack-rank the candidate factors first: Use Case (Primary home or Investment) ranks first, Life Stage (First-time buyers vs. Repeat home buyers) ranks second, Life Stage/Kids (Expanding or Contracting) ranks third. Then expand fully, one factor at a time.

- **Single Factor** (Use Case only): Primary Home Buyers, Casual Real Estate Investors
- **Two Factor** (adds Life Stage, split only where it matters): Primary Home – First Time, Primary Home – Repeat, and Casual Real Estate Investors not split — three segments after pruning, where a naive full cross would have made four
- **Three Factor** (adds Expanding/Contracting, again only where it changes behavior): Primary Home – First Time, Primary Home – Repeat – Expanding, Primary Home – Repeat – Contracting, Investment Property not split further — four segments

A clean-up pass renames for clarity and merges where the compound label is redundant: "Primary Home – First Time – Expanding" and "…Contracting" collapse back to just "First Time Home Buyers" since life stage doesn't differentiate first-timers, while repeat buyers keep the split into "Families Upsizing" (expanding) and "Seniors Downsizing" (contracting). The **final segmentation**: First Time Home Buyers, Families Upsizing, Seniors Downsizing, Casual Real Estate Investors.

The critical discipline in Method 1 is "**split only where the factor actually changes the segment's problems or incentives**" — not every factor applies to every branch of the tree. Investors don't split by first-time/repeat because that distinction doesn't change their needs; first-time buyers don't split by expanding/contracting because they don't have an existing home to be contracting or expanding from yet.

{{DIAGRAM:1}}

## Method 2: split only when necessary (Instacart)

Starting narrow and expanding later, worked on Instacart's grocery shoppers, with a different stack-ranked factor list: Income (Affluent vs. Middle Income) ranks first, Life Stage/Kids (Single, Couples, Families with Kids) ranks second, Independence (Adults/Independent vs. Teens & Seniors/Dependent) ranks third. Method 2 builds the compound grid directly rather than expanding-then-pruning.

- **Single Factor**: Affluent Customers, Middle Income Customers
- **Two Factor** gives six raw segments — Affluent–Singles, Affluent–Couples, Affluent–Families With Kids, Middle Income–Singles, Middle Income–Couples, Middle Income–Families With Kids — then a cleanup insight collapses them: "Income range of singles is small, not much difference between affluence and middle income" and "Couples and Families With Kids operate with similar financial constraints within the affluent and middle-income buckets," collapsing six down to three: **High Income Singles, Affluent–Families, Middle Income–Families**
- **Three Factor**, adding Independence, shows the full un-pruned cross of twelve cells as an illustration of how fast the tree explodes, reinforcing why pruning is not optional once you're past two factors

Both methods converge on the same discipline: segmentation complexity grows combinatorially as you move from single to two to three factors, and the actual skill is knowing **when to stop splitting and when to merge branches back together** — not how many factors you can chain.

## The Segmentation Practice Session: interview vs. real-world sequencing

A companion workbook built on top of the RedFin example adds a piece worth calling out separately: how to identify the factors in the first place, and how the interview-compressed version of the process differs from the real-world version.

- **In the real world**, you do a back-and-forth: Context, then Problems (general, market-wide), then Segmentation, then Problems (deeper, per-segment), then Solutions.
- **In interviews**, you're forced to go straight: Context, then Segmentation, then Problems, then Solutions.

The practical interview technique: since you can't skip straight to segmentation without knowing what factors matter, **simulate the missing "general problems" step in your head** — Context, then Problems (silently, to surface candidate factors), then Segmentation, then Problems (deeper per segment), then Solutions. In other words, the factors you segment on should come from a quick mental pass over the high-level customer jobs, not be invented from thin air.

{{DIAGRAM:2}}

Before segmenting, the full job map any home buyer goes through is: research housing market, understand budget constraints, prioritize house requirements/preferences, find houses that fit budget and preferences, make offer and land deal, do due diligence, close the purchase, handle post-purchase logistics, release the current home, and manage purchase timing.

Four candidate segmentation factors get identified from that job map, each tagged with why it changes problems versus why it changes willingness to pay:

- **Research housing market**: Use Case (Primary vs. Investment) changes research needs, and Life Stage (Expanding vs. Contracting) matters since contracting/retiring families may relocate; investors have more willingness to pay for market info
- **Financing**: Wealth (ultra-wealthy financing vehicles vs. standard mortgage vs. cash) matters since the ultra-wealthy have different financing vehicles available; they also have more willingness to pay for help leveraging those vehicles
- **Understand budget constraints**: Experience (First-time vs. Repeat) matters since first-timers need education on budgeting and financing
- **Prioritize house requirements**: Experience matters since first-timers need education on housing types, criteria, and prioritization
- **Find houses that fit**: Experience matters since first-timers struggle to articulate what they want while repeat buyers can describe it precisely
- **Due diligence**: Urgency (Immediate vs. Deliberate process) matters
- **Post-purchase logistics**: Use Case matters since primary-home buyers need repair/move-in help while investors need rental and maintenance support
- **Current home release**: Life Stage (First-time vs. Repeat) matters since first-timers can just exit a lease while repeat buyers must sell and coordinate timing, and Life Stage (Expanding vs. Contracting) matters since contracting/retiring families may sell remotely, face tax implications, and need interim rent
- **Purchase timing**: Life Stage (First-time vs. Repeat) matters since repeat buyers with kids must time around the school year

The practice document's own compound-segmentation walkthrough on these factors reaches the same final answer as the core example, confirming the two are describing the same exercise worked twice: Primary Home – First Time Buyer, Primary Home – Repeat Buyer – Expanding, Primary Home – Repeat Buyer – Contracting, Investment Property, plus a fifth segment the practice doc adds that the simpler version omits — **Ultra-Wealthy Buyers** who use special financing vehicles — reached via a fourth segmentation pass on Wealth after the first three factors. This demonstrates that "how many factors to use" is itself a judgment call driven by how differentiated the resulting segment's problems and solutions would actually be; the ultra-wealthy segment earns its own slot because its financing problem is categorically different, not just a matter of budget size.

## A standing drill set

Five unworked practice prompts serve as a standing drill set, each following the identical template of High-Level Jobs, Jobs Difference by Factor, Factors (problems + incentives), Compound Segmentation (1/2/3-factor), Final Segmentation, and Nice Names:

- Grocery Delivery (Instacart, with the job list pre-filled — planning meals, perishable grocery list, inventory check, find items, price comparison, last-minute orders, build cart, pay, edit order, replacement suggestions, receive, quality check/returns, order history — but factors and segments left blank)
- Personal Productivity – Mindfulness
- Personal Productivity – Slides/Presentation Software (Google Slides, PPT, Keynote)
- Online Publishers (newspapers, magazines, blogs, newsletters)
- Marketplaces – Local Services (plumbers, HVAC, electricians, landscapers, interior designers)

Treat these as a standing drill set — pick one cold, time-box 15 to 20 minutes, and run the full pipeline before checking your answer against the RedFin and grocery worked examples.`,
takeaways:["Segment the Customer first, not the Provider — demand drives product opportunity; supply/partner segments get built afterward to serve the demand segments you've already prioritized (Uber: Rider Needs Spectrum $35–$100 WTP spread drove the Comfort/XL/Black/Assist/Pet driver-supply segmentation)","\"Native segmentation\" = grouping people by similar problems, incentives, and connectedness; incentives = the Needs/Desires/Vices vocabulary from Context & Motivation, and each N/D/V maps to specific, memorable demographic dimensions — use the matrix instead of guessing at dimensions","Two compound-segmentation methods, same underlying discipline: Method 1 (expand fully, then prune/merge branches that don't actually differ) worked on RedFin; Method 2 (build the cross, then collapse cells the data says don't differ) worked on Instacart — segmentation complexity grows combinatorially, so the real skill is knowing when to stop splitting or merge back, not how many factors you can chain","In a live interview you can't run the real-world Context to Problems to Segmentation loop — simulate the \"general problems\" pass silently in your head to surface candidate factors before naming segments, rather than inventing factors from nothing","A segmentation factor should be justified by both a \"different problems\" reason and/or a \"different willingness-to-pay\" reason — a factor with neither justification isn't worth splitting on"],
cards:[{q:"Which entity should you segment first — the Customer or the Provider — and why?",a:"The Customer. The goal is to find the most important, highest-willingness-to-pay opportunities to serve; you figure out who to partner with on the supply side afterward, to deliver on the biggest customer opportunities you've already identified."},{q:"Define \"native segmentation,\" and name the three supporting principles.",a:"\"Grouping people with similar problems, incentives, and connections for that market/product type.\" Supporting principles: focused problems lead to better solutions; incentives (Needs/Desires/Vices) determine willingness to pay; connectedness enables cheaper/faster acquisition."},{q:"What are the two compound-segmentation methods taught, and which worked example uses each?",a:"Method 1 (\"expand all options, then clean up\") — worked on RedFin home buyers. Method 2 (\"split only when necessary\" — build the full cross, then collapse cells that don't actually differ) — worked on Instacart grocery shoppers."},{q:"In the RedFin Method 1 walkthrough, what are the three stack-ranked factors, and what's the final named segmentation?",a:"(1) Use Case: Primary vs. Investment; (2) Life Stage: First-Time vs. Repeat buyer; (3) Life Stage/Kids: Expanding vs. Contracting. Final: First Time Home Buyers, Families Upsizing (repeat, expanding), Seniors Downsizing (repeat, contracting), Casual Real Estate Investors."},{q:"In the Instacart Method 2 example, what specific data-driven insight collapsed the 6-cell two-factor grid down to 3 segments?",a:"\"Income range of singles is small, not much difference between affluence and middle income\" and \"Couples and Families With Kids operate with similar financial constraints within the affluent and middle-income buckets\" — collapsing to High Income Singles, Affluent–Families, Middle Income–Families."},{q:"Which demographic dimensions matter most for \"Romance to Intimate Relationship,\" and for \"Convenience to Delivery Speed\"?",a:"Romance/Intimate Relationship: Geography, Age, Ethnicity, Gender, Sexual Orientation, Religion, Marital Status, Kids. Convenience/Delivery Speed: Income, Life Stage, Kids."},{q:"Why must you \"simulate\" a step in a live interview that you wouldn't skip in real-world work?",a:"Real-world CTUC work does Context to Problems (general) to Segmentation to Problems (deeper) to Solutions; a live interview forces Context to Segmentation to Problems to Solutions directly, so you must mentally run the \"general problems\" pass silently to surface the segmentation factors before naming segments."}]},
{id:"intv-4",track:"intv",title:"C. Customer Problems — CTUC Deep Dive",min:12,
body:`The CTUC framework introduces **User Problems** as the box that answers "which problems are most important and urgent, and in what sequence should they be tackled." This lesson goes deeper into the mechanics: the altitude ladder applied specifically to problem statements, a stacked-cost hierarchy of problem-discovery methods from cheap hypothesis to expensive validation, a concrete "talk to five customers" playbook by market, a nine-question diagnostic checklist for spotting where an existing product's problem-solving falls short, and a full worked example — continuing the RedFin segments — that shows problem discovery and problem expansion end to end for one specific segment.

## The Customer Problems outline

This component organizes into four parts: altitudes of customer problems; discovering customer problems; questions to ask to identify problems; and identifying and prioritizing problems in interviews.

## 1. Altitude, applied specifically to problem statements

The same **altitude ladder** from the CTUC overview — Company/Industry, Product Group, Theme, Task, Sub-task, Action — reappears here scoped specifically to how big a problem statement is allowed to be, with the same explicit caveat: focus on relative scale, don't worry about exact terminology. Two new worked altitude ladders:

- **Health Care**, high to low: How do we build a better health care system? How do we improve chronic-issues patient care? How do we help people find doctors? How do we improve search for doctors? How do we improve the doctor page? How do we improve the scheduling flow?
- **AI Agents**, high to low: How do we build AI Agents that people love talking to daily? How do we build avatars that demonstrate matching emotions? How do we help build accurate 3D models for specific people? How do we provide a realistic video-conference-type experience? How do we provide multimodal I/O with agents? How do people choose an AI Agent?

The pattern across all three ladders — dating, health care, AI agents — is that each rung is a legitimate, answerable problem statement on its own. **The mistake isn't picking the wrong altitude, it's mixing altitudes within a single answer** — such as pitching a company-level solution to a sub-task-level problem, or failing to state which altitude you're operating at before diving in.

{{DIAGRAM:0}}

## 2. Discovering customer problems

Before picking a discovery method, name the actual research objectives — seven target questions: what needs/desires/vices are customers trying to satisfy; what are the details of those needs/desires/vices; how do they satisfy them now; how satisfied are they with the current solutions; what are the challenges with the current solutions; what are the magical experiences they want; and what is the thing they would rush to pay you for, in any of the currencies — recall the value-chain "payment" types Money, Time, Signals, and Contact Information.

Discovery methods stack on a **cost axis**, from Hypothesis (Low Cost) at the bottom to Validated Problems (High Cost) at the top — cheaper methods give you unvalidated hunches, and each step up costs more effort but earns more confidence, from lowest to highest cost:

- **Leverage Theme Patterns** — pattern-matching against known problem types across similar product themes; cheapest, pure pattern recognition, no primary research
- **Use the product as a customer and identify gaps** — self-dogfooding
- **Write down a full life description of the customer and imagine doing their job** — a deep empathy exercise, still with no external contact
- **Look at how they hack the product to solve their problems** — observing workaround behavior in existing usage data
- **Look at quantitative data and follow up with targeted questions** — data-first, then confirm with light-touch questions
- **Observe people using their current products** — direct behavioral observation
- **Talk to customers about their goals and problems** — the most expensive, most validated: direct primary research

This is presented as a checklist to run in whichever order fits your budget, not a mandate to always start with talking to customers.

## Talking to customers, and watching them

The execution playbook for **talking to customers** has five behavioral steps: build rapport by getting to know them; explain what you're trying to understand; ask open-ended questions and let them talk; ask good follow-up questions; and make sure you cover needs, current usage, challenges, ideal experience, and willingness to pay. The concrete instruction is to talk to **five people** who are customers of that market, with market-specific tactics:

- Real estate — go to open houses and talk to buyers and agents, or go to houses with a "for sale by owner" sign and talk to sellers
- Dating — talk to friends who are dating across different demographics
- Zapier-style workflow automation — talk to savvy marketing and biz-ops folks in your company
- Reddit — chat with active Reddit users on the platform
- A cohort-course platform like Maven — talk to students in class and instructors
- Stripe — talk to devs on the payment team or indie developers on Twitter
- FB Marketplace — talk to highly active sellers, buy something from them and chat them up

**Observing people using products** has four steps: ask people to do a specific goal/task; let them choose the app, or choose it for them; watch their screen as they use it; ask them questions about why they did what they did.

**Quantitative data plus qual follow-up** has two steps: understand product usage to identify trends and anomalies, then talk to customers about why they did what they did — illustrated by Yelp Deals, where quantitative anomaly-spotting in usage data was followed by qualitative interviews to explain the anomaly.

**Customers hacking your product** has two steps: identify how customers are using the product for an unintended use case, and understand how they're hacking the product to serve a need that isn't currently served — illustrated by Facebook Buy/Sell Groups, a community feature repurposed by users into an informal marketplace, revealing an unmet commerce need before Facebook built Marketplace formally.

Writing a full life description and imagining living the customer's life is illustrated with creators like Mr. Beast, Ali Abdaal, and Codie Sanchez: large audiences on YouTube; making long-form video for a long time; a well-oiled monetization machine; long-term-value content that gets great distribution; teams to pay and revenue goals to hit. This models the technique on a concrete, recognizable creator segment rather than leaving it abstract.

**Being the customer**, the self-dogfooding method, has four questions: Task completion — can you complete the tasks? Usability — what is painful, what makes you want to not use the app again? Opportunities — what do you wish existed in the app? Delight — what do you love about it?

**Leveraging theme patterns** has two steps: build a basic understanding of common problems across different themes, which gives your brain a set of filters to start looking at the market from. Two ready-made theme-level checklists:

- Media – Creator Problems: Creation, Distribution, Monetization, Community
- Media – Consumer Problems: Discover Content & Creators, Consumption Experience, Community & Connection, Identity & Preferences

These double as a template — for any new theme you research, build the equivalent four-item problem checklist, creator-side and consumer-side, before you start interviewing, so your primary research has a structure to slot findings into rather than starting from a blank page.

{{DIAGRAM:1}}

## 3. Questions to ask to identify problems — a nine-point diagnostic checklist

A standing checklist for auditing any existing product's problem-solving quality, each phrased as a single yes/no diagnostic question:

- **Promise** — do they deliver the value they promise, to what extent?
- **Ease of Use** — is it frictionless to use on a consistent basis?
- **Time to Value** — how much time does it take to deliver value?
- **Effort to Value** — how much work does it take to get value?
- **Habit Loop** — does it sustain the value delivery over long periods of time?
- **Personalization** — can it be customized to a specific user's preferences?
- **Seamlessness across All Devices** — does it work across all the user's devices in lock step?
- **Seamlessness for Cross-Tool Integration** — can it integrate with related tools to reduce junk work?
- **Skill Growth** — does it help people become super users over time?
- **Privacy** — can the user create an account, log in and out, and store information in a trustworthy manner?

"Promise" gets its own worked example, since it's the anchor concept the rest of the list builds on: a product's **promise** is a statement that it will satisfy a specific Need/Desire/Vice. Worked chain: Need equals "Manage money," and promise options a fintech product might make include "We will help you build a nest egg," "We will help you plan for retirement," "We will help you grow your money," and "We will help you save more of your money." The diagnostic move: pick the product's actual stated promise, then run it through the other eight dimensions to see where the gap between promise and delivered experience actually lives.

## 4. Identifying & prioritizing problems in interviews

Four steps run in sequence inside a live interview:

- **Paint a rich picture** of the target audience and their jobs, to put yourself in their shoes
- **Visualize the high-level jobs** the target audience is trying to achieve
- **Brainstorm problems at the right altitude**, so that each problem is appropriately "big" — not so narrow it's trivial, not so broad it's unanswerable
- **Prioritize by Reach times Intensity**, where intensity is an explicit proxy for willingness to pay, and then, as a secondary cut, by **Blocker status** — is this problem actually blocking the customer from getting value at all, versus a nice-to-have improvement

> Prioritize by Reach times Intensity first, then by Blocker status — a huge-reach, low-intensity problem can still lose to a smaller-reach problem that's an outright blocker, because a blocker caps the value of every other improvement until it's fixed.

## Worked example: RedFin's Casual Real Estate Investors, problem discovery end to end

This continues the four RedFin segments — First Time Home Buyers, Families Upsizing, Casual Real Estate Investors, Seniors Downsizing — by first painting a rich picture across all four, then drilling one segment through the full pipeline.

- **First Time Home Buyers**: younger people looking to stop renting, have lower budgets and down payments, don't know what their real needs are with a house, and don't understand the house-buying process
- **Families Upsizing**: becoming more affluent and may have kids, have more budget and can put more money down, have a clear mental model for their housing needs, and understand the house-buying process and know exactly the help they need
- **Casual Real Estate Investors**: have extra savings they want to invest, are open to locations across the country to fit their budget, may not be as knowledgeable about the investment market, and potentially need help thinking about a real estate portfolio
- **Seniors Downsizing**: have kids out of the house and don't need a large house, reinvest the real estate money in other liquid assets or use it for other purposes, and stay in the same place or relocate to a cheaper area

{{DIAGRAM:2}}

Higher-order jobs, drilled for Casual Real Estate Investors specifically: Goal Setting covering how much to invest, geography constraints, ROI expectations; Research Tools covering geographical market insights, type of real estate, pricing, time to close, financing; Partnership covering real estate agent, RE group to invest with, advisors; Deal Flow Tools covering search and alerts, managing a pipeline, virtual visits; Transaction Support covering due diligence, financing, closing support; Post-Transaction Support covering property management, reselling. These roll up into three **High-Level Problems**: Research, Goal Setting & Advice, and Deal Flow Tools & Support.

## Problem expansion at the right altitude

Problem expansion at the right altitude takes just the "Research" high-level problem and expands it into a full, appropriately-sized set of sub-questions. The problem stated at the customer's own altitude is "I have money to invest in real estate but I don't know what to buy!" — expanded into: Which geographies perform well in real estate investment? What level of investment do I need for different geographies? What type of real estate is good for investment in a given geography? What does typical ROI look like in geography-and-RE-type pairs? What are the anomalies in a geography? What are the drivers for growth by geography — what are the risks, and when do housing prices go up vs. fall in a market? What is the economic outlook for a geography? What are the renting-vs-buying trends? What are the inventory trends in a market? What are the types of RE investment available?

Ten sub-questions from one problem statement — a concrete demonstration that the parent problem is genuinely too broad to solve directly, and each of the ten children is independently answerable and independently valuable, which is the test for whether an expansion has landed at the right altitude.`,
takeaways:["The altitude ladder (Company/Industry to Product Group to Theme to Task to Sub-task to Action) applies to problem statements themselves, not just product scope — every rung is independently answerable; the failure mode is mixing altitudes in one answer, not picking the \"wrong\" one","Problem-discovery methods stack on a cost axis: cheap/low-validation (leverage theme patterns, self-dogfood, imagine their life) up through expensive/high-validation (talk to customers directly) — pick methods to fit your research budget, using named market-specific tactics for the \"talk to 5 customers\" step","The nine-question diagnostic checklist (Promise, Ease of Use, Time to Value, Effort to Value, Habit Loop, Personalization, Seamlessness x2, Skill Growth, Privacy) is a reusable audit tool for any existing product — start from the product's stated Promise, tied to a specific Need/Desire/Vice, then check the other eight for where delivery falls short of that promise","\"Brainstorm problems at the right altitude, so each problem is big\" is testable: an expansion has landed correctly when the parent problem is too broad to solve directly but each child sub-question is independently answerable and independently valuable","Prioritize by Reach x Intensity (intensity = proxy for willingness to pay) first, then by Blocker status — a problem that blocks all downstream value can outrank a bigger-reach, non-blocking problem"],

{id:"intv-5",track:"intv",title:"D. Creative Solutions — CTUC Deep Dive",min:13,
body:`The CTUC framework introduces **Creative Solutions** as the box that answers "what would an 11/10 experience look like, and how should solutions be prioritized." This lesson goes deeper into the actual four-part method: how to define an aspirational "**WOW experience**" before designing anything, why imitation is a legitimate and often winning strategy, a library of pre-solved product-component and theme-level problems you can borrow from instead of inventing from scratch, and, for the cases where imitation genuinely isn't enough, what "fertile ground" for real innovation looks like, illustrated with seven named product case studies.

## The Creative Solutions outline: four steps

**Define the WOW Experience.** **Imitate Then Innovate.** **Imitating Well.** **Innovating.** The ordering is deliberate and matters as much as the content: you define the aspirational bar first, then check whether imitation — of a full product or just a component — can get you there before reaching for genuine innovation. Innovation is the expensive, last-resort step, not the default starting point.

{{DIAGRAM:0}}

## 1. Define the WOW experience

The governing question: "**What would the customer think was an 11/10 Experience?**" — the same "11/10, not 10/10" framing from the CTUC overview, applied here as a concrete writing exercise: draft the ideal experience as a first-person narrative from the customer's point of view, stated as a list of specific sensory and emotional beats, before you design any actual feature.

A worked example for **Health Care Systems** writes an 11/10 experience as eight first-person beats: "From the moment I realized I had a health issue, I felt truly cared for." "In my worst moments, I felt I had an expert who would answer my questions right away." "I knew clearly what my diagnosis plan was going to be." "I knew clearly what my treatment plan was going to be." "I didn't have to sit around waiting in the hospital for more time than was needed." "I felt like a great team was supporting my treatment plan — they were all on the same page at all times." "The hospitals and insurance companies worked out the payments; my payments were clear." "The care team checked in on me over a longer period of time to make sure my recovery was going well."

A second worked example, **AI Friend**, applies the same technique to a very different theme, in seven beats: "A friend that is available 24/7 whenever I need them." "A friend that I can trust 100% with any of my issues." "A friend that is a great listener and can give sage advice when needed." "A friend who knows my life story and can understand me well." "A friend that can entertain me when I am feeling down." "A friend that can intellectually spar with me and help me grow." "A friend that I can learn new things from."

> Every beat is a customer-stated outcome or feeling, never a feature or technical mechanism — that discipline is what keeps the WOW-experience exercise from collapsing prematurely into a familiar, unambitious solution shape.

## 2. Imitate then innovate — the core strategic reframe

The blunt thesis, stated twice for emphasis: "**You don't always have to innovate to win! You can imitate and still win!**" Imitation happens in two distinct ways, and treating them separately matters because the win condition differs for each.

**Full product imitation** is illustrated with named examples: IG Stories vs. Snapchat, where Instagram copied the Story format directly; IG Reels after TikTok, the same pattern as a fast-follow of an entire product format; Microsoft Teams vs. Slack; and a forward-looking one — Google, Meta, and Microsoft competing heavily with OpenAI by imitating the LLM-assistant product category rather than only innovating around it. The explanation for why the imitators won: "**The products that imitated won because of distribution strengths!**" Full-product imitation is a viable strategy specifically when you have a distribution advantage the originator lacks, such as an existing user base, platform bundling, or brand trust, not just because you can build the same feature.

**Product component imitation** is the more broadly useful lever for an interview or day-to-day work: "When it comes to product components, you also don't have to reinvent the wheel — and all the types of wheels! You can study great apps for how they solve different product problems!" You're not copying a competitor's whole product, you're borrowing a well-solved sub-component — a checkout flow, an onboarding pattern, a search-filter UI — from wherever it's already been solved well, and recombining components in a way that is itself the innovation.

## 3. Imitating well — a library of pre-solved component problems

The practical payoff for the "imitate the component" strategy is a checklist of **twenty specific, recurring product-component problems**, meant to be scanned before you invent a novel mechanism for something that's already a solved category of problem.

Identity, discovery, and content:

- How can people create accounts easily without trust issues?
- How do you onboard the friend graph for a person joining your app?
- How do you deal with the cold-start problem in personalization?
- How do you let people explore and discover content and items?
- How do you let people represent themselves well via their profile?
- How do you design feeds for different media types?
- How do you let people find related content?
- How do you tackle copy/paste well?
- How do you help people cross-shop related items?
- How do you help people discover and sign up for loyalty programs?

Commerce, search, and organization:

- How do you design a great shopping cart?
- How do you have a great checkout experience?
- How do you do great post-purchase and support emails?
- How do you help people search for products/content they want?
- How do you design great contextual filters?
- How do you design great in-app purchase mechanics for games?
- How do you let people organize files/content?
- How do you allow people to share via access-control mechanics?
- How do you provide shortcut access to the things people use most?
- How do you do integration between your app and calendar apps?

The practical use of this list: before designing a novel solution to, say, "how do new users get value fast," check whether the problem is actually just "cold-start personalization" — a category with dozens of existing, studyable solutions across Spotify, Netflix, TikTok, and others — rather than treating it as a from-scratch design problem.

{{DIAGRAM:1}}

## A component library by theme

A worked component library by theme, with real product screenshots referenced, covers several themes.

**Media – Creator, Content Creation**: the problems are what will work on this platform and audience, how to create great content, how to scale content creation; the solutions fall into four categories — Formats (Articles, Text Posts, Images, Reels, Infographics, Moving graphics, shown via Facebook's Post/Story/Live/Reel selector); Inspiration (Trending, Templates, Remix, shown via Facebook's Post Composer prompts and Instagram Reels' Composer Templates); Tools (Composers, Templates, AI Tools for editing, Insights, shown via Instagram's "Reels Made For You" and LinkedIn Analytics); Workflows (Scheduling & Planning, Drafts, Collaboration, cross-platform editing and sharing, shown via Substack's drafting dashboard and Buffer's scheduling calendar).

**Media – Consumer, Discover Content & Creators**: the problems are automatically get content that only matches my interest, find content and creators that match my interest, don't miss great content from people I care about; the solutions are Onboarding Flows; Content Discovery (Explore, Trending, Feed Recs, Related Content/Chaining, Topics/Hashtags); Account Discovery (Feed Recs, Profile Recs, Search); Account/Channel Following, Profiles, Collections, and Notification subscriptions.

**Marketplaces – Demand, Selection**: the problems are do you have the products/services/people I want, and do you have things I didn't even know about but would love; the solutions form a supply-acquisition menu — Sales Enablement, Piggybacking, Referrals, Affiliates, Subsidies, Direct Supplier Value, SEO, Community, Self-Serve Supplier Onboarding, White-Glove Onboarding.

**Marketplaces – Supply, Profile/Business Page/Storefront**: the problems are how do I represent myself authentically, how do I share all my products and services, how do I set the right expectations, how do I make sure they can reach me, how do I share my reputation; the solutions are Business Details, Menus & Catalog Management, Product Details, Business Hours, Service Areas, Business Rules, Contact Mechanisms, Ratings & Reviews, Verifications, Personal Interests.

Each of these Problems/Solutions pairs is itself a mini-template: state the customer-facing problem in plain language, then list the named solution categories, not specific implementations, that address it — this is the format to reuse when building your own component library for an unfamiliar theme.

## 4. Innovating — fertile ground and how to actually find it

**Fertile ground for product innovation** reuses three of the four value-creation forces: Technology shifts that enable building better solutions; Consumer mindset shifts that help adoption of new solutions; Regulatory changes that open up new solution spaces. Competitive Power Shifts is deliberately dropped from this specific list — innovation-readiness is about what's newly possible, not about capturing value once created.

Seven worked case studies, each stated as a before/after tension line plus the specific Technology Trends and Consumer Trends (and, where relevant, Regulatory Change) that made the innovation possible, form the single richest part of this material:

- **Square**: "15 years ago it was a soul-sucking experience to accept credit cards as a physical business" — technology enablers were internet-enabled device adoption among sellers and credit-card processing over the headphone jack; the consumer trend enabler was widespread US credit card adoption, contrasted with the fact that this didn't work in India or emerging markets where credit cards weren't widely available.
- **Paytm/QR-code payments**: "EVERYONE paid with cash until one day NO ONE pays with cash!" — technology enablers were Jio driving internet-enabled phone adoption across all socioeconomic classes with cheap plans and phones, plus UPI (Unified Payment Interface) pushed by the central government; consumer trend enablers were embrace of internet-enabled devices, trust in mobile banking, and skipping credit cards entirely; the regulatory enabler was UPI itself.
- **Netflix Streaming**: "Everyone went to movie theaters and got cable until one day they stopped!" — technology enablers were high-speed internet adoption at cheap prices, streaming technology and CDN infrastructure, and cheap large-screen TVs; the consumer trend enabler was "stay at home and be a couch potato."
- **Uber/Lyft**: "Don't get into a car with a stranger" (1997) shifted to "I ONLY want to get into a car with a stranger" (2017) — technology enablers were internet-connected phones with GPS tracking and cameras, mobile maps infrastructure, and real-time logistics; consumer trend enablers were people feeling safe getting into cars with strangers, willing to trade convenience for risk, and willing to drive part-time with no stigma; the regulatory enabler was breaking the taxi medallion monopoly, city by city.
- **AutoSleep**: "Sleep is the most important recovery activity for your body! And you can track it NOW!" — the technology enabler was smartwatches with tech to track sleep stages; consumer trend enablers were widespread smartwatch adoption, awareness of the value of sleep, and adoption of measuring personal activities.
- **Otter.ai**: "Voice transcription products have been around forever but not used much — until Otter.ai!" — technology enablers were speech-to-text actually working, working on mobile devices, and being real-time; the consumer trend enabler was trust in SaaS products with personal information, carried over from Gmail, Google Drive, and enterprise SaaS generally.

{{DIAGRAM:2}}

The pattern across all seven: the underlying customer need was almost never new — people always wanted convenient payments, entertainment at home, safe rides, better sleep, easy transcription — what changed was that a specific technology crossed a usability or cost threshold **at the same moment** a specific consumer mindset shift made the previously-unthinkable behavior, like "get in a stranger's car," acceptable. Innovation opportunities cluster at that intersection, not at either force alone.

## Two disciplines for actually innovating

Two deep-understanding disciplines describe how to actually innovate.

**Understand technology capabilities deeply**: get your hands dirty and actually play with the technology; test its capabilities across different apps; prototype and build tiny apps with it yourself; understand specifically where the technology breaks down, not just where it works; visualize a world where the capability gets better, and be able to specifically articulate the impact of that improvement.

**Understand consumer trends deeply**: understand the specific changes in consumer and business preferences, not generic "people want convenience" but the specific, current shift; understand the adoption cycles for different mindset shifts, early enthusiasts versus mainstream, and where a given trend sits on that curve; understand the implications of products for these mindset changes; visualize what products could look like in that future state.

Both disciplines converge on the same instruction: don't theorize about technology or consumer trends from a distance — use the product yourself, talk to real early adopters, and be concrete about what specifically changed, the same "get your hands dirty" ethic that runs through problem-discovery methods.`,
takeaways:["Define the \"11/10 WOW experience\" first, as a list of first-person, outcome-language beats, never features — the worked examples (Health Care Systems, AI Friend) show the discipline of naming feelings and outcomes, which keeps you from prematurely collapsing into a familiar, unambitious solution","You don't have to innovate to win — imitation of a full product (IG Stories vs. Snap, Teams vs. Slack) wins specifically when you have a distribution advantage the original lacks; imitation of a product component (borrowing a well-solved checkout flow, cold-start pattern, or contextual-filter design) is broadly useful and is itself where a lot of real innovation actually lives, via novel recombination","Keep a running library of pre-solved component problems (20 named alone, spanning identity/onboarding/discovery/commerce/search/organization) and theme-level Problem to Solution tables (Media Creator, Media Consumer, Marketplace Demand, Marketplace Supply) — check this library before inventing a novel mechanism for a problem category that's already been solved elsewhere","Fertile ground for genuine innovation = Technology shifts + Consumer mindset shifts (+ sometimes Regulatory changes) crossing a threshold simultaneously — all seven named case studies (Square, Paytm, Netflix, Uber/Lyft, AutoSleep, Otter.ai) follow this exact pattern: the underlying need was old, but a technology/cost threshold and a consumer trust/behavior threshold crossed together","To find real innovation opportunities, don't theorize from a distance — get hands-on with the technology (prototype, find where it breaks) and get concrete about the specific, current consumer mindset shift, not a generic \"people want X\""],
cards:[{q:"What discipline distinguishes a well-written \"11/10 WOW experience\" beat from a feature list?",a:"Every beat is written in first-person, outcome/feeling language from the customer's point of view (e.g., \"I knew clearly what my treatment plan was going to be\") — never a feature or technical mechanism."},{q:"What two forms does \"imitation\" take, and what specifically explains why full-product imitators win?",a:"Full product imitation (e.g., IG Stories vs. Snap) and product component imitation (borrowing a well-solved sub-piece from another app). Full-product imitators win specifically because of distribution strengths — an existing user base or platform advantage the original innovator lacked."},{q:"Name four of the twenty \"component problems\" worth checking before inventing a novel solution.",a:"Any four of: account creation without trust issues; onboarding the friend graph; cold-start personalization; content/item discovery; profile representation; feed design by media type; related-content discovery; copy/paste; cross-shopping; loyalty program discovery/signup; shopping cart design; checkout experience; post-purchase/support emails; search; contextual filters; in-app purchase mechanics; file/content organization; access-control sharing; shortcut access; calendar-app integration."},{q:"What three forces are named as \"fertile ground for product innovation,\" and which value-creation force is deliberately left out?",a:"Technology shifts, Consumer mindset shifts, and Regulatory changes. Competitive Power Shifts (the 7 Powers) is left out — innovation-readiness is about what's newly possible, not about capturing value once it's created."},{q:"In the Uber/Lyft case study, what specific technology, consumer, and regulatory enablers are named?",a:"Technology: internet-connected phones with GPS tracking and cameras, mobile maps infrastructure, real-time logistics. Consumer trend: people felt safe getting into cars with strangers, traded convenience for risk once safety crossed a threshold, and were willing to drive part-time with no stigma. Regulatory: breaking the taxi medallion monopoly, city by city."},{q:"What is the common pattern across all seven innovation case studies?",a:"The underlying customer need was old and unchanged; what made innovation possible was a specific technology crossing a usability/cost threshold at the same moment a specific consumer mindset/trust threshold shifted — innovation opportunities cluster at that intersection, not at either force alone."},{q:"What are the two \"deep understanding\" disciplines for actually innovating, once imitation isn't enough?",a:"Understand technology capabilities deeply (hands-on prototyping, finding where it breaks, visualizing where it's headed) and understand consumer trends deeply (the specific current shift, adoption-cycle stage, and implications) — both require getting hands-on rather than theorizing from a distance."}]},
{id:"intv-6",track:"intv",title:"Product Thinking — Growth and Monetization",min:14,
body:`Two of the most common "how would you..." product-thinking prompts in a PM interview are "how would you **monetize** product X?" and "how would you **grow or 3X** product X?" There's a structured framework for each, worked end-to-end through two named products — LinkedIn for monetization, via a paid mentor/VC-calls marketplace, and DoorDash for growth, via a full six-lever growth-framework pass. Example prompts include: "How would you monetize product X?", "What feature would you build in product X to increase revenue?", "How would you 3X DoorDash?", "How would you 5X OpenAI Revenue?"

## Part 1: Monetization — the five-question approach

Run any monetization prompt through five questions, in order:

- **Ecosystem** — what value exchange is happening on the platform currently?
- **User value** — what problems are worth solving, and for whom?
- **Free vs. Paid** — which problems do we solve for free, and which ones do we charge for?
- **Paid Product** — what new paid product will you build, and what existing (currently free) products can we put behind a paywall?
- **Pricing** — how much do we charge?

## Worked example: LinkedIn — "What feature would you build to increase revenue?"

**Step 1, Ecosystem Value.** Before proposing anything, map out what each stakeholder group on the platform currently gets. People get a contact list for their professional network, a way to connect with strangers who can be helpful with their current challenges, the ability to learn things that can help with their careers, and the ability to find and apply for jobs. Companies get to build their brand and to find people who would be great fits for them. Recruiters get to source candidates for their open positions and build a long-term network of professional contacts. Sales gets to research companies and org dynamics, and to get leads for the products they are selling. Marketing gets to build awareness for their products and educate the market on the advances in their space.

{{DIAGRAM:0}}

**Step 2** filters to "what would they pay for?" using an **Important times Urgent** lens. Not every value prop is monetizable — the specific sub-items that clear the "important and urgent enough to pay for" bar are: for People, connecting with strangers who can be helpful with current challenges; for Companies/Recruiters, finding people who'd be great fits, and sourcing candidates; for Sales, getting leads for the products they're selling; for Marketing, building awareness for their products and educating the market. Cross each of those against what LinkedIn already monetizes vs. doesn't — that's where the actual opportunity gets found:

- **People**: paying for sending messages via InMail already exists today; paying and booking VC calls does **not** exist; paying for group coaching or classes exists but "the best stuff is not on it"
- **Companies/Recruiters**: a better Global Referral System does not exist
- **Sales**: better org-research tools, like simulating an org chart to know who to target, do not exist — worth auditing what already exists (like Sales Navigator) before assuming a gap
- **Marketing**: content creation and programming tools, content analytics tools, and trend analysis tools all do not exist on LinkedIn

The gap analysis itself is the idea-generation step: "**does not exist**" cells are the candidate paid features. The one picked to build all the way out: People — pay and book VC calls with experts and mentors.

**Step 3, Paid Product design**, on both sides of the marketplace. The mentee/buyer experience: learn about services, pick a time, pay to book, reminder emails, join Zoom. The expert/mentor/seller experience: set up a services page, set up calendar, set up pricing, Zoom integration, automatically add events to calendar, reminder emails, join Zoom, meeting notes share-out.

> The supply side almost always needs more product investment — calendar, pricing setup, integrations — than the demand side, which is just book-and-pay, even though the demand side generates the immediate revenue event.

**Step 4, Pricing.** Three generic pricing-model families exist to choose from: value-based pricing, competitive pricing, and cost-based pricing — the explicit guidance is to weigh value and competitors together, not pick one model in isolation. Concrete options considered for the VC-calls product: an x% cut of the booking, a flat $x fee per appointment booked, or free for 30 days followed by a paid model. The strategic framing for LinkedIn specifically: LinkedIn can view this as a large revenue base and either match the competitor model — an x% cut, the way most expert-marketplace platforms price — or undercut everyone by charging a flat $x per appointment instead of a percentage. **Flat-fee pricing becomes relatively cheaper than a cut as the transaction size grows**, which is a lever incumbents with percentage-based pricing can't easily match without cannibalizing their own take rate.

{{DIAGRAM:1}}

## Part 2: Growth — the six-lever approach

Growth prompts, like "how would you 3X this business?", decompose into six distinct levers — treat this as a checklist to run through **exhaustively**, not a menu to pick one item from:

- **Lever 1** — acquiring new customers from segments with product-market fit
- **Lever 2** — growing existing product usage in current segments and use cases
- **Lever 3** — growing existing product usage in new segments or use cases
- **Lever 4** — growing existing product usage in new geographies
- **Lever 5** — identifying new complementary products
- **Lever 6** — identifying new adjacent or new-area products

## Worked example: DoorDash — "How will you increase DoorDash revenue by 3X in 5 years?"

**Lever 1**, acquiring new customers with product-market fit: target segments are busy affluent people and people who want to save time. Concrete tactics: referrals, marketing promos, partnerships, app-install ads, geographic expansion, carrier deals to make the app pre-installed, and vertical expansion.

**Lever 2**, growing existing usage in current segments and use cases, pass one: segment is Busy Affluent People (single or families), use case is Save time. Two sub-levers: for dollars per order — bundling multiple restaurants into one order, cross-sell/upsell from one restaurant, free delivery for larger orders, ranking changes that surface more upscale, higher-basket restaurants; for transactions per customer — a bundle promotion ("no delivery fees on 5 orders a week") and a bundled product ("order for the week, place 5 orders at one time").

**Lever 2, pass two**, a different use case with the same segment: use case this time is wanting to eat healthy and not wanting to cook, framed as **Meal Plans**. Tactic: Private Chefs cooking in an industrial kitchen with fixed menus — but this needs filters that allow people to find health-food-specific restaurants and dishes, or the meal-plan framing doesn't actually serve the "eat healthy" job.

**Lever 3**, growing existing usage for new segments or use cases: new segment is Busy People who are price-conscious — college students, early-career singles. Use case is the same "eat healthy, don't want to cook" (Meal Plans) job, served differently: group ordering for large buildings — apartments, college dorms, offices — which solves the price-sensitivity problem via shared delivery fees.

**Lever 4**, growing existing usage in new geographies: enter new cities and countries — a lever worth flagging explicitly even when the interview conversation naturally gravitates toward segment/use-case levers.

**Lever 5**, identifying new complementary products: Industrial Kitchens, Personal Chefs, Home Chefs — direct extensions of the "Private Chefs" idea from Lever 2, now reframed as standalone product lines.

**Lever 6**, identifying new adjacent or new-area products: Grocery Delivery, Drug/Medicine Delivery, Alcohol Delivery, Last-Mile Package Delivery — genuinely new categories that reuse DoorDash's delivery-logistics core but aren't "food."

{{DIAGRAM:2}}

## Portfolio prioritization — don't just list ideas, sequence them

Once the six-lever pass generates a long list of ideas, the explicit next step is to **do prioritization and have a portfolio**: group everything into four buckets — grow user base, grow usage of existing products, build complementary products, place some bets in new areas — and lay them out on a Phase 1/Phase 2/Phase 3 by Growing-existing-products/New-product-bets matrix. The point of the matrix isn't the specific cell contents, which can be left as a blank template — it's the discipline of explicitly **sequencing** which lever fires in which phase, rather than presenting a flat, unprioritized list of six levers' worth of ideas as if they're all equally near-term. A candidate answer that reads as "everything, all at once" reads worse than one that says "Phase 1 is levers 1–2 because they're the fastest payback; Phase 3 is lever 6 because it needs the logistics network Phase 1–2 build first."

## Reusable answer outline

A condensed skeleton for structuring any growth-prompt answer out loud, useful as a template to internalize rather than re-derive each time:

- Start with **market context**
- Then **segments and problems** that have fit today
- Then, as a divider — "3x business" — **grow current products** via the growth frameworks, such as acquiring new users through referrals, increasing transactions per user through notifications, and increasing basket size per transaction through "people who buy this also buy this" or bundling/cross-selling
- Then **grow usage of existing products**, walked through per Segment/Problem pairing, expecting to generate at least two distinct segment/problem combinations, not just one
- Then **new products**, framed the same way every time as Segment/Problem/Solution`,
takeaways:["Monetization decomposes into five questions run in order — ecosystem, user value, free vs. paid, paid product, pricing — and the actual idea-generation step is mapping \"what would they pay for\" against \"what already exists,\" since the gaps are the candidate features","A two-sided paid marketplace almost always needs more product investment on the supply side (calendar, pricing setup, integrations) than the demand side (browse, pay, book) — plan the build accordingly even though the demand side is what generates the immediate revenue event","Pricing should weigh value and competitors together, not either alone — and a structurally different pricing model (flat fee vs. the market's standard percentage cut) can be a competitive lever in its own right, not just a number to tune","Growth decomposes into six levers (new customers w/ PMF, grow current segment/use case, grow new segment/use case, new geographies, complementary new products, adjacent new products) — run all six exhaustively before picking, since a real growth plan usually draws from multiple levers at once","Don't stop at a flat list of growth ideas — sequence them into a Phase 1/2/3 portfolio matrix; an unprioritized list of six levers' worth of ideas reads worse in an interview than an explicit \"this now, that later, because X\" sequencing argument"],
cards:[{q:"What are the five questions in the monetization framework, in order?",a:"Ecosystem (what value exchange exists today) to User value (what problems are worth solving, for whom) to Free vs. Paid (which problems do we charge for) to Paid Product (what new paid product, or what existing free thing goes behind a paywall) to Pricing (how much do we charge)."},{q:"In the LinkedIn monetization example, what specific paid feature did the framework land on, and how was the gap identified?",a:"Pay-and-book calls with experts/mentors (VC calls). It was found by crossing each stakeholder's \"important & urgent enough to pay for\" value prop against what LinkedIn already monetizes — InMail (paid messaging) exists, paid group coaching exists in a limited form, but \"pay & book VC calls\" does not exist — that gap became the feature."},{q:"What are the three pricing-model families named, and what two concrete pricing options were considered for the LinkedIn VC-calls product?",a:"Value-based, competitive, and cost-based pricing (consider value + competitors together). Concrete options: an x% cut of the booking (match the competitor/marketplace-standard model), or a flat $x per appointment booked (undercut competitors, since flat fees get relatively cheaper than a % cut as transaction size grows); also considered \"free for 30 days, followed by\" a paid model."},{q:"What are the six levers in the growth framework?",a:"(1) Acquire new customers from segments with product-market fit, (2) grow existing product usage in current segments/use cases, (3) grow existing product usage in new segments/use cases, (4) grow existing product usage in new geographies, (5) identify new complementary products, (6) identify new adjacent/new-area products."},{q:"In the DoorDash 3X example, how did the \"Meal Plans\" idea show up under two different growth levers?",a:"First under Lever 2 (grow existing usage, current segment/new use case) for the Busy Affluent segment via Private Chefs cooking in an industrial kitchen. Then again under Lever 3 (grow existing usage, new segment/same use case) for a Busy-but-Price-Conscious segment (college students, early-career singles) via group ordering for large buildings — same underlying job, served to a different segment with a different mechanism."},{q:"What's the final step insisted on after generating growth ideas across all six levers, and what shape does it take?",a:"Prioritize and build a portfolio — don't present a flat list. Lay ideas out on a Phase 1/2/3 x (Growing existing products / New product bets) matrix so the answer shows explicit sequencing, not just an exhaustive but unordered list of ideas."}]},
{id:"intv-7",track:"intv",title:"Analytical Thinking — Root Cause Analysis",min:14,
body:`Analytical thinking interviews, and the follow-up grilling embedded inside any product-sense question, fall into three categories: **Root Cause**, **Trade Off/Product Decisions & Analysis**, and **Estimation**. This lesson covers Root Cause Analysis in depth — the four-step drill, an alternate compressed lens, and three fully worked examples.

## 1. Root cause analysis — the 4-step drill

## Step 1: categorization — is it "us" or the "market"?

Before touching any data, bucket the possible causes into two families. The outcome of this step is a single fork: **Operational & Engineering issue vs. core Product/Marketing issue**.

**Operational & Engineering issues** fall into four categories:

- **Measurement Accuracy** — logging, data querying, and dashboard visualization; a shocking share of "metric crises" turn out to be a broken dashboard query, not real user behavior
- **Platform Issues** — device (iOS, Android, mobile web, desktop), OS (Windows, macOS, Chrome OS, Linux), and browsers (Chrome, Firefox, Safari, IE)
- **Infrastructure Issues** — the hardware infrastructure stack, web/native app integrations such as deep links from mobile web into the app, partner integrations, and geography (US, EU, APAC, Africa, even east coast vs. west coast within a country, since timezone and regional infra can differ)
- **Product Launch Issues** — app releases and web release notes, error logs, latency and performance metrics, spammy content or reduced content due to feed errors, and search/navigation issues

**Product/Marketing issues** are what remains once ops/engineering is ruled out, falling into three categories: **External Factors** (outside forces not caused by the product itself, such as seasonality, competitor moves, or macro conditions), **Marketing Impact** (changes in campaign spend, targeting, or channel mix), and **Product Experience/User Behavior** (the product itself changed, or users' underlying behavior shifted).

> Always check the four operational/engineering categories first, in order, before assuming the problem is a "real" product issue — it's cheaper to rule out a broken pipeline than to design an experiment chasing a phantom behavioral cause.

{{DIAGRAM:0}}

## Step 2: dig into the data — locate the abnormality precisely

Once ops/engineering is ruled out, three complementary lenses are usually combined:

- **Segment tree** — branches the metric by factor, and each factor branches into its constituent segments (e.g., Metric by Factor A into Segment A1, A2; by Factor B into Segment B1, B2, B3). Which factors matter is product-specific: customer segmentation by product type, acquisition channel, customer lifestage, or marketplace dynamics like geography or topics/categories — there's no universal segment list.
- **Funnel/user journey** — lays out the funnel stages top-down, a set of nested funnels, wide at top narrowing down. Shape depends on product type (media, marketplace, productivity, messaging, business, ads) and which stakeholder has the metrics issue, customers or partners such as creators, sellers, drivers, restaurants. Cross the funnel against segments in a matrix so you can see at a glance which segment is breaking at which stage.
- **Submetric decomposition** — breaks the top-line metric into component parts, tree-style (e.g., Revenue into Customers, Orders/Customer, Avg. Order Value). Cross submetrics against segments the same way as the funnel.

The outcome of Step 2 is a specific, located abnormality, taking one of five possible shapes: an abnormality in some segment; in some funnel stage; in some submetric; in some segment for some funnel stage (a segment x funnel-stage matrix cell); or in some submetric for some segment (a submetric x segment matrix cell). Naming which of these five shapes you've found tells you exactly which matrix to build the hypothesis table on next.

## Step 3: build the hypothesis table

For the specific located abnormality, generate hypotheses across four lenses: **Product Experience/Ranking-Recommendations-Backend, Customer Behavior/Psychology, and Marketing/Sales**. Build a hypothesis table with rows as the specific issues — segment plus funnel-stage combination — and columns for the hypothesis type. Each cell is a specific, testable hypothesis, not a vague direction — "poor first-order experience" is a hypothesis; "the product is bad" is not.

## Step 4: propose experiments

For each hypothesis from Step 3, propose a specific change to test it, using the same table structure extended with an Experiments/Changes column. This closes the loop: **categorize, then locate, then hypothesize, then test.**

## Alternate lens: the 6-question compressed approach

A second, more compact framing of the same root-cause process is useful as a fast mental checklist to narrate out loud in an interview when the full 4-step drill is too slow to lay out from scratch. Run through six questions in order:

- **Product Description** — what does this product do?
- **Purpose/Mission** — what is the mission of this product?
- **Data Hypotheses** — what underlying data patterns could cause this anomaly?
- **Product/User Hypotheses** — what product features or user actions could lead to this data?
- **Additional Insights** — what additional information do you need?
- **Actions** — what will you do about this?

This maps onto the 4-step drill, categorize to dig into data to hypothesize to experiment, but starts one layer earlier, grounding the answer in the product's actual purpose before touching data — which matters most when the interviewer picks an unfamiliar product and you need thirty seconds to orient before hypothesizing.

{{DIAGRAM:1}}

## Worked example: Facebook Groups — group count stagnant, Groups DAU growing

Prompt: "You are a PM on Facebook Groups. The number of FB Groups is stagnating but Groups DAU is growing. What would you do?" Running the 6-question approach end to end.

**Product Description**: Groups has both public and private groups serving different purposes — public groups are large interest communities that compete with Reddit/subreddits; private groups are mostly small friends-and-family groups, or small organizations. **Mission**: help people build communities.

**Data Hypotheses**, four in total, each with an explicit rationale:

- Public groups are acquiring a larger number of users and using the product more — since group count is stagnant while group DAU is growing, more people must be concentrating into fewer, more successful groups
- Private group creation and adoption has stagnated — if private-group usage were growing, private group creation would grow with it, and it isn't
- A large number of dormant group members reactivated — people who were part of groups but not using them all started using them again
- Group creation itself isn't working — a straightforward "the create-flow is broken" hypothesis

Product & User Hypotheses split by which data hypothesis they explain. For **Public Group Growth**: features that promote groups content in feed could be working; group recommendations are working; admin and group behavior is driving both growth and engagement. For **Private Group Stagnation**: people could be using Meta's other messaging apps — WhatsApp, IG Direct, Messenger — instead of FB Groups; people could be using other messaging/community products like Discord, Slack, or iMessage.

A judgment step inserted before deciding what to do — "**Good or Bad?**" — labels each hypothesis-confirmed pattern before prioritizing follow-up, since not every one is equally worth acting on: public companies/interest-groups growing is good, short and long term, since it's core to the product mission and competes directly with subreddits. Reactivation is good in the short term but needs verification — is it a sustainable trend or a one-off spike, and why? Friends-and-family private groups stagnating is **bad** — private groups are critical to Meta's mission long-term, and it's specifically worth investigating rather than shrugging off, since public growth is masking it in the aggregate DAU number.

**Additional Information** needed: for the public side, which groups are succeeding and why, and whether the growth driver is a Meta feature that's scalable or organic admin/community behavior that's harder to force. For the private side, are friends-and-family groups on WhatsApp/IG Direct/Messenger trending in the right direction, and are competitor platforms like Discord and iMessage pulling friends-and-family use cases away from Groups.

**Actions**: for the public side, if feature-driven, scale it responsibly and sustainably; if community/admin-behavior-driven, productize the behavior and encourage all communities to adopt it. For the private side, if friends-and-family usage is trending up on Meta's other apps, lean into growing it there via messaging-app integration; if it's not growing anywhere in Meta's family, look for ways to accelerate; if people have moved to outside platforms, explore competing by leveraging community messaging and WhatsApp Communities as a bridge back to Groups.

## Worked example: DoorDash — installs growing, daily orderers stagnant

Prompt: "You are a PM at DoorDash. Installs are growing steadily but Daily Users who order has stagnated. What would you do?" The explicit two-step method: first, the metrics issue is already constrained by the funnel — you know it's downstream of install, so you don't need to re-derive that; second, identify segments and issues by segment. Segments used: user lifestage (New vs. Existing) and market maturity (New vs. Mature market).

{{DIAGRAM:2}}

Segment-by-funnel-stage analysis surfaces four distinct issues, each with its own data hypotheses and each needing a different fix:

- **New Users who install but don't open the app**: data hypotheses are app-install ad campaign leading to poor clicks, installed during non-food hours and forgot to use the app, incentivizing people to download without intent to use; actions are evaluating ad placements/creatives for spamminess, targeting ad campaigns during lunch/dinner dayparts, evaluating targeting criteria and post-install performance.
- **New Users who install and open the app but don't place orders**: data hypotheses are not finding a restaurant they like, and friction in placing the first order causing abandonment; actions are improving the onboarding flow by asking favorite restaurant and capturing preferences to get the first order right, and improving purchase flows.
- **New Users who install, place orders, but churn just as high as those who never ordered**: data hypotheses are poor first-order experience, or coming to DoorDash just to use a promo; actions are improving the onboarding flow, improving the purchase flow, and evaluating incentives given for the first order.
- **Existing Users with high churn**: data hypotheses are cost-based churn and health-driven churn; actions are loyalty programs with delivery discounts, and a healthy-option program with planning tools.

The lesson: one aggregate metric — "daily active orderers stagnant" — hides four unrelated root causes, each needing a different fix. **Don't stop segmenting until each remaining slice points to a single, specific, testable hypothesis.** A single blanket fix, like "run more ads," would only address one of the four issues and leave the other three untouched.

## Worked example: Tinder — 1% of men get all the dating requests
