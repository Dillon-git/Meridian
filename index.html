{id:"comm-1",track:"comm",title:"BLUF: Writing for Executives",min:6,
body:`Executives read differently: they scan for the decision, the risk, and the ask. Writing that makes them excavate for those loses the room before paragraph two.

## Bottom Line Up Front
First sentence = the conclusion or ask. Not context, not journey. "We should delay the launch two weeks; the eval regression is real and fixable" — then evidence. Structure everything as answer-first, pyramid beneath: conclusion → 2–4 supporting arguments → data. If they stop reading at any point, they still have the most important thing you know.

## The craft rules
One idea per paragraph. Numbers over adjectives ("cut latency 40%" not "dramatically faster"). Name the uncertainty honestly — executives trust people who volunteer what they don't know. Kill hedging filler ("it seems like it might be worth considering") — hedge with precision instead ("70% confident; the open risk is X"). Signpost decisions needed: DECISION NEEDED, FYI, BLOCKED are three different emails; label which one this is.

## Status updates that build trust
The format that works: headline state (green/yellow/red + one sentence why), what changed since last update, top risk and what you're doing about it, the ask. Consistent structure means readers learn where to look — variance is cognitive tax. Deliver bad news at the same speed as good news, with a plan attached; nothing builds a reputation faster.`,
takeaways:["First sentence carries the conclusion or ask; pyramid beneath","Hedge with precision ('70% confident, risk is X'), never with mush","Bad news at the same speed as good news, always with a plan attached"],
cards:[
 {q:"What is BLUF structure?",a:"Bottom Line Up Front — conclusion or ask in the first sentence, then supporting arguments, then data. The reader who stops early still has the essential."},
 {q:"How should you hedge in executive writing?",a:"With precision — '70% confident; the open risk is X' — never with filler like 'it might be worth considering.'"},
 {q:"What four elements make a trustworthy status update?",a:"Headline state (color + why), what changed since last time, top risk + mitigation, and the explicit ask."}
]},
{id:"comm-2",track:"comm",title:"The MOO Framework: Pre-empting Objections",min:6,
body:`Before any pitch, proposal, or contentious review, identify the **Most Obvious Objection** — the pushback a smart skeptic will raise within thirty seconds — and address it before they can.

## Why pre-emption beats rebuttal
Raising the objection yourself does three things: proves you've thought it through (competence), removes the gotcha moment (the objector has nothing to win the room with), and reframes the discussion from "is this flawed?" to "is their answer to the flaw good enough?" — much friendlier territory. Objections you handle in the appendix are credibility; objections that ambush you are doubt about everything else you said.

## The practice
Draft your proposal, then role-play the three toughest people in the room. What does finance ask? (Cost per task at scale.) What does the staff engineer ask? (What happens when the model provider changes behavior?) What does legal ask? (Where does customer data go?) Write each objection at full strength — steelman, not strawman — then either fix the plan (the objection was right!), or prepare the concise answer with evidence.

## The meta-skill
Half the value is upstream: proposals change because the MOO exercise finds real flaws before the meeting. If you can't answer the MOO convincingly, you're not ready to pitch — you're ready to do more homework. The strongest form: open the pitch with it. "The obvious concern here is cost at scale. Here's why it's manageable..."`,
takeaways:["Identify and pre-empt the Most Obvious Objection before your audience raises it","Steelman objections at full strength; if you can't answer the MOO, you're not ready","Opening with the objection converts skepticism into credibility"],
cards:[
 {q:"What is the MOO framework?",a:"Identify the Most Obvious Objection a smart skeptic would raise, and address it pre-emptively at full strength — in the pitch itself."},
 {q:"Why does pre-empting an objection beat rebutting it live?",a:"It signals thoroughness, removes the gotcha, and reframes debate from 'is this flawed?' to 'is their answer good enough?'"},
 {q:"What does it mean if you can't answer your MOO convincingly?",a:"You're not ready to pitch — the exercise found a real flaw. Fix the plan first; that's half the framework's value."}
]},
{id:"comm-3",track:"comm",title:"Managing Up & Stakeholder Craft",min:7,
body:`Managing up is not flattery — it's making your manager and executives effective on your behalf: right information, right format, right time, no surprises.

## The operating rules
**No surprises, ever.** Bad news travels to your boss from you, first, with a plan. The career damage from surprises exceeds the damage from the underlying problem. **Learn their format.** Some leaders want a page of prose, some want three bullets, some want the spreadsheet. Delivering brilliance in the wrong format is delivering friction. **Bring options, not problems.** "Here's the situation, here are three paths, I recommend B because X" — you keep the judgment, they keep the decision. **Make their goals explicit.** Your project is a line item in their portfolio; frame your updates in their currency (their OKRs, their exposure, their boss's questions).

## The stakeholder map
Plot power × interest. High-power/high-interest: manage closely, co-create. High-power/low-interest: keep satisfied — efficient summaries, no noise. Low-power/high-interest: keep informed generously (they're often your best evangelists and early-warning system). Low/low: minimal, polite. Re-map at every org change; power moves.

## Disagreeing upward
Privately first. With evidence, in their decision frame ("given your goal of X, this risks Y"). Then commit visibly once decided — relitigating decisions in hallways is how influence dies. If it's a matter of integrity, that's different: escalate formally.`,
takeaways:["No surprises: bad news travels up from you first, with a plan","Bring options with a recommendation, framed in the stakeholder's currency","Disagree privately with evidence; commit visibly after the decision"],
cards:[
 {q:"What's the cardinal rule of managing up?",a:"No surprises — bad news reaches your manager from you, first, with a plan attached."},
 {q:"How do you present a problem to a senior leader?",a:"Options, not problems: the situation, 2–3 paths, and your recommendation with reasoning — they keep the decision, you keep the judgment."},
 {q:"What's the protocol for disagreeing with a senior decision?",a:"Privately, with evidence, framed in their goals. Once decided, commit visibly — hallway relitigating destroys influence."}
]},
{id:"comm-4",track:"comm",title:"Narrative: The PM's Sharpest Tool",min:6,
body:`Data informs; stories move. The PMs who shape company direction are almost always the best narrative-builders — because organizations are groups of people deciding under uncertainty, and humans decide through story.

## The working-backwards memo
Amazon's discipline: write the press release and FAQ before building. The press release forces customer-language value ("what would we proudly announce?"); the FAQ forces the hard questions (pricing, why now, why us). If the press release is boring, the product is boring — cheapest possible time to learn that. Six-page narratives beat slide decks for decisions because prose exposes reasoning gaps that bullets hide; the meeting starts with silent reading, so the document must stand alone.

## Story structure for product pitches
Status quo → inciting tension (the world changed / the pain deepened) → stakes (what happens if we don't act) → resolution (your proposal) → proof (evidence it works) → the ask. Note the proposal arrives AFTER the tension is felt. Pitches that open with the solution ask the audience to care before giving them a reason.

## Vision narratives
The 2–3 year story of the product's world: concrete enough to feel ("a rep opens the deal and the brief is already written"), flexible on mechanism. Repeat it until you're bored of it — that's approximately when the organization has begun to hear it.`,
takeaways:["Write the press release first — if it's boring, the product is boring","Structure pitches tension-first; the proposal lands only after stakes are felt","Repeat the vision past your own boredom — that's when it starts landing"],
cards:[
 {q:"What is working backwards (PR/FAQ)?",a:"Writing the press release and FAQ before building — forcing customer-language value and hard questions at the cheapest possible moment."},
 {q:"Why do narrative memos beat slide decks for decisions?",a:"Prose exposes reasoning gaps that bullets hide, and a silent-reading start means the document must stand entirely on its own."},
 {q:"What's the correct order in a pitch narrative?",a:"Status quo → tension → stakes → THEN the proposal → proof → ask. Solutions presented before tension ask people to care without a reason."}
]},
{id:"comm-5",track:"comm",title:"LNO: Where Your Hours Go",min:6,
body:`Shreyas Doshi's LNO framework: tasks are not equal, so effort shouldn't be either. **Leverage** tasks return 10x+ (strategy docs, hiring, evals design, the pitch that unlocks headcount). **Neutral** tasks return ~1x (routine reviews, standard updates). **Overhead** returns less than the time invested (status theater, meetings you attend out of politeness).

## The core move
Do L tasks at your absolute best — slow down, revise, obsess. Do N tasks merely well. Do O tasks fast and imperfectly, or delete/delegate/automate them — a B-minus expense report is a correct expense report. The failure mode of conscientious people is polishing overhead: it feels virtuous and costs you your leverage hours. Perfectionism applied uniformly is a strategy error, not a virtue.

## Auditing yourself
Weekly: label last week's calendar and task list L/N/O honestly. Most PMs find under 20% leverage. Then engineer the ratio: batch overhead into fixed windows, template the neutral, and protect deep blocks for leverage work — leverage tasks need contiguous hours; they're exactly the tasks that die by fragmentation.

## The AI-era addendum
AI is an LNO machine: it converts N and O work (summaries, first drafts, data pulls, meeting notes) into minutes. PMs who delegate their N/O layer to AI and reinvest the hours in L work compound; PMs who use the saved time to do more overhead don't. The framework tells you where the reinvestment goes.`,
takeaways:["Label work L/N/O; excellence is for leverage tasks only — B-minus overhead is correct","Protect contiguous deep blocks: leverage work dies by fragmentation","Delegate N and O to AI and reinvest saved hours in L — that's the compounding loop"],
cards:[
 {q:"What do L, N, and O stand for and what effort does each deserve?",a:"Leverage (10x return — your absolute best), Neutral (~1x — merely good), Overhead (<1x — fast and imperfect, or deleted/delegated/automated)."},
 {q:"What's the failure mode of conscientious PMs under LNO?",a:"Polishing overhead — uniform perfectionism feels virtuous but spends leverage-hours on sub-1x work."},
 {q:"How should AI change your LNO allocation?",a:"Push Neutral and Overhead work to AI (drafts, summaries, data pulls) and reinvest the freed hours in Leverage work — that's where compounding happens."}
]}
);

{id:"case-1",track:"case",title:"Case: GitHub Copilot — The Inline Pattern Wins",min:7,
body:`Copilot became the archetype AI product not because its model was unbeatable but because its product decisions were nearly perfect for trust mechanics.

## The design bets
**Inline, not chat-first:** suggestions appear in the editor as ghost text, accepted with tab, ignored by just... typing. Cost of a bad suggestion ≈ zero; value of a good one is instant. This is the platonic low-stakes/high-frequency AI surface. **The developer stays the author:** Copilot never commits code; every character passes through the human. Automation level matched to trust level from day one. **Verification is native to the domain:** code either runs or doesn't; tests pass or don't. The user can always check the work — which makes imperfect suggestions acceptable in a way imperfect medical advice never is.

## The metrics story
Acceptance rate became the industry-defining AI metric, refined by survival (how much accepted code remains after 30 seconds, after a week). Reported productivity gains and the % of committed code written by AI gave the business narrative.

## The lessons
Choose surfaces where wrong outputs are cheap and verification is instant. Match autonomy to earned trust. Ship where the data flywheel is native (edits are labels). And the durability caution: the pattern was copiable — model-layer advantage decayed within a year; distribution (IDE + GitHub) is what held. Product patterns are defensible for quarters; distribution and workflow depth for years.`,
takeaways:["Pick surfaces where bad outputs cost nothing and verification is instant","Keep the human the author until reliability earns more autonomy","Product patterns get copied in quarters; distribution and workflow hold for years"],
cards:[
 {q:"Why was Copilot's inline ghost-text pattern so effective?",a:"Ignoring a bad suggestion cost nothing (keep typing) and accepting a good one was instant (tab) — perfect low-stakes, high-frequency trust mechanics."},
 {q:"What made code the ideal first domain for generative AI?",a:"Native verification — code runs or doesn't, tests pass or don't — so imperfect outputs were acceptable and checkable."},
 {q:"What was Copilot's durable moat once the pattern was copied?",a:"Distribution (IDE integration + GitHub) and workflow depth — not model quality, which competitors matched within a year."}
]},
{id:"case-2",track:"case",title:"Case: ChatGPT — Interface as Innovation",min:7,
body:`GPT-3 existed for two years before ChatGPT. The model that launched the fastest-growing consumer product in history was only modestly better — the revolution was packaging intelligence as conversation.

## Why the chat interface detonated
Zero learning curve: every human already knows how to converse. Immediate, personalized value in the first session. Infinitely demo-able — screenshots of conversations became self-propagating marketing; every user's use case was novel content. And RLHF made it feel like it was trying to help — the assistant persona itself was the product innovation as much as any capability.

## PM lessons
**Capability overhang:** the model could already do this; nobody had wrapped it right. At any moment, huge latent value sits in existing technology awaiting the right interface. Ask "what can current models do that no product has packaged?" — that question IS the AI startup landscape. **Friction is the moat you remove:** the playground with settings and API keys served the same model; framing it as "chat" removed identity friction (who is this for? everyone) and skill friction. **Fast-follow reality:** launch as research preview, learn from millions, productize behind the wave.

## The counter-lesson
Chat's very universality is its product weakness — a blank text box gives no affordances for what it's good at (the discoverability problem every LLM product has fought since). Universal interfaces win adoption; purpose-built interfaces win workflows. The market has room for both, but confusing which game you're playing is fatal.`,
takeaways:["Capability overhang: latent value sits in existing models awaiting the right interface","The assistant persona and zero-friction chat framing were the innovation, not the model","Universal interfaces win adoption; purpose-built interfaces win workflows"],
cards:[
 {q:"What is capability overhang?",a:"Latent value in existing technology that no product has packaged correctly yet — GPT-3 existed for 2 years before ChatGPT wrapped it as chat."},
 {q:"Why did the chat interface specifically cause explosive adoption?",a:"Zero learning curve, instant personalized value, self-propagating screenshots, and an assistant persona everyone could relate to."},
 {q:"What is chat's inherent product weakness?",a:"A blank box gives no affordances — users can't discover what it's good at. Universal interfaces win adoption but lose structured workflows to purpose-built tools."}
]},
{id:"case-3",track:"case",title:"Case: Netflix Personalization — The Invisible AI",min:6,
body:`Netflix's recommendation system may be the most economically successful AI product ever built — and most users never think about it. That invisibility is the design lesson.

## The business framing
Netflix framed recommendations not as a feature but as core economics: personalization reduces churn, and churn is the business. Their estimate — savings of $1B+ per year — came from tying the system to retention, not engagement vanity metrics. The PM lesson: AI investments survive budget cycles when framed as core-metric infrastructure, not innovation theater.

## Design choices worth stealing
**Everything is the recommender:** not a "recommended for you" row but the entire homepage — every row, every ordering, even the artwork per title is personalized (the same show shows different thumbnails to different users, tested relentlessly). **Proxy metric honesty:** they learned early that what people SAY they want (star ratings, documentaries) diverges from behavior (what they actually watch), and rebuilt around behavioral signals. Declared preference lost to revealed preference — a lesson every AI personalization effort relearns. **The 90-second window:** users who don't find something in ~90 seconds leave; the system optimizes time-to-satisfying-choice, a sharp, user-centered objective rather than raw engagement.

## The caution
Optimizing revealed preference has a known failure mode: the system feeds impulses users themselves wouldn't endorse (the doom-scroll dynamic). Durable personalization balances revealed behavior against user-stated goals — otherwise you win the metric and erode the relationship.`,
takeaways:["Frame AI as core-metric infrastructure (retention), not innovation theater","Revealed preference beats declared preference — build on behavior","Optimize a user-centered objective (time-to-satisfying-choice), and balance it against stated goals"],
cards:[
 {q:"How did Netflix justify massive recommendation investment?",a:"Framed as core economics — personalization reduces churn, worth an estimated $1B+/year in retention. Infrastructure, not innovation theater."},
 {q:"What did Netflix learn about ratings vs behavior?",a:"Declared preferences (star ratings, 'I want documentaries') diverge from revealed preferences (what people actually watch) — behavioral signals won."},
 {q:"What's the failure mode of pure revealed-preference optimization?",a:"Feeding impulses users wouldn't endorse (doom-scroll dynamics) — winning the metric while eroding the relationship. Balance against stated goals."}
]},
{id:"case-4",track:"case",title:"Case: Notion AI vs Jasper — Feature vs Product",min:7,
body:`In 2022 Jasper was the AI-writing rocket: $75M ARR, $1.5B valuation. Then models became commodities, ChatGPT gave the capability away, and incumbents embedded writing AI inside the tools where writing already happened. Jasper's standalone value evaporated; Notion AI, launched as a feature inside an existing workflow, thrived comparatively.

## The structural lesson
Ask of any AI product: **is this a product, or a feature of someone else's product?** The test isn't capability, it's context — where does the work live? Writing lives in docs, notes, email. A separate destination for AI writing forces a copy-paste tax and owns none of the context that makes output good. Notion AI knew your pages; Jasper knew your prompt.

## Wrapper risk, honestly assessed
"Thin wrapper" isn't a death sentence — it's a starting position with a clock running. The wrapper survives if it accumulates one of: proprietary context (your data, wired in), workflow ownership (the work happens here), distribution (bundled where users already are), or network effects. Jasper had none by the time the wave hit; cheaper capability underneath destroyed it.

## PM application
When proposing an AI product, locate it honestly on this map. If the capability is the whole story, incumbents with context and distribution will absorb it. The question is never "can we build the capability?" — it's "why do WE keep the customer when the capability is everywhere?"`,
takeaways:["Ask: product or feature? Where the work lives determines who wins","Wrappers survive only by accumulating context, workflow, distribution, or network effects","'Why do WE keep the customer when the capability is everywhere?' is the load-bearing question"],
cards:[
 {q:"Why did Jasper collapse while Notion AI thrived?",a:"Writing work lived inside docs/notes tools — Notion had the context and workflow; Jasper was a separate destination whose capability became free everywhere."},
 {q:"What four assets can save a 'thin wrapper' product?",a:"Proprietary context, workflow ownership, distribution, or network effects — accumulated before the underlying capability commoditizes."},
 {q:"What's the load-bearing question for any AI product proposal?",a:"'Why do WE keep the customer when this capability is everywhere?' — capability alone always commoditizes."}
]},
{id:"case-5",track:"case",title:"Case: Duolingo — Gamified Retention as Science",min:6,
body:`Duolingo turned habit formation into an engineering discipline — and its mechanics are the reference kit for any daily-use product (including the one you're using right now).

## The mechanics that matter
**Streaks** are the flagship: loss aversion (breaking a 200-day streak hurts more than a lesson delights) converts motivation into obligation. Refined with streak freezes — because a single unforgivable miss causes abandonment, not recommitment; forgiveness mechanics INCREASE long-term retention. **Leagues and leaderboards** exploit relative comparison in short cycles. **Calibrated notifications** — timed to each user's historical practice window. **Spaced repetition** under the hood chooses what to practice, personalizing difficulty to the edge of ability.

## The experimentation machine
None of this was designed by intuition alone: Duolingo runs hundreds of concurrent experiments, and famously found counter-intuitive wins (the passive-aggressive "these reminders don't seem to be working, we'll stop for now" notification outperformed — it weaponized the relationship itself). Their bet: retention compounds, so a 0.1% DAU improvement is worth an experiment cycle.

## The honest caveats
Gamification can hijack the goal: optimizing streak maintenance is not optimizing learning; users learn to farm XP with easy reviews. Duolingo continually re-anchors mechanics to learning outcomes. The PM lesson: gamify progress toward the user's true goal, audit for mechanic-farming, and add forgiveness — the point is the habit, not the punishment.`,
takeaways:["Loss aversion (streaks) converts motivation into obligation — but always add forgiveness mechanics","Retention compounds: tiny DAU wins justify serious experiment investment","Gamify the user's true goal and audit for mechanic-farming, or the game replaces the purpose"],
cards:[
 {q:"Why do streak freezes increase long-term retention?",a:"A single unforgivable miss causes abandonment, not recommitment — forgiveness mechanics keep the habit alive through inevitable lapses."},
 {q:"What's the core risk of gamification?",a:"Mechanic-farming: users optimize streaks/XP instead of the true goal (learning) — mechanics must be re-anchored to real outcomes continually."},
 {q:"What justified Duolingo's hundreds of concurrent experiments?",a:"Retention compounds — a 0.1% DAU improvement recurs indefinitely, making tiny wins economically enormous."}
]}
);

{id:"intv-1",track:"intv",title:"Product Thinking — The CTUC Framework",min:10,
body:`**Product Thinking** is the skill of taking an ambiguous market and generating a compelling product solution: one that solves a high-value user problem and drives a successful business outcome. Satish Mummareddy's PM interview bootcamp breaks it into four sequential components — **Context & Motivation**, then **Target Audience**, then **User Problems**, then **Creative Solutions**, abbreviated **CTUC**. The framework covers three applications: an overview of the four components, applying product thinking at work and in interviews, and applying it at different altitudes or levels.

## What makes a product worth building

Before the four components, it helps to define the target state CTUC is aiming you toward. A compelling product hits all six of:

- A **large market opportunity**
- Solving **high-value customer problems**
- Customers with genuine **willingness to pay**
- Clear **differentiation** from current solutions
- **Profitability** for the company
- The ability to **compete and win** in the market

Skipping straight to solutions — the default instinct in any brainstorm — means optimizing without knowing whether the underlying problem or audience was even worth solving for. CTUC exists to force the earlier validation before you spend effort on a fix.

> CTUC exists to force validation of the problem and the audience before you spend a single hour on a fix — solving the wrong problem well is still solving the wrong problem.

## Context & Motivation: why now, why us

**Context & Motivation** answers: What are the value-creation opportunities and value-destruction risks in this market? What are the value-capture dynamics in this market? What customer mindset, technology, and competitive forces are driving them? What is the motivation for the company to innovate or invest in this market at all? This is the "why now, why us" layer — get it wrong and every downstream choice is built on sand.

{{DIAGRAM:0}}

## Target Audience and User Problems

**Target Audience** answers: Which customers are the most valuable to focus on in this market? Which high-value customers is the company well-positioned to serve and win? What partners does the company need to serve them well? Note the explicit "**well-positioned to win**" filter — this isn't just "who has the biggest need," it's "who can we credibly win given our specific advantages."

**User Problems** answers: Which problems are most important and urgent for the target customers? Which problems do they have high willingness to pay to solve? What sequence should the high-value customer problems be tackled in? The sequencing question matters as much as the problem identification — most real products solve several problems, and the order you tackle them in is itself a strategic choice.

## Creative Solutions: the 11/10 bar

**Creative Solutions** answers: What would an **11/10 experience** look like for the highest-value customer problems? How can technology and humans be combined to provide a high-quality solution? Which solutions should be prioritized, and in what sequence? The "11/10 experience" framing, not "10/10," is deliberate — it pushes past "good enough" to an aspirational bar before you start trimming for feasibility.

Each component's outcome, stated explicitly: **Context & Motivation and Target Audience together tell you where to play**; **User Problems and Creative Solutions tell you how to win**.

## Applying CTUC at work vs. in interviews vs. live

The same four boxes get filled from different inputs depending on the setting, and the **compression itself is the whole skill**.

- **At work**, over a four-to-eight-week discovery cycle: inputs are market research, internal data, primary user research, design sprints, and prototype testing, flowing into the four CTUC boxes over weeks. At this depth you run CTUC twice — first explore the full tree, laying out every segment times every problem times every solution as an exhaustive grid (for example Segment A has problems P.A1 through P.A4, each with its own candidate solutions S.A1.1 through S.A4.1, and the same for Segments B and C), then prioritize within the tree, using highlighting or scoring to cut the full grid down to the highest-value combinations worth actually pursuing.
- **In interview preparation**, spanning four to twenty hours: inputs compress to market research, primary research, theme and market preparation, and hypothesis generation from mental models. You're condensing months of at-work inputs into hours, which is why having pre-built mental models — like a seven-jobs-of-money map, or a library of product themes — matters: you can't do primary research in an interview, so you substitute structured priors.
- **In a live thirty-minute interview**: inputs compress further to insights recalled from theme preparation, insights recalled from market preparation, mental models, hypothesis generation, and real-time interviewer feedback. At this depth there's no time for the full-tree exploration — you go straight to sequential prioritization: pick one segment, drill into its top problem, propose its top solution, and defend the choice out loud, adjusting based on what the interviewer pushes back on.

{{DIAGRAM:1}}

The practical implication: rehearsing CTUC only in its full, at-work form (exhaustive grids) doesn't train the compressed skill you actually need live. **Practice the sequential-prioritization version directly.**

## Product Thinking at different altitudes

CTUC applies at multiple **altitudes** — company/industry level, product-group level, theme level, task level, sub-task level, action level, from higher/broader scope down to lower/narrower — and the framework itself doesn't change; only the scope of "market" being analyzed does. Product complexity by altitude runs, from broadest to narrowest:

- Company/Industry level
- Product Group level
- Theme level
- Task level
- Sub-task level
- Action level

A dating-app example walks the same ladder: "How to build a new dating app for youth (20 to 30)?" is company/industry altitude. "How to serve women better on Tinder or Match?" is product group. "How to improve matches on Tinder or Match?" is theme. "How to improve onboarding on Tinder or Match?" is task. "How to improve the profile page?" is sub-task. "How to improve the photo-selection flow?" is action. Each of these is a legitimate CTUC prompt — Context, Audience, Problems, and Solutions all still apply — just scoped to a narrower slice of the same product.

{{DIAGRAM:2}}

## Altitude maps to seniority and skill

**Altitude roughly maps to PM seniority** (focus on relative scale, don't worry about exact terminology): Company/Industry level pairs with IC9+ or Director+; Product Group level pairs with IC7/8, M2, or D1; Theme level pairs with IC5/6 or M1; Task level pairs with IC4/5; Sub-task and Action level pairs with IC3.

Altitude also maps to **skill emphasis**: Company/Industry level draws most on Identify Market Opportunities; Product Group level draws on Identify Product Opportunities; Theme level draws on Identify Customer Problems; Task level draws on Identify Creative Solutions; Sub-task/Action level draws on Identify Delightful Experiences. Read together with the seniority mapping, this says something concrete about career growth: **moving up levels isn't just "do more of the same thing bigger"** — it requires shifting which of the CTUC skills you're primarily exercising, from delightful execution-level details at IC3 toward market-opportunity judgment at Director+.

## Naming your altitude signals seniority

When you get a product-sense prompt, the altitude is often ambiguous or given away by the phrasing — "how would you improve X's onboarding" is task/sub-task altitude; "how should X enter a new market" is company/industry altitude. **Naming the altitude explicitly** at the start of your answer, and asking the interviewer to confirm scope if it's ambiguous, is itself a signal of seniority — it shows you know CTUC generalizes and you're choosing your scope deliberately rather than guessing.`,
takeaways:["CTUC = Context & Motivation, then Target Audience, then User Problems, then Creative Solutions, run in that order so solutions are grounded in a validated problem and audience; Context+Audience answer \"where to play,\" Problems+Solutions answer \"how to win\"","The same four boxes apply at every altitude, company down to single-action — only the scope of \"market\" changes; altitude roughly maps to both PM seniority level and which CTUC skill is most emphasized, market opportunities at the top, delightful experiences at the bottom","At work you explore the full segment x problem x solution tree then prioritize within it; interview prep compresses that into hours of hypothesis-driven prep; a live interview compresses further into real-time sequential prioritization on a single thread — these are different skills and should be practiced separately"],
cards:[{q:"What are the four components of the CTUC product thinking framework, in order, and what pair of questions do the first two vs. last two answer together?",a:"Context & Motivation, Target Audience, User Problems, Creative Solutions. Context & Motivation + Target Audience answer \"where to play\"; User Problems + Creative Solutions answer \"how to win.\""},{q:"What are the six criteria for a product being compelling to build?",a:"Large market opportunity, solves high-value customer problems, customers willing to pay, clearly differentiated from current solutions, profitable for the company, and able to compete and win."},{q:"How does the depth and inputs of CTUC differ across at-work discovery, interview prep, and a live 30-minute interview?",a:"At work: market research, internal data, primary research, design sprints, prototyping over weeks, with a full-tree-explore-then-prioritize pass. Interview prep: market/primary research and hypothesis generation over hours. Live interview: recalled insights and real-time interviewer feedback, going straight to sequential prioritization on one thread — no time for the full tree."},{q:"What roughly maps to each altitude level in the PM-level ladder, from Company/Industry down to Sub-task/Action?",a:"Company/Industry ~ IC9+/Director+; Product Group ~ IC7/8/M2/D1; Theme ~ IC5/6/M1; Task ~ IC4/5; Sub-task/Action ~ IC3."},{q:"Which product-thinking skill is emphasized at the Company/Industry altitude vs. the Sub-task/Action altitude?",a:"Company/Industry emphasizes \"Identify Market Opportunities\"; Sub-task/Action emphasizes \"Identify Delightful Experiences\" — seniority growth shifts which CTUC skill you lean on most."},{q:"Why does naming the altitude of a product-sense prompt explicitly, at the start of your answer, signal seniority?",a:"It shows you understand CTUC generalizes across scope and that you're deliberately choosing or confirming scope rather than guessing at what the interviewer meant."},{q:"What does it mean to say the \"compression itself is the whole skill\" across at-work, interview-prep, and live-interview settings?",a:"The same four CTUC boxes get filled from progressively less input as the setting compresses — weeks of research at work, hours of prep before an interview, recalled insights in 30 live minutes — so rehearsing only the exhaustive at-work version doesn't train the real-time sequential-prioritization skill you actually need live."}]},
{id:"intv-2",track:"intv",title:"A. Context & Motivation — CTUC Deep Dive",min:12,
body:`The CTUC framework introduces **Context & Motivation** as the first box, answering "why now, why us." This lesson goes deeper into the actual sub-framework: how value gets created and destroyed in a market, the psychological layer underneath every technology product, the four forces that move value around at any moment, and where to actually go find the raw material — public filings, founder letters, conferences — to answer these questions for a real market.

## The four outcome questions, restated

Context & Motivation exists to answer, in order: What are the value-creation opportunities and value-destruction risks in this market? What are the value-capture dynamics in this market? What customer mindset, technology, and competitive forces are driving them? What is the motivation for the company to innovate or invest in this market at all? The component splits into four sub-sections: **the technology-product value chain**; how to do Context & Motivation well; sources of information; and what information feeds into Context & Motivation (which turns out to restate the sources content, since sourcing is treated as important enough to frame twice).

## A. The technology-product value chain

Value creation is a simple three-party loop. A **Provider** — one or more businesses, creators, or consumers — delivers a **Service or Good** to a **Customer** (consumer, business, or advertiser); the Customer sends **Payment** back to the Provider. "Payment" is broader than money — five things can flow as payment:

- Money
- Time
- Signals
- Contact Information
- Stored Money

Non-money payment types can be leveraged into money through other products. For example, a free app collects attention and signals, then monetizes those via ads sold to a different customer, the advertiser. The provider/customer pairing itself has recognizable patterns worth naming explicitly when framing a market: Business, Business+Business, Business+Sellers, Platforms+Drivers, Platforms+Restaurants+Drivers, Platforms+Creators, Platforms+Publishers, Platforms+Musicians, Platforms+Authors, Platforms+Podcasters, and Platforms+Consumers.

> Identify the real customer and the real provider for your product first — they aren't always who the product's UI makes them look like, and you can't segment correctly until you get this right.

The key takeaway for this section: identify the real customer and the real provider for your product; be clear about the payment mechanism or mechanisms; understand how non-money payments convert to money through adjacent products. This is a direct callback to CTUC's Target Audience component — you can't segment customers correctly if you haven't first correctly identified who the provider and customer actually are in the value chain.

{{DIAGRAM:0}}

## Twelve themes: organizing products by human need

Technology products can be organized by the underlying human need they serve — **twelve "themes"** in total:

- Entertain, Educate and Connect People — media by studios, traditional publishers, music/podcasts/audiobooks, creators, community, and friends & family
- Middleman Making Connections — marketplaces: local, ecommerce, real estate, short-term rentals, transportation, freelance, jobs, dating
- Always On Connection to People — communication, both private and large-group (two slots)
- Do More With Less — productivity: personal, enterprise, no/low-code tools
- Amplifying And/Or Replacing Humans on Some Tasks — Gen AI (business agents, consumer agents, creator agents/tools) and consumer hardware, operating systems, browsers, and search (two slots)
- Enhancing World and How We Interact With It — AR (assistants, spatial computing) and VR (games, experiences)
- Pays the Bills for the Free Stuff — advertising, general and vertical
- Makes It Easy(ier) to Make Money — ecommerce logistics, ecommerce dev and marketing, business website and marketing, business HR/finance/marketing/sales
- Moves, Stores, and Invests Money — payments (dev platforms, peer-to-peer) and finance (banking/credit, investments)
- Build On Top of Others — developer platforms (operating systems, tools) and design platforms

This grid is a fast way to place any unfamiliar company or product idea into a category before doing deeper research — ask "which of these 12 human needs is this actually serving" as the very first move.

## The psychological layer: needs, desires, and vices

The thesis for why value creation happens at all: technology products succeed by satisfying underlying human **Needs, Desires, and Vices** — and three separate psychological models stack together to build the vocabulary for naming them precisely.

**Maslow's Hierarchy of Needs** holds that universal human needs group into deficiency needs and growth needs, and individuals' basic needs must be met before they become motivated to pursue higher-level needs: Physiological, then Safety, then Belongingness/Love, then Esteem, then Self-fulfillment. The stated criticisms: people disagree with an absolute hierarchy since people move up and down it constantly, and there's an alternate view where needs overlap rather than stack strictly.

**Steven Reiss's 16 Basic Human Desires**, drawn from his book on desires that motivate our actions and define our personalities, are each defined in one line:

- Power — desire to influence others
- Independence — desire for self-reliance
- Curiosity — desire for knowledge
- Acceptance — desire for inclusion
- Order — desire for organization
- Saving — desire to collect things
- Honor — desire to be loyal
- Idealism — desire for social justice
- Social Contact — desire for companionship
- Family — desire to raise one's own children
- Status — desire for social standing
- Vengeance — desire to get even
- Romance — desire for sex and beauty
- Eating — desire for food
- Physical Activity — desire for exercise
- Tranquility — desire for emotional calm

**Vices** map to the Seven Deadly Sins: Pride (excessive self-esteem or arrogance), Greed/Avarice (desire for wealth, power, or possessions), Lust (desire for sexual pleasure), Envy (resentment or desire for others' possessions, qualities, or achievements), Gluttony (overindulgence in food, drink, or other pleasures), Wrath/Anger (anger or rage that can lead to violence, revenge, or harmful actions), and Sloth (laziness or reluctance to work or make an effort).

## The merged Need/Desire/Vice-to-Technology-Need table

These three models merge into one working table, organized by which Maslow tier each Need/Desire/Vice sits under — Self-fulfillment Needs, Psychological Needs, or Basic Needs — then translated into concrete "**Technology Need**" categories a product actually addresses:

- Power → Social Influence and Professional Influence
- Virtue → Idealism/Honor and Generosity
- Pride → Vanity/Celebration/Self Respect and Competition/Comparison
- Super Powers → Amplifying human capabilities
- Knowledge → Professional Learning, General Knowledge/Current Affairs, Hobbies/Curiosities
- Wealth → Make Money, Save Money, Grow Money
- Relaxation/Boredom → Passive Entertainment, Active Entertainment, Mindfulness/Mental Fitness
- Connection → Friends & Family, People with Shared Interests, Peers/Mentors
- Romance → Intimate Relationship
- Appearance → Exercise/Training/Yoga and Fashion/Makeup
- Convenience → Save Personal Time, Delivery Speed, Reduced Effort, Reduced Friction

The practical use: when you're stuck articulating why a product idea would be compelling, run it through this table — name the specific Need/Desire/Vice it satisfies and the specific Technology Need category, rather than staying at a vague "it's useful" level.

## What determines value creation, destruction, and capture

Four forces answer "what determines Value Creation, Destruction & Capture": **Technology Shifts, Consumer Mindset Shifts, Competitive Power Shifts, and Regulatory Changes**. The closing synthesis: at any moment in time, Technology Shifts, Customer Mindset Shifts, and Competitive Powers determine Value Creation opportunities, Value Destruction Risks, and Value Capture Dynamics.

**Technology Shifts** solve human Needs/Desires/Vices in a more compelling manner, through specific mechanisms: increased reach and power, new super-powers, comprehensive and fast knowledge, more savings, more earnings, more investment opportunities, less friction, more entertainment, more selection, deeper connection, more inspiration and training tools, and being cheaper, faster, and safer. That drives three outcomes:

- **Market Size Growth** — growing market reach, growing revenue per user, accelerating adoption, lowering costs
- **New Products Growth** — increased reach, increased revenue per user, accelerated adoption
- **Existing Products Shrink** — increased churn or lower usage, reduced margins

Every technology shift simultaneously grows some products and shrinks others; naming which side of that your idea is on is part of the analysis.

{{DIAGRAM:1}}

**Consumer Mindset Shifts** change what humans value in solving their Needs/Desires/Vices. Concrete examples: digital power over IRL power, flexibility over in-office jobs, summaries over long-form knowledge, short-form over long-form video, more acceptance of multicultural dating, families split across cities and countries, increased obesity rates, single-income shifting to double-income households, "8 to 5" jobs shifting to "24/7" jobs, and IRL hangouts shifting to online gaming sessions. These shift value creation and destruction by shifting value from one market to another, shifting value between different products, and shifting value between different solutions.

**Competitive Power Shifts** draw on Hamilton Helmer's **7 Powers** framework as what determines which company actually captures the value once it's created:

- Scale Economies — cheaper operations and higher margins
- Network Economies — increases product value
- Counter-Positioning — cuts into a competitor's value/margin while increasing your own
- Switching Costs — increases retention
- Branding — lowers acquisition costs, raises margins, raises win rate
- Cornered Resources — barrier to entry and higher costs for competition
- Process Power — lower costs, higher margins, more reliability

These are applied via four explicit questions: which powers do we have? Which powers do our competitors have? How can we leverage powers our competition isn't willing to match or can't? How will our competition leverage powers we're not willing to match or can't?

**Regulatory Changes** is named as the fourth force but isn't built out with its own framework here — it's covered more deeply in financial-products-specific material, where regulatory pressure gets its own detailed treatment.

## B. How to do Context & Motivation well

Execution organizes into four sub-questions, each with its own diagnostic checklist.

**User Trends**: split what stays the same from what changes. Core human needs, desires, or vices stay the same; what changes over time is how humans go about satisfying that core need — plus a macro-economics check on whether there are macro trends driving the change. The question set to interrogate a user trend: what is the basic human need people are trying to satisfy (Core Human Need or Desire); how did they satisfy this need in the past, how are they doing it now, and where are we in the transition from old to new (Products Trend); how often do people make choices for this need (Decision Frequency); how involved is the decision process (Decision Process); are there differences in choices across different groups and what factors drive the differences (Group Differences); and how much time or money do people spend on this use case, and how is that trending (Time/Money).

## Technology trends and competitive motivation

**Technology Trends**: a non-exhaustive list of core technology trends relevant in 2025 includes AI (large language models, RAG, tool use for LLMs, image generation, image segmentation/matching/clustering, video understanding, video synthesis, audio-to-text, text-to-audio synthesis and cloning, avatars with lip sync, text-to-text and speech-to-speech translation, domain LLMs like MedPalm for medical knowledge, and embeddings for personalization), AR/VR devices and platforms, 5G connectivity, connected devices (IoT), mobile payments infrastructure, low-code/no-code dev platforms, blockchain technology, edge computing, distributed computing, robotics, self-driving cars, video conferencing, brain-computer interfaces, spatial computing, smart contracts, and privacy-enhancing computing. The diagnostic question set for any one trend, applied to your market: what technologies will impact products in this market (Products Trend); what new capabilities will these technologies enable (New Capabilities); what may become obsolete as a result of new technology (Obsolete); what new opportunities does it open up (New Opportunities); and what risks does it pose specifically to our company (Risks).

**Competitive Powers/Motivation** reuses the 7 Powers framework with the "which powers do we/they have, and which can only one side leverage" question set — the practical version of "what levers will help us compete and what will help our competitors."

**Motivation to innovate** asks bluntly: why should a company focus on this specific area? Four questions: what are the risks to the company of not acting? What are the big opportunities to take a swing at? Why is it important to invest now? What changed to make this an urgent and important space? This is the section that most directly answers CTUC's "why now, why us" — and it's deliberately the last step, built on top of everything above, not a standalone brainstorm.

{{DIAGRAM:2}}

## C/D. Sources of context information

Eight source types: Public Company Filings, Founder/CEO Letters & Interviews, Company Conferences, Company Websites/Blogs/Help Centers, Traffic Data, Deep Tech Writers/Blogs/Forums, Market Research Reports, and ChatGPT & Perplexity for brainstorming and sourcing. The first three go deepest.

**Public Company Filings** are the highest-value source, especially S1s and earnings calls.

- **IPO Filings (S1)** give the deepest dive into Business, Products, Finances, Competition, and Risks — the most in-depth view of a company, but only once. Named examples: Instacart S1, Reddit S1, Uber S1, DoorDash S1, Zoom S1, and Redfin S1.
- **Annual Reports (10-K)** give a high-level business overview without as much depth, but the data itself is the important piece — trends on consumer, business, and advertiser metrics. Named examples: Meta's Q4 10-K and Zillow's 10-K.
- **Quarterly Reports (10-Q)** give a metrics update, exemplified by Meta's Q3 10-Q.
- **Earnings Call Transcripts & Webcasts** give more insight into product direction straight from leadership, exemplified by Meta with Zuckerberg, Microsoft with Satya, Amazon with Jassy, and Google with Sundar.

Instacart's S1 is singled out by name as "a master class on the grocery industry and the grocery delivery market" — worth reading in full as a template for how a company frames its own market in a filing, not just for Instacart-specific facts.

**Founder/CEO Letters & Interviews** has two named examples: Amazon's annual shareholder letters, spanning the Bezos era through the current one, called "master classes on Retail & Ecommerce"; and Zuckerberg's podcast appearances and Facebook posts, called "master classes on AR/VR, AI and Media industries."

**Company Conferences** give "deep insights into product strategy," with two named examples: Canva Create Conference 2024 and Stripe Sessions Conference 2024.

The practical takeaway across all three: for interview prep on a specific company, an S1 (if it exists) plus the most recent earnings call plus one founder interview is a fast, high-signal Context & Motivation research stack — you don't need to read all eight source types for every prep session, but you should know all eight exist so you reach for the right one when the market or company calls for it. A private company with no filings pushes you toward conferences and blogs instead.`,
