CONTENT.lessons.push(
{id:"ai-1",track:"ai",title:"How LLMs Actually Work",min:9,
body:`A large language model is a next-token predictor: given a sequence of tokens, it outputs a probability distribution over what comes next. Everything else — chat, reasoning, coding — is built on that single operation, repeated.

## The pipeline
**Tokens** are the model's atoms: chunks of ~4 characters on average. Text is tokenized, mapped to vectors (embeddings), and passed through dozens of **transformer layers**. Each layer uses **attention** — a mechanism that lets every token look at every other token and decide which ones matter for predicting what comes next. That is the entire trick: attention gives the model context-awareness at scale.

## Why this matters for PMs
Because generation is sampling from a probability distribution, outputs are **stochastic** — the same prompt can produce different answers. Temperature controls how adventurous the sampling is. This is why you can never fully "fix" an LLM output with a prompt tweak; you can only shift probabilities. Your quality bar must be statistical (what percent of outputs are acceptable) not deterministic (does it work).

**Context windows** limit how many tokens the model can attend to at once. Long context is expensive: attention cost grows with input length, and models attend less reliably to the middle of very long inputs ("lost in the middle"). Feature designs that assume the model remembers everything will fail in production.

## The capability ladder
Raw pretrained models just complete text. **Post-training** (instruction tuning + RLHF/RLAIF) turns them into assistants that follow instructions and refuse harmful requests. Most behavior your users experience — tone, refusals, format-following — comes from post-training, not pretraining.`,
takeaways:["LLMs are stochastic next-token predictors — set statistical quality bars, not deterministic ones","Attention over a limited context window is the core mechanism and the core constraint","Assistant behavior comes from post-training (RLHF), not from pretraining"],
cards:[
 {q:"What single operation underlies everything an LLM does?",a:"Next-token prediction: outputting a probability distribution over the next token, repeated token by token."},
 {q:"Why can't a prompt tweak ever fully 'fix' an LLM output?",a:"Generation is sampling from a probability distribution — prompts shift probabilities, they don't guarantee outcomes. Quality must be measured statistically."},
 {q:"What does the attention mechanism do?",a:"Lets every token weigh every other token in context to decide what's relevant for predicting the next token — it's what gives transformers context-awareness."},
 {q:"Where does an assistant's instruction-following and refusal behavior come from?",a:"Post-training (instruction tuning + RLHF/RLAIF), not pretraining. Pretrained models only complete text."}
]},
{id:"ai-2",track:"ai",title:"Prompting, RAG, Fine-tuning: Choosing the Right Lever",min:8,
body:`When model output isn't good enough, teams reach for one of three levers. Choosing the wrong one wastes months.

## Prompting (hours to days)
Always start here. System prompts, few-shot examples, chain-of-thought, output schemas. Cheap, instantly reversible, and shockingly powerful. If a capable model can't do the task with a well-engineered prompt and good context, fine-tuning a weaker signal rarely saves you.

## RAG — Retrieval-Augmented Generation (days to weeks)
Use when the model lacks **knowledge**: your docs, your data, anything post-cutoff or private. Pipeline: chunk documents, embed them into vectors, retrieve the most similar chunks for each query, stuff them into the prompt. The model then answers grounded in retrieved text.

RAG quality is dominated by **retrieval quality**, not the LLM. Most RAG failures are search failures: wrong chunks retrieved, bad chunking strategy, stale index. Debug retrieval first — look at what was actually retrieved before blaming the model.

## Fine-tuning (weeks, ongoing cost)
Use when the model lacks a **behavior**: consistent format, domain-specific style and vocabulary, or you need a small cheap model to match a big one on a narrow task. Fine-tuning does NOT reliably add knowledge — it teaches patterns. It also creates an asset you must maintain: new base model releases can leapfrog your fine-tune overnight.

## The decision rule
Knowledge problem → RAG. Behavior/format problem → prompt first, fine-tune if prompts plateau. Cost/latency problem → fine-tune or distill a smaller model. And always re-evaluate when a new frontier model ships — it may erase the need for your whole workaround.`,
takeaways:["Order of operations: prompt → RAG → fine-tune; escalate only when the cheaper lever plateaus","RAG fixes missing knowledge; fine-tuning fixes missing behavior — not the reverse","Most RAG failures are retrieval failures — debug what was retrieved before blaming the model"],
cards:[
 {q:"Knowledge problem vs behavior problem — which lever fits each?",a:"Missing knowledge → RAG (retrieve and ground). Missing behavior/format/style → prompting, then fine-tuning if prompts plateau."},
 {q:"What dominates RAG output quality?",a:"Retrieval quality — chunking, embedding, and search. Most RAG failures are retrieving the wrong context, not LLM failures."},
 {q:"Why is fine-tuning a risky asset?",a:"It's costly to maintain and a new base model release can outperform your fine-tune overnight, erasing the investment."},
 {q:"What should you always try before RAG or fine-tuning?",a:"Prompt engineering with a capable model — system prompts, few-shot examples, structured outputs. It's the cheapest, fastest, reversible lever."}
]},
{id:"ai-3",track:"ai",title:"Agents & Tool Use",min:8,
body:`An agent is an LLM in a loop: it receives a goal, chooses an action (often a tool call), observes the result, and repeats until done. The loop is what separates agents from single-shot generation — and it's where both the power and the risk live.

## The anatomy
**Tools** give the model hands: search, code execution, database queries, API calls. The model emits a structured request; your system executes it and feeds results back. **Orchestration** decides the loop structure: single agent with many tools, pipelines of specialized steps, or multi-agent systems. **Memory/state** carries context across steps and sessions.

## Why agents fail
Errors **compound**. If each step is 95% reliable, a 10-step task succeeds ~60% of the time. This is the central math of agent PM work. Countermeasures: fewer steps, verification steps (does the output parse? do tests pass?), the ability to backtrack, and checkpoints where a human confirms before consequential actions.

## The PM's design decisions
Define the **blast radius**: what can the agent do without confirmation? Reading data is cheap to allow; sending emails, spending money, or deleting things needs gates. Define **stopping conditions**: max steps, budget caps, escalate-to-human triggers. Define **observability**: you need traces of every step to debug failures, because "it didn't work" is otherwise unfixable.

Autonomy is a dial, not a switch. The winning pattern in most products so far: agent does the work, human approves the irreversible parts. Expand autonomy as measured reliability earns it.`,
takeaways:["Agents = LLM + tools + loop; errors compound per step (0.95^10 ≈ 60%)","Design the blast radius: gate irreversible actions, allow cheap reversible ones","Autonomy is a dial earned by measured reliability, not a launch decision"],
cards:[
 {q:"If each agent step is 95% reliable, what's the success rate of a 10-step task?",a:"About 60% (0.95^10). Error compounding is the central math of agent reliability."},
 {q:"What is 'blast radius' in agent design?",a:"The scope of actions an agent may take without human confirmation. Reversible/read actions are open; irreversible ones (send, spend, delete) get gates."},
 {q:"Name three countermeasures to compounding agent errors.",a:"Fewer steps, verification/self-checks between steps (parse, test), and human checkpoints before consequential actions — plus full step-level tracing."},
 {q:"What's the dominant autonomy pattern in successful agent products?",a:"Agent does the work, human approves irreversible parts; autonomy expands gradually as measured reliability improves."}
]},
{id:"ai-4",track:"ai",title:"Evals: The PM's Most Important AI Artifact",min:9,
body:`In traditional software, the spec defines correct behavior and QA verifies it. In AI products, the **eval suite IS the spec**. If you can't measure quality, you can't improve it, can't ship confidently, and can't stop regressions. Owning evals is arguably the highest-leverage thing an AI PM does.

## The three layers
**1. Unit-style evals:** hundreds of input → expected-property pairs. Not exact-match answers (outputs vary) but properties: contains the right facts, valid JSON, no hallucinated fields, under 200 words.

**2. LLM-as-judge:** a strong model grades outputs against a rubric you write. Scales human judgment. Must itself be validated — periodically check judge scores against human labels; judges have biases (they favor longer, confident answers).

**3. Human review:** the ground truth. Expensive, so spend it calibrating the other two layers and on a rotating sample of production traffic.

## Building the eval set
Source cases from real user queries, support escalations, and deliberately adversarial inputs. Your eval set should over-represent hard cases and failure modes, not mirror average traffic — average traffic is easy. 50 brutal, representative cases beat 500 softballs.

## The metrics that matter
Define acceptable/unacceptable per use case, then track: task success rate, hallucination rate, refusal correctness (refusing what it should, not refusing what it shouldn't), format compliance, latency, and cost per task. Set a ship bar BEFORE seeing results — otherwise you'll rationalize whatever you got.

Every model swap, prompt change, or retrieval tweak runs the suite. No green, no merge. This converts "the model feels better" arguments into data.`,
takeaways:["The eval suite is the spec — quality you can't measure is quality you can't manage","Three layers: property-based unit evals, validated LLM-as-judge, sampled human review","Over-represent hard cases; set the ship bar before seeing results"],
cards:[
 {q:"Why are evals called 'the spec' of AI products?",a:"Because outputs are probabilistic, correct behavior can only be defined as measured performance against test cases — the eval suite defines what 'working' means."},
 {q:"What are the three layers of an eval stack?",a:"1) Property-based automated evals, 2) LLM-as-judge graded against a rubric (validated against humans), 3) sampled human review as ground truth."},
 {q:"How should an eval set differ from production traffic?",a:"It should over-represent hard cases, edge cases, and known failure modes — average traffic is easy and hides regressions."},
 {q:"What's a known bias of LLM-as-judge?",a:"Judges favor longer, more confident-sounding answers; they must be periodically calibrated against human labels."},
 {q:"When should the quality ship-bar be set?",a:"Before seeing eval results — otherwise the team rationalizes whatever score it got."}
]},
{id:"ai-5",track:"ai",title:"The Economics: Cost, Latency, and Model Choice",min:8,
body:`AI features have a property traditional software doesn't: meaningful **marginal cost per use**. A popular feature can lose money. AI PMs must do unit economics from day one.

## The cost model
Price = (input tokens × input rate) + (output tokens × output rate). Output tokens typically cost several times more than input. Long system prompts, stuffed RAG context, and chatty outputs all multiply cost. Know your **cost per task** and your **cost per active user per month**, and put both on your dashboard next to engagement.

## The levers
**Model routing:** use a frontier model only where quality demands it; route easy cases to small cheap models. A classifier or heuristic decides. This routinely cuts costs 5–10x. **Caching:** identical or similar requests shouldn't hit the model twice; prompt-prefix caching cuts repeated-context costs dramatically. **Prompt diet:** trim the system prompt, retrieve less but better context, cap output length. **Batch/async:** non-interactive work (summaries, enrichment) can run on cheaper batch tiers.

## Latency is UX
Users tolerate ~1s to first token for chat-like features; beyond that engagement drops. **Streaming** is the single best trick — perceived latency is time-to-first-token, not time-to-completion. Reasoning-heavy or multi-step agent flows need progress indicators, or run them async with a notification.

## Model choice as portfolio
Don't marry a vendor. Abstract the model layer so you can swap. Re-benchmark on YOUR evals when new models ship — public benchmarks don't predict your task. The right frame: models are suppliers; your evals are the procurement test.`,
takeaways:["Track cost per task and per user from day one — AI features have real marginal costs","Routing + caching + prompt diet routinely cut costs 5–10x","Stream everything: perceived latency is time-to-first-token"],
cards:[
 {q:"What two cost metrics belong on every AI feature dashboard?",a:"Cost per task and cost per active user per month — tracked alongside engagement."},
 {q:"What is model routing and what's its typical impact?",a:"Sending easy cases to small cheap models and only hard cases to frontier models — commonly a 5–10x cost reduction."},
 {q:"Why does streaming matter so much for AI UX?",a:"Perceived latency is time-to-first-token, not total completion time; streaming makes long generations feel instant."},
 {q:"How should you evaluate a newly released model?",a:"Run it against YOUR eval suite — public benchmarks don't predict performance on your specific task. Treat models as swappable suppliers."}
]},
{id:"ai-6",track:"ai",title:"Hallucination, Safety & Failure Modes",min:8,
body:`Every AI PM needs a taxonomy of failure — because you can't design mitigations for failures you haven't named.

## The taxonomy
**Hallucination:** confident fabrication — fake citations, invented API parameters, wrong numbers. Worst when plausible. **Instruction drift:** ignoring format or constraints, especially in long conversations. **Sycophancy:** agreeing with the user's wrong premise instead of correcting it. **Prompt injection:** malicious instructions embedded in content the model processes (a webpage, an email) hijack its behavior — the #1 security issue for agents that read untrusted content. **Refusal errors:** both over-refusing legitimate requests and under-refusing harmful ones. **Bias:** systematically different quality or tone across user groups.

## Mitigation patterns
Grounding (RAG with citations users can check) attacks hallucination. Structured outputs with schema validation attack drift. Treating all retrieved/external content as untrusted data — never as instructions — attacks injection. Separate the privilege of the user from the privilege of content the model reads.

## The PM's job
For each failure mode, decide: how often is acceptable? How will we detect it (evals + production monitoring)? What happens when it occurs (user-visible uncertainty, easy correction, human escalation)? A feature where a hallucination costs the user 5 seconds of annoyance and one where it triggers a wrong medical decision need entirely different bars — write the bar down per failure mode.

Ship with a **failure budget**, monitor it in production, and treat exceeding it like an SLO breach: page someone, roll back, fix.`,
takeaways:["Name failure modes explicitly: hallucination, drift, sycophancy, injection, refusal errors, bias","Prompt injection is the top security risk for agents reading untrusted content","Set an acceptable failure rate per mode based on cost-of-error; monitor it like an SLO"],
cards:[
 {q:"What is prompt injection and why does it matter for agents?",a:"Malicious instructions hidden in content the model reads (webpages, emails) that hijack its behavior — the top security risk when agents process untrusted content."},
 {q:"What is sycophancy in LLMs?",a:"The model agreeing with a user's incorrect premise or flattering them instead of correcting errors — it optimizes for approval over accuracy."},
 {q:"What's the core defense against prompt injection?",a:"Treat all external/retrieved content as untrusted DATA, never as instructions; separate user privilege from content privilege and gate consequential actions."},
 {q:"How should acceptable hallucination rates be set?",a:"Per use case, based on the cost of an error — a 5-second annoyance vs a wrong medical decision need entirely different bars, written down and monitored."}
]}
);

{id:"aipd-1",track:"aipd",title:"Define the Job, Not the Feature",min:8,
body:`The most common AI product failure isn't technical — it's building "AI that does X" without defining the job precisely enough to know when it's done well.

## From capability to job
"AI summarization" is a capability. "Give an account executive a 90-second pre-meeting brief with the three things most likely to come up, grounded in the CRM" is a job. The job definition specifies: the user, the moment, the input context, the output shape, and — critically — what a great vs unacceptable output looks like.

## The job spec template
For any AI feature, write: **Trigger** (when does this run?), **Inputs** (what context does the model get, and is it reliably available?), **Output contract** (format, length, tone, must-include, must-never-include), **Quality bar** (what percent acceptable, judged how?), **Failure behavior** (what does the user see when it fails, and how do they recover?).

If you can't fill in the quality bar and failure behavior, you have a demo, not a product plan.

## Where AI jobs go wrong
Jobs that need 100% reliability (compliance filings, money movement) are wrong for direct LLM output — restructure them so AI drafts and deterministic systems or humans verify. Jobs where the model lacks the decisive context (it can't know what was said in the hallway) will plateau at "plausible but generic." The fix is usually a context strategy — get the data — not a better model.

The sharpest question in AI product reviews: **"What does the model know at the moment it generates, and is that enough to do this job well?"**`,
takeaways:["Specify trigger, inputs, output contract, quality bar, and failure behavior — or it's a demo","Jobs needing 100% reliability must be restructured: AI drafts, deterministic systems verify","Most quality plateaus are context problems, not model problems"],
cards:[
 {q:"What five elements make up an AI job spec?",a:"Trigger, inputs/context, output contract, quality bar (percent acceptable + how judged), and failure behavior with user recovery."},
 {q:"What's the sharpest diagnostic question for a plateauing AI feature?",a:"'What does the model know at the moment it generates, and is that enough to do the job well?' — quality plateaus are usually context gaps, not model gaps."},
 {q:"How do you handle jobs requiring 100% reliability?",a:"Never ship direct LLM output — restructure so AI drafts and a deterministic system or human verifies before anything consequential happens."}
]},
{id:"aipd-2",track:"aipd",title:"Designing for Failure",min:8,
body:`Deterministic software fails by crashing; AI fails by being confidently wrong. Great AI product design assumes failure and makes it cheap.

## The three questions
For every AI surface: **How will the user know if the output is wrong?** (Can they verify at a glance — citations, diffs, previews — or would they have to redo the work to check?) **What does a wrong output cost them?** (Seconds? Their reputation? Money?) **How do they recover?** (Regenerate, edit, undo, escalate?)

The product patterns follow directly. High cost-of-error + hard to verify = keep a human in the loop and show provenance. Low cost + easy to verify = let it rip, add a regenerate button.

## Failure-friendly patterns
**Drafts, not actions:** the AI writes the email; the user sends it. **Diffs, not replacements:** show what changed so review is cheap. **Citations and grounding:** every claim links to a source the user can check in one tap. **Confidence honesty:** when the system is unsure, say so and degrade gracefully — offer options instead of one answer, or hand off to search/human. **Undo everywhere:** reversibility converts scary automation into safe delegation.

## The trust budget
Users start with a small trust budget. Each visible failure — especially an early one — cuts it; each verified success grows it. This is why onboarding should route users toward tasks the system is demonstrably great at, and why the worst launch strategy is maximum surface area on day one. Ship narrow, be excellent, expand.`,
takeaways:["Ask: how does the user detect a wrong output, what does it cost, how do they recover?","Prefer drafts/diffs/citations/undo — patterns that make verification and recovery cheap","Trust is a budget: ship narrow and excellent first, expand as trust accrues"],
cards:[
 {q:"What three questions define failure design for an AI surface?",a:"How will the user know the output is wrong? What does a wrong output cost them? How do they recover?"},
 {q:"Name four failure-friendly UX patterns.",a:"Drafts not actions; diffs not replacements; citations/grounding for one-tap verification; undo/reversibility everywhere."},
 {q:"Why should AI products launch narrow rather than broad?",a:"Users have a small initial trust budget — early visible failures destroy it. Being excellent on a narrow surface builds the trust needed to expand."}
]},
{id:"aipd-3",track:"aipd",title:"Trust Calibration & Confidence UX",min:7,
body:`The goal is not maximum user trust — it's **calibrated** trust: users rely on the system exactly as much as its actual reliability deserves. Over-trust causes silent errors reaching the real world; under-trust means paying for AI nobody uses.

## Diagnosing miscalibration
Over-trust signals: users accept outputs without edits at rates higher than your measured accuracy; errors surface downstream (a customer catches the mistake, not the user). Under-trust signals: heavy regeneration, users redoing the work manually, feature abandonment despite good eval scores.

## Calibration tools
**Selective friction:** add review steps only where errors are costly; frictionless everywhere else. **Uncertainty display:** don't show raw probabilities (users can't use "73%"); show behavior — hedged language, multiple options, or "I couldn't verify this" flags. **Provenance:** sources and reasoning visible on demand. **Track the accept-edit-reject ratio** per surface: it's your live trust dashboard. Accept-without-edit rate above your true accuracy = over-trust; investigate.

## The automation ladder
A useful maturity model per task: (1) AI suggests, human does → (2) AI drafts, human approves → (3) AI acts, human reviews after → (4) AI acts autonomously, sampled audits. Move up a rung only when measured reliability plus cost-of-error justify it — and communicate the change, because silent autonomy increases is how trust gets destroyed at scale.`,
takeaways:["Target calibrated trust, not maximum trust — over-trust ships silent errors","Accept-edit-reject ratios are your live trust dashboard; compare accept rate to true accuracy","Climb the automation ladder rung by rung, publicly, as reliability earns it"],
cards:[
 {q:"What is calibrated trust?",a:"Users rely on the system exactly as much as its measured reliability deserves — neither accepting bad outputs (over-trust) nor redoing good ones (under-trust)."},
 {q:"What behavioral signal indicates over-trust?",a:"Accept-without-edit rates higher than measured accuracy, and errors being caught downstream (by customers) rather than by the user."},
 {q:"What are the four rungs of the automation ladder?",a:"AI suggests → AI drafts + human approves → AI acts + human reviews after → AI acts autonomously with sampled audits."},
 {q:"Why not show users raw confidence percentages?",a:"Users can't act on '73% confident' — show uncertainty as behavior instead: hedged language, multiple options, or explicit 'couldn't verify' flags."}
]},
{id:"aipd-4",track:"aipd",title:"AI UX Patterns That Work",min:8,
body:`A pattern language for AI interfaces has emerged. Knowing when each applies saves you from reinventing (or misapplying) them.

## The pattern catalog
**Copilot/sidebar:** AI assists alongside the user's main work; user stays in control. Best when work is complex and context-rich (coding, writing, analysis). **Inline suggestion:** completions appear in the flow of work, accepted with a keystroke (tab-to-complete). Best when suggestions are frequent, small, and instantly verifiable. Magic: zero cost to ignore. **Chat:** open-ended, conversational. Powerful but a UX cop-out when the task has structure — don't make users type a paragraph when a button would do. **Background/proactive:** AI works without being asked — drafts waiting in the morning, anomalies flagged. Highest leverage AND highest trust requirement; always start opt-in. **Workflow/agent:** multi-step tasks delegated wholesale, with checkpoints.

## Choosing
Ask: how big is the unit of work, and how verifiable? Small + verifiable → inline. Large + needs steering → copilot/chat. Repetitive + well-specified → background or agent with approvals.

## Cross-cutting rules
Always show what the AI is about to do before it does anything consequential. Make ignoring the AI free — suggestion UIs win because dismissal costs nothing. Keep the human's hands on the artifact (editable output beats final answers). And instrument every accept/edit/dismiss: your UX telemetry is also your eval data.`,
takeaways:["Match pattern to unit-of-work size and verifiability — chat is a cop-out for structured tasks","Ignoring the AI must cost nothing; suggestions beat interruptions","Every accept/edit/dismiss is telemetry AND eval data — instrument it all"],
cards:[
 {q:"When is inline suggestion the right AI pattern?",a:"When suggestions are frequent, small, and instantly verifiable — and dismissal is free (e.g., tab-to-complete)."},
 {q:"Why is chat often a UX cop-out?",a:"When a task has known structure, forcing users to compose prompts is worse than purpose-built UI — chat suits genuinely open-ended tasks."},
 {q:"What's the rule for proactive/background AI?",a:"Highest leverage but highest trust requirement — always launch opt-in, and show what it did with easy review/undo."},
 {q:"What dual purpose does accept/edit/dismiss instrumentation serve?",a:"It's product telemetry (engagement, trust calibration) and a continuous eval dataset from real usage."}
]},
{id:"aipd-5",track:"aipd",title:"Data Flywheels & AI Moats",min:8,
body:`"We'll have a data moat" is the most over-claimed sentence in AI strategy. Sometimes it's real. Usually it isn't. Knowing the difference is a core AI PM skill.

## When data compounds
A real flywheel needs: (1) usage generates data that is **proprietary** (competitors can't buy or scrape it), (2) that data **measurably improves** the product (via fine-tuning, retrieval, or ranking), and (3) the improvement drives more usage. Break any link and there's no flywheel. Generic interaction logs rarely qualify — frontier models improve faster than your logs accumulate advantage.

## What actually compounds
**Correction data:** every user edit of an AI draft is a labeled example of preference in YOUR domain. **Outcome data:** which suggestion was accepted AND led to a good downstream result (the deal closed, the code passed review). **Context graphs:** the accumulated private structure of a customer's world (their docs, decisions, entities) that makes your product smarter for them specifically — this is more a switching-cost moat than a model moat, and it's often stronger.

## Real AI-era moats, ranked roughly by durability
Workflow depth and integration (you're wired into how work happens) > proprietary context per customer > correction/outcome data loops > distribution > raw model quality (rented, decays fastest).

The strategic implication: obsess less about model differentiation, more about owning the workflow and accumulating context competitors would have to re-earn customer by customer.`,
takeaways:["A data moat needs proprietary data that measurably improves the product and drives usage — verify each link","Correction data and outcome data compound; generic logs don't","Workflow depth + per-customer context beat model quality as durable moats"],
cards:[
 {q:"What three links must hold for a real data flywheel?",a:"Usage generates proprietary data → that data measurably improves the product → the improvement drives more usage. Break one link, no flywheel."},
 {q:"What two data types actually compound into advantage?",a:"Correction data (user edits = domain preference labels) and outcome data (which outputs led to good downstream results)."},
 {q:"Rank AI-era moats by durability.",a:"Workflow depth/integration > proprietary per-customer context > correction/outcome loops > distribution > raw model quality (rented, decays fastest)."}
]},
{id:"aipd-6",track:"aipd",title:"Shipping AI: The Lifecycle Differences",min:8,
body:`AI features break the standard build-test-ship-forget lifecycle in specific ways. PMs who run the old playbook get burned in predictable places.

## Before build: feasibility spikes
You cannot spec your way to knowing if the model can do the task. Prototype against real examples in days, not weeks — a prompt plus 30 real cases in a spreadsheet tells you more than a design review. Kill fast: the best AI orgs kill more prototypes than they ship.

## During build: the data pipeline is the product
Engineers will estimate the model integration in days — accurate, but the schedule risk lives in context engineering: getting the right data to the model reliably (permissions, freshness, formatting). Ask "where does every token of context come from?" in the first week, not week six.

## Launch: staged by risk
Internal dogfood → trusted beta (with feedback capture wired in) → percentage rollout gated on eval metrics AND user behavior metrics (accept rates, complaint rates). Have a rollback plan for the model layer itself — model version pinning matters because providers update models under you.

## After launch: drift never sleeps
Monitor continuously: input drift (users bring new kinds of requests), quality drift (provider model updates, degrading retrieval index), cost drift (usage patterns change). Sample production outputs into your eval set weekly — production is the best eval-case generator you have. Budget standing capacity for AI quality work forever; there is no 'done' state.`,
takeaways:["Prototype feasibility with real cases before speccing; kill fast and often","Schedule risk lives in the context/data pipeline, not the model call","Post-launch: monitor input, quality, and cost drift; feed production cases into evals weekly"],
cards:[
 {q:"How do you establish AI feature feasibility?",a:"A prototype spike: real prompt + ~30 real input cases evaluated in days. You can't spec your way to feasibility."},
 {q:"Where does the real schedule risk in AI features live?",a:"Context engineering — reliably getting the right data to the model (permissions, freshness, formatting) — not the model integration itself."},
 {q:"What three kinds of post-launch drift must AI products monitor?",a:"Input drift (new request types), quality drift (provider updates, stale retrieval), and cost drift (changing usage patterns)."},
 {q:"Why pin model versions at launch?",a:"Providers update models underneath you; pinning plus a rollback plan protects against silent quality regressions you didn't cause."}
]}
);

{id:"strat-1",track:"strat",title:"Playing to Win: The Strategy Cascade",min:8,
body:`Roger Martin's framework remains the cleanest test of whether you have a strategy or just a plan. Strategy is an integrated set of five choices:

## The cascade
**1. Winning aspiration** — what does winning mean, for whom? Not a mission poster; a definition you could verify. **2. Where to play** — which customers, segments, geographies, channels. Choosing NOT to play somewhere is the whole point; a where-to-play that excludes nothing is not a choice. **3. How to win** — why customers in that arena pick you: lower cost or differentiation, made concrete. **4. Capabilities** — what you must be distinctively good at for the how-to-win to hold. **5. Management systems** — the metrics, cadences, and investments that keep the capabilities real.

## The integrity test
The five must reinforce each other. Most "strategies" fail the cascade test: a where-to-play of "everyone" with a how-to-win of "best product" backed by no distinctive capability. That's a hope.

## Using it as a PM
Run your product area through the cascade quarterly. The sharpest prompts: "What are we explicitly choosing NOT to do, and would a smart outsider agree we've actually made that choice?" and "If a competitor knew our strategy in full, could they nullify it?" (If yes, it relies on secrecy, not capability — weak.) For AI products, the how-to-win question forces the moat conversation: model quality is rented; where's the durable advantage?`,
takeaways:["Strategy = five reinforcing choices: aspiration, where to play, how to win, capabilities, systems","A where-to-play that excludes nothing is not a choice","Test: could a competitor who knows your strategy nullify it? Capability-based strategies survive disclosure"],
cards:[
 {q:"What are the five choices in the Playing to Win cascade?",a:"Winning aspiration, where to play, how to win, capabilities required, management systems."},
 {q:"What's the fastest tell that a 'strategy' is really just a plan?",a:"It excludes nothing — a where-to-play of 'everyone' with a how-to-win of 'best product' and no distinctive capability."},
 {q:"What does it mean if disclosing your strategy would let competitors nullify it?",a:"It relies on secrecy rather than distinctive capability — a weak strategy. Strong strategies survive full disclosure."}
]},
{id:"strat-2",track:"strat",title:"Positioning: April Dunford's Method",min:8,
body:`Positioning is the deliberate act of setting the context in which customers understand your product. Get it wrong and great products look pointless — customers compare you to the wrong things and undervalue what makes you special.

## The five components, in order
**1. Competitive alternatives** — what would customers do without you? (Often: spreadsheets, interns, nothing. Rarely the competitors on your battlecard.) **2. Unique attributes** — what you have that the alternatives don't. **3. Value** — what those attributes enable for customers, in their terms. **4. Best-fit segment** — who cares MOST about that value; characteristics that make a customer great for you. **5. Market category** — the frame of reference that makes your value obvious to that segment.

The order matters: category comes LAST. Teams that pick a category first ("we're a CRM") inherit its assumptions and get compared on its checklist.

## Category strategy
Three options: enter an **existing category** (instant understanding, incumbent comparison), **create a new one** (no comparison, but you pay to educate the market — viable mostly with big funding), or **reframe/subsegment** ("CRM for investment bankers" — often the sweet spot).

## The audit signals
Positioning is broken when: sales calls spend the first 20 minutes explaining what you are; you lose to competitors you consider inferior; won customers describe your value differently than your website does. That last one is gold — reposition around the words your best customers already use.`,
takeaways:["Position from competitive alternatives up; choose the category last","Your real competitor is often a spreadsheet or 'do nothing' — position against that","Won customers' own words for your value are your best positioning source"],
cards:[
 {q:"What are Dunford's five positioning components, in order?",a:"Competitive alternatives → unique attributes → value → best-fit segment → market category. Category comes last."},
 {q:"Why is picking the market category first a mistake?",a:"You inherit the category's assumptions and get compared on its feature checklist, burying what makes you unique."},
 {q:"Name three signals that positioning is broken.",a:"Sales spends calls explaining what you are; you lose to 'inferior' competitors; customers describe your value differently than your marketing does."}
]},
{id:"strat-3",track:"strat",title:"Moats & Network Effects",min:8,
body:`Growth explains how you get big; moats explain why you stay big. Every strategy review should name the moat and honestly assess its current strength.

## The classic moat inventory
**Network effects** — product improves as more people use it. Direct (each user adds value to others: messaging), indirect/two-sided (more supply attracts demand: marketplaces), data network effects (usage improves the product: maps, recommendations). Strength varies wildly — check whether the effect is global or local, and whether it asymptotes (the 1,000th restaurant in your city adds little). **Switching costs** — data, integrations, workflows, learned behavior, contracts. Often the most underrated moat in B2B. **Economies of scale**, **brand**, **counter-positioning** (incumbents can't copy you without breaking their own business model — the most elegant moat), and **cornered resources**.

## The honest questions
For each claimed moat: what's the evidence in retention and pricing power? Moats show up as numbers — churn that stays low when competitors launch, prices that hold. A "moat" with no pricing power is a story.

## AI-era notes
Model access is not a moat (everyone rents the same models). Counter-positioning is newly potent: AI-native products with per-seat-free, outcome-priced models attack incumbents whose revenue depends on seats. And switching costs are shifting from data lock-in to **context lock-in** — the accumulated private knowledge a product has about how you work.`,
takeaways:["Moats must show up in numbers: retention under competitive attack and pricing power","Counter-positioning — structures incumbents can't copy without self-harm — is the most elegant moat","AI shifts switching costs from data lock-in to context lock-in"],
cards:[
 {q:"What evidence proves a moat is real?",a:"Retention that holds when competitors launch, and pricing power. A moat without these is a story."},
 {q:"What is counter-positioning?",a:"Adopting a model incumbents can't copy without damaging their own business (e.g., outcome-based pricing vs their per-seat revenue). They see it coming and still can't respond."},
 {q:"What are the three flavors of network effects?",a:"Direct (users add value to each other), indirect/two-sided (supply attracts demand), and data network effects (usage improves the product)."}
]},
{id:"strat-4",track:"strat",title:"The DHM Model & Strategy for Product Teams",min:7,
body:`Gibson Biddle's DHM model compresses product strategy into one question: how will you **Delight customers in Hard-to-copy, Margin-enhancing ways?** It's the fastest strategic filter for a roadmap.

## Applying DHM
Take your top roadmap items and score each: Does it delight (move a real customer metric, not just check a box)? Is it hard to copy (tie it to a moat: brand, network effects, unique data, economies of scale)? Does it enhance margin (grow revenue, reduce cost, improve pricing power)? Most roadmaps are heavy on delight, empty on hard-to-copy. That's how you win reviews and lose markets.

## From DHM to strategy statements
Biddle's practice: for each strategy pillar write a one-line hypothesis ("Personalization: we delight members by making selection feel effortless"), the metric that proxies it, and the projects that serve it. Strategy becomes testable — each quarter you ask whether the metric moved and whether the hypothesis survived.

## The GLEe and GEM companions
GLEe: how will you Get big, Lead, and Expand — a 10+ year arc in three phases. GEM: force-rank Growth, Engagement, Monetization for your product right now — because teams that won't rank them make incoherent tradeoffs (pop-up paywalls on the growth surface). Say the ranking out loud; argue about it once, then let every team apply it.`,
takeaways:["Filter roadmaps through DHM: delight × hard-to-copy × margin — most items fail the middle term","Write strategy pillars as testable hypotheses with proxy metrics","Force-rank Growth, Engagement, Monetization once — incoherent tradeoffs come from unranked priorities"],
cards:[
 {q:"What does DHM stand for?",a:"Delight customers, in Hard-to-copy, Margin-enhancing ways — Biddle's compression of product strategy."},
 {q:"What's the most common DHM failure in real roadmaps?",a:"Heavy on delight, empty on hard-to-copy — features that please users but build no durable advantage."},
 {q:"What is the GEM exercise and why does it matter?",a:"Force-ranking Growth, Engagement, Monetization for your product now — unranked priorities produce incoherent tradeoffs across teams."}
]},
{id:"strat-5",track:"strat",title:"Second-Order Thinking & Strategic Judgment",min:7,
body:`First-order thinking answers "what happens next?" Second-order thinking asks "and then what?" Strategic judgment lives almost entirely in the second question.

## The tools
**Second-order effects:** every intervention changes behavior. Add AI that auto-replies to customers → response volume rises because replying is now free → the metric you optimized (response time) improves while the system degrades (inbox noise). Ask "what does this incentivize?" of every feature. **Inversion:** instead of "how do we win?", ask "what would guarantee we lose?" and avoid it. Pre-mortems are structured inversion. **Base rates:** before believing your plan, ask how often plans like this succeed for teams like yours. The outside view is brutal and usually right. **Asymmetry:** favor decisions with capped downside and uncapped upside (reversible experiments), demand extreme confidence for the reverse.

## Compounding and dis-economies
Strategy plays out over years: small durable advantages (a retention edge, a data loop, a hiring bar) compound quietly. Meanwhile most things that work small break big — channels saturate, quality dilutes, culture thins. Ask of any success: "what breaks when this 10x's?"

## The practice
Write decisions down with reasoning and expected outcomes. Review quarterly. Calibration comes from confronting your own record, not from more frameworks.`,
takeaways:["Ask 'and then what?' — every feature changes incentives, and metrics can improve while systems degrade","Use inversion and base rates: how do teams like us usually fail at plans like this?","Keep a decision journal — calibration comes from confronting your record"],
cards:[
 {q:"What is second-order thinking in product decisions?",a:"Asking 'and then what?' — how the intervention changes behavior and incentives, not just its immediate effect."},
 {q:"What is inversion as a strategy tool?",a:"Instead of asking how to succeed, ask what would guarantee failure and systematically avoid it — pre-mortems are structured inversion."},
 {q:"Why keep a decision journal?",a:"Recording reasoning and expected outcomes, then reviewing them, is the only reliable way to calibrate your judgment."}
]}
);

{id:"disc-1",track:"disc",title:"Continuous Discovery & the Opportunity Solution Tree",min:8,
body:`Teresa Torres's core argument: discovery isn't a phase, it's a weekly habit. Teams that talk to customers weekly and structure what they learn make measurably better decisions than teams that "do research" quarterly.

## The Opportunity Solution Tree
A living map with four levels. **Outcome** at the root — the metric change you're driving (not a feature, not revenue three steps removed; something your team can influence in a quarter). **Opportunities** — customer needs, pains, and desires, phrased in customer language ("I can't tell if my meeting was useful"), harvested from interviews. **Solutions** — ideas that address specific opportunities. **Experiments** — the cheapest tests of the riskiest assumptions in each solution.

The tree's power is honesty: it exposes when you're solution-first (solutions dangling with no opportunity), when your research is decorative (opportunities with no interviews behind them), and when you're under-exploring (one solution per opportunity — generate three before committing).

## Interview cadence mechanics
Weekly, small, and automated: recruit through in-product prompts, keep interviews to 30 minutes, focus on **specific past behavior** ("walk me through the last time...") not opinions or futures. One story per interview beats ten preferences.

## For AI products
Opportunities are found in the friction between intent and tool: watch where users do work the tool should absorb — copy-pasting between apps, re-explaining context, manually verifying outputs. Those seams are your roadmap.`,
takeaways:["Structure discovery as outcome → opportunities → solutions → experiments; keep the tree alive weekly","Interview for specific past behavior, never opinions about hypothetical futures","Generate ~3 solutions per opportunity before committing to one"],
cards:[
 {q:"What are the four levels of an Opportunity Solution Tree?",a:"Outcome (metric), opportunities (customer needs in their language), solutions (ideas mapped to opportunities), experiments (tests of riskiest assumptions)."},
 {q:"What does a solution with no parent opportunity on the tree reveal?",a:"Solution-first thinking — the team is building an idea without evidence of the customer need it serves."},
 {q:"What's the golden rule of interview questions?",a:"Ask about specific past behavior ('walk me through the last time...') — never opinions, preferences, or hypothetical futures."}
]},
{id:"disc-2",track:"disc",title:"Jobs to Be Done",min:7,
body:`People don't buy products; they hire them to make progress in a specific circumstance. The milkshake story is the canon: morning commuters "hired" milkshakes to make a boring drive interesting and last until lunch — competing not with other milkshakes but with bagels and bananas. Fixing the product meant thicker shakes, not better flavors.

## The three dimensions of a job
**Functional** (the practical task), **emotional** (how I want to feel — confident, in control), **social** (how I want to be seen — competent, on top of things). B2B pretends to be purely functional; it never is. The analytics dashboard is hired partly so its buyer looks data-driven in the Monday meeting. Roadmaps that ignore emotional/social dimensions lose to inferior products that nail them.

## Forces of progress
Every switch is governed by four forces: **push** of the current problem, **pull** of the new solution, **anxiety** about the new, **habit** of the current. Most PMs only work the pull (more features!). Often the highest-ROI work is reducing anxiety (trials, guarantees, migration tools) and breaking habit (import in one click).

## Making JTBD operational
Write outcome statements: direction + metric + context ("minimize the time to detect a pipeline failure when a deal is slipping"). Interview recent switchers — people who just bought or churned — and reconstruct the timeline of their decision. The moment of switching is where jobs are visible.`,
takeaways:["Jobs have functional, emotional, and social dimensions — B2B included","Switching = push + pull vs anxiety + habit; reducing anxiety often beats adding pull","Interview recent switchers and reconstruct the decision timeline"],
cards:[
 {q:"What are the three dimensions of any job to be done?",a:"Functional (the task), emotional (how I want to feel), social (how I want to be seen by others)."},
 {q:"What four forces govern whether a customer switches products?",a:"Push of the current problem and pull of the new solution, versus anxiety about the new and habit of the existing."},
 {q:"Why interview recent switchers specifically?",a:"The job is most visible at the moment of switching — reconstructing their decision timeline reveals the real forces and competing alternatives."}
]},
{id:"disc-3",track:"disc",title:"The Mom Test: Interviews That Don't Lie",min:7,
body:`Rob Fitzpatrick's rule: your mother will tell you your idea is great — so ask questions even your mother couldn't lie about. Bad interviews produce false validation, which is worse than no research because it arrives with confidence attached.

## The three rules
**1. Talk about their life, not your idea.** The moment you pitch, all subsequent data is contaminated by politeness. **2. Ask about specifics in the past, not generics or futures.** "Would you use X?" invites theater. "What did you do the last time this happened?" retrieves facts. **3. Talk less, listen more.**

## Separating signal from noise
Compliments are noise ("that's really cool!"). Generic claims are noise ("I always...", "I would definitely..."). Future promises are noise ("I'd buy that"). Signal is: what they actually did, what it cost them (time, money, embarrassment), what they've already tried, and whether they've paid anything — money, time, or reputation — trying to solve it. **People solving a real problem have already tried something.** No workaround = probably not a real problem.

## Commitment as evidence
End interviews by asking for something that costs them: an intro to a colleague, a follow-up meeting, a pilot commitment, a letter of intent. Advancement = evidence. Politeness without commitment = a soft no. Track your interviews by commitments generated, not by how encouraging they felt.`,
takeaways:["Never pitch during discovery — talk about their life, past and specific","Compliments, generics, and future promises are noise; past behavior and incurred costs are signal","No existing workaround usually means no real problem; commitments are the only honest yes"],
cards:[
 {q:"What are the Mom Test's three rules?",a:"Talk about their life not your idea; ask about specific past behavior not generics/futures; talk less, listen more."},
 {q:"What's the strongest evidence a problem is real?",a:"The person has already tried to solve it — a workaround, a spreadsheet, a hired intern, money spent. No attempted solution = probably not a real problem."},
 {q:"How do you distinguish a polite no from real interest at the end of an interview?",a:"Ask for a commitment that costs them something: an intro, a next meeting, a pilot. Advancement is evidence; compliments are not."}
]},
{id:"disc-4",track:"disc",title:"Assumption Mapping & Cheap Tests",min:7,
body:`Every product idea is a stack of assumptions wearing a trench coat. Discovery's job is to find the assumption that kills the idea — as cheaply and quickly as possible.

## Surfacing assumptions
Decompose any idea into four risk categories (Marty Cagan's): **Value** — will customers choose/use it? **Usability** — can they figure it out? **Feasibility** — can we build it (for AI: can the model do it reliably)? **Viability** — does it work for the business (cost, legal, brand, support load)? Teams over-test usability (easy) and under-test value and viability (uncomfortable).

## Prioritizing: the two axes
Plot assumptions by **impact if wrong** × **strength of evidence**. Test the top-right first: high impact, weak evidence. Most teams test what's easy to test instead — that's how you validate fonts while the business model dies.

## The cheap-test toolkit
Fake door (measure clicks on a feature that doesn't exist yet), concierge (deliver the service manually to learn what good looks like), Wizard of Oz (humans behind the curtain simulating the AI — the single most useful test for AI products: it measures demand AND generates training/eval data before you build), landing page + signup, pre-orders, prototype interviews. Match test cost to assumption importance: a kill-shot assumption deserves a week; a minor one deserves an hour.`,
takeaways:["Decompose ideas into value, usability, feasibility, viability risks — teams under-test value and viability","Test high-impact + weak-evidence assumptions first, not the easy ones","Wizard of Oz is the king of AI product tests: demand signal + eval data before you build"],
cards:[
 {q:"What are Cagan's four product risk categories?",a:"Value (will they use it), usability (can they use it), feasibility (can we build it), viability (does it work for the business)."},
 {q:"How do you prioritize which assumptions to test?",a:"Impact-if-wrong × strength-of-evidence. Test high-impact, weak-evidence assumptions first — not whatever is easiest."},
 {q:"Why is Wizard of Oz testing especially valuable for AI products?",a:"Humans simulate the AI behind the curtain — you measure real demand and simultaneously generate ground-truth examples that become your eval set."}
]},
{id:"disc-5",track:"disc",title:"Segmentation That Cuts Reality at the Joints",min:7,
body:`Bad segmentation is demographic ("SMBs, 50–200 employees"). Good segmentation is behavioral and need-based: groups that would make different buying decisions for different reasons. The test of a segmentation is whether it changes what you'd build or how you'd sell.

## Needs-based segmentation
Segment by the job, the circumstance, and the intensity of the pain. "Teams that just lost a deal to a faster competitor" is a segment; "mid-market SaaS" is a mailing list. Signals of a good segment: members reference the same alternatives, use similar words for the problem, and respond to the same message.

## The beachhead logic
For new products, pick the first segment by: **pain intensity** (hair on fire), **willingness to pay**, **reachability** (can you find them efficiently?), **referenceability** (do they talk to each other? density of word-of-mouth), and **winnability** (can you be 10x better for them specifically?). A beachhead you can dominate beats a big market you can dent. Geoffrey Moore's bowling pin: win the beachhead, then expand to adjacent segments who reference the first.

## ICP discipline
Write the Ideal Customer Profile down: firmographics AND the behavioral/situational markers that predict success. Then enforce it — the fastest way to poison retention metrics and support load is selling to customers outside the ICP because the quarter needed the revenue.`,
takeaways:["Segment by job, circumstance, and pain intensity — not demographics","Pick beachheads for pain, reachability, reference density, and winnability — dominate then expand","Write the ICP down and enforce it; off-ICP revenue poisons retention"],
cards:[
 {q:"What's the test of a good segmentation?",a:"It changes decisions — different segments would need different products or messages. If not, it's just a mailing list."},
 {q:"What five criteria pick a beachhead segment?",a:"Pain intensity, willingness to pay, reachability, referenceability (word-of-mouth density), and winnability (can you be 10x for them)."},
 {q:"Why does selling outside the ICP hurt more than it helps?",a:"Off-ICP customers churn, distort feedback, and consume support — poisoning retention metrics for revenue that doesn't compound."}
]}
);

{id:"data-1",track:"data",title:"North Star Metrics & Metric Trees",min:7,
body:`A North Star Metric is the single measure that best captures the value you deliver to customers — chosen so that moving it moves the business. Revenue is a lagging result, not a North Star; the North Star should LEAD revenue.

## Choosing one
Good North Stars express delivered value with a rate or depth component: messages sent by teams (Slack), nights booked (Airbnb), weekly active learners completing a session. Seven checks: it expresses customer value, it's a leading indicator of revenue, it's influenceable by teams, it's measurable, it's simple to explain, it's not gameable in obvious ways, and it moves in weeks not years.

## The input metric tree
The North Star alone is unactionable — decompose it into 3–5 **input metrics** teams can directly drive. Nights booked = new guests × conversion × repeat rate × nights per stay. Each team owns an input; the tree makes visible how local work aggregates into company outcomes, and it's your first diagnostic when the North Star moves unexpectedly: walk the tree.

## Guardrails
Every optimization needs counter-metrics that catch the damage it could cause: pushing activation? watch week-4 retention. Pushing AI-generated content volume? watch report rates and consumption per item. A metric without a guardrail is an invitation to Goodhart's law — when a measure becomes a target, it ceases to be a good measure.`,
takeaways:["North Star = delivered customer value that leads revenue — not revenue itself","Decompose into 3–5 ownable input metrics; walk the tree to debug movements","Pair every target metric with guardrail metrics or Goodhart's law collects"],
cards:[
 {q:"Why shouldn't revenue be a North Star Metric?",a:"Revenue is a lagging result of value delivered. The North Star should capture customer value that LEADS revenue."},
 {q:"What is a metric input tree?",a:"The decomposition of the North Star into 3–5 driver metrics teams can directly own — making local work's contribution visible and enabling diagnosis."},
 {q:"What is Goodhart's law and its remedy?",a:"When a measure becomes a target it ceases to be a good measure. Remedy: pair every target with guardrail/counter-metrics that catch the damage."}
]},
{id:"data-2",track:"data",title:"Retention & Cohort Analysis",min:8,
body:`Retention is the single most honest metric a product has. Growth can be bought; retention only comes from delivered value. Nearly every durable company sits on a retention curve that flattens.

## Reading curves
Plot cohorts (users grouped by start week/month) against time. Three shapes: **declining to zero** (leaky bucket — no business yet, fix the product before spending on growth), **flattening** (a core of users found durable value — the height of the plateau is your business), **smiling** (later-life usage rises — resurrection or network effects; rare and precious). Always compare cohorts: are newer cohorts flattening higher? That's product improvement showing up honestly.

## Finding the habit moment
Correlate early actions with long-term retention: users who do X within Y days retain at 2–3x. That's your activation target (the folklore examples: Facebook's 7 friends in 10 days). Two cautions: correlation isn't causation — validate by driving the behavior experimentally and watching whether retention follows; and the moment must be causally plausible, not a proxy for pre-existing intent.

## Retention mechanics
Improve retention in three ways: better onboarding to the habit moment (biggest lever, usually), building the habit loop (triggers that bring users back to value, not to the app), and win-back (weakest lever, use sparingly). For AI products, watch **trust-adjusted retention**: usage that persists after the user's first bad output experience is the real signal.`,
takeaways:["Flattening cohort curves = a business; declining-to-zero = fix product before growth","Find the early action that predicts retention, then validate causally — don't just chase correlations","Newer cohorts flattening higher is the honest signature of product improvement"],
cards:[
 {q:"What are the three retention curve shapes and their meanings?",a:"Declining to zero (leaky bucket, no durable value), flattening (core users found value — a business), smiling (usage rises later — network effects/resurrection)."},
 {q:"What's the two-step discipline for activation moments?",a:"Find the early behavior correlated with retention, then experimentally drive it and confirm retention follows — correlation alone may reflect pre-existing intent."},
 {q:"How do you verify your product is actually improving over time?",a:"Newer cohorts should flatten at higher retention levels than older ones — cohort comparison, not aggregate metrics."}
]},
{id:"data-3",track:"data",title:"Experimentation That You Can Trust",min:8,
body:`A/B testing is the only reliable way to establish causation at scale — and the easiest ritual to perform badly while feeling scientific.

## The non-negotiables
**Power the test before running it.** Small effects need big samples; running an underpowered test and eyeballing it produces noise with confidence intervals. Decide sample size and duration up front. **No peeking-and-stopping.** Checking daily and stopping at significance inflates false positives massively — significance will be crossed by chance during a random walk. Fix the duration or use sequential testing methods designed for it. **Run whole weeks.** Weekday and weekend users differ; partial weeks bias results. **One primary metric,** chosen in advance, with guardrails. Twenty metrics at p<0.05 means one "wins" by luck.

## Reading results
A p-value is not the probability you're right — it's the probability of seeing this data if there were no effect. Look at confidence intervals, not point estimates: "+2% (±0.4%)" and "+2% (±6%)" are different worlds. Check segment consistency: an effect driven entirely by one platform is a bug hunt, not a win.

## When you can't test
Small samples, network effects, or brand-level changes resist A/B testing. Alternatives: switchback tests, geo experiments, difference-in-differences, staged rollouts with matched cohorts. Weaker inference, still better than vibes. The cultural point: experiments exist to change decisions. Define ship/kill criteria before results arrive.`,
takeaways:["Power tests up front; never peek-and-stop; run whole weeks; one primary metric","Confidence intervals over point estimates; a p-value is not the probability you're right","Define ship/kill criteria before seeing results — experiments exist to change decisions"],
cards:[
 {q:"Why does peeking at A/B results and stopping at significance corrupt the test?",a:"Random variation crosses significance thresholds by chance during the run — stopping there massively inflates false positive rates."},
 {q:"What does a p-value of 0.03 actually mean?",a:"A 3% chance of observing data this extreme IF there were no real effect — not a 97% chance the effect is real."},
 {q:"Why must A/B tests run in whole-week multiples?",a:"Weekday and weekend user behavior differs systematically; partial weeks bias the sample."},
 {q:"What are the alternatives when A/B testing isn't possible?",a:"Switchback tests, geo experiments, difference-in-differences, staged rollouts with matched cohorts."}
]},
{id:"data-4",track:"data",title:"Debugging a Metric Move",min:7,
body:`"Why did X drop?" is a rite of passage. The wrong response is a plausible story; the right response is a structured elimination.

## The sequence
**1. Verify it's real.** Instrumentation breaks more often than user behavior changes. Check the pipeline, recent tracking changes, bot filtering, timezone/date bugs. A shocking fraction of metric crises end here. **2. Establish shape.** Sudden cliff (points to a deploy, outage, or tracking change — check the change log for that exact date) vs gradual slide (mix shift, seasonality, slow decay, competitor). **3. Segment.** Slice by platform, geography, browser/version, acquisition channel, new-vs-existing users. A drop isolated to one segment is a clue; a uniform drop across all segments is either measurement or something universal (pricing, brand, outage). **4. Decompose the formula.** If conversion = visits × rate, which factor moved? Walk the metric tree downward. **5. Check the mix.** Simpson's paradox is everywhere: every segment can improve while the aggregate falls because segment composition shifted (e.g., cheap traffic surged). Always check composition before behavior.

## The write-up
Lead with the answer, the evidence, the fix, and what monitoring now exists so it's caught earlier next time. Resist single-cause narratives when the data shows multiple small contributors — that's usually the truth.`,
takeaways:["Verify instrumentation before believing behavior changed — many crises are tracking bugs","Cliffs point to deploys/tracking; slides point to mix, seasonality, decay","Check mix shift (Simpson's paradox) before concluding behavior changed"],
cards:[
 {q:"What's the first step when a metric moves unexpectedly?",a:"Verify it's real — check instrumentation, tracking changes, pipelines, bot filtering. Measurement breaks more often than behavior changes."},
 {q:"What does a sudden cliff vs gradual slide in a metric suggest?",a:"Cliff: a deploy, outage, or tracking change on that date. Slide: mix shift, seasonality, slow decay, or competitive pressure."},
 {q:"What is Simpson's paradox in metric debugging?",a:"Every segment improves while the aggregate declines (or vice versa) because segment composition shifted — always check mix before behavior."}
]},
{id:"data-5",track:"data",title:"Funnels, Growth Accounting & the Metrics of AI Features",min:8,
body:`## Growth accounting
Net growth = new + resurrected − churned. Two products with identical growth can be opposite businesses: one compounding on retention, one on a treadmill replacing churned users with paid acquisition. Always decompose. The **quick ratio** (new + resurrected) / churned gives a one-number health check.

## Funnel discipline
Define stages by user intent, not page views. Measure conversion AND time-between-stages (slowing velocity predicts dropping conversion). Fix the biggest absolute loss first, not the worst percentage — 10% improvement on a stage 80% of users reach beats 50% on a stage 4% reach.

## AI feature metrics — the special set
Beyond standard engagement: **Acceptance rate** (suggestions accepted / shown) and **edit distance** (how much users modify accepted outputs — light edits are fine, heavy rewrites mean the AI isn't doing the job). **Regeneration rate** (retries signal dissatisfaction). **Task completion** (did the user's actual goal complete, not just "did they engage" — engagement with a broken AI can be users struggling). **Coverage** (what share of eligible moments does AI successfully serve?). **Cost per completed task** and **latency percentiles** (p95, not mean). **Trust trajectory:** acceptance rate over user tenure — rising means the product is earning reliance; falling after week one means novelty masked a quality problem.

Instrument these from day one. They are simultaneously your product analytics and your eval-in-production layer.`,
takeaways:["Decompose growth into new + resurrected − churned; same growth can hide opposite businesses","Fix the biggest absolute funnel loss, not the worst percentage","AI features need their own metric set: acceptance, edit distance, regeneration, task completion, cost/task"],
cards:[
 {q:"What is growth accounting and the quick ratio?",a:"Net growth = new + resurrected − churned; quick ratio = (new + resurrected)/churned — a one-number health check on growth quality."},
 {q:"Why can high engagement be a bad sign for an AI feature?",a:"Engagement may be struggle — retries and rephrasing. Measure task completion and regeneration rate to distinguish delight from friction."},
 {q:"What does edit distance on accepted AI outputs tell you?",a:"How much of the job the AI is really doing — light edits are healthy; heavy rewrites mean users only use it as a starting point."},
 {q:"Which funnel stage should you fix first?",a:"The biggest absolute loss (users reached × drop rate), not the worst percentage drop."}
]}
);

{id:"exec-1",track:"exec",title:"PRDs That Drive Decisions",min:7,
body:`A PRD's job is not documentation — it's forcing clarity before code and alignment without meetings. If engineering reads it and still asks "but what should happen when...", it failed.

## The load-bearing sections
**Problem & evidence:** whose problem, how you know it's real (data, quotes, tickets — not vibes), and the cost of not solving it. **Outcome:** the metric change that defines success, with current baseline and target. **Non-goals:** explicitly out of scope — the section that prevents the death-by-scope-creep. Often the most valuable paragraph in the doc. **Solution narrative:** the user's experience end-to-end, written as a story, with edge cases and failure states. **Open questions:** honest unknowns with owners and dates.

## For AI features, add
The job spec (trigger, context, output contract), the quality bar and eval plan, failure behaviors, cost/latency budgets, and the data/permission story. An AI PRD without an eval plan is a demo request.

## Craft notes
Write the press release or the exec summary FIRST — if the one-paragraph version isn't compelling, ten pages won't save it. Keep the doc alive during build: decisions get appended, not lost in Slack. And measure the PRD afterward: did we hit the outcome we wrote down? Teams that never check calibrate never.`,
takeaways:["Non-goals is often the most valuable section — scope creep dies there","AI PRDs must include eval plan, quality bar, failure behavior, and cost budget","Write the one-paragraph version first; if it's not compelling, the long version won't be"],
cards:[
 {q:"What sections make a PRD load-bearing?",a:"Problem with evidence, measurable outcome with baseline/target, explicit non-goals, end-to-end solution narrative with failure states, open questions with owners."},
 {q:"What must an AI feature PRD add beyond the standard sections?",a:"The job spec (trigger/context/output contract), quality bar + eval plan, failure behaviors, cost/latency budgets, and data/permission story."},
 {q:"Why write non-goals explicitly?",a:"They're the pre-agreed defense against scope creep — the clearest record of what was consciously excluded and why."}
]},
{id:"exec-2",track:"exec",title:"Prioritization Beyond the Framework",min:7,
body:`RICE, ICE, MoSCoW, Kano — frameworks make prioritization legible, but the numbers are estimates wearing lab coats. Use them to structure debate, not to outsource judgment.

## The toolkit and when each fits
**RICE** (Reach × Impact × Confidence / Effort): good default for comparing dissimilar backlog items; its gift is the Confidence term, which forces teams to admit what they're guessing. **Kano:** separates must-haves (absence angers, presence is unnoticed) from performance features (more is better) and delighters (unexpected joy) — crucial when deciding the minimum lovable version. **Opportunity scoring:** importance minus satisfaction, from user surveys — finds underserved needs. **Cost of delay:** for sequencing when timing matters (a feature worth $1M/quarter delayed two quarters cost you $2M, whatever the roadmap says).

## The deeper truths
Prioritization is portfolio construction: balance core improvements (defend retention), growth bets, debt/quality, and a small number of strategic swings. All-quadrant-one roadmaps starve the future; all-moonshot roadmaps starve the present. The real question is never "is this worth doing?" but **"is this the best use of this team's next quarter?"** — opportunity cost is the only honest lens. And sequence by information: do the thing that most reduces uncertainty about the biggest bet first.`,
takeaways:["Frameworks structure debate; the Confidence term in RICE is its real gift","Kano separates must-haves from performance features from delighters — different investment logic each","The honest question is opportunity cost: best use of THIS team's next quarter?"],
cards:[
 {q:"What does RICE stand for and what's its most valuable term?",a:"Reach × Impact × Confidence ÷ Effort. Confidence is the gift — it forces teams to admit what's a guess."},
 {q:"What are Kano's three feature categories?",a:"Must-haves (absence angers, presence unnoticed), performance (more is better), delighters (unexpected joy). Each justifies different investment."},
 {q:"What is cost of delay?",a:"The value lost per unit time a feature ships later — the right lens when sequencing matters more than selection."}
]},
{id:"exec-3",track:"exec",title:"Pre-mortems & Risk Rituals",min:6,
body:`A pre-mortem inverts the post-mortem: "It's six months from now and this launch failed badly. What happened?" Prospective hindsight reliably surfaces risks that planning meetings suppress, because it makes pessimism safe — you're not doubting the plan, you're playing the game.

## Running one
Everyone writes failure stories silently first (prevents anchoring on the loudest voice). Collect, cluster, then sort into Shreyas Doshi's taxonomy: **Tigers** — real threats that will bite (act on these), **Paper tigers** — feared but toothless (explicitly deprioritize, which frees anxiety and capacity), **Elephants** — the things nobody's saying (the senior engineer who thinks the architecture is wrong, the dependency on a team that's underwater). Elephants are the highest-value output; create explicit cover to name them.

## Then actually mitigate
Each tiger gets: owner, mitigation or kill-criteria, and a check-in date. Classify as launch-blocking, fast-follow, or monitor. A pre-mortem without assigned mitigations is theater.

## AI-specific tigers worth hunting
Quality cliff on a user segment your evals under-represent; cost blow-up from an unexpected usage pattern; a prompt-injection path to a consequential action; trust collapse from one viral bad output; provider model update changing behavior mid-quarter.`,
takeaways:["Prospective hindsight makes pessimism safe and surfaces suppressed risks","Sort risks into tigers / paper tigers / elephants — elephants are the highest-value finds","Every tiger gets an owner, mitigation, and date — otherwise it's theater"],
cards:[
 {q:"How does a pre-mortem differ from a risk brainstorm?",a:"It assumes failure already happened ('it's 6 months later and we failed — what happened?') — prospective hindsight makes pessimism safe and specific."},
 {q:"What are tigers, paper tigers, and elephants?",a:"Tigers: real threats to act on. Paper tigers: feared but harmless, explicitly deprioritized. Elephants: unspoken concerns nobody will name — the most valuable to surface."},
 {q:"Name three AI-specific pre-mortem risks.",a:"Eval blind spots on a user segment, cost blow-ups from unexpected usage, prompt-injection paths to consequential actions, viral trust collapse, provider model updates."}
]},
{id:"exec-4",track:"exec",title:"Story Mapping & Scope Craft",min:6,
body:`Flat backlogs hide the product. A story map lays it out in two dimensions: the user's journey left-to-right (the backbone), and depth of capability top-to-bottom under each step. Suddenly everyone can see what "the product" actually is — and what any release cut actually removes.

## Slicing releases
Draw horizontal lines through the map. Each slice must span the WHOLE journey — a thin end-to-end path that delivers the outcome crudely, rather than three journey steps built deluxe and the rest missing. The bicycle before the car chassis. This is what "MVP" was supposed to mean: the smallest slice a user can travel end-to-end and get value.

## Scope craft under pressure
When dates compress, cut depth, not steps: keep the full journey, make each step simpler. Cutting a journey step ships a product nobody can use; cutting depth ships a product that's merely modest. Protect the walking skeleton.

## For AI products
The map gains a third consideration per step: what's the automation level here — manual, AI-assisted, AI-automated? Often the right v1 slices the journey with AI at only ONE step (the highest-pain one) and humans everywhere else. Expand automation step by step in later releases as evals and trust mature.`,
takeaways:["Map the journey horizontally, depth vertically; slice releases as thin end-to-end paths","Under pressure, cut depth not journey steps — protect the walking skeleton","AI v1s often automate exactly one journey step; expand as trust matures"],
cards:[
 {q:"What are the two dimensions of a story map?",a:"The user journey left-to-right (backbone) and depth of capability top-to-bottom under each step."},
 {q:"What's the rule for slicing a release from a story map?",a:"Each slice must span the whole journey end-to-end, thinly — not a few steps built deluxe with gaps."},
 {q:"When a deadline compresses scope, what do you cut?",a:"Depth, never journey steps — a simpler complete journey beats a polished incomplete one."}
]},
{id:"exec-5",track:"exec",title:"Working With Engineers on AI Systems",min:7,
body:`AI PM credibility with engineers is earned in specifics. You don't need to train models; you need to reason about systems, tradeoffs, and failure honestly.

## The vocabulary that matters
Be fluent in: context windows and token budgets; latency percentiles (p50 vs p95 — means lie); throughput vs latency tradeoffs; caching layers; retrieval indexes and their staleness; eval harnesses and CI gates; model version pinning; fallback chains (primary model → cheaper backup → deterministic degradation). You should be able to follow a trace of an agent run and point at the step that went wrong.

## The conversations that build trust
Ask about **error budgets** — what reliability is the system designed for, and what happens beyond it? Ask **"what makes this hard?"** early and listen fully — the answer usually contains the real schedule. Bring **data to design debates:** eval results, production traces, user recordings — not opinions about model quality. Negotiate **quality-cost-latency** openly as a three-way tradeoff you own together: PM sets the user-experience constraints, engineering proposes the frontier of what's achievable, you pick the point together.

## The anti-patterns
Promising model behavior to stakeholders before feasibility spikes. Treating non-determinism as an engineering bug ("just make it consistent"). Demanding evals after build instead of before. And the classic: spec'ing the happy path and calling failure handling "edge cases" when it's 30% of the work.`,
takeaways:["Fluency in tokens, percentiles, caching, evals, and fallbacks earns the room","Ask 'what makes this hard?' early — the answer contains the real schedule","Quality, cost, latency: negotiate the triangle openly; never promise model behavior before a spike"],
cards:[
 {q:"Why quote p95 latency instead of the mean?",a:"Means hide tail pain — a fine average with a terrible p95 means a meaningful share of users regularly suffer. Users experience the tail."},
 {q:"What is a fallback chain in an AI system?",a:"Ordered degradation: primary model → cheaper/faster backup → deterministic behavior — so failures degrade gracefully instead of hard-failing."},
 {q:"Name three AI PM anti-patterns with engineering.",a:"Promising model behavior before feasibility spikes; treating non-determinism as a bug to 'fix'; leaving evals and failure handling until after build."}
]}
);
