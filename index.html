{id:"intv-29",track:"intv",title:"Theme 11: Financial Products — The Seven Jobs of Money",min:12,
body:`Financial products exist to move, store, and invest money. Satish Mummareddy's Theme 11 breaks the vertical into seven customer jobs, each with its own value proposition and product category — a map for a "design a fintech product" interview prompt and for orienting quickly in any new financial-product area at work.

## The Seven Jobs, In Full

Each job maps to a distinct value proposition and a distinct product category:

- **Store Money** — "How do I store my money in a safe place and have the ability to use it for different use cases when I need it?" The product category is **checking accounts**: easy access via debit cards, checks, and online transfers, typically no or low interest, convenient for daily expenses, bill payments, and managing cash flow. Revenue comes from monthly fees, overdraft fees, and minimum-balance requirements.
- **Save Money** — "How do I save money by tracking my spend, making plans, and using tax-efficient ways to capture more of my earnings?" Banking products include **savings accounts** (interest-bearing, FDIC-insured, but low rates) and **certificates of deposit (CDs)** (fixed deposits with higher interest rates for longer-term commitments, guaranteed returns, but penalties for early withdrawal and funds locked). Tax-advantaged products include tracking & planning tools, **529 plans** (education savings), **Health Savings Accounts (HSAs)** (medical expenses), and **annuities** (retirement income, often high fees).
- **Grow Money** — "How do I grow my money in alignment with my short- and long-term goals based on my life stage?" The same savings/CD instruments double as growth vehicles depending on framing. Investment products include **brokerage accounts** (stocks, bonds, ETFs, mutual funds) and retirement accounts — **401(k)** (employer-sponsored, often with matching) and **IRA** (Traditional and Roth, tax-advantaged).
- **Make Payments** — "How do I make payments for my purchases in person and online, for both recurring and one-off payments, seamlessly?" Banking products include **debit cards** and **bill pay**. Credit products include standard **credit cards**, **reward credit cards** (cash back, travel points), **secured credit cards** (deposit-backed, for building credit), and **business credit cards** (higher limits, expense tracking).
- **Borrow Money** — "How do I borrow money to make larger purchases, cover emergencies, and fund investments?" The core category is **loans**: personal loans (unsecured, for debt consolidation or major purchases), **auto loans** (loans specifically for purchasing vehicles, secured by the vehicle itself), mortgages (secured by the property), home equity loans/HELOCs (secured by home equity), student loans (federal or private), and payday loans (short-term, high-interest, often predatory). Alternate mechanisms include **Buy Now, Pay Later (BNPL)** and peer-to-peer lending (higher returns, but riskier).
- **Risk Protection** — "How do I protect myself against financial risk from unexpected life, natural, and economic circumstances?" The product category is **insurance**: life insurance (term is affordable; whole life adds a savings component), health insurance (employer plans or exchange plans), auto insurance (liability, collision, comprehensive), and disability insurance (covers lost income from injury).
- **Send/Receive (Transfer) Money** — "How do I move money to accomplish my goals?" The product category compares **wire transfer** directly against **ACH (Automated Clearing House)** — a comparison detailed below.

{{DIAGRAM:0}}

## Wire vs. ACH: The Seventh Job In Detail

Wire transfers move money directly between financial institutions; ACH transfers pass through clearing houses — that mechanism difference is what drives every row of the comparison:

- **Speed** — wire settles in minutes to one business day; ACH takes hours to several business days.
- **Settlement** — wire is largely irrevocable; ACH carries several reversal rules.
- **Cost** — wire runs tens of dollars; ACH runs tenths of a cent up to 1.5%.
- **Direction** — only the sender can initiate a wire; either sender or receiver can initiate an ACH.
- **Frequency** — wire is largely one-off; ACH supports both one-off and recurring payments.
- **Size** — wire can move up to many millions of dollars; 98% of ACH transfers are under $25K.
- **International reach** — wire has wide international support; ACH has limited support.

{{DIAGRAM:2}}

## The Five Recurring Problems

Across all seven jobs, the reasons people don't use a given financial product cluster into five buckets — a diagnostic checklist for any fintech product gap:

- **Access** — people don't have access to different types of financial products based on their socioeconomic conditions.
- **Cost** — people have to pay higher prices to access financial products based on their socioeconomic conditions.
- **Convenience** — people have to make more effort to use financial products based on their socioeconomic conditions.
- **Knowledge** — people don't use financial products because they don't understand the value.
- **Trust & security** — people avoid financial products due to security concerns.

> The same nominal problem — access — can actually be a knowledge or convenience problem in disguise, depending on which socioeconomic segment is experiencing it.

## Who Plays In This Space

Seven entity types each have a distinct purpose, key services, examples, and target audience:

- **Commercial Banks** — accepting deposits (checking/savings), providing loans (personal, auto, mortgages, business), credit/debit card services, wire transfers and payment processing. Examples: JPMorgan Chase, Bank of America, Citibank. Audience: the general public and businesses.
- **Brokerage Firms** — stock/bond/mutual fund trading, investment advice and portfolio management, retirement planning and wealth management. Examples: Charles Schwab, Fidelity, Robinhood. Audience: individual and institutional investors.
- **Insurance Companies** — life, health, auto, homeowners insurance, annuities and retirement products. Examples: State Farm, Allstate, MetLife. Audience: individuals, families, and businesses.
- **Mortgage Companies** — offering and servicing mortgage loans, refinancing existing loans. Examples: Rocket Mortgage, LoanDepot. Audience: homebuyers and property investors.
- **Mutual Fund Companies** — managing mutual funds, ETFs, index funds, and retirement investment options. Examples: Vanguard, BlackRock. Audience: retail and institutional investors.
- **FinTech Companies** — peer-to-peer lending (LendingClub, Prosper), digital banking (Chime, Revolut), payment solutions (PayPal, Square), robo-advisors (Betterment, Wealthfront). Audience: tech-savvy consumers and small businesses.
- **FinTech Platforms** — banking-as-a-service for other fintech companies: whitelabel credit cards, whitelabel bank accounts, whitelabel loans. Audience: fintech companies themselves, as infrastructure providers.

The **value proposition list** restates the same seven jobs as what any of these entities is ultimately selling: Save Money, Store Money, Make Payments, Grow Money, Borrow Money, Risk Protection, Transfer (Send/Receive) Money. Any given entity typically specializes in a subset of these seven rather than covering all of them — which is exactly why the "strategies based on the entity" exercise below matters.

## Why The Space Is Heavily Regulated

Financial products carry three regulatory pressures that don't exist in most other verticals:

- **Functional separation** — prevents conflicts of interest by separating services like deposit-taking, lending, investment banking, and insurance. Example: the **Volcker Rule** limits proprietary trading by commercial banks.
- **Consumer protections** — the **Gramm-Leach-Bliley Act** mandates transparency in how consumer data is handled; the **Dodd-Frank Act** ensures fair treatment of consumers through the **CFPB (Consumer Financial Protection Bureau)**.
- **Systemic risk mitigation** — Dodd-Frank and the **Basel Accords** impose stricter oversight on large financial conglomerates, alongside restrictions on speculative activity by commercial banks that reduce systemic risk.

{{DIAGRAM:3}}

Any product idea in this space needs a regulatory lens as part of the feasibility check from day one, not bolted on after a design is finalized — a product design that's technically and commercially great but violates functional-separation or consumer-protection rules isn't shippable regardless of how good the user experience is.

## Segmentation Lenses Specific To Financial Products

Two segmentation dimensions the deck calls out as especially load-bearing in this vertical, beyond the standard demographic/behavioral split:

- **Life stage** — a finer-grained ladder than most verticals need: Birth, Infancy, Childhood, College, Young Adult, Family, Family with Kids, Family with College Kids, Empty Nesters, Retirement, Old Age. Financial needs and risk tolerance shift meaningfully at each step — a "Family with Kids" household's borrowing and insurance needs look nothing like a "Young Adult"'s, even at the same income level.
- **Socioeconomic segment** — Under-served groups, Middle class, Affluent, and Uber-rich. Each socioeconomic segment experiences the five recurring problems differently — an access problem for an under-served segment is often a convenience or knowledge problem for the middle class using the same product category.

## How To Think About A Product In This Space

When approaching a "design a financial product" prompt, run the idea through the sequence below, in order:

{{DIAGRAM:1}}

- Which of the **seven jobs/value propositions** does it serve?
- Which **life-stage segment** is the target customer in?
- Which **socioeconomic segment**?
- Which of the **five problems** (access, cost, convenience, knowledge, trust & security) is it actually solving?
- Does it clear a **regulatory feasibility check** against the three pressures above?

## Strategy By Entity Type

Then apply an entity-specific strategy lens — the deck explicitly separates "strategies based on the entity," meaning the same customer problem gets attacked differently depending on who you are. A **bank's move** (for example, cross-selling a new loan product to existing depositors, leveraging trust and existing relationship data) looks structurally different from a **fintech platform's move** (for example, competing on convenience and speed with none of the legacy trust/branding, but also none of the switching-cost moat) even when both are targeting the exact same underlying customer problem.

The seven entity types the deck names for this exercise are **Banks, Brokerages, Insurance, Mortgage, Mutual Fund, FinTech Products, and FinTech Platforms** — each warrants its own explicit "given who we are, what's our angle" pass before finalizing a solution.`,
takeaways:["Financial products serve seven jobs: store, save, grow, make payments, borrow, protect against risk, and send/receive money — each with distinct product categories, and auto loans specifically sit in \"Borrow Money\" as a secured loan (collateral changes the risk model versus unsecured products)","Non-adoption of any financial product traces back to one of five problems — access, cost, convenience, knowledge, or trust & security — and the same nominal problem (e.g., \"access\") can actually be a knowledge or convenience problem in disguise depending on the segment","The vertical is uniquely regulated (functional separation, consumer protection via Gramm-Leach-Bliley/Dodd-Frank/CFPB, and systemic risk mitigation via Basel/Dodd-Frank) — build the regulatory check into the design process from the start, and pair it with an entity-specific strategy lens, since the right move for a bank differs structurally from the right move for a fintech platform even against the same customer problem"],
cards:[
 {q:"What are the seven customer jobs that financial products serve, and what's the core product category for each?",a:"Store (checking accounts), Save (savings accounts/CDs/tax-advantaged tools), Grow (brokerage/retirement accounts), Make Payments (debit/credit cards), Borrow (loans + BNPL/P2P), Risk Protection (insurance), Send/Receive (wire transfer vs. ACH)."},
 {q:"What five problems explain why someone doesn't use a given financial product, and why can the same nominal problem actually be a different one depending on segment?",a:"Access, cost, convenience, knowledge, and trust & security. E.g., an \"access\" gap for an under-served segment may really be a knowledge gap for a middle-class segment who technically qualifies but doesn't know it."},
 {q:"Compare wire transfer and ACH on speed, cost, and who can initiate.",a:"Wire: minutes to one business day, tens of dollars, only the sender can initiate. ACH: hours to several business days, tenths of a cent to 1.5%, either sender or receiver can initiate."},
 {q:"Name the three types of regulatory pressure specific to financial products, with an example law/rule for each.",a:"Functional separation (Volcker Rule — limits proprietary trading by commercial banks), consumer protection (Gramm-Leach-Bliley — data transparency; Dodd-Frank/CFPB — fair treatment), and systemic risk mitigation (Dodd-Frank and Basel Accords — oversight of large financial conglomerates)."},
 {q:"Why does the same customer problem require a different strategic move depending on which entity type (bank vs. fintech platform) is solving it?",a:"A bank can leverage an existing trusted relationship and proprietary customer/servicing data; a fintech platform has neither of those built-in advantages and must compete on convenience, speed, or price instead — same problem, structurally different right-to-win."},
 {q:"Why does an auto loan carry different risk pricing than an unsecured personal loan?",a:"It's secured by the vehicle itself — the lender can repossess collateral, so pricing reflects recovery value in addition to credit risk."},
 {q:"What two segmentation lenses does the deck call out as especially load-bearing for financial products, beyond standard demographic/behavioral splits?",a:"Life stage (a fine-grained ladder from Birth through Old Age, since needs and risk tolerance shift at each step) and socioeconomic segment (Under-served, Middle class, Affluent, Uber-rich, since each experiences the five recurring problems differently)."}
]},
{id:"intv-30",track:"intv",title:"Theme 12: Design Platforms — Built On Top of Others",min:9,
body:`Satish Mummareddy's tagline for Theme 12 is **"Built On Top of Others!"** — placing **design platforms** inside the broader **developer/design infra** category, alongside infrastructure players like **AWS**, **Google Cloud**, and **Azure**, and developer tools like **Cloudflare**, **Twilio**, **Datadog**, **Okta**, and **Stripe**. The three named design platforms — **Adobe**, **Figma**, and **Canva** — are the theme's whole case study.

> Design platforms give consumers and businesses the tools to design physical and digital products.

The value-creation shape mirrors other theme notes: a **Provider** (Business, or Business + Business) exchanges **Service/Goods** for **Payment** with a **Customer** (Consumers, Business).

## What value do design platforms provide? An eight-category catalog

The deck answers this with a concrete, named-example catalog spanning both digital and physical output — worth using as a checklist when scoping what a design tool should support:

- **Illustrations** — vector illustration and drawing tools, provided by **Adobe Illustrator**.
- **Print and Web Publishing** — posters, resumes, docs, social graphics, print materials, websites, Instagram posts, and brochures, provided by **Canva**.
- **Social Media Content** — platform-specific content (TikTok video, Instagram story/reel/post/ad, Facebook post/ad, Pinterest idea pin) plus editing utilities like text effects, merge videos, remove background, convert to GIF, resize video/image, and trim video, provided by **Adobe Express**.
- **Physical Products** — merchandise and print-on-demand: tote bags, cards, mugs, t-shirts, stickers, and custom "make it your own" goods, provided by **Canva**.
- **Photo Editing** — presets, background blur, and color/light adjustment, provided by **Adobe Photoshop/Lightroom**.
- **Video Editing** — timeline editing, audio/sound design, and effects, provided by **Adobe Premiere**.
- **Visual Effects** and **Animations** — compositing, environmental effects, motion graphics, and animated shapes/icons, provided by **Adobe After Effects**.
- **3D** — modeling, materials/texturing, and assets (painting models, real-world-to-model scanning, stage scenes), provided by **Adobe 3D & AR / Substance 3D**.
- **Web & Mobile App Design** — UI/UX design and prototyping, provided by **Figma**.

## Five historical waves — each with a named beneficiary

The deck's central narrative device is a sequence of **five historical waves**, each answering "what were the key differentiators over time," and each attributing a clear winner:

- **Wave 1** solved building better design tools for different use cases — beneficiary: **Adobe**.
- **Wave 2** solved collaborating better within the design team — beneficiary: **Figma**.
- **Wave 3** solved collaborating better with other functions outside the design team — beneficiary: again **Figma**.
- **Wave 4** solved enabling everyone to design, not just trained designers — beneficiary: **Canva**.
- **Wave 5** solves enabling everyone to design better and faster — beneficiary: all three, **Adobe**, **Figma**, and **Canva**, converging on the same wave.

{{DIAGRAM:0}}

The pattern worth naming explicitly: **Wave 1** (tool depth) and **Wave 4** (democratization) are opposite competitive strategies that both won — **Adobe** won by going deep for professionals, **Canva** won by going broad for non-designers. **Waves 2–3** show that **collaboration**, not just tool capability, was itself a distinct, separately-won axis of competition — which is why **Figma** displaced parts of Adobe's territory without ever matching Adobe's raw tool depth.

## How the top three platforms position themselves

Each platform's stated **positioning statement**, purpose, target audience, and use cases:

- **Adobe** — positioning statement: "State of the art in every design technology." Purpose: Adobe offers groundbreaking technology that empowers everyone, everywhere to imagine, create, and bring any digital experience to life. Target audience: high design competence (**designers**). Use cases: all design use cases spanning physical & digital publishing, web & mobile app design, and 3D design.
- **Figma** — positioning statement: "Seamless Design and Product Development Tooling." Purpose: Figma helps design and development teams build great products, together. Target audience: high design competence (**designers & developers**). Use cases: web and mobile apps.
- **Canva** — positioning statement: "Everyone can bring their designs to life." Purpose: Canva makes it easy to create professional designs and to share or print them. Target audience: low design skills (**marketing, comms, sales, creative teams, agencies, small businesses**). Use cases: visual docs, logos, posters, brochures, flyers, social media, stickers, websites, yard signs, mugs, clothing, calendars, labels, photo collages, and photo editing.

Positioning cuts along two axes simultaneously: **skill level** of the target user, running from high (**Adobe**/**Figma**) to low (**Canva**), and **scope of collaborator**, running from designers only, to designers plus developers, to non-designer businesspeople — Adobe to Figma to Canva.

{{DIAGRAM:1}}

## What vectors do the platforms push on now?

Four forward-looking pushes the deck names, each mapped to which platform(s) it belongs to:

- **Adobe** pushes the state of the art in design for different use cases — continued depth investment.
- **Canva** pushes simplifying design for everyone — continued breadth investment.
- All three — **Adobe**, **Figma**, **Canva** — push **generative AI** to give design superpowers to everyone, across design formats — the deck's explicit claim that generative AI is the one vector where all three converge, rather than differentiate.
- **Figma** pushes collaboration within & across teams, and deeper integrations in design deployment workflows — not just designing together, but shipping the design into production more seamlessly.`,
takeaways:["Design platforms give consumers & businesses tools to design physical and digital products, spanning an eight-category value catalog from illustrations and photo/video editing to physical merchandise and web/app UI design","Five historical waves explain how Adobe, Figma, and Canva each won distinct territory: Adobe won on tool depth (wave 1), Figma won on collaboration — first within design teams, then across functions (waves 2–3), Canva won on democratizing design for non-designers (wave 4), and all three now converge on generative AI as the shared next wave (wave 5)","The three platforms position along two axes: target-user skill level (high for Adobe/Figma, low for Canva) and collaborator scope (designers-only for Adobe, designers+developers for Figma, non-designer businesspeople for Canva) — a reusable two-axis map for scoping any \"who is this design tool for\" question","Depth (Adobe) and breadth/democratization (Canva) are opposite strategies that both succeeded simultaneously in the same market — a reminder that \"go deep for experts\" and \"go broad for everyone\" aren't mutually exclusive winning strategies, they can coexist as different wedges of the same overall market","For an auto lender, this theme is genuinely about internal tooling rather than a borrower-facing product — the transferable move is applying the skill-level × collaborator-scope framework to the lender's own design-tool stack decisions (Figma for product/eng collaboration, Canva for marketing/dealer self-serve, Adobe for deep creative work)"],
cards:[
 {q:"Name the five historical waves of design-platform competition and which company the deck names as the beneficiary of each.",a:"Wave 1: better design tools for different use cases → Adobe. Wave 2: collaborate better within the design team → Figma. Wave 3: collaborate better with other functions → Figma. Wave 4: enable everyone to design → Canva. Wave 5: enable everyone to design better and faster → Adobe, Figma, and Canva together."},
 {q:"What two axes does the deck use to position Adobe, Figma, and Canva against each other?",a:"Target-audience skill level (high design competence for Adobe/Figma vs. low design skills for Canva) and collaborator scope (designers only for Adobe, designers & developers for Figma, cross-functional non-designers — marketing/sales/agencies/small businesses — for Canva)."},
 {q:"What is the one vector the deck says all three platforms — Adobe, Figma, Canva — are converging on simultaneously, rather than differentiating around?",a:"Generative AI, to give design \"superpowers\" to everyone across design formats — named as the shared wave 5 investment area for all three, in contrast to earlier waves where each platform won distinct, non-overlapping territory."},
 {q:"List the eight value categories the deck catalogs for what design platforms provide, with one named example provider each.",a:"Illustrations (Adobe Illustrator), Print & Web Publishing (Canva), Social Media Content (Adobe Express), Physical Products (Canva), Photo Editing (Adobe Photoshop/Lightroom), Video Editing (Adobe Premiere), Visual Effects & Animations (Adobe After Effects), 3D (Adobe Substance 3D), Web & Mobile App Design (Figma)."},
 {q:"Why did Figma win territory from Adobe without ever matching Adobe's raw tool depth?",a:"Because collaboration was a separately-won competitive axis from tool capability — Figma's wave was \"collaborate better within the design team\" and then \"collaborate better with other functions,\" not \"build deeper tools than Adobe.\" Winning on collaboration let Figma displace Adobe in web/app design workflows even while Adobe remained deeper on raw creative tooling."},
 {q:"How should an auto lender apply the skill-level × collaborator-scope framework to its own design-tooling decisions?",a:"Map internal design needs the same way the deck maps Adobe/Figma/Canva: use Figma-equivalent tooling where design and engineering must collaborate directly (the borrower-facing loan application UI), Canva-equivalent tooling to let non-designers (marketing, dealer relations) self-serve simple assets, and Adobe-equivalent depth only where genuine creative craft is required (brand video, print collateral) — rather than buying one tool for every use case."}
]},
{id:"case-7",track:"case",title:"Case: Crossing Career Chasms — A Solo Founder's Live Strategy Doc",min:10,
body:`Satish Mummareddy (the instructor of the bootcamp this note-set is drawn from) published a real, unfiltered **strategy document** for his own two-person business — a course teaching product thinking to PMs — as a worked example of applying the **CTUC framework** and **7 Powers** to an actual, small, live business rather than a hypothetical case study. He's explicit about the effort involved: roughly **2 hours total** (1 hour on the write-up, 1 hour on the underlying raw research/process), and explicitly asks readers to "forgive inaccuracies and comprehensiveness" given the time-box — a useful calibration point for how much rigor a real strategy doc needs versus how much a polished consulting deck implies.

## Company and mission

**Crossing Career Chasms** is a two-person company (1 full-time employee, 1 at 5% time, no other support staff), founded by a **20+ year product/engineering leader** who has shipped across startups (including video mining) and big tech (Yahoo, Yelp, Meta), spanning consumer, business, advertiser, trust & safety, and AI-first products — "some spectacular, some not so much," in his own words. The founder left a high-paying senior PM role at **Meta working on Gen AI** to start this.

**Mission:** help tech people realize their full potential by developing their product and leadership skills. **Business model:** B2C for now (paid in money for services and products); B2B is possible but explicitly deprioritized as "not worth the time right now" — a clean example of scoping out a viable-but-distracting adjacent market rather than chasing it.

{{DIAGRAM:0}}

## Context and motivation

**Consumer trends** show an upward trend of product folks (PM, Design, Eng, Data Science, UXR, PMM) upskilling mid-career by learning directly from competitor practitioners rather than through traditional channels — with early signs of **$1M+ solo/small-team teaching businesses** forming around this. The underlying human needs driving it:

- Career growth and professional influence
- Income growth
- Knowledge
- Pride in quality of work

The **new opportunity** relative to how people solved this in the past (traditional university/exec education): more practical courses with relevant examples, and courses that actually change behavior rather than just teaching concepts.

**Technology trends** include acceptance of remote education via platforms like Coursera and Udacity; quality of video-conferencing software; broad adoption of video conferencing generally (the founder's own example: "my 70-year-old teacher parents" now use Zoom); better class-interaction software (Pigeonhole, Slido, FigJam); and **AI's emerging capability** to help build educational products directly — including richer async-plus-synchronous learning mechanisms, better AI-powered homework feedback systems, and AI coaches paired with a human instructor for a specific course.

**Where this market sits, and how fast decisions get made:** early — only a handful of $1M+/year one-to-few-person online teaching operations exist so far. Potential students make purchase decisions only a few times a year, with deliberation ranging from a day to a month depending on price point and who's paying (self-funded vs. employer-funded). Buyers vary on: how much they value product-thinking/strategy skill in a competitive job market, how much they value the instructor's demonstrated insight (via social posts, newsletters), how much they need/value university-certificate prestige vs. raw learning, and how much they value structured learning vs. self-directed content.

## Full competitor landscape

The **competitive set** spans a wide price range and a wide range of credibility mechanisms:

- **Exec Education** (Wharton, Kellogg, Stanford, etc.) — priced around $5K, strong brand, taught mostly by research academics, solid theory and case studies
- **Reforge / Product Faculty** — $2,000/yr (Reforge) to $2,500 (Product Faculty, online/live), standardized and rigorous course material taught by senior product leaders from different companies, though experience varies by instructor
- **Product School** — priced at $4,500
- **Shreyas (Product Sense)** — $1,800 for one week live, a single coherent philosophy taught by one person, positioned as "not for everyone," senior PM/founder-only, application-gated
- **Lenny's Newsletter** — $180/year, a great mix of product lessons from different companies, extremely well-researched best practices, delivered as self-directed learning
- **Exponent / Product Alliance** — $850 / $750, instructors who are early-career PMs, focused specifically on interview prep

This is the same source material the interview-prep notes in this vault are drawn from — the bootcamp itself sits in the **Exponent/Product Alliance price tier** but is positioned to compete against the full spread above.

## Target audience: segmentation and prioritization

Factors that matter for this specific course: current role (PM vs. non-PM vs. founder), employment state (working vs. not working), tier of current company (top-tier vs. other), and career state (IC3–7 vs. IC7+). These combine into **seven compound segments**, each scored on **reach**, **intensity** (willingness to pay), and **ability to win** given the current competitive power structure — the same rigor as the beachhead segmentation logic used elsewhere in this vault:

- **Segment 1**, non-PMs who want to develop product skills — Medium reach, Medium intensity, Medium win-ability
- **Segment 2**, breaking into PM — Medium reach, High intensity, High win-ability
- **Segment 3**, PMs in active job search — High reach, High intensity, High win-ability
- **Segment 4**, PMs who aspire to break into top-tier companies — High reach, High intensity, High win-ability
- **Segment 5**, PMs at top-tier companies who want to grow IC4–IC7 — Low/Medium reach, Medium intensity, Medium win-ability
- **Segment 6**, Path to CPO — Low reach, High intensity, Low win-ability
- **Segment 7**, Founder — Low reach, High intensity, Low win-ability

**Segments 3 and 4** score high on all three axes and — the founder notes explicitly — are "a lot of times one group of people": PMs in active job search who also aspire to break into top-tier companies.

> Reach × intensity × win-ability — score every segment on all three, because willingness to pay alone is never enough.

**Segments 6** (Path to CPO) and **7** (Founder) score high on willingness-to-pay but low on reach and low on ability to win given the current competitive landscape — correctly deprioritized despite the attractive intensity score, since reach and win-ability are gating factors, not just nice-to-haves.

{{DIAGRAM:1}}

## Customer problems and jobs to be done

The prioritized target segment cares about **building products that add customer value**; has developed strong execution skills working with engineers/designers to ship features; aspires to more influence on product direction; may struggle to articulate product investments and strategy clearly and wants to get better at **product strategy** and **organizational influence**; wants to work in a more empowering culture; wants to experience what "great" looks like at different functions and levels; wants to make the compensation leap to top-tier-company levels; may have interviewed at a top-tier company in the past and missed the cut, and wants to know what it actually takes; is willing to put in deliberate work to get better at product-thinking skills.

The high-level **jobs to be done**:

- Understand what good product thinking/strategy looks like
- Understand what it takes to do good product thinking/strategy
- Learn how to do it themselves at their current job
- Learn how to do it fast, specifically for interviews
- Learn how to operate at higher levels to get promoted

Five **gaps in existing solutions**:

- No comprehensive, practical frameworks that apply across a wide range of product problems
- No in-depth strategy-document examples for common product types
- No examples of what good product thinking looks like specifically inside interviews
- No coverage of the variety of problem types that actually show up
- No structured **deliberate-practice** loop — "since we get random questions in interviews," making generalizable skill more valuable than memorized answers

## Unique solution and positioning — evaluated against five alternatives

The deck evaluates **five possible solution vectors** against four success criteria: Frameworks, Examples, Variety of Problems, and Deliberate Practice.

- **Vector 1**, summaries of great newsletter posts and podcasts — Maybe on Frameworks, Maybe on Examples, Maybe on Variety of Problems, No on Deliberate Practice
- **Vector 2**, breaking down into component skills and building those skills — Yes on Frameworks, Maybe on Examples, No on Variety of Problems, No on Deliberate Practice
- **Vector 3**, frameworks only — Yes on Frameworks, No on Examples, No on Variety of Problems, Maybe on Deliberate Practice
- **Vector 4**, frameworks plus applying to your own problems via a capstone project — Yes on Frameworks, No on Examples, No on Variety of Problems, Maybe on Deliberate Practice
- **Vector 5**, frameworks plus applying to a wide range of product problems plus applying to your own — Yes across all four criteria

**Vector 5** is the only one that scores "yes" across all four criteria rather than a partial "maybe," and it's the chosen approach: comprehensive frameworks shared as simple, actionable mental models that work across a wide range of products; application across **12 technology-product themes** covering roughly **50 product types/markets**, each with examples; live brainstorming sessions to inspire people's thinking on different product types; deliberate practice via end-to-end homework exercises framed as interview-style questions; and live feedback discussion digging into some of the homework, sometimes alongside the founder's own example work.

{{DIAGRAM:2}}

**Differentiation and positioning claim:** the offering solves the top user problems more directly than existing options, is clearly differentiated on outcomes, and leverages the founder's willingness to demonstrate his own thinking live — tackling any product question openly, both async and live — as the **credibility mechanism**, rather than relying on institutional brand (which he doesn't have, vs. Exec Education) or a single narrow philosophy (vs. Shreyas's approach).

**Pricing strategy:** competitors price in the $2K–$5K range. The stated goal is to reach more people and be able to win, so pricing started at **$300 early-bird**, sat at **$750** (with a "Maven discount" to $562 through end of weekend at time of writing), with a planned range of **$750–$950 in 2024** — a deliberate, explicit undercut versus the full competitive set while still sitting above the pure-content Lenny's-Newsletter and Exponent/Product-Alliance tiers.

## 7 Powers, applied to a two-person business

A reminder that **Hamilton Helmer's 7 Powers** framework isn't just for venture-scale companies — the founder maps each power honestly, including where he has none, and the deck includes a comparative evaluation across all five main competitor types plus his own business:

- **Scale Economies** — more students, more margin, more ability to invest further in course development
- **Network Economies** — community value grows with more students, creating a dense network across companies
- **Counter-Positioning** — a unique course/teaching approach that undercuts competitors' cost and time-to-serve business model
- **Switching Costs** — none
- **Branding** — name recognition
- **Cornered Resources** — distribution via social media and newsletters, partnerships with other high-reach influencers
- **Process Power** — course structure, time invested in actually helping students build skills, not just present content

## The comparative power table across competitors

The comparative power evaluation, marking Y where a competitor has the power, runs across **University Exec Ed, Shreyas, Reforge/Product Faculty, Lenny,** and **Crossing Career Chasms (CCC)**:

- **Scale Economies** — all five have it: Univ Y, Shreyas Y, Reforge/Product Faculty Y, Lenny Y, CCC Y
- **Network Economies** — Univ Y, Shreyas Y, Reforge/Product Faculty Y, Lenny none marked, CCC none marked
- **Counter-Positioning** — only CCC has it: Y
- **Switching Costs** — none of the five have it
- **Branding** — Univ Y, Shreyas Y, Reforge/Product Faculty Y, Lenny Y, CCC none marked
- **Cornered Resources** — Shreyas Y and Lenny Y, the others including CCC have none marked
- **Process Power** — only CCC has it: Y

Read across the columns: universities and Reforge win on **Branding** and **Network Economies** but claim no Counter-Positioning or Process Power. Shreyas and Lenny both claim **Cornered Resources** (distribution/audience). Satish's own business is the only one claiming **Counter-Positioning** and **Process Power**, and is honest that it has no Branding and no Switching Costs yet — the gaps aren't hidden, they're named as the current weaknesses to work on.

{{DIAGRAM:3}}

## Go-to-market: deliver value before asking for payment

A **two-cohort marketing plan** is explicitly framed as "doing the work before I get paid, delivering value to people and then asking them to pay."

- **Cohort 1** was a free 28/56-day PM interview-prep sequence delivered to roughly 500 people, plus free 1-hour Product Thinking webinars, intended to create a virtuous cycle of people understanding how good the material is; this reportedly led to **420 people** signing up for interest in Cohort 2
- **Cohort 2** converts that goodwill via a free 3-hour Product Thinking workshop plus sharing a real strategy doc (this one, and the live workshop it accompanies) — with organic support coming from people who already found the free work valuable

A secondary channel is **organic support/referral** from people who find the founder's work valuable, compounding on top of the paid-workshop funnel.`,

 ex:`Position a dealer-side AI assistant. Competitive alternative isn't another AI product — it's the F&I manager calling the lender's dealer line and waiting on hold. Unique attribute: instant answers grounded in that dealer's actual pipeline and program terms. Value in their words: "I keep the customer at the desk instead of losing the deal to a callback." Best-fit segment: high-volume franchise dealers with weekend-heavy traffic (when support lines are thinnest). Category: NOT "AI chatbot" (invites toy comparisons) — "your always-on funding desk." The frame does the selling.`},
"strat-3":{
 dg:{cap:"Moats show up as numbers",t:"split",s:["Claimed moat","Retention holds when competitor launches?","Pricing power holds?","|","No evidence in either? → it's a story","Name the real one or fix the strategy"]},
 ex:`Auto lending moats, honestly ranked: decades of loan-performance data across credit cycles (real — risk models trained on it price risk competitors can't); dealer network integration depth (real — switching a dealer's F&I workflow is painful); brand trust with subprime borrowers (partially real — measurable in direct-channel conversion); "our AI chat assistant" (not a moat — every lender rents the same models within a quarter). The test in practice: when a fintech launches instant pre-approval, does your dealer volume hold? If yes, the integration moat is real. If you also hold rate — pricing power — it's strong.`},
"strat-4":{
 dg:{cap:"Score every roadmap item three ways",t:"flow",s:["Delights? — moves a customer metric","Hard to copy? — tied to a real moat","Margin-enhancing? — revenue, cost, or pricing","Weak on hard-to-copy = wins reviews, loses markets"]},
 ex:`Three auto-finance roadmap items through DHM. (1) Instant prequalification with soft pull: delight high (certainty without credit fear), hard-to-copy medium-high (needs real-time decisioning infrastructure), margin high (higher-intent applicants) — fund it. (2) Payment calculator UI refresh: delight mild, copyable in a sprint, margin neutral — fine, but it's maintenance, not strategy. (3) AI-powered rate-negotiation tips for shoppers: delight high, copy risk total (any GPT wrapper can do it), margin possibly NEGATIVE (compresses your own spread) — the DHM lens catches what enthusiasm misses.`},
"strat-5":{
 dg:{cap:"Ask 'and then what?' before shipping",t:"flow",s:["Intervention ships","Behavior adapts to the new incentive","Target metric improves","System degrades somewhere else?","Guardrail metrics catch it — or customers do"]},
 ex:`First-order: auto-approving more loan applications with a lower documentation bar raises funded volume — metric up, team celebrates. Second-order: dealers learn your bar dropped, route their thinner applications to you, your mix shifts, and 18 months later charge-offs surface in a vintage you can't un-book. Auto lending is a second-order business by nature: every origination decision is a bet whose truth arrives years later. The discipline: for every growth lever, write down "what does this teach dealers/borrowers to do?" and pair it with a vintage-quality guardrail before launch, not after the loss curve bends.`},
"disc-1":{
 dg:{cap:"The Opportunity Solution Tree",t:"flow",s:["Outcome: the metric your team drives","Opportunities: needs in customer language","Solutions: ~3 per opportunity before choosing","Experiments: cheapest test of riskiest assumption"]},
 ex:`Outcome: raise prequalification → funded-loan conversion. From weekly shopper interviews, opportunities emerge in their words: "I don't know if this rate will change at the dealership" (certainty), "I can't tell what I can actually afford monthly with insurance" (total-cost blindness), "the dealer tried to switch my financing" (defense at the desk). Three solutions for the certainty opportunity: rate-lock guarantee, terms shown per-vehicle VIN, a dealer-desk QR that pulls up the locked offer. Cheapest experiment for the riskiest assumption (will dealers honor it?): concierge-test with 5 partner dealers before building anything.`},
"disc-2":{
 dg:{cap:"Four forces at the moment of switching",t:"split",s:["Will they switch?","Push of current pain","Pull of your solution","|","Anxiety about the new","Habit of the old"]},
 ex:`Job: "finance my next car." Functional: get approved at a payment I can afford. Emotional: avoid the shame of a decline at the desk and the fear of being taken advantage of. Social: look like a savvy buyer in front of the salesperson (and my spouse). Now the forces for using prequalification online: push — past dealership humiliation; pull — certainty before walking in. Anxiety — "will checking hurt my credit score?" (this single fear kills more prequalification starts than any UX flaw; the soft-pull message must be unmissable); habit — "the dealer handles financing, that's just how it works." Marketing that only amplifies pull is fighting half the battle.`},
"disc-3":{
 dg:{cap:"Signal vs noise in interviews",t:"split",s:["What they say","'Cool!' / 'I would definitely use that' → noise","Hypotheticals about the future → noise","|","What they DID last time → signal","Workarounds + money/time spent → signal"]},
 ex:`Interviewing car shoppers about an AI budgeting tool: "Would you use an AI that tells you what car you can afford?" — everyone says yes; you learn nothing. Mom Test version: "Tell me about the last time you figured out your car budget. What did you actually do?" Now you hear: opened a bank app, guessed at insurance, texted a friend who "knows cars," used a payment calculator on three sites, gave up and decided at the dealership. That's a real workflow with real seams. And the commitment test: "Can I follow up when we have a prototype — and would you connect me with the friend you texted?" Watch what they do, not what they say.`},
"disc-4":{
 dg:{cap:"Test the scary assumption first",t:"split",s:["Idea = stack of assumptions","High impact-if-wrong + weak evidence → test NOW","Wizard of Oz / concierge / fake door","|","Low impact or strong evidence → later","Match test cost to assumption weight"]},
 ex:`Idea: AI negotiation coach that helps shoppers counter dealer add-ons in real time. Assumption audit — value: will shoppers actually open it mid-negotiation, phone in hand at the desk? (High impact, zero evidence: test first.) Viability: does coaching against add-ons damage the dealer relationships your business depends on? (Kill-shot risk — a week of dealer-council conversations before any code.) Feasibility: fine. The cheap test for value: a Wizard-of-Oz SMS line staffed by two analysts for 20 recruited shoppers over a weekend. Cost: a few thousand dollars. What it saves you from: an eight-week build for a moment when no shopper pulls out their phone.`},
"disc-5":{
 dg:{cap:"Beachhead → dominate → expand",t:"flow",s:["Segment by job + pain intensity, not demographics","Score: pain, pay, reachability, references, winnability","Win the beachhead completely","Expand to adjacent segments who reference it"]},
 ex:`"Car buyers" is not a segment. Real segments by job and circumstance: first-time buyers with thin credit files terrified of rejection; refinancers whose rates dropped since origination; families replacing a totaled vehicle on an insurance clock; credit-rebuilders post-bankruptcy who know exactly what a payment means. For a new refi product, the beachhead test picks "originated at a high rate 18–30 months ago, credit score since improved 40+ points" — burning pain (overpaying monthly, visibly), reachable (you can literally compute who they are from bureau data), winnable (pre-computed offers, one-tap flow). Dominate that before touching the broad market.`},
"data-1":{
 dg:{cap:"North Star and its input tree",t:"split",s:["North Star: value delivered, leads revenue","Input 1: e.g. prequalification starts","Input 2: approval-to-funding conversion","|","Input 3: repeat/refinance rate","Guardrails: vintage quality, complaint rate"]},
 ex:`Weak North Star for the auto business: originations volume (it's revenue-adjacent and gameable by loosening credit — see every lending blow-up in history). Stronger: "funded loans that are current at month 12" or, more product-shaped for Auto Navigator, "shoppers who buy with financing they chose before the dealership." That leads revenue, expresses delivered value (certainty), and resists gaming. Input tree: prequalification starts × completion rate × offer-to-dealer-visit rate × funding rate. Guardrails: early-delinquency vintage curves and dealer NPS — so growth pressure can't quietly buy volume with risk.`},
"data-2":{
 dg:{cap:"Cohort curves tell the truth",t:"split",s:["Plot each cohort over time","Declines to zero → leaky bucket, fix product","Flattens → durable value; height = your business","|","Newer cohorts flatten higher → real improvement","Find the early action that predicts staying"]},
 ex:`Retention reads differently in lending — a loan retains by contract — so cohort analysis moves to the relationship: of customers funded in each quarter, what share have a second product (refi, next car, card) within 36 months? And within the app: of shoppers who prequalified in March, what share return within 45 days (median car-shopping window)? Suppose users who save 3+ vehicles to a garage in week one convert to funded at 2.4x. Before rebuilding onboarding around vehicle-saving, run the causal check: prompt a random half to save vehicles. If conversion doesn't follow, saving was a symptom of intent, not a cause of it.`},
"data-3":{
 dg:{cap:"An experiment you can trust",t:"flow",s:["Power calculation → sample size + duration","Pre-register: one primary metric + ship bar","Run whole weeks; no peeking-and-stopping","Read confidence intervals, not points","Check segments for consistency"]},
 ex:`You test showing the full monthly payment (with estimated insurance and tax) versus loan-payment-only on vehicle pages. Primary metric, pre-registered: prequalification completion. Power says 3 weeks at your traffic — you commit to it, no early stop when day 6 looks great. Result: completion +1.8% (CI ±0.7%), but funded-rate guardrail is flat and one segment stands out — subprime shoppers complete 6% MORE (certainty reduces fear) while super-prime is flat. That segment read isn't just a rollout decision; it's discovery telling you who your certainty positioning actually serves.`},
"data-4":{
 dg:{cap:"The debugging sequence, in order",t:"flow",s:["1 · Is it real? Check instrumentation first","2 · Shape: cliff (deploy/tracking) vs slide (mix)","3 · Segment: platform, geo, channel, new vs existing","4 · Decompose the metric formula","5 · Check mix shift (Simpson's paradox)"]},
 ex:`Monday: "prequalification approvals dropped 9% last week — why?" Sequence: (1) instrumentation — a tracking release Wednesday? No. (2) Shape — cliff on Thursday. What shipped Thursday? A bureau-data vendor migration. (3) Segment — the drop concentrates in thin-file applicants. (4) Decompose — application volume flat; approval rate down only where bureau attributes are missing. (5) Mix — no shift. Root cause: the new vendor returns nulls where the old one returned zeros, and the risk model treats null as high-risk. The story you avoided telling leadership: "demand is softening." The write-up leads with the answer, the evidence, the fix, and the new null-rate monitor.`},
"data-5":{
 dg:{cap:"The AI feature dashboard",t:"split",s:["Quality signals","Acceptance rate + edit distance","Task completion, not just engagement","|","Health signals","Regeneration rate, p95 latency, cost/task"]},
 ex:`Your underwriters get AI-drafted stipulation letters (explaining what documents an applicant still needs). Dashboard: acceptance rate 84% — good. Edit distance tells the richer story: accepted letters are edited heavily in one place — the document list itself — meaning the AI nails the language but misreads which stips are outstanding: a retrieval bug, not a writing bug. Regeneration spikes on bankruptcy-flagged applications: add those to the eval set. Task completion: did the applicant actually submit the right documents within 7 days? That's the metric that justifies the feature — everything else is instrumentation for improving it.`}

"exec-1":{
 dg:{cap:"A PRD that forces decisions",t:"flow",s:["Problem + evidence (data, quotes, tickets)","Outcome: baseline → target metric","Non-goals: what we're consciously NOT doing","Solution narrative incl. failure states","AI addendum: eval plan, cost budget, data story"]},
 ex:`PRD for AI-assisted deal restructuring (when an application is approved with conditions). Problem evidence: 31% of conditioned approvals never fund; dealer interviews say restructuring by phone takes 20+ minutes and customers walk. Outcome: conditioned-approval funding rate 42% → 55%. Non-goals: no changes to credit policy itself; no shopper-facing exposure in v1; no support for commercial vehicles. That non-goals section is what stops three stakeholders from tripling scope in review. AI addendum: eval set of 200 historical restructures graded by senior credit analysts; cost cap $0.08/deal; every suggestion must trace to an actual program rule.`},
"exec-2":{
 dg:{cap:"Portfolio, not just ranking",t:"split",s:["This quarter's capacity","Core: defend retention & trust","Growth bets with clear hypotheses","|","Debt & quality (pay it or it compounds)","1–2 strategic swings"]},
 ex:`Auto platform backlog: dealer-portal latency fix, AI stip-letter drafting, refi pre-computed offers, Spanish-language prequalification, decision-engine tech debt. RICE-score them, but notice what the score hides: cost of delay on refi offers is seasonal (rates are falling NOW — the opportunity decays monthly); the decision-engine debt multiplies the cost of every future item (it's an enabler, scoring poorly alone); Spanish prequalification scores modest on reach but is a strategic bet on an underserved segment leadership has named. The framework opens the debate; the portfolio lens — and opportunity cost per team — closes it.`},
"exec-3":{
 dg:{cap:"Pre-mortem sorting",t:"split",s:["'It failed. What happened?'","Tigers: real → owner + mitigation + date","Paper tigers: named, deprioritized","|","Elephants: what nobody's saying","Classify: blocking / fast-follow / monitor"]},
 ex:`Pre-mortem on launching AI chat for loan servicing. Tigers: a customer in hardship gets a flippant-toned response and it screenshots to social (mitigation: hardship-intent classifier routes to humans, launch-blocking); the assistant states a payoff amount that's wrong by the per-diem interest (mitigation: payoff figures only from the servicing system, never generated). Paper tiger: "customers will hate talking to AI" — your call-deflection data says they hate hold times more. Elephant, surfaced anonymously: the servicing ops VP believes this exists to cut her headcount, and her team is quietly slow-walking integration. No prompt fixes that — the sponsor conversation does.`},
"exec-4":{
 dg:{cap:"Slice thin, end to end",t:"flow",s:["Backbone: the user's whole journey","v1: crudely complete path, AI at ONE step","Cut depth under pressure, never steps","Automate more steps as trust matures"]},
 ex:`Journey for a refinance product: discover savings → check eligibility → submit documents → sign → payoff old loan. The tempting build order is a deluxe document-AI experience first (it's the cool part). Story mapping forces the honest v1: a crude but complete path — pre-computed offer, simple upload, manual back-office verification, e-sign, payoff. AI appears at exactly one step (document classification), humans cover the rest. When the timeline slips, you simplify the upload UX; you do NOT cut the payoff step and ship a "refi" that can't actually retire the old loan. Walking skeleton first, muscles later.`},
"exec-5":{
 dg:{cap:"The quality-cost-latency triangle",t:"split",s:["Pick the operating point together","PM: user-experience constraints","p95 latency budget per surface","|","Eng: the achievable frontier","Fallback chain + error budget agreed"]},
 ex:`Dealer chat: you ask for "instant, always right, on every question." Engineering hears an unbounded spec. The credible conversation: p95 under 3 seconds for program-terms questions (dealers are mid-conversation with a customer); rate-quote accuracy must be 100% — so quotes come from the pricing API and the LLM only narrates them (that design decision came from asking "what makes this hard?"); fallback chain is frontier model → small model → "connect you to the funding desk" — never a hallucinated answer. You've traded scope (narration, not generation, for numbers) to buy certainty where it's non-negotiable. That trade IS the PM job.`},
"comm-1":{
 dg:{cap:"BLUF structure",t:"flow",s:["Line 1: conclusion or ask","2–4 supporting arguments","Data + uncertainty, precisely hedged","Label it: DECISION NEEDED / FYI / BLOCKED"]},
 ex:`Before: "Team has been investigating the recent trends in prequalification and there are several interesting findings across segments that may relate to the vendor migration discussed in..." After (BLUF): "DECISION NEEDED by Thursday: approve rolling back the bureau-vendor migration. Approvals for thin-file applicants dropped 9% — root cause is the new vendor returning nulls our risk model reads as high-risk. Rollback restores ~$4M/month in funded volume; the fix-forward alternative takes 6 weeks. 85% confident in root cause; the open risk is the null-handling patch touching other models. Detail below." An SVP can act on that from a phone, in an elevator.`},
"comm-2":{
 dg:{cap:"Pre-empt the strongest objection",t:"flow",s:["Draft the proposal","Role-play finance, eng, legal, ops","Write the MOO at full steelman strength","Can't answer it? Fix the plan","Can? Open the pitch with it"]},
 ex:`Pitching AI-drafted adverse-action explanations (why an application was declined). The MOO — and legal WILL raise it in the first five minutes: "ECOA requires specific, accurate reasons; a hallucinated explanation is a regulatory violation per letter." Weak response: "the model is very accurate." Strong pre-emption, in your opening: "The obvious concern is compliance. The AI never generates reasons — reasons come only from the decision engine's actual codes; the model translates them to plain English from an approved phrase library, every output is logged against its codes, and 100% go through compliance-reviewed templates for the first 90 days." You've converted the ambush into your credibility moment.`},
"comm-3":{
 dg:{cap:"Power × interest → treatment",t:"split",s:["Map every stakeholder","High power + high interest → co-create","High power + low interest → efficient summaries","|","Low power + high interest → generous updates","Re-map after every reorg"]},
 ex:`Your AI servicing-assistant launch touches: the servicing ops VP (high power, high interest — co-create; her early objections are free consulting), the chief credit officer (high power, low interest until something breaks — monthly three-bullet summary, zero surprises), compliance analysts (lower power, very high interest — generous access; they're your early-warning system and will defend the project in rooms you're not in), and the contact-center agents themselves (low formal power, existential interest — their adoption decides the outcome; treat their skepticism as user research, not resistance). The map isn't politics; it's making sure the launch has no ambushes left in it.`},
"comm-4":{
 dg:{cap:"Tension before solution",t:"flow",s:["Status quo","Tension: what changed / what it costs","Stakes if we don't act","NOW the proposal","Proof → the ask"]},
 ex:`Press-release-first for a refi product: "Your bank notifies eligible customers they're overpaying — and moves them to a lower payment in under ten minutes, without paperwork." If that excites nobody, no six-page PRD will save it. Pitch structure for the exec room: status quo — 400k current customers originated above today's rates; tension — fintechs are mailing them refi offers this quarter, using rates as the wedge into OUR relationship; stakes — losing the loan usually loses the customer, and their next car too; proposal — pre-computed one-tap refi; proof — the concierge pilot's 31% take rate; ask — two teams for two quarters. Solution at slide five, not slide one.`},
"comm-5":{
 dg:{cap:"Route effort by task class",t:"split",s:["Label the week's work","Leverage → your absolute best, deep blocks","Neutral → merely good, templated","|","Overhead → fast, imperfect, automated","Push N+O to AI; reinvest in L"]},
 ex:`A PM week at an auto-finance business, labeled. Leverage: the eval rubric for the underwriting copilot (it defines quality for a year), the dealer-council narrative, the vendor-selection memo. Neutral: sprint review notes, standard status updates, ticket grooming. Overhead: reformatting the same numbers for three different leadership templates, meeting-notes distribution, calendar tetris. The move: AI drafts every N and O artifact (your meeting-notes skill, status templates, auto-pulled metrics), you spend the reclaimed ~6 hours on the eval rubric — the single artifact where being 3x better compounds for quarters. B-minus status updates are a strategy, not a failing.`},
"case-1":{
 dg:{cap:"Copilot's trust mechanics",t:"flow",s:["Ghost text appears inline","Ignoring costs nothing (keep typing)","Accepting costs one keystroke","Code verifies itself: run / test","Every edit = a training label"]},
 ex:`Translate Copilot's lessons to auto finance. The analogue of "code runs or it doesn't" is anywhere verification is native: an AI-drafted deal structure is instantly checked by the pricing engine — bad suggestions cost a glance, so you can ship at 85% quality. The analogue of ghost text: pre-filled fields in the dealer's deal jacket that the F&I manager tabs through — never a modal that interrupts. And the moat lesson transfers exactly: any lender can rent the same model; the durable position is being embedded in the dealer's daily workflow (your platform IS their desk) so the AI shows up where the work already lives.`},
"case-2":{
 dg:{cap:"Capability overhang → interface unlock",t:"flow",s:["Capability exists (GPT-3, 2020)","Wrong wrapper: playground, API keys","Right wrapper: chat, zero learning curve","Explosive adoption; screenshots as marketing","Blank-box weakness: discoverability"]},
 ex:`The capability-overhang question for your world: what can current models already do that no auto-finance product has packaged? Candidates sitting in plain sight: every loan document a customer receives, explained in plain language on demand ("what does this GAP waiver actually cover?"); a trade-in's true payoff-vs-value position, narrated instead of tabulated; the entire F&I menu conversation, simulated for a nervous first-time buyer the night before they visit the dealership. None of these need new models — they need the right wrapper in the right moment. The ChatGPT lesson: the interface unlock IS the product bet, and the first mover on packaging gets a brand.`},
"case-3":{
 dg:{cap:"Personalization as core economics",t:"cycle",s:["Behavioral signals (what they DO)","Models rank every surface","Faster time-to-satisfying-choice","Retention ↑ funds the loop"]},
 ex:`Netflix's framing transplanted: personalization on Auto Navigator isn't a feature, it's conversion economics — every ranked surface (which vehicles, which payment structures, which down-payment defaults) shortens time-to-confident-choice, and confident shoppers fund. The declared-vs-revealed lesson lands hard here: shoppers SAY they want the lowest APR; behavior shows they choose on monthly payment fit and certainty of approval. Design for revealed preference — but note the ethics line the caution flags: optimizing purely for what converts (longer terms, lower payments, more interest paid) against the customer's stated goal is how lenders erode trust and invite regulators. Balance both, visibly.`},
"case-4":{
 dg:{cap:"The wrapper survival test",t:"split",s:["Capability commoditizes — always","Context: proprietary data wired in?","Workflow: does the work happen here?","|","Distribution: bundled where users are?","None of these → Jasper's fate"]},
 ex:`Run the Jasper test on an internal proposal: "standalone AI car-shopping advisor app." When the capability commoditizes — and it will; every OEM, marketplace, and bank will have one — why do YOU keep the shopper? an incumbent lender's honest answers: context (you know their real approval odds, their trade-in's payoff, their existing relationship — no generic advisor does), workflow (financing approval is the moment of truth in the purchase; you own it), distribution (millions of existing customers and the dealer network). So build the advisor INSIDE those advantages — not as a destination app competing with ChatGPT for attention it can't win.`},
"case-5":{
 dg:{cap:"Habit mechanics, honestly used",t:"cycle",s:["Trigger: calibrated, personal timing","Action: small daily win","Reward: progress made visible","Investment: streak, mastery, saved state"]},
 ex:`Duolingo's mechanics power this very app — streaks, spaced repetition, XP. The transplant to auto finance is a credit-building product: daily/weekly micro-actions (on-time payment logged, score-simulator check-in, one lesson on utilization), a streak with forgiveness (a missed week in a hard month must not reset the journey — hardship-aware forgiveness is both the retention play AND the brand play for a bank), and progress made visceral (score trajectory, "you've paid down $1,400 of principal"). The caution transfers too: reward the true goal (financial health), not engagement theater — a bank that gamifies checking the app daily without improving outcomes is optimizing the wrong loop.`}

"intv-1":{
 dgs:[{cap:"CTUC, run in order",t:"flow",s:["Context & Motivation — why now, why us","Target Audience — who's valuable and winnable","User Problems — sequenced by urgency & WTP","Creative Solutions — 11/10 bar, then prioritize","Name your altitude before you answer"]},{cap:"Compression: work → prep → live",t:"flow",s:["At work: weeks, full segment x problem x solution tree","Interview prep: hours, hypothesis-driven priors","Live interview: minutes, sequential prioritization","Pick one segment, top problem, top solution","Defend and adjust on interviewer pushback"]},{cap:"Altitude ladder, broad to narrow",t:"flow",s:["Company/Industry — IC9+/Director+","Product Group — IC7/8, M2, D1","Theme — IC5/6, M1","Task — IC4/5","Sub-task / Action — IC3"]}],
 ex:`Applying CTUC to "how would you improve our auto-refinance product," working through all four boxes at the product-group altitude. For Context & Motivation: rates have been volatile, and a meaningful share of paper originated 18 to 30 months ago is now priced above current market rates — a value-capture opportunity if you can win the refi relationship before a competitor's marketing does. The value-destruction risk is that if you don't act, that book of business either refinances elsewhere, a revenue loss, or sits overpriced, a reputational and regulatory risk in a scrutinized lending category. For Target Audience: not everyone with an outstanding loan — the well-positioned-to-win segment is borrowers whose credit score has visibly improved since origination, where you have proprietary bureau-refresh data competitors may not act on as fast, and who are still early enough in their loan term that refi economics work, meaning balance is high enough relative to closing costs. For User Problems, sequenced: the highest-urgency, highest-willingness-to-pay problem isn't "I don't know rates dropped" — it's "I don't know if refinancing is worth the hassle without a hard credit pull that dings my score to find out." That problem should be tackled before secondary problems like application friction or document collection. For Creative Solutions, at an 11/10 bar: a pre-qualified, soft-pull refi offer pushed proactively the moment a borrower crosses the value threshold, sequenced by savings size so the highest-value borrowers see it first, with the offer itself serving as the answer to "is this worth it" — a stated dollar savings number, not a rate percentage. Checking altitude: this whole exercise sits at the theme level, since refi is one theme within the broader lending product group, appropriate for an IC5/6-scoped answer. A company-altitude version of the same prompt, "should we get into auto refinancing at all," would need a different Context & Motivation section focused on market entry economics, not a single product improvement.`},
"intv-2":{
 dgs:[{cap:"Value creation, destruction & capture",t:"flow",s:["Provider delivers Good/Service to Customer","Payment flows back — money, time, signals, data","Product satisfies a Need, Desire, or Vice","Tech + Consumer Mindset shifts create/destroy value","7 Powers determine who captures it"]},{cap:"A technology shift always cuts two ways",t:"split",s:["One technology shift hits the market","Market Size Growth","New Products Growth","|","Existing Products Shrink","Increased churn, reduced margins"]},{cap:"Doing Context & Motivation well",t:"flow",s:["User Trends — what's constant vs. what's changing","Technology Trends — capabilities, obsolescence, risk","Competitive Powers — which side can leverage what","Motivation to innovate — why now, why us"]}],
 ex:`Running a captive auto lender's refinance business through the Context & Motivation machinery. On the value chain: Provider is the auto lender, Customer is the borrower refinancing, and Payment is money (interest over the loan term) plus, less obviously, signals and contact information — bureau data access, updated income and employment info — that feed underwriting for future cross-sell. This is a Business+Consumer pairing, and the idea that non-money payment converts to money through adjacent products shows up directly: the servicing relationship itself, not just the loan, is a payment-in-kind that funds future auto, insurance, and banking cross-sell. On the Needs/Desires/Vices check: a refi offer isn't really solving "Wealth to Save Money" alone — for a rate-shocked borrower it's also hitting "Convenience to Reduced Friction," no re-shopping effort, and "Relaxation/Boredom to Mindfulness/Mental Fitness" in a soft sense, removing monthly payment anxiety. Naming all three, not just the obvious savings angle, changes what the 11/10 solution looks like. On the four forces: the Technology Shift is that real-time bureau-refresh data now makes soft-pull pre-qualification cheap and instant, which didn't exist a decade ago — this is what makes the whole product economically viable now, not five years ago. The Consumer Mindset Shift is that more borrowers now expect proactive, personalized offers, shaped by fintech UX, rather than expecting to have to shop for a refi themselves, meaning a passive "here's our rate page" strategy under-delivers against current expectations. The Competitive Power is Cornered Resources, proprietary servicing and bureau data on the lender's own existing loan book, plus some Switching Costs from an existing banking relationship, not Scale Economies or Network Economies — which argues the winning move is a data-driven proactive offer, not a price war. On motivation: the risk of not acting is that rate-shocked borrowers refinance away with a competitor, taking the interest income and the servicing relationship with them; the reason now is that bureau-refresh and soft-pull technology only recently made proactive, no-friction pre-qualification cheap enough to do at scale. The sources you'd actually use are the lender's own 10-K and 10-Q for auto-loan-book trend data like delinquency rates and originations, a competitor auto-lender's investor materials if public, and CFPB guidance documents in place of a "founder letter," since this space has its own regulatory-source category that generic tech markets don't.`},

 ex:`Running the same discovery-and-expansion pipeline against a captive auto lender's Refinance Borrowers segment. Painting a rich picture: refinance borrowers already hold an active auto loan, are rate-aware enough to have noticed a shift or been alerted to one, have an existing payment history that's often better than their original approval credit, and are weighing whether the hassle of re-applying is worth the monthly savings. Higher-order jobs include Rate Discovery, am I paying above market and how would I even know; Eligibility Check, do I actually qualify for something meaningfully better; Application, paperwork, credit pull, document collection; Payoff Coordination, closing out the old loan cleanly; and Ongoing Servicing, new payment setup, autopay migration. Running the nine-point diagnostic against the current refi flow, Promise — "save money on your car payment" — is the stated promise, but Time to Value is poor if the flow requires a hard credit pull just to see an estimate; a targeted, low-friction question, soft-pull pre-qualification, beats making the customer commit before they know the payoff. Habit Loop and Skill Growth don't really apply since refi is a one-time event, not a recurring habit — which itself is diagnostic: don't force every one of the nine dimensions onto a product where it doesn't naturally apply. Problem expansion on "Eligibility Check," mirroring the RedFin Research expansion, yields: What's my updated credit tier since origination? What's the current market rate for someone in my updated tier? How much would my payment actually change? Does my remaining loan balance and term make refinancing worth the closing and admin cost? Would refinancing reset my amortization in a way that costs me more in total interest despite a lower payment? Is there a prepayment penalty on my current loan? Each is independently answerable and independently useful. Prioritizing by Reach times Intensity, then Blocker, Eligibility Check has the highest reach since every rate-shocked borrower hits it, the highest intensity since it's the make-or-break question, and it's also a genuine Blocker — nothing downstream matters if the borrower can't first get a trustworthy, low-friction answer to "am I actually eligible for something better." That combination is why it should be solved before investing in downstream flow polish.`},

 ex:`Full 4-step root-cause drill on "approval rate for pre-qualified auto loan offers dropped 12% this month." Step 1, categorize: no recent tracking releases rules out Measurement Accuracy; no deploys that week rules out Product Launch Issues; checking Platform/Infrastructure finds no changes there either. This is a Product/Marketing-side issue, most likely Product Experience/User Behavior or Marketing Impact. Step 2, dig into data: segment by channel, dealer-referred vs. direct-to-consumer, and by funnel stage, offer shown to application started to application completed to approved, and by submetric, approval rate equals application-completion rate times underwriting-pass rate. The drop isolates to one specific cell: dealer-referred applicants, at the underwriting-pass-rate submetric specifically — application volume and completion rate are both flat. Step 3, hypothesize: build the hypothesis table for that one cell. A Product Experience/Backend hypothesis is that a dealer integration is sending stale trade-in valuations that inflate loan-to-value ratios past the risk threshold. A Customer Behavior hypothesis is a genuine credit-quality shift in that channel's applicant mix this month. A Marketing hypothesis is that a new dealer partner onboarded this month has a systematically different, riskier customer base than existing dealer partners. Step 4, experiment: for the backend hypothesis, pull a sample of declined dealer-referred applications and compare submitted vs. current trade-in values; if stale data is the cause, fix the integration refresh cadence and re-run the cohort through underwriting to confirm recovery. For the marketing hypothesis, compare approval rates by individual dealer partner, isolating whether it's one new partner dragging the average down or a broad shift.`},

 ex:`Applying the three-type taxonomy to a captive auto lender's product decisions. A Type 1, feature-vs-feature tradeoff: a lender launches an instant pre-approval widget on the dealer site; pre-approval completions go up 30%, but full loan-application completion rate, the stage after pre-approval, drops 8%. Confirming strategy first — the lender's mission is fast, transparent financing that converts to funded loans, not just top-of-funnel engagement; pre-approval is a means to that end, not the end itself. Defining success as funded-loan volume and approval-to-funding conversion rate, not pre-approval volume alone. Understanding the data means asking whether the drop in full-application completion is an absolute-number problem or just a rate problem on a much larger, lower-intent pre-approval base — is it cannibalistic, pulling in browsers who were never going to finance, or incremental? If funded-loan volume is flat or up despite the completion-rate drop, this is a "flat masking two large swings" situation exactly like the Instagram Stories tradeoff, and the fix is UX — why are qualified pre-approved applicants dropping off at full application — not a rollback of the pre-approval widget. Next steps would instrument the pre-approval-to-application funnel by segment to locate exactly where drop-off is concentrated. A tradeoff over use cases: should the lender optimize approval-rate distribution for a small number of large loans, fewer bigger-ticket vehicle loans, or a large number of small loans, higher volume with smaller average loan size, more used-vehicle and subprime-adjacent lending? Customer-adoption and retention path and portfolio risk concentration are the deciding dimensions, not raw origination revenue, which may look "the same in both" options in isolation. A growth vs. integrity tradeoff: an underwriting model relaxes a debt-to-income threshold to approve more marginal applicants, growing origination volume, but raising the 90-day delinquency rate. This is a precision-recall problem — recall means catching enough good-but-marginal borrowers to grow volume, precision means not approving borrowers who will default. The answer should be stated as a specific point on that curve, such as "accept a DTI threshold that adds X% more approvals while keeping projected 90-day delinquency under Y%," rather than a vague "let's be a bit more flexible on underwriting." Applying the estimation approach to auto lending, a demand-side estimate of addressable refinance borrowers might combine total outstanding auto loans in a market times the share originated 18 to 30 months ago times the share now priced above current market rates, cross-checked against a supply-side estimate built from the lender's own book size and typical industry refi-eligible share — landing in the same order of magnitude is the bar, exactly as in the "how many dentists" example.`},
