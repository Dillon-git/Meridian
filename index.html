 ex:`Auto lenders are themselves buyers of nearly every category in this deck's taxonomy — CRM/sales tooling for loan officers, financial management/ERP for treasury and loan-loss accounting, HR tooling for a distributed sales/servicing workforce, analytics/BI for portfolio performance — so this theme is directly the internal-tooling map for a lending organization's own back office. The more product-relevant parallel is dealer-facing software, which is B2B in exactly the shape this deck describes: a dealership is "the business," and a lender's dealer portal (credit decisioning, e-contracting, funding status, reserve/participation reporting) is a business product whose job is to make the dealer's floor staff faster and their F&I desk more profitable — i.e., it should be evaluated against the same "make money vs. save money, and by what mechanism" discipline the deck applies to every category above. The five-question empathy method is the more directly transferable tool: applied to a dealership F&I manager, it forces concrete answers to "what is their job, how do they submit deals today, what makes financing a deal hard, what would make their life better, and what problem would they pay to have go away" — exactly the kind of grounded discovery a lender's product team should run before building or re-platforming a dealer portal, rather than assuming the internal view of "what dealers need."`},
"intv-29":{
 dgs:[
 {cap:"The seven jobs of money",t:"split",s:["Store · Save · Grow — build wealth over time","Make Payments · Borrow — move money now","Risk Protection — hedge against the unexpected","|","Send/Receive — transfer between parties","Every job filtered by: access, cost, convenience, knowledge, trust"]},
 {cap:"Designing a financial product, step by step",t:"flow",s:["Identify the job — which of the seven value propositions does it serve","Life stage — where is the customer on the ladder from Birth to Old Age","Socioeconomic segment — under-served, middle class, affluent, uber-rich","Diagnose the barrier — access, cost, convenience, knowledge, or trust & security","Regulatory feasibility check — functional separation, consumer protection, systemic risk","Entity-specific strategy — a bank's angle differs from a fintech platform's angle"]},
 {cap:"Wire vs. ACH",t:"split",s:["Send/Receive Money: two transfer rails","Wire — minutes to 1 business day","Wire — tens of dollars, sender-only, largely irrevocable, one-off, up to millions, wide international reach","|","ACH — hours to several business days","ACH — tenths of a cent to 1.5%, sender or receiver can initiate, one-off or recurring, 98% under $25K, limited international reach"]},
 {cap:"Why the space is heavily regulated",t:"split",s:["Three regulatory pressures","Functional separation — Volcker Rule limits proprietary trading","Consumer protection — Gramm-Leach-Bliley (data transparency), Dodd-Frank/CFPB (fair treatment)","|","Systemic risk mitigation — Dodd-Frank & Basel Accords oversight of large conglomerates","Restrictions on speculative activity by commercial banks"]}
 ],
 ex:`Auto loans sit inside "Borrow Money," secured by the vehicle itself — which changes the risk model versus an unsecured personal loan (the lender can repossess collateral, so pricing reflects recovery value, not just credit risk). Running a refi product idea through the full sequence: first, Job — Borrow Money, specifically refinancing an existing auto loan. Second, Life stage — this differs meaningfully by segment; a "Young Adult" financing their first car has different urgency and risk tolerance than a "Family with Kids" refinancing a family vehicle, and the offer's messaging and urgency framing should differ accordingly. Third, Socioeconomic segment — a refi offer aimed at the middle-class segment likely faces a knowledge or convenience problem (they don't know they qualify, or the re-shopping effort isn't worth it for the perceived savings); an under-served segment refinancing out of a subprime original loan is more likely facing an access problem (do they even qualify to requalify at a materially better rate). Fourth, which of the five problems — access, since thin-file or recently-improved-credit borrowers may not know they now qualify for a better rate (arguably a knowledge problem, not a true access problem, since the access exists but is invisible to them); cost, since the effort of re-shopping and re-applying often outweighs the perceived savings for smaller loan balances (a convenience problem in disguise); trust & security, since borrowers are wary of a "too good to be true" unsolicited refi offer from an unfamiliar lender, which argues for surfacing the offer inside a channel they already trust (their existing loan servicer, or the original dealer relationship) rather than cold outreach. Fifth, the regulatory check — any proactive, pre-qualified offer needs a Gramm-Leach-Bliley-compliant data-handling disclosure (since it's built on existing bureau/servicing data) and needs to clear CFPB fair-treatment standards for how the offer is targeted and priced across different borrower segments. Sixth, the entity-specific angle — as the original lender/servicer, the strategic advantage is the existing trusted relationship and proprietary servicing data; a fintech platform competing for the same refi couldn't originate from a position of "we already know your loan history and you already trust us," and would have to win on pure price/convenience instead.`},
"intv-30":{
 dgs:[{cap:"Five waves, five winners",t:"flow",s:["Wave 1: deeper tools → Adobe","Wave 2–3: collaboration (team, then cross-function) → Figma","Wave 4: democratize design → Canva","Wave 5: better & faster for everyone → all three, via generative AI"]},
 {cap:"Two-axis positioning map",t:"split",s:["Two axes position Adobe, Figma, Canva","Skill level — high: Adobe, Figma","Skill level — low: Canva","|","Collaborator scope — designers only: Adobe","Collaborator scope — designers + developers: Figma","Collaborator scope — non-designer businesspeople: Canva"]}],
 ex:`Design platforms don't map onto lending products themselves, but they map directly onto how a lender's own product/design/marketing org operates day to day — which is the honest, non-forced connection here: this is internal tooling for the product/design org, not a customer-facing analog. A lending company's design team plausibly uses exactly this three-platform stack: Figma for the actual loan-application UI/UX and internal design-dev handoff (wave 2/3 territory — designers and engineers collaborating on the borrower-facing flow), Canva for non-designers across marketing, comms, and sales creating rate-sheet graphics, social posts, and dealer-facing flyers without needing design-team support (wave 4 territory — democratizing design output for people whose job isn't design), and Adobe for anything requiring genuine design depth — video ad creative, brand illustration, print collateral for dealer partnerships. The positioning-axes framework (skill level × collaborator scope) is the more transferable planning tool: a lender evaluating its own design-tooling stack should ask the same two questions the deck asks of Adobe/Figma/Canva — who on the team actually needs deep design capability versus who just needs to self-serve simple assets, and where does design collaboration need to extend to engineering versus to non-design business functions like marketing and dealer relations.`},

  {cap:"Five solution vectors scored against four criteria",t:"flow",s:["Vector 1: newsletter/podcast summaries — mostly Maybe, No on practice","Vector 2: component skill-building — Frameworks Yes, rest No/Maybe","Vector 3: frameworks only — Frameworks Yes, others No","Vector 4: frameworks + capstone — still No on Examples/Variety","Vector 5: frameworks + wide examples + own application — Yes on all four"]},
  {cap:"7 Powers: incumbents vs. Crossing Career Chasms",t:"split",s:["7 Powers scorecard across five competitors","Univ / Reforge / Lenny / Shreyas share Scale, Network, Branding","Shreyas and Lenny also claim Cornered Resources","No Counter-Positioning or Process Power claimed by any of them","|","Crossing Career Chasms shares only Scale Economies","Uniquely claims Counter-Positioning and Process Power","Honestly has no Branding and no Switching Costs yet"]}
 ],
 ex:`The transferable lesson isn't the PM-education market — it's the discipline of writing this down at all, at this level of honesty, in under two hours. A PM proposing a new auto-finance product, say a soft-pull pre-qualification refi flow, could run the identical compact exercise: Context (why now — rate volatility creating a refi window), Target Audience (score candidate borrower segments on reach × intensity × win-ability against incumbent lenders, exactly like the seven compound segments in this case), Customer Problems (why existing refi products go unused — likely a knowledge or trust problem per the financial-products problem taxonomy), Unique Solution (evaluate 3–5 solution vectors against explicit success criteria the way the five course-format options were scored here, rather than jumping to the first idea), and a 7 Powers pass on defensibility — does proprietary bureau-refresh data function as a Cornered Resource? Does an existing dealer-relationship network create Network Economies competitors can't replicate? Naming the powers you don't have (this business's honest "Switching Costs: none") is as valuable as naming the ones you do — it tells you exactly what to build next.`}

<script>
/* ===================== MERIDIAN APP v2 ===================== */
/* @APP_LOGIC_SLOT */
"use strict";
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const DAY=86400000;
const clamp=(x,lo,hi)=>Math.min(hi,Math.max(lo,x));
const todayStr=(d=new Date())=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");

/* ---------- state ---------- */
function defaultDB(){return {v:1,updatedAt:0,srs:{},done:{},notes:[],projects:[],custom:[],
  meta:{streak:0,lastDay:"",xp:0,revlog:{},intake:{},gradelog:{},minlog:{}}};}
let DB=defaultDB();
try{const raw=localStorage.getItem("meridian.db");if(raw)DB=Object.assign(defaultDB(),JSON.parse(raw));
  DB.meta=Object.assign(defaultDB().meta,DB.meta||{});}catch(e){}
let VIEW={name:"today",p:null}, deskTab="notes", syncState="off", syncTimer=null, FLOW=false;

function saveLocal(){DB.updatedAt=Date.now();localStorage.setItem("meridian.db",JSON.stringify(DB));queueSync();}
function token(){return localStorage.getItem("meridian.token")||"";}
function gistId(){return localStorage.getItem("meridian.gist")||"";}

/* ---------- theme ---------- */
function themePref(){return localStorage.getItem("meridian.theme")||"light";}
function applyTheme(){
  let t=themePref();
  if(t==="auto")t=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";
  document.documentElement.dataset.theme=t;
  const mc=$("#themeColor");if(mc)mc.content=t==="dark"?"#131217":"#FAF9F5";
}
applyTheme();
if(window.matchMedia)window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change",applyTheme);

/* ---------- cards ---------- */
function allCards(){
  const out=[];
  CONTENT.lessons.forEach(l=>l.cards.forEach((c,i)=>out.push({id:l.id+"#"+i,q:c.q,a:c.a,track:l.track,src:l.title})));
  (DB.custom||[]).forEach(c=>{if(!c.del)out.push({id:c.id,q:c.q,a:c.a,track:c.track||"note",src:c.src||"Your note"});});
  return out;
}
function unlockedCards(){return allCards().filter(c=>c.id.indexOf("#")<0||DB.done[c.id.split("#")[0]]);}
function dueCards(){const now=Date.now();return unlockedCards().filter(c=>DB.srs[c.id]&&!DB.srs[c.id].susp&&DB.srs[c.id].due<=now);}
function newCards(){return unlockedCards().filter(c=>!DB.srs[c.id]);}
function newAllowance(){const t=todayStr();const used=(DB.meta.intake&&DB.meta.intake[t])||0;return Math.max(0,8-used);}
function interleave(cards){
  const by={};cards.forEach(c=>{(by[c.track]=by[c.track]||[]).push(c);});
  const keys=Object.keys(by);const out=[];let more=true;
  while(more){more=false;for(const k of keys){const c=by[k].shift();if(c){out.push(c);more=true;}}}
  return out;
}

/* ---------- SRS engine: FSRS-4.5 ----------
 entry: {s:stability(days), d:difficulty(1-10), reps, lapses, due, last, u, susp}
 UI grades: 0 again, 1 hard, 2 good, 3 easy → FSRS G = g+1 */
const FW=[0.4872,1.4003,3.7145,13.8206,5.1618,1.2298,0.8975,0.031,1.6474,0.1367,1.0461,2.1072,0.0793,0.3246,1.587,0.2272,2.8755];
const F_FACTOR=19/81, F_DECAY=-0.5;
function fsR(days,s){return Math.pow(1+F_FACTOR*Math.max(0,days)/s,F_DECAY);}
function fsS0(G){return Math.max(0.1,FW[G-1]);}
function fsD0(G){return clamp(FW[4]-Math.exp(FW[5]*(G-1))+1,1,10);}
function fsNext(e,G,elapsed){
  const r=fsR(elapsed,e.s);
  let d=e.d-FW[6]*(G-3);
  d=clamp(FW[7]*fsD0(4)+(1-FW[7])*d,1,10);
  let s;
  if(G===1){
    s=FW[11]*Math.pow(e.d,-FW[12])*(Math.pow(e.s+1,FW[13])-1)*Math.exp(FW[14]*(1-r));
    s=Math.min(s,e.s);
  }else{
    const hard=G===2?FW[15]:1, easy=G===4?FW[16]:1;
    s=e.s*(Math.exp(FW[8])*(11-e.d)*Math.pow(e.s,-FW[9])*(Math.exp(FW[10]*(1-r))-1)*hard*easy+1);
  }
  return {d:d,s:clamp(s,0.1,36500)};
}
function fsInterval(s){return clamp(Math.round(s),1,365);} /* desired retention 0.9 → interval = stability */
function migrateSRS(){
  let n=0;
  for(const k in DB.srs){const e=DB.srs[k];
    if(e&&e.s==null){
      e.s=Math.max(0.5,e.iv||0.5);
      e.d=clamp(6.4-((e.ease||2.5)-2.5)*3.2,1,10);
      e.lapses=e.lapses||0;e.last=e.u||Date.now();
      delete e.iv;delete e.ease;n++;
    }}
  if(n){saveLocal();}
  return n;
}
migrateSRS();
function grade(cardId,g){
  const now=Date.now(), G=g+1;
  let e=DB.srs[cardId];
  if(!e){
    const t=todayStr();DB.meta.intake=DB.meta.intake||{};DB.meta.intake[t]=(DB.meta.intake[t]||0)+1;
    e={s:fsS0(G),d:fsD0(G),reps:0,lapses:0,last:now};
  }else{
    const elapsed=Math.max(0,(now-(e.last||now))/DAY);
    const nx=fsNext(e,G,elapsed);
    e.s=nx.s;e.d=nx.d;
  }
  if(g===0){e.lapses=(e.lapses||0)+1;e.due=now+600000;}
  else{e.due=now+fsInterval(e.s)*DAY;}
  e.reps=(e.reps||0)+1;e.last=now;e.u=now;DB.srs[cardId]=e;
  const t=todayStr();
  DB.meta.revlog[t]=(DB.meta.revlog[t]||0)+1;
  DB.meta.gradelog=DB.meta.gradelog||{};
  const gl=DB.meta.gradelog[t]||{n:0,a:0};gl.n++;if(g===0)gl.a++;DB.meta.gradelog[t]=gl;
  DB.meta.minlog=DB.meta.minlog||{};
  DB.meta.minlog[t]=Math.round(((DB.meta.minlog[t]||0)+0.5)*10)/10;
  DB.meta.xp+=2;bumpStreak();saveLocal();
}
function ivPreview(id,g){
  const G=g+1,e=DB.srs[id];
  if(!e)return fsInterval(fsS0(G))+" d";
  const elapsed=Math.max(0,(Date.now()-(e.last||Date.now()))/DAY);
  return fsInterval(fsNext(e,G,elapsed).s)+" d";
}
function bumpStreak(){
  const t=todayStr(),y=todayStr(new Date(Date.now()-DAY));
  if(DB.meta.lastDay===t)return;
  DB.meta.streak=(DB.meta.lastDay===y)?(DB.meta.streak||0)+1:1;
  DB.meta.lastDay=t;
}
function logMin(m){const t=todayStr();DB.meta.minlog=DB.meta.minlog||{};
  DB.meta.minlog[t]=Math.round(((DB.meta.minlog[t]||0)+m)*10)/10;}

/* ---------- gist sync ---------- */
const GFILE="meridian-data.json";
async function gapi(path,opt={}){
  opt.headers=Object.assign({Authorization:"Bearer "+token(),Accept:"application/vnd.github+json"},opt.headers||{});
  const r=await fetch("https://api.github.com"+path,opt);
  if(!r.ok)throw new Error("GitHub "+r.status);
  return r.json();
}
async function ensureGist(){
  if(gistId())return gistId();
  const gists=await gapi("/gists?per_page=100");
  const hit=gists.find(g=>g.files&&g.files[GFILE]);
  if(hit){localStorage.setItem("meridian.gist",hit.id);return hit.id;}
  const made=await gapi("/gists",{method:"POST",body:JSON.stringify({description:"Meridian — AI PM mastery data",public:false,
    files:{[GFILE]:{content:JSON.stringify(DB)}}})});
  localStorage.setItem("meridian.gist",made.id);return made.id;
}
function mergeItems(a,b){const m={};[...(a||[]),...(b||[])].forEach(x=>{if(!x||!x.id)return;if(!m[x.id]||(x.u||0)>(m[x.id].u||0))m[x.id]=x;});return Object.values(m);}
function mergeDB(rem){
  if(!rem||rem.v!==1)return;
  const out=defaultDB();
  out.srs=Object.assign({},rem.srs);
  for(const k in DB.srs){if(!out.srs[k]||(DB.srs[k].u||0)>(out.srs[k].u||0))out.srs[k]=DB.srs[k];}
  out.done=Object.assign({},rem.done,DB.done);
  out.notes=mergeItems(rem.notes,DB.notes);
  out.projects=mergeItems(rem.projects,DB.projects);
  out.custom=mergeItems(rem.custom,DB.custom);
  const rl=rem.meta||{},ll=DB.meta;
  out.meta.xp=Math.max(rl.xp||0,ll.xp||0);
  out.meta.revlog=Object.assign({},rl.revlog);for(const d in ll.revlog){out.meta.revlog[d]=Math.max(out.meta.revlog[d]||0,ll.revlog[d]);}
  out.meta.intake=Object.assign({},rl.intake||{},ll.intake||{});
  out.meta.gradelog=Object.assign({},rl.gradelog||{});
  for(const d in (ll.gradelog||{})){const a=out.meta.gradelog[d]||{n:0,a:0},b=ll.gradelog[d];
    out.meta.gradelog[d]=b.n>=a.n?b:a;}
  out.meta.minlog=Object.assign({},rl.minlog||{});
  for(const d in (ll.minlog||{})){out.meta.minlog[d]=Math.max(out.meta.minlog[d]||0,ll.minlog[d]);}
  if((rl.lastDay||"")>(ll.lastDay||"")){out.meta.lastDay=rl.lastDay;out.meta.streak=rl.streak||0;}
  else if((rl.lastDay||"")<(ll.lastDay||"")){out.meta.lastDay=ll.lastDay;out.meta.streak=ll.streak||0;}
  else{out.meta.lastDay=ll.lastDay;out.meta.streak=Math.max(rl.streak||0,ll.streak||0);}
  out.updatedAt=Date.now();DB=out;
  migrateSRS();
  localStorage.setItem("meridian.db",JSON.stringify(DB));
}
async function pull(){
  if(!token())return;
  setSync("busy");
  try{
    const id=await ensureGist();
    const g=await gapi("/gists/"+id);
    const f=g.files[GFILE];
    let text=f.content;
    if(f.truncated){text=await (await fetch(f.raw_url)).text();}
    mergeDB(JSON.parse(text));
    setSync("ok");
  }catch(e){console.warn(e);setSync("err");}
}
async function push(){
  if(!token())return;
  setSync("busy");
  try{
    const id=await ensureGist();
    await gapi("/gists/"+id,{method:"PATCH",body:JSON.stringify({files:{[GFILE]:{content:JSON.stringify(DB)}}})});
    setSync("ok");
  }catch(e){console.warn(e);setSync("err");}
}
function queueSync(){if(!token())return;clearTimeout(syncTimer);syncTimer=setTimeout(push,2500);}
function setSync(s){syncState=s;const d=document.querySelector(".syncdot");if(d)d.className="syncdot "+s;}
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="hidden"&&token()){clearTimeout(syncTimer);
  try{navigator.sendBeacon&&push();}catch(e){}}});

/* ---------- render helpers ---------- */
function md(body,dgs){
  const fmt=s=>esc(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  return body.trim().split(/\n\n+/).map(p=>{
    p=p.trim();
    const dm=p.match(/^\{\{DIAGRAM:(\d+)\}\}$/);
    if(dm){
      const dg=dgs&&dgs[+dm[1]];
      if(!dg)return "";
      return `<div class="card lux dg-inline"><div class="eyebrow">${esc(dg.cap||"How it flows")}</div>${dgSVG(dg)}</div>`;
    }
    if(p.startsWith("## ")){
      const lines=p.split("\n");const hd=lines.shift();
      let out="<h4>"+esc(hd.slice(3))+"</h4>";
      if(lines.length)out+="<p>"+fmt(lines.join(" "))+"</p>";
      return out;
    }
    if(p.startsWith("- ")){
      const items=p.split("\n").filter(l=>l.trim().startsWith("- ")).map(l=>l.trim().slice(2));
      return "<ul>"+items.map(it=>"<li>"+fmt(it)+"</li>").join("")+"</ul>";
    }
    if(p.startsWith("> ")){
      const lines=p.split("\n").map(l=>l.replace(/^>\s?/,""));
      return "<blockquote>"+fmt(lines.join(" "))+"</blockquote>";
    }
    return "<p>"+fmt(p.replace(/\n/g," "))+"</p>";
  }).join("");
}
/* diagram engine: dg = {t:"flow"|"cycle"|"split", cap, s:[...]} */
function dgWrap(s,max){
  const words=String(s).split(" ");const lines=[];let cur="";
  words.forEach(w=>{if((cur+" "+w).trim().length>max){if(cur)lines.push(cur.trim());cur=w;}else cur+=" "+w;});
  if(cur.trim())lines.push(cur.trim());return lines.slice(0,3);
}
function dgBox(x,y,w,h,label,accent){
  const lines=dgWrap(label,Math.floor(w/7.2));
  const lh=15, ty=y+h/2-(lines.length-1)*lh/2;
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="10" style="fill:${accent?'var(--accent-soft)':'var(--card)'};stroke:${accent?'var(--accent)':'var(--line)'};stroke-width:1"/>`+
    lines.map((ln,i)=>`<text x="${x+w/2}" y="${ty+i*lh}" text-anchor="middle" dominant-baseline="middle" style="fill:var(--ink)" font-size="12" font-family="-apple-system,sans-serif">${esc(ln)}</text>`).join("");
}
function dgArrow(x1,y1,x2,y2){
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" style="stroke:var(--accent-dim)" stroke-width="1.2" marker-end="url(#dgA)"/>`;
}
function dgSVG(dg){
  const W=330, bh=48, gap=24;
  const defs=`<defs><marker id="dgA" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" style="fill:var(--accent-dim)"/></marker></defs>`;
  let inner="",H;
  if(dg.t==="cycle"){
    H=dg.s.length*(bh+gap)-gap+8;
    dg.s.forEach((s,i)=>{
      const y=4+i*(bh+gap);
      inner+=dgBox(46,y,W-92,bh,s,i===0);
      if(i<dg.s.length-1)inner+=dgArrow(W/2,y+bh,W/2,y+bh+gap-2);
    });
    const y0=4+bh/2, y1=4+(dg.s.length-1)*(bh+gap)+bh/2;
    inner+=`<path d="M ${W-46} ${y1} C ${W-8} ${y1}, ${W-8} ${y0}, ${W-44} ${y0}" fill="none" style="stroke:var(--accent-dim)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#dgA)"/>`;
  }else if(dg.t==="split"){
    const bar=dg.s.indexOf("|");
    const left=dg.s.slice(1,bar), right=dg.s.slice(bar+1);
    const rows=Math.max(left.length,right.length);
    H=(bh+gap)+rows*(bh+gap)-gap+8;
    inner+=dgBox(70,4,W-140,bh,dg.s[0],true);
    const bw=(W-40)/2-10;
    inner+=dgArrow(W/2-20,4+bh,20+bw/2,4+bh+gap-2);
    inner+=dgArrow(W/2+20,4+bh,W-20-bw/2,4+bh+gap-2);
    left.forEach((s,i)=>{const y=4+(bh+gap)*(i+1);inner+=dgBox(20,y,bw,bh,s,false);
      if(i<left.length-1)inner+=dgArrow(20+bw/2,y+bh,20+bw/2,y+bh+gap-2);});
    right.forEach((s,i)=>{const y=4+(bh+gap)*(i+1);inner+=dgBox(W-20-bw,y,bw,bh,s,false);
      if(i<right.length-1)inner+=dgArrow(W-20-bw/2,y+bh,W-20-bw/2,y+bh+gap-2);});
  }else{
    H=dg.s.length*(bh+gap)-gap+8;
    dg.s.forEach((s,i)=>{
      const y=4+i*(bh+gap);
      inner+=dgBox(30,y,W-60,bh,s,i===0||i===dg.s.length-1);
      if(i<dg.s.length-1)inner+=dgArrow(W/2,y+bh,W/2,y+bh+gap-2);
    });
  }
  return `<svg viewBox="0 0 ${W} ${H+4}" style="width:100%;height:auto;display:block;margin-top:10px" xmlns="http://www.w3.org/2000/svg">${defs}${inner}</svg>`;
}
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);}
function openSheet(html){$("#sheet").innerHTML=html;$("#modal").classList.add("open");}
function closeSheet(){$("#modal").classList.remove("open");}
$("#modal").addEventListener("click",e=>{if(e.target.id==="modal")closeSheet();});
function nav(name,p){VIEW={name,p:p||null};render();window.scrollTo(0,0);}
function trackOf(id){return CONTENT.tracks.find(t=>t.id===id);}
function lessonsIn(t){return CONTENT.lessons.filter(l=>l.track===t);}
function fmtDate(){return new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});}
function nextLesson(){
  return CONTENT.lessons.find(l=>!DB.done[l.id]&&(!l.req||DB.done[l.req]));
}

}

  return `<svg width="76" height="76" viewBox="0 0 76 76" role="img" aria-label="Daily goal">
    <circle cx="38" cy="38" r="${r}" fill="none" style="stroke:var(--accent-soft)" stroke-width="7"/>
    <circle cx="38" cy="38" r="${r}" fill="none" style="stroke:var(--accent)" stroke-width="7" stroke-linecap="round"
      stroke-dasharray="${(pct*C).toFixed(1)} ${C.toFixed(1)}" transform="rotate(-90 38 38)"/>
    <text x="38" y="36" text-anchor="middle" font-size="16" font-weight="650" style="fill:var(--ink)">${Math.round(mins)}</text>
    <text x="38" y="50" text-anchor="middle" font-size="10" style="fill:var(--ink3)">of ${goal} min</text></svg>`;
}

let SESSION=null;
function reviewMode(){return localStorage.getItem("meridian.mode")||"flip";}
function vReview(){
  if(!SESSION){
    const due=interleave(dueCards());
    const fresh=newCards().slice(0,newAllowance());
    const q=[...due,...fresh];
    if(!q.length){
      const locked=allCards().length-unlockedCards().length;
      return header("Review")+`<div class="empty"><div class="glyph">◈</div>
      <h3 style="margin-bottom:6px">All clear</h3>
      <p style="font-size:14px">No cards due right now.${locked?"<br>Complete lessons to unlock "+locked+" more cards.":""}</p>
      <div style="margin-top:18px">${FLOW&&nextLesson()?`<button class="btn solid" onclick="APP.lesson('${nextLesson().id}')">Next: today's lesson →</button>`:`<button class="btn" onclick="APP.go('library')">Open topics</button>`}</div></div>`;
    }
    SESSION={q,i:0,shown:false,doneCount:0,typed:""};
  }
  const s=SESSION;
  if(s.i>=s.q.length){
    const n=s.doneCount;SESSION=null;
    const l=nextLesson();
    return header("Review")+`<div class="empty"><div class="glyph">✦</div>
      <h3 style="margin-bottom:6px">Session complete</h3>
      <p style="font-size:14px">${n} cards reviewed · +${n*2} XP</p>
      <div style="margin-top:18px" class="btnrow" style="justify-content:center">
      ${FLOW&&l?`<button class="btn solid" onclick="APP.lesson('${l.id}')">Next: today's lesson →</button>`:""}
      <button class="btn ${FLOW&&l?"ghost":"solid"}" onclick="APP.go('today')">Back to Today</button></div></div>`;
  }
  const c=s.q[s.i], mode=reviewMode();
  const modeTabs=`<div class="modetabs">
    <button class="${mode==="flip"?"active":""}" onclick="APP.setMode('flip')">Flip</button>
    <button class="${mode==="type"?"active":""}" onclick="APP.setMode('type')">Type answer</button></div>`;
  let inner=`<div class="eyebrow">${esc((trackOf(c.track)||{name:c.src}).name||c.src)}</div>
    <div class="q">${esc(c.q)}</div>`;
  if(s.shown){
    if(mode==="type"&&s.typed)inner+=`<div class="yours"><strong>Your answer:</strong> ${esc(s.typed)}</div>`;
    inner+=`<div class="a">${esc(c.a)}</div>`;
  }
  let controls;
  if(s.shown){
    controls=`<div class="grade">
    <button class="g-again" onclick="APP.grade(0)">Again<span>10 min</span></button>
    <button onclick="APP.grade(1)">Hard<span>${ivPreview(c.id,1)}</span></button>
    <button class="g-good" onclick="APP.grade(2)">Good<span>${ivPreview(c.id,2)}</span></button>
    <button class="g-easy" onclick="APP.grade(3)">Easy<span>${ivPreview(c.id,3)}</span></button></div>`;
  }else if(mode==="type"){
    controls=`<textarea id="typedIn" placeholder="Type what you remember — then check" style="min-height:90px">${esc(s.typed||"")}</textarea>
    <button class="btn solid" style="width:100%" onclick="APP.checkTyped()">Check answer</button>`;
  }else{
    controls=`<button class="btn solid" style="width:100%" onclick="APP.reveal()">Show answer</button>`;
  }
  return header("Review · "+(s.i+1)+" of "+s.q.length)+modeTabs+
  `<div class="card lux flash">${inner}</div>${controls}`;
}

function vProgress(){
  const cards=unlockedCards();const seen=cards.filter(c=>DB.srs[c.id]).length;
  const mastered=cards.filter(c=>DB.srs[c.id]&&(DB.srs[c.id].s||0)>=21).length;
  const doneLessons=Object.keys(DB.done).filter(k=>k.indexOf("challenge")<0).length;
  const days=[...Array(7)].map((_,i)=>{const d=new Date(Date.now()-(6-i)*DAY);return{k:todayStr(d),l:"SMTWTFS"[d.getDay()]};});
  const mx=Math.max(1,...days.map(d=>DB.meta.revlog[d.k]||0));
  let gN=0,gA=0;const gl=DB.meta.gradelog||{};
  for(let i=0;i<30;i++){const k=todayStr(new Date(Date.now()-i*DAY));if(gl[k]){gN+=gl[k].n;gA+=gl[k].a;}}
  const retention=gN?Math.round((1-gA/gN)*100):null;
  const fc=[...Array(7)].map((_,i)=>{
    const start=Date.now()+i*DAY, end=start+DAY;let n=0;
    for(const k in DB.srs){const e=DB.srs[k];if(e&&!e.susp&&e.due>=(i===0?0:start)&&e.due<end)n++;}
    return n;});
  const fmx=Math.max(1,...fc);
  return header("Stats")+`
  <div class="stats">
    <div class="stat hi"><div class="n">${DB.meta.streak||0}</div><div class="l">Streak</div></div>
    <div class="stat"><div class="n">${retention==null?"—":retention+"%"}</div><div class="l">Retention 30d</div></div>
    <div class="stat"><div class="n">${seen}</div><div class="l">Cards seen</div></div>
    <div class="stat"><div class="n">${mastered}</div><div class="l">Mastered</div></div>
  </div>
  <div class="card"><div class="eyebrow">Reviews · last 7 days</div>
    <div class="week">${days.map(d=>{const v=DB.meta.revlog[d.k]||0;
      return `<div class="col"><div class="colbar" style="height:${Math.round(v/mx*46)+2}px"></div><div class="coll">${d.l}</div></div>`;}).join("")}</div></div>
  <div class="card"><div class="eyebrow">Due forecast · next 7 days</div>
    <div class="week">${fc.map((v,i)=>{const d=new Date(Date.now()+i*DAY);
      return `<div class="col"><div class="colbar" style="height:${Math.round(v/fmx*46)+2}px;background:var(--green)"></div><div class="coll">${i===0?"now":"SMTWTFS"[d.getDay()]}</div></div>`;}).join("")}</div>
    <p class="dim" style="font-size:12px;margin-top:8px">Cards scheduled by FSRS at 90% target retention. Lessons done: ${doneLessons}.</p></div>
  <div class="card"><div class="eyebrow">Mastery by topic</div>
  ${CONTENT.tracks.map(t=>{const ls=lessonsIn(t.id);const d=ls.filter(l=>DB.done[l.id]).length;
    const pct=ls.length?Math.round(d/ls.length*100):0;
    return `<div style="margin-top:12px"><div class="row" style="font-size:13.5px"><span>${t.glyph} ${esc(t.name)}</span><span class="dim">${pct}%</span></div>
    <div class="bar ${pct>=80?"g":""}"><i style="width:${pct}%"></i></div></div>`;}).join("")}</div>`;
}

/* ---------- actions ---------- */
const APP={
  go(name,p){if(name==="review")SESSION=null;if(name==="today")FLOW=false;nav(name,p);},
  startFlow(){FLOW=true;SESSION=null;nav("review");},
  desk(t){deskTab=t;nav("desk");},
  lesson(id){nav("lesson",id);},
  lessonDone(id){const l=CONTENT.lessons.find(x=>x.id===id);
    DB.done[id]=Date.now();DB.meta.xp+=15;if(l)logMin(l.min);bumpStreak();saveLocal();toast("+15 XP — cards unlocked");
    if(FLOW){nav("today");}else{render();}},
  challengeDone(){DB.done["challenge-"+todayStr()]=Date.now();DB.meta.xp+=20;logMin(5);bumpStreak();saveLocal();toast("+20 XP");render();},
  challengeNote(){const doy=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,0))/DAY);
    const ch=CONTENT.challenges[doy%CONTENT.challenges.length];
    APP.editNote(null,"Challenge — "+todayStr(),ch.text+"\n\n");},
  reveal(){SESSION.shown=true;render();},
  checkTyped(){const el=$("#typedIn");SESSION.typed=el?el.value.trim():"";SESSION.shown=true;render();},
  setMode(m){localStorage.setItem("meridian.mode",m);render();},
  lockedMsg(){toast("Finish the prerequisite lesson first");},
  grade(g){const c=SESSION.q[SESSION.i];grade(c.id,g);SESSION.doneCount++;
    if(g===0)SESSION.q.push(c);
    SESSION.i++;SESSION.shown=false;SESSION.typed="";render();},
  note(id){nav("note",id);},
  project(id){nav("project",id);},
  editNote(id,title,body){
    const n=id?(DB.notes||[]).find(x=>x.id===id):null;
    openSheet(`<h3>${n?"Edit note":"New note"}</h3>
    <label class="f">Title</label><input type="text" id="nt" value="${esc(n?n.title:(title||""))}">
    <label class="f">Note</label><textarea id="nb">${esc(n?n.body:(body||""))}</textarea>
    <div class="btnrow"><button class="btn solid" onclick="APP.saveNote('${id||""}')">Save</button>
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);
  },
  saveNote(id){
    const t=$("#nt").value.trim(),b=$("#nb").value.trim();
    if(!t&&!b)return closeSheet();
    if(id){const n=DB.notes.find(x=>x.id===id);n.title=t;n.body=b;n.u=Date.now();}
    else DB.notes.push({id:"n"+Date.now(),title:t,body:b,u:Date.now()});
    saveLocal();closeSheet();nav("desk");toast("Saved");
  },
  delNote(id){const n=DB.notes.find(x=>x.id===id);if(n){n.del=true;n.u=Date.now();saveLocal();}nav("desk");},
  noteToCard(id){
    const n=DB.notes.find(x=>x.id===id);
    openSheet(`<h3>New flashcard</h3>
    <label class="f">Front — the question</label><input type="text" id="cq" value="${esc(n.title)}">
    <label class="f">Back — the answer</label><textarea id="ca">${esc(n.body.slice(0,300))}</textarea>
    <div class="btnrow"><button class="btn solid" onclick="APP.saveCard('${id}')">Add to rotation</button>
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);
  },
  saveCard(){
    const q=$("#cq").value.trim(),a=$("#ca").value.trim();
    if(!q||!a)return;
    DB.custom.push({id:"c"+Date.now(),q,a,u:Date.now(),src:"Your note"});
    saveLocal();closeSheet();toast("Card added to rotation");
  },
  editProject(id){
    const p=id?(DB.projects||[]).find(x=>x.id===id):null;
    const lines=a=>(a||[]).join("\n");
    openSheet(`<h3>${p?"Edit project":"New project"}</h3>
    <label class="f">Name</label><input type="text" id="pn" value="${esc(p?p.name:"")}">
    <label class="f">Status</label><select id="ps">${["active","planning","launched","paused"].map(s=>`<option ${p&&p.status===s?"selected":""}>${s}</option>`).join("")}</select>
    <label class="f">One-line summary</label><input type="text" id="psu" value="${esc(p?p.summary:"")}">
    <label class="f">Details to remember — one per line</label><textarea id="pd">${esc(lines(p&&p.details))}</textarea>
    <label class="f">Decisions — one per line</label><textarea id="pde">${esc(lines(p&&p.decisions))}</textarea>
    <label class="f">Open questions — one per line</label><textarea id="pq">${esc(lines(p&&p.questions))}</textarea>
    <div class="btnrow"><button class="btn solid" onclick="APP.saveProject('${id||""}')">Save</button>
    <button class="btn ghost" onclick="APP.closeSheet()">Cancel</button></div>`);
  },
  saveProject(id){
    const split=v=>v.split("\n").map(x=>x.trim()).filter(Boolean);
    const data={name:$("#pn").value.trim(),status:$("#ps").value,summary:$("#psu").value.trim(),
      details:split($("#pd").value),decisions:split($("#pde").value),questions:split($("#pq").value),u:Date.now()};
    if(!data.name)return;
    if(id){Object.assign(DB.projects.find(x=>x.id===id),data);}
    else{data.id="p"+Date.now();DB.projects.push(data);}
    saveLocal();closeSheet();deskTab="projects";nav("desk");toast("Saved");
  },
  delProject(id){const p=DB.projects.find(x=>x.id===id);if(p){p.del=true;p.u=Date.now();saveLocal();}deskTab="projects";nav("desk");},
  closeSheet,
  settings(){
    openSheet(`<h3>Settings</h3>
    <label class="f">Appearance</label><select id="sth">${["light","dark","auto"].map(s=>`<option ${themePref()===s?"selected":""}>${s}</option>`).join("")}</select>
    <label class="f">GitHub token</label><input type="password" id="stok" value="${esc(token())}" autocomplete="off">
    <label class="f">Gist ID ${gistId()?"(connected)":""}</label><input type="text" id="sgist" value="${esc(gistId())}" placeholder="auto-created on first sync">
    <div class="btnrow">
      <button class="btn solid" onclick="APP.saveSettings()">Save &amp; sync</button>
      <button class="btn small ghost" onclick="APP.exportData()">Export JSON</button>
      <button class="btn small ghost" onclick="APP.importData()">Import</button>
      <button class="btn small danger" onclick="APP.reset()">Reset device</button></div>
    <p class="dim" style="font-size:12px;margin-top:14px">Tip: to let Claude update your content and projects, share the Gist ID above in a Cowork session and ask it to “update my Meridian”.</p>`);
  },
  saveSettings(){
    localStorage.setItem("meridian.theme",$("#sth").value);applyTheme();
    localStorage.setItem("meridian.token",$("#stok").value.trim());
    const g=$("#sgist").value.trim();if(g)localStorage.setItem("meridian.gist",g);else localStorage.removeItem("meridian.gist");
    closeSheet();pull().then(()=>{render();toast("Synced");});
  },
  exportData(){
    const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="meridian-backup-"+todayStr()+".json";a.click();
  },
  importData(){
    const inp=document.createElement("input");inp.type="file";inp.accept=".json";
    inp.onchange=()=>{const f=inp.files[0];const r=new FileReader();
      r.onload=()=>{try{mergeDB(JSON.parse(r.result));saveLocal();render();toast("Imported & merged");}catch(e){toast("Invalid file");}};
      r.readAsText(f);};
    inp.click();
  },
  reset(){if(confirm("Erase local data on this device? (Your Gist is untouched.)")){localStorage.removeItem("meridian.db");location.reload();}},
  async connect(){
    const t=$("#tok").value.trim();
    if(!t)return toast("Paste your token first");
    localStorage.setItem("meridian.token",t);
    toast("Connecting…");
    try{await ensureGist();await pull();localStorage.setItem("meridian.setup","1");nav("today");toast("Connected ✓");}
    catch(e){toast("Couldn't connect — check the token");localStorage.removeItem("meridian.token");}
  },
  skipSetup(){localStorage.setItem("meridian.setup","1");nav("today");}
};
window.APP=APP;

/* ---------- router ---------- */
function render(){
  const setup=!localStorage.getItem("meridian.setup");
  $("#nav").style.display=setup?"none":"";
  let html;
  if(setup)html=vSetup();
  else switch(VIEW.name){
    case "library":html=vLibrary();break;
    case "lesson":html=vLesson();break;
    case "review":html=vReview();break;
    case "desk":html=vDesk();break;
    case "note":html=vNote();break;
    case "project":html=vProject();break;
    case "progress":html=vProgress();break;
    default:html=vToday();
  }
  $("#app").innerHTML=html;
  document.querySelectorAll("nav button").forEach(b=>{
    b.classList.toggle("active",b.dataset.v===VIEW.name||(VIEW.name==="lesson"&&b.dataset.v==="library")||(VIEW.name==="note"||VIEW.name==="project")&&b.dataset.v==="desk");
    b.onclick=()=>APP.go(b.dataset.v);
  });
}

/* ---------- boot ---------- */
render();
if(token()){pull().then(render);}
if("serviceWorker" in navigator&&location.protocol.startsWith("http")){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>

</body>
</html>
